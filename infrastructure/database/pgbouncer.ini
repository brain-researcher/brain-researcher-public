;;;
;;; PgBouncer configuration for Brain Researcher platform
;;; Optimized for high-availability, connection pooling, and load balancing
;;;

[databases]
; Database connections for Brain Researcher services
brain_researcher = host=postgres port=5432 dbname=brain_researcher user=postgres pool_size=50 max_db_connections=100

; Separate connection pools for different service types
brain_researcher_readonly = host=postgres port=5432 dbname=brain_researcher user=readonly pool_size=30 max_db_connections=50
brain_researcher_analytics = host=postgres port=5432 dbname=brain_researcher user=analytics pool_size=20 max_db_connections=30

; Knowledge graph database connections (if using separate DB)
br_kg_db = host=postgres port=5432 dbname=br-kg user=postgres pool_size=25 max_db_connections=50

; Test database for integration tests
brain_researcher_test = host=postgres port=5432 dbname=brain_researcher_test user=postgres pool_size=10 max_db_connections=20

; High-performance connection for batch processing
brain_researcher_batch = host=postgres port=5432 dbname=brain_researcher user=batch_user pool_size=5 max_db_connections=10

;;;
;;; Connection pool settings
;;;

[pgbouncer]
; Network and basic settings
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/pgbouncer

; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
auth_hba_file = /etc/pgbouncer/pg_hba.conf

; Connection pooling mode
; transaction - best for web applications (recommended for Brain Researcher)
; session - for applications that need session-level features
; statement - most aggressive pooling (use with caution)
pool_mode = transaction

; Pool size limits
max_client_conn = 1000
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 10
reserve_pool_timeout = 5
max_db_connections = 200

; Connection limits per user/database
max_user_connections = 100

; Server connection settings
server_reset_query = DISCARD ALL
server_reset_query_always = 0
server_check_delay = 30
server_check_query = SELECT 1

; Connection timeouts (seconds)
server_connect_timeout = 15
server_login_retry = 15
server_idle_timeout = 600
server_lifetime = 3600
client_idle_timeout = 0
client_login_timeout = 60

; Query timeout and cancellation
query_timeout = 300
query_wait_timeout = 120
cancel_wait_timeout = 10

; DNS settings
dns_max_ttl = 15
dns_zone_check_period = 0
dns_nxdomain_ttl = 15

; Logging configuration
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
log_stats = 1

; Syslog settings (if needed)
syslog = 0
syslog_facility = daemon
syslog_ident = pgbouncer

; Log file rotation
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

; Statistics and monitoring
stats_period = 60
stats_users = postgres,pgbouncer

; Application name for connection tracking
application_name_add_host = 1

;;;
;;; Advanced configuration
;;;

; TCP socket options
tcp_defer_accept = 0
tcp_socket_buffer = 0
tcp_keepalive = 1
tcp_keepcnt = 3
tcp_keepidle = 600
tcp_keepintvl = 30
tcp_user_timeout = 0

; Memory management
pkt_buf = 4096
listen_backlog = 128

; Security settings
ignore_startup_parameters = extra_float_digits

; Admin interface
admin_users = postgres,pgbouncer_admin
stats_users = postgres,pgbouncer_stats

; So_reuseport for better performance on multi-core systems
so_reuseport = 1

; Disable prepared statements in transaction pooling mode
server_reset_query = DISCARD ALL

;;;
;;; Performance tuning for Brain Researcher workloads
;;;

; Optimizations for mixed read/write workloads
autodb_idle_timeout = 3600

; Connection pool optimization for different service patterns
; - Orchestrator service: high concurrency, short transactions
; - BR-KG service: read-heavy with some long-running queries
; - Agent service: mixed workload with potential long-running operations
; - Analytics service: long-running analytical queries

; Enable verbose logging for debugging (disable in production)
verbose = 0

;;;
;;; Service-specific pool configurations
;;; These can be overridden per database in the [databases] section
;;;

; Default configuration suitable for most services
default_pool_size = 50
max_db_connections = 100

; For read-heavy services (BR-KG)
; Use in database config: pool_size=30

; For analytical workloads
; Use in database config: pool_size=20 max_db_connections=30

; For batch processing
; Use in database config: pool_size=5 max_db_connections=10

;;;
;;; Monitoring and health checks
;;;

; Enable built-in health check endpoint
; Can be used with load balancers and orchestration systems
server_check_query = SELECT 1

; Statistics collection for monitoring tools
stats_period = 60

; Log important events
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

;;;
;;; High availability and failover
;;;

; Connection retry settings
server_login_retry = 15
server_connect_timeout = 15

; Graceful connection handling
server_lifetime = 3600
server_idle_timeout = 600

; Client connection management
client_idle_timeout = 0  # No timeout for client connections
client_login_timeout = 60

;;;
;;; Security considerations
;;;

; Authentication method (md5 recommended for production)
auth_type = md5

; User authentication file
auth_file = /etc/pgbouncer/userlist.txt

; Optional: HBA-style authentication
auth_hba_file = /etc/pgbouncer/pg_hba.conf

; Admin access control
admin_users = postgres,pgbouncer_admin
stats_users = postgres,pgbouncer_stats,grafana

;;;
;;; Environment-specific overrides
;;;

; These settings can be overridden via environment variables:
; PGBOUNCER_LISTEN_ADDR
; PGBOUNCER_LISTEN_PORT
; PGBOUNCER_POOL_MODE
; PGBOUNCER_MAX_CLIENT_CONN
; PGBOUNCER_DEFAULT_POOL_SIZE
; PGBOUNCER_AUTH_TYPE
; PGBOUNCER_AUTH_FILE

;;;
;;; Integration with orchestration systems
;;;

; For Docker Swarm:
; - Use service discovery for database host
; - Mount configuration files as configs
; - Use secrets for authentication

; For Kubernetes:
; - Use ConfigMaps for configuration
; - Use Secrets for authentication
; - Consider using operators for advanced management

;;;
;;; Monitoring integration
;;;

; Prometheus metrics can be collected via:
; - pgbouncer_exporter sidecar
; - Custom scripts reading SHOW STATS
; - Integration with existing monitoring stack

; Key metrics to monitor:
; - Total connections (client and server)
; - Pool utilization
; - Query wait times
; - Connection errors
; - Query timeouts

;;;
;;; Tuning notes for Brain Researcher
;;;

; The Brain Researcher platform has several distinct workload patterns:
;
; 1. Web UI requests: Short-lived, frequent, predictable load
;    - Use transaction pooling
;    - Higher pool sizes
;    - Lower timeouts
;
; 2. LLM Agent operations: Variable duration, can be long-running
;    - Consider dedicated pools
;    - Higher query timeouts
;    - Careful connection management
;
; 3. Knowledge graph queries: Mix of simple lookups and complex analytics
;    - Separate pools for different query types
;    - Read-only replicas for heavy analytics
;
; 4. Data ingestion: Batch operations, potentially long-running
;    - Dedicated pool with lower concurrency
;    - Higher timeouts
;    - Bulk operation optimization

;;;
;;; Maintenance and operations
;;;

; Regular maintenance tasks:
; - Monitor pool utilization
; - Analyze slow query logs
; - Review connection patterns
; - Optimize pool sizes based on usage
; - Update configuration based on workload changes

; Health check commands:
; SHOW POOLS; SHOW CLIENTS; SHOW SERVERS; SHOW STATS;

; Emergency operations:
; SUSPEND; RESUME; RELOAD; SHUTDOWN;

; Configuration reload without downtime:
; RELOAD;

;;;
;;; End of configuration
;;;

; This configuration is optimized for the Brain Researcher platform's
; multi-service architecture with varying workload characteristics.
; Adjust pool sizes and timeouts based on observed usage patterns.
