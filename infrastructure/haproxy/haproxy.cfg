global
    # Global settings for HAProxy
    daemon
    log stdout local0 info

    # Performance tuning
    maxconn 4096
    nbproc 1
    nbthread 4

    # Security
    chroot /var/lib/haproxy
    user haproxy
    group haproxy

    # SSL/TLS settings
    ssl-default-bind-options ssl-min-ver TLSv1.2
    ssl-default-bind-ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-server-options ssl-min-ver TLSv1.2

    # Stats socket for runtime configuration
    stats socket /var/run/haproxy.sock mode 600 level admin
    stats timeout 30s

defaults
    # Default settings for all sections
    mode http
    log global
    option httplog
    option dontlognull
    option log-health-checks
    option redispatch

    # Timeouts
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 15s
    timeout http-keep-alive 2s
    timeout check 5s

    # Error pages
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

    # Health check settings
    default-server inter 30s downinter 5s rise 2 fall 3 slowstart 60s maxconn 256 maxqueue 128 weight 100

# Statistics interface
frontend stats
    bind *:8080
    mode http
    stats enable
    stats uri /stats
    stats refresh 30s
    stats realm HAProxy\ Statistics
    stats auth admin:${HAPROXY_STATS_PASSWORD}
    stats admin if TRUE

    # Real-time monitoring endpoints
    http-request use-service prometheus-exporter if { path /metrics }

# Frontend for HTTPS traffic
frontend https_frontend
    bind *:443 ssl crt /etc/ssl/certs/brain-researcher.pem
    mode http

    # Security headers
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-Frame-Options "SAMEORIGIN"
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"

    # Rate limiting
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny if { sc_http_req_rate(0) gt 20 }

    # Routing based on path
    acl is_api path_beg /api/
    acl is_orchestrator path_beg /orchestrator/
    acl is_br_kg path_beg /br-kg/
    acl is_agent path_beg /agent/
    acl is_websocket hdr(Upgrade) -i websocket

    # Backend selection
    # Browser-facing /api traffic terminates at the Web UI facade.
    use_backend web_ui_backend if is_api
    use_backend orchestrator_backend if is_orchestrator
    use_backend br_kg_backend if is_br_kg
    use_backend agent_backend if is_agent
    use_backend websocket_backend if is_websocket
    default_backend web_ui_backend

# Frontend for HTTP traffic (redirect to HTTPS)
frontend http_frontend
    bind *:80
    mode http

    # Health check endpoint (no redirect)
    acl is_health_check path_beg /health
    use_backend health_check_backend if is_health_check

    # Redirect all other HTTP to HTTPS
    redirect scheme https code 301 if !{ ssl_fc }

# Backend for Orchestrator service
backend orchestrator_backend
    mode http
    balance leastconn

    # Health check
    option httpchk GET /health HTTP/1.1\r\nHost:\ orchestrator

    # Session affinity for job consistency
    cookie ORCHESTRATOR insert indirect nocache secure httponly

    # Connection pooling and keep-alive
    http-reuse safe

    # Advanced load balancing with weights
    server orch-1 orchestrator:3001 check cookie orch-1 weight 100 maxconn 200
    server orch-2 orchestrator:3001 check cookie orch-2 weight 100 maxconn 200
    server orch-3 orchestrator:3001 check cookie orch-3 weight 100 maxconn 200
    server orch-4 orchestrator:3001 check cookie orch-4 weight 100 maxconn 200
    server orch-5 orchestrator:3001 check cookie orch-5 weight 100 maxconn 200

# Backend for BR-KG service
backend br_kg_backend
    mode http
    balance roundrobin

    # Health check
    option httpchk GET /health HTTP/1.1\r\nHost:\ br-kg

    # Connection pooling
    http-reuse safe

    # Cache-friendly routing for read operations
    acl is_read method GET HEAD
    hash-type consistent

    server br-kg-1 br-kg:5000 check weight 100 maxconn 150
    server br-kg-2 br-kg:5000 check weight 100 maxconn 150
    server br-kg-3 br-kg:5000 check weight 100 maxconn 150
    server br-kg-4 br-kg:5000 check weight 100 maxconn 150

# Backend for Agent service
backend agent_backend
    mode http
    balance leastconn  # LLM requests benefit from least connections

    # Health check
    option httpchk GET /health HTTP/1.1\r\nHost:\ agent

    # Longer timeouts for LLM processing
    timeout server 300s
    timeout connect 10s

    # Connection pooling
    http-reuse safe

    # Load balancing with connection limits for GPU-intensive tasks
    server agent-1 agent:8000 check weight 100 maxconn 50
    server agent-2 agent:8000 check weight 100 maxconn 50
    server agent-3 agent:8000 check weight 100 maxconn 50

# Backend for Web UI
backend web_ui_backend
    mode http
    balance roundrobin

    # Health check
    option httpchk GET /health HTTP/1.1\r\nHost:\ web-ui

    # Static content optimization
    compression algo gzip
    compression type text/html text/css text/javascript application/javascript application/json

    # Connection pooling
    http-reuse safe

    server web-ui-1 web-ui:3000 check weight 100
    server web-ui-2 web-ui:3000 check weight 100
    server web-ui-3 web-ui:3000 check weight 100
    server web-ui-4 web-ui:3000 check weight 100

# Backend for WebSocket connections
backend websocket_backend
    mode http
    balance source  # Sticky sessions for WebSocket

    # WebSocket-specific settings
    timeout tunnel 3600s  # 1 hour for long-lived connections

    # Health check
    option httpchk GET /ws/health HTTP/1.1\r\nHost:\ orchestrator

    server orch-ws-1 orchestrator:3001 check weight 100
    server orch-ws-2 orchestrator:3001 check weight 100
    server orch-ws-3 orchestrator:3001 check weight 100

# Health check backend (for load balancer health)
backend health_check_backend
    mode http
    http-request return status 200 content-type "application/json" string '{"status":"healthy","timestamp":"'$(date -Iseconds)'"}'

# Backup backend for maintenance
backend maintenance_backend
    mode http
    http-request return status 503 content-type "text/html" file /etc/haproxy/maintenance.html

# Advanced configuration sections

# Listen section for Redis load balancing (if needed)
listen redis_cluster
    bind *:6379
    mode tcp
    balance first

    # Redis health check
    option tcp-check
    tcp-check send PING\r\n
    tcp-check expect string +PONG

    server redis-master redis-master:6379 check inter 1s
    server redis-replica-1 redis-replica:6379 check inter 1s backup
    server redis-replica-2 redis-replica:6379 check inter 1s backup

# PostgreSQL connection load balancing through PgBouncer
listen postgres_pool
    bind *:5432
    mode tcp
    balance leastconn

    # PostgreSQL health check
    option pgsql-check user postgres

    server pgbouncer-1 pgbouncer:6432 check inter 30s
    server pgbouncer-2 pgbouncer:6432 check inter 30s

# Custom error pages and maintenance mode
# These can be dynamically switched using HAProxy stats interface

# Resolvers for dynamic service discovery (if using Docker Swarm)
resolvers docker_resolver
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold other 30s
    hold refused 30s
    hold nx 30s
    hold timeout 30s
    hold valid 10s
    hold obsolete 30s

# Mailers for alerting (optional)
mailers smtp_mailers
    mailer smtp_server 127.0.0.1:587

# Peers for high availability (multiple HAProxy instances)
peers haproxy_peers
    peer haproxy-1 127.0.0.1:1024
    peer haproxy-2 127.0.0.2:1024
