# Production overrides for a single-node k3s cluster on GCE VM.
#
# Usage:
#   helm upgrade --install brain-researcher infrastructure/k8s/helm/brain-researcher \
#     -n brain-researcher-core --create-namespace \
#     -f infrastructure/deployment/gce_k3s/values.prod.yaml \
#     --set global.domain="${DOMAIN}" \
#     --set global.imageRegistry="${IMAGE_REGISTRY}" \
#     --set global.imageTag="${TAG}"

global:
  # Override via `--set global.domain=...`
  domain: brain-researcher.com
  imageRegistry: docker.io/zjc062
  imageTag: "20260528224312-brkg-d28846f56"
  imagePullPolicy: IfNotPresent
  environment: production
  storageClass: local-path

# k3s ships Traefik by default (unless disabled during install).
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: brain-researcher-tls
      hosts:
        - "{{ .Values.global.domain }}"
  hosts:
    - host: "{{ .Values.global.domain }}"
      paths:
        # Catch-all: Next.js handles /api/* internally via rewrites
        - path: /
          pathType: Prefix
          service:
            name: web-ui
            port: 3000
        - path: /mcp/setup
          pathType: Prefix
          service:
            name: web-ui
            port: 3000
        - path: /mcp
          pathType: Prefix
          service:
            name: mcp
            port: 7000
        - path: /.well-known/oauth-protected-resource
          pathType: Prefix
          service:
            name: mcp
            port: 7000
        # WebSocket endpoint for orchestrator
        - path: /ws
          pathType: Prefix
          service:
            name: orchestrator
            port: 3001

# Disable the legacy RWX shared volume (NFS / EFS). When disabled, the chart
# mounts an `emptyDir` for paths that previously used the PVC.
storage:
  sharedData:
    enabled: false

# Shared JobStore for agent + orchestrator in single-node k3s
jobStore:
  enabled: true
  hostPath: /srv/brain-researcher/jobstore
  mountPath: /app/jobstore

# k3s already provides ingress; disable the chart nginx reverse-proxy.
nginx:
  enabled: false

# Keep the surface area minimal for k3s MVP deployments.
apiGateway:
  enabled: false

