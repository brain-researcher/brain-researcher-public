# Secret templates for Brain Researcher platform
# Contains sensitive configuration data with proper security practices
# Note: In production, these should be created with actual encrypted values
# and managed through proper secret management systems like Sealed Secrets,
# External Secrets Operator, or Vault

---
apiVersion: v1
kind: Secret
metadata:
  name: llm-api-keys
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: llm-api-keys
    app.kubernetes.io/component: secrets
  annotations:
    # Kubernetes automatically adds this annotation for Opaque secrets
    # sealedsecrets.bitnami.com/managed: "true"  # Uncomment if using Sealed Secrets
type: Opaque
stringData:
  # LLM API Keys - Replace with actual values
  OPENAI_API_KEY: "your-openai-api-key-here"
  ANTHROPIC_API_KEY: "your-anthropic-api-key-here"
  DEEPSEEK_API_KEY: "your-deepseek-api-key-here"
  
  # Additional LLM providers (if needed)
  HUGGINGFACE_API_KEY: "your-huggingface-api-key-here"
  COHERE_API_KEY: "your-cohere-api-key-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: brain-researcher-data
  labels:
    app.kubernetes.io/name: database-credentials
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # PostgreSQL credentials
  POSTGRES_USER: "brain_researcher"
  POSTGRES_PASSWORD: "your-secure-postgres-password-here"
  POSTGRES_DB: "brain_researcher"
  POSTGRES_ROOT_PASSWORD: "your-secure-root-password-here"
  
  # Redis credentials (if authentication is enabled)
  REDIS_PASSWORD: "your-secure-redis-password-here"
  
  # Connection strings
  POSTGRES_URL: "postgresql://brain_researcher:your-secure-postgres-password-here@postgres-service:5432/brain_researcher"
  REDIS_URL: "redis://:your-secure-redis-password-here@redis-service:6379"

---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secrets
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: jwt-secrets
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # JWT signing secrets - Generate secure random strings in production
  JWT_SECRET_KEY: "<JWT_SECRET_KEY>"
  JWT_REFRESH_SECRET: "<JWT_REFRESH_SECRET>"
  
  # Session secrets
  SESSION_SECRET: "your-secure-session-secret-key-here"
  COOKIE_SECRET: "your-secure-cookie-secret-key-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-auth
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: mcp-auth
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Shared token for in-cluster MCP HTTP access.
  # Clients must send: Authorization: Bearer <token>
  BR_MCP_AUTH_TOKEN: "your-secure-mcp-token-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: tls-certificates
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: tls-certificates
    app.kubernetes.io/component: secrets
  annotations:
    cert-manager.io/issuer: "letsencrypt-prod"  # If using cert-manager
type: kubernetes.io/tls
stringData:
  # TLS certificate and key - Replace with actual certificates
  # In production, use cert-manager or similar for automatic certificate management
  tls.crt: "<TLS_CERTIFICATE_PEM>"
  tls.key: "<TLS_PRIVATE_KEY_PEM>"

---
apiVersion: v1
kind: Secret
metadata:
  name: oauth-credentials
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: oauth-credentials
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # OAuth provider credentials
  GOOGLE_CLIENT_ID: "your-google-oauth-client-id"
  GOOGLE_CLIENT_SECRET: "your-google-oauth-client-secret"
  
  GITHUB_CLIENT_ID: "your-github-oauth-client-id"
  GITHUB_CLIENT_SECRET: "your-github-oauth-client-secret"
  
  ORCID_CLIENT_ID: "your-orcid-oauth-client-id"
  ORCID_CLIENT_SECRET: "your-orcid-oauth-client-secret"
  
  # OAuth redirect URLs
  OAUTH_REDIRECT_URL: "https://brain-researcher.local/auth/callback"

---
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-credentials
  namespace: brain-researcher-monitoring
  labels:
    app.kubernetes.io/name: monitoring-credentials
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Grafana admin credentials
  GF_SECURITY_ADMIN_PASSWORD: "your-secure-grafana-password"
  GF_SECURITY_SECRET_KEY: "your-secure-grafana-secret-key"
  
  # Prometheus credentials (if basic auth is enabled)
  PROMETHEUS_USERNAME: "prometheus"
  PROMETHEUS_PASSWORD: "your-secure-prometheus-password"
  
  # AlertManager credentials
  ALERTMANAGER_USERNAME: "alertmanager"
  ALERTMANAGER_PASSWORD: "your-secure-alertmanager-password"

---
apiVersion: v1
kind: Secret
metadata:
  name: external-services
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: external-services
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # External service API keys and credentials
  SUPABASE_URL: "https://your-supabase-project.supabase.co"
  SUPABASE_ANON_KEY: "your-supabase-anon-key"
  SUPABASE_SERVICE_KEY: "your-supabase-service-key"
  NEXT_PUBLIC_SUPABASE_URL: "https://your-supabase-project.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "your-supabase-anon-key"
  SUPABASE_OAUTH_PROVIDERS: "google,github"
  NEXT_PUBLIC_SUPABASE_OAUTH_PROVIDERS: "google,github"
  SUPABASE_JWKS_URL: "https://your-supabase-project.supabase.co/auth/v1/keys"
  SUPABASE_JWT_ISSUER: "https://your-supabase-project.supabase.co/auth/v1"
  SUPABASE_JWT_AUDIENCE: "authenticated"
  
  # Email service credentials (if using SMTP)
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "your-email@gmail.com"
  SMTP_PASSWORD: "your-app-specific-password"
  
  # Object storage credentials (if using S3-compatible storage)
  AWS_ACCESS_KEY_ID: "your-aws-access-key"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-key"
  S3_BUCKET_NAME: "brain-researcher-data"
  S3_REGION: "us-east-1"

---
apiVersion: v1
kind: Secret
metadata:
  name: model-registry-credentials
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: model-registry-credentials
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Model registry and container registry credentials
  DOCKER_REGISTRY_USERNAME: "your-docker-username"
  DOCKER_REGISTRY_PASSWORD: "your-docker-password"
  DOCKER_REGISTRY_EMAIL: "your-email@example.com"
  
  # Hugging Face Hub credentials
  HF_TOKEN: "your-huggingface-token"
  
  # MLflow registry credentials (if using external MLflow)
  MLFLOW_TRACKING_URI: "https://your-mlflow-server"
  MLFLOW_USERNAME: "your-mlflow-username"
  MLFLOW_PASSWORD: "your-mlflow-password"

