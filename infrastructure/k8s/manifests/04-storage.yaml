# PersistentVolumeClaims and storage configuration for Brain Researcher platform
# Provides persistent storage for stateful services

---
# Storage Class definitions for different performance tiers
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: brain-researcher-fast-ssd
  labels:
    app.kubernetes.io/name: brain-researcher
    app.kubernetes.io/component: storage
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: kubernetes.io/aws-ebs  # Change based on your cloud provider
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
  encrypted: "true"
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: brain-researcher-standard
  labels:
    app.kubernetes.io/name: brain-researcher
    app.kubernetes.io/component: storage
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: kubernetes.io/aws-ebs  # Change based on your cloud provider
parameters:
  type: gp3
  encrypted: "true"
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true

---
# BR-KG database storage - High performance SSD for database files
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neurokg-db-storage
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: neurokg
    app.kubernetes.io/component: database-storage
    app.kubernetes.io/part-of: brain-researcher-platform
  annotations:
    volume.beta.kubernetes.io/storage-class: "brain-researcher-fast-ssd"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: brain-researcher-fast-ssd
  resources:
    requests:
      storage: 50Gi
  # Optional: Selector for specific PV (if using static provisioning)
  # selector:
  #   matchLabels:
  #     app: neurokg-db

---
# BR-KG vector cache storage - Fast access for embeddings
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
