---
# Shared data storage for datasets and artifacts - ReadWriteMany for shared access
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-data-storage
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: brain-researcher
    app.kubernetes.io/component: shared-storage
    app.kubernetes.io/part-of: brain-researcher-platform
  annotations:
    volume.beta.kubernetes.io/storage-class: "brain-researcher-standard"
spec:
  accessModes:
    - ReadWriteMany  # Allows multiple pods to mount the same volume
  storageClassName: brain-researcher-standard  # May need EFS or similar for RWX
  resources:
    requests:
      storage: 200Gi

