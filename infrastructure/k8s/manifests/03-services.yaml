  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: web-ui-service
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: web-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: brain-researcher-platform
  annotations:
    prometheus.io/scrape: "false"  # Next.js doesn't expose metrics by default
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/name: web-ui
    app.kubernetes.io/component: frontend
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: brain-researcher-data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: brain-researcher-platform
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9121"  # redis_exporter port
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
    - name: metrics
      port: 9121
      targetPort: 9121
      protocol: TCP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: brain-researcher-data
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: brain-researcher-platform
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9187"  # postgres_exporter port
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
    - name: metrics
      port: 9187
      targetPort: 9187
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
  sessionAffinity: None

---
# Headless service for PostgreSQL StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless-service
  namespace: brain-researcher-data
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database-headless
    app.kubernetes.io/part-of: brain-researcher-platform
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: brain-researcher-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: brain-researcher-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: brain-researcher-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: visualization
    app.kubernetes.io/part-of: brain-researcher-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: visualization
  sessionAffinity: ClientIP  # For dashboard sessions
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 1800

---
# Service for external access to Grafana (optional)
apiVersion: v1
kind: Service
metadata:
  name: grafana-external-service
  namespace: brain-researcher-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: visualization-external
    app.kubernetes.io/part-of: brain-researcher-platform
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 3100
      targetPort: 3000
      protocol: TCP
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: visualization
  sessionAffinity: ClientIP

