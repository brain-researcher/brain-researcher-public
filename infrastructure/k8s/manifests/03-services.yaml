---
apiVersion: v1
kind: Service
metadata:
  name: niclip-service
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: niclip
    app.kubernetes.io/component: niclip
    app.kubernetes.io/part-of: brain-researcher-platform
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8001"
    prometheus.io/path: "/metrics"
