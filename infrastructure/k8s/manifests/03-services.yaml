# Service definitions for Brain Researcher platform
# Provides service discovery and load balancing for all components

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: brain-researcher-platform
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"  # For AWS
    prometheus.io/scrape: "true"
    prometheus.io/port: "9113"  # nginx-prometheus-exporter port
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
    - name: metrics
      port: 9113
      targetPort: 9113
      protocol: TCP
  selector:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: proxy
  sessionAffinity: None

apiVersion: v1
kind: Service
metadata:
  name: mcp-service
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: mcp
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: brain-researcher-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 7000
      targetPort: 7000
      protocol: TCP
  selector:
    app.kubernetes.io/name: mcp
    app.kubernetes.io/component: mcp
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/component: orchestrator
    app.kubernetes.io/part-of: brain-researcher-platform
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3001"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
    - name: websocket
      port: 3002
      targetPort: 3002
      protocol: TCP
  selector:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/component: orchestrator
  sessionAffinity: ClientIP  # For WebSocket connections
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 300

---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: brain-researcher-platform
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/name: agent
    app.kubernetes.io/component: agent
  sessionAffinity: ClientIP  # For stateful conversations
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 1800  # 30 minutes for long conversations

---
# Headless service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: agent-headless-service
  namespace: brain-researcher-core
  labels:
    app.kubernetes.io/name: agent
    app.kubernetes.io/component: agent-headless
    app.kubernetes.io/part-of: brain-researcher-platform
spec:
  clusterIP: None
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/name: agent
    app.kubernetes.io/component: agent

