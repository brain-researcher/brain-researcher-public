---
# BR-KG Service Destination Rule
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: neurokg-service-destination-rule
  namespace: brain-researcher
  labels:
    app: brain-researcher
    service: neurokg
spec:
  host: neurokg-service.brain-researcher.svc.cluster.local
  trafficPolicy:
    # Connection pooling for database-heavy operations
    connectionPool:
      tcp:
        maxConnections: 50
        connectTimeout: 30s
        keepalive:
          time: 7200s
          interval: 75s
      http:
        http1MaxPendingRequests: 20
        http2MaxRequests: 100
        maxRequestsPerConnection: 10
        maxRetries: 5
        consecutiveGatewayErrors: 10
        interval: 30s
        baseEjectionTime: 30s
        maxEjectionPercent: 50
        h2UpgradePolicy: UPGRADE # Enable HTTP/2 for better performance
        
    # Circuit breaker for resilience
    outlierDetection:
      consecutiveGatewayErrors: 5
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 30
      
    # Load balancing for Neo4j queries
    loadBalancer:
      simple: LEAST_CONN # Good for database connections
      consistentHash:
        httpHeaderName: "X-Session-ID" # Session affinity for Neo4j
        
    # TLS settings for internal communication
    tls:
      mode: ISTIO_MUTUAL
      
  # Service subsets for different deployment strategies
  subsets:
  - name: v1
    labels:
      version: v1
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 30
        http:
          maxRequestsPerConnection: 5
  - name: v2
    labels:
      version: v2
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 50
        http:
          maxRequestsPerConnection: 10
  - name: canary
    labels:
      version: canary
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 20
        http:
          maxRequestsPerConnection: 3

---
# Agent Service Destination Rule
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: agent-service-destination-rule
  namespace: brain-researcher
  labels:
    app: brain-researcher
    service: agent
spec:
  host: agent-service.brain-researcher.svc.cluster.local
  trafficPolicy:
    # Optimized for LLM processing
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 60s # Longer timeout for LLM processing
        keepalive:
          time: 3600s
          interval: 60s
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 200
        maxRequestsPerConnection: 5
        maxRetries: 3
        consecutiveGatewayErrors: 5
        interval: 30s
        baseEjectionTime: 30s
        maxEjectionPercent: 30
        h2UpgradePolicy: UPGRADE
        # Extended timeouts for long-running analysis
        timeout: 300s
        
    # Circuit breaker tuned for AI workloads
    outlierDetection:
      consecutiveGatewayErrors: 3
      consecutive5xxErrors: 3
      interval: 60s
      baseEjectionTime: 60s
      maxEjectionPercent: 30
      minHealthPercent: 50
      
    # Load balancing for AI processing
    loadBalancer:
      simple: ROUND_ROBIN
      consistentHash:
        httpHeaderName: "X-User-ID" # User affinity for conversation continuity
        
    tls:
      mode: ISTIO_MUTUAL
      
  subsets:
  - name: stable
    labels:
      version: stable
  - name: experimental
    labels:
      version: experimental
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 50
        http:
          timeout: 600s # Longer timeout for experimental features

