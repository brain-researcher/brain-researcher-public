---
# Main Web UI Virtual Service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: web-ui-virtual-service
  namespace: brain-researcher
  labels:
    app: brain-researcher
    service: web-ui
spec:
  hosts:
  - "brain-researcher.local"
  - "app.brain-researcher.com"
  - "ui.brain-researcher.local"
  - "dashboard.brain-researcher.local"
  gateways:
  - brain-researcher-gateway
  http:
  # Health check endpoint
  - match:
    - uri:
        exact: /health
    route:
    - destination:
        host: web-ui-service.brain-researcher.svc.cluster.local
        port:
          number: 3000
        subset: production
    timeout: 5s
    retries:
      attempts: 2
      perTryTimeout: 2s

  # API routes with authentication
  - match:
    - uri:
        prefix: /api/
    headers:
      X-Brain-Researcher-Service:
        exact: web-ui
    route:
    - destination:
        host: web-ui-service.brain-researcher.svc.cluster.local
        port:
          number: 3000
        subset: production
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
    headers:
      request:
        add:
          X-Forwarded-Proto: https
          X-Service-Version: v1
      response:
        add:
          X-Frame-Options: DENY
          X-Content-Type-Options: nosniff

  # Static assets with caching
  - match:
    - uri:
        prefix: /_next/static/
    - uri:
        prefix: /static/
    - uri:
        prefix: /favicon.ico
    route:
    - destination:
        host: web-ui-service.brain-researcher.svc.cluster.local
        port:
          number: 3000
        subset: production
    timeout: 10s
    headers:
      response:
        add:
          Cache-Control: public, max-age=31536000, immutable

  # Main application routes
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: web-ui-service.brain-researcher.svc.cluster.local
        port:
          number: 3000
        subset: production
    timeout: 60s
    retries:
      attempts: 2
      perTryTimeout: 30s
    headers:
      request:
        add:
          X-Forwarded-Proto: https
      response:
        add:
          X-Frame-Options: DENY
          Strict-Transport-Security: max-age=31536000; includeSubDomains

  # Traffic splitting for A/B testing
  - match:
    - headers:
        X-Experiment-Group:
          exact: beta
      uri:
        prefix: /
    route:
    - destination:
        host: web-ui-service.brain-researcher.svc.cluster.local
        port:
          number: 3000
        subset: staging
      weight: 100

---
# BR-KG API Virtual Service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: br-kg-api-virtual-service
  namespace: brain-researcher
  labels:
    app: brain-researcher
    service: br-kg
spec:
  hosts:
  - "api.brain-researcher.local"
  - "br-kg.brain-researcher.local"
  - "api.brain-researcher.com"
  gateways:
  - brain-researcher-gateway
  http:
  # Health check
  - match:
    - uri:
        exact: /health
    route:
    - destination:
        host: br-kg-service.brain-researcher.svc.cluster.local
        port:
          number: 5000
        subset: v1
    timeout: 5s

  # Search endpoints with rate limiting
  - match:
    - uri:
        prefix: /search/
    headers:
      X-API-Key:
        regex: ".*"
    route:
    - destination:
        host: br-kg-service.brain-researcher.svc.cluster.local
        port:
          number: 5000
        subset: v1
      weight: 90
    - destination:
        host: br-kg-service.brain-researcher.svc.cluster.local
        port:
          number: 5000
        subset: v2
      weight: 10
    timeout: 120s
    retries:
      attempts: 2
      perTryTimeout: 60s
    headers:
      request:
        add:
          X-Search-Source: istio-mesh
          X-Request-Timestamp: "%START_TIME%"

  # Vector search with longer timeouts
  - match:
    - uri:
        prefix: /vector/
    route:
    - destination:
        host: br-kg-service.brain-researcher.svc.cluster.local
        port:
          number: 5000
        subset: v1
    timeout: 300s
    retries:
      attempts: 1
      perTryTimeout: 300s
    headers:
      request:
        add:
          X-Vector-Search: "true"

  # Spatial queries with database affinity
  - match:
    - uri:
        prefix: /spatial/
    route:
    - destination:
        host: br-kg-service.brain-researcher.svc.cluster.local
        port:
          number: 5000
        subset: v1
    timeout: 180s
    headers:
      request:
        add:
          X-Spatial-Query: "true"

  # Export endpoints with streaming support
  - match:
    - uri:
        prefix: /export/
    route:
    - destination:
        host: br-kg-service.brain-researcher.svc.cluster.local
        port:
          number: 5000
        subset: v1
    timeout: 600s
    headers:
      response:
        add:
          Content-Type: application/octet-stream
          X-Export-Service: br-kg

  # General API routes
  - match:
    - uri:
        prefix: /api/
    route:
    - destination:
        host: br-kg-service.brain-researcher.svc.cluster.local
        port:
          number: 5000
        subset: v1
    timeout: 60s
    retries:
      attempts: 3
      perTryTimeout: 20s

---
# Agent Service Virtual Service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: agent-service-virtual-service
  namespace: brain-researcher
  labels:
    app: brain-researcher
    service: agent
spec:
  hosts:
  - "agent.brain-researcher.local"
  - "llm.brain-researcher.local"
  - "agent.brain-researcher.com"
  gateways:
  - brain-researcher-gateway
  http:
  # Health check
  - match:
    - uri:
        exact: /health
    route:
    - destination:
        host: agent-service.brain-researcher.svc.cluster.local
        port:
          number: 8000
        subset: stable
    timeout: 5s

  # Chat streaming endpoints
  - match:
    - uri:
        prefix: /chat/stream/
    route:
    - destination:
        host: agent-service.brain-researcher.svc.cluster.local
        port:
          number: 8000
        subset: stable
    timeout: 3600s # 1 hour for long conversations
    headers:
      request:
        add:
          X-Streaming: "true"
          X-Content-Type: text/event-stream
      response:
        add:
          Cache-Control: no-cache
          Connection: keep-alive
          X-Accel-Buffering: "no"

  # Analysis endpoints with extended timeout
  - match:
    - uri:
        prefix: /analysis/
    route:
    - destination:
        host: agent-service.brain-researcher.svc.cluster.local
        port:
          number: 8000
        subset: stable
    timeout: 1800s # 30 minutes for complex analysis
    retries:
      attempts: 1
      perTryTimeout: 1800s
    headers:
      request:
        add:
          X-Analysis-Request: "true"

  # Tool execution with experimental features
  - match:
    - uri:
        prefix: /tools/
    headers:
      X-Experimental:
        exact: "true"
    route:
    - destination:
        host: agent-service.brain-researcher.svc.cluster.local
        port:
          number: 8000
        subset: experimental
    timeout: 900s
    fault:
      delay:
        percentage:
          value: 1.0
        fixedDelay: 100ms # Add small delay for experimental features

  # Regular tool execution
  - match:
    - uri:
        prefix: /tools/
    route:
    - destination:
        host: agent-service.brain-researcher.svc.cluster.local
        port:
          number: 8000
        subset: stable
    timeout: 600s
    retries:
      attempts: 2
      perTryTimeout: 300s

  # General chat endpoints
  - match:
    - uri:
        prefix: /chat/
    route:
    - destination:
        host: agent-service.brain-researcher.svc.cluster.local
        port:
          number: 8000
        subset: stable
    timeout: 300s
    retries:
      attempts: 2
      perTryTimeout: 150s

---
# Orchestrator Service Virtual Service
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: orchestrator-virtual-service
  namespace: brain-researcher
  labels:
    app: brain-researcher
    service: orchestrator
spec:
  hosts:
  - "orchestrator.brain-researcher.local"
  - "coord.brain-researcher.local"
  gateways:
  - brain-researcher-internal-gateway
  http:
  # Job management endpoints
  - match:
    - uri:
        prefix: /jobs/
    route:
    - destination:
        host: orchestrator-service.brain-researcher.svc.cluster.local
        port:
          number: 3001
        subset: v1
    timeout: 180s
    retries:
      attempts: 3
      perTryTimeout: 60s

  # Workflow coordination
  - match:
    - uri:
        prefix: /workflow/
    route:
    - destination:
        host: orchestrator-service.brain-researcher.svc.cluster.local
        port:
          number: 3001
        subset: v1
    timeout: 300s
    headers:
      request:
        add:
          X-Workflow-Coordinator: istio-mesh

---
# External services virtual services for egress traffic
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: openneuro-virtual-service
  namespace: brain-researcher
spec:
  hosts:
  - "openneuro.org"
  gateways:
  - brain-researcher-egress-gateway
  - mesh
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: openneuro.org
        port:
          number: 443
    timeout: 300s
    retries:
      attempts: 3
      perTryTimeout: 100s
    headers:
      request:
        add:
          User-Agent: Brain-Researcher/1.0

