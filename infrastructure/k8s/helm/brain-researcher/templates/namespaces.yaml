# Namespaces template for Brain Researcher platform
{{- if .Values.namespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "brain-researcher.coreNamespace" . }}
  labels:
    {{- include "brain-researcher.labels" . | nindent 4 }}
    {{- include "${PUBLIC_HOSTNAME}ponentLabels" "core" | nindent 4 }}
  annotations:
    description: "Core services namespace for Brain Researcher platform"
    helm.sh/release-name: {{ .Release.Name }}
    helm.sh/release-namespace: {{ .Release.Namespace }}

---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "brain-researcher.dataNamespace" . }}
  labels:
    {{- include "brain-researcher.labels" . | nindent 4 }}
    {{- include "${PUBLIC_HOSTNAME}ponentLabels" "data" | nindent 4 }}
  annotations:
    description: "Data services namespace for Brain Researcher platform"
    helm.sh/release-name: {{ .Release.Name }}
    helm.sh/release-namespace: {{ .Release.Namespace }}

---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "brain-researcher.monitoringNamespace" . }}
  labels:
    {{- include "brain-researcher.labels" . | nindent 4 }}
    {{- include "${PUBLIC_HOSTNAME}ponentLabels" "monitoring" | nindent 4 }}
  annotations:
    description: "Monitoring and observability namespace for Brain Researcher platform"
    helm.sh/release-name: {{ .Release.Name }}
    helm.sh/release-namespace: {{ .Release.Namespace }}
{{- end }}