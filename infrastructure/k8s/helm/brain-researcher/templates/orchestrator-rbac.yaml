{{- if and .Values.orchestrator.enabled .Values.orchestrator.marimoRuntime.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "brain-researcher.orchestrator.fullname" . }}-marimo-runtime
  namespace: {{ .Values.namespaces.core }}
  labels:
    {{- include "brain-researcher.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get", "list", "patch", "update"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "brain-researcher.orchestrator.fullname" . }}-marimo-runtime
  namespace: {{ .Values.namespaces.core }}
  labels:
    {{- include "brain-researcher.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
subjects:
  - kind: ServiceAccount
    name: {{ include "brain-researcher.orchestrator.serviceAccountName" . }}
    namespace: {{ .Values.namespaces.core }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "brain-researcher.orchestrator.fullname" . }}-marimo-runtime
{{- end }}
