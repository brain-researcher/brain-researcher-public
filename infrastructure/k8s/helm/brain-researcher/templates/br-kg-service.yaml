{{- $brKg := index .Values "br-kg" }}
{{- if $brKg.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "brain-researcher.fullname" . }}-br-kg
  namespace: {{ .Values.namespaces.core }}
  labels:
    {{- include "brain-researcher.labels" . | nindent 4 }}
    app.kubernetes.io/component: br-kg
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    {{- include "brain-researcher.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: br-kg
{{- end }}
