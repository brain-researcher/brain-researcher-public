{{- if .Values.webUi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "brain-researcher.fullname" . }}-web-ui
  namespace: {{ .Values.namespaces.core }}
  labels:
    {{- include "brain-researcher.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.webUi.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.webUi.service.ports.http | default 3000 }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "brain-researcher.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- end }}

