{{- if .Values.neurokg.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "brain-researcher.fullname" . }}-neurokg
  namespace: {{ .Values.namespaces.core }}
  labels:
    {{- include "brain-researcher.labels" . | nindent 4 }}
    app.kubernetes.io/component: neurokg
spec:
  serviceName: {{ include "brain-researcher.fullname" . }}-neurokg-headless
  replicas: {{ .Values.neurokg.replicaCount }}
  selector:
    matchLabels:
      {{- include "brain-researcher.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: neurokg
  template:
    metadata:
      labels:
        {{- include "brain-researcher.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: neurokg
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
        {{- with .Values.neurokg.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "brain-researcher.serviceAccountName" . }}
      {{- include "brain-researcher.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: neurokg
          image: "{{ .Values.global.imageRegistry }}/neurokg:{{ .Values.neurokg.imageTag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: FLASK_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
            # Default to the in-cluster Neo4j instance. These can be overridden via
            # `neurokg.extraEnv` / `neurokg.extraEnvFrom` if needed.
            - name: NEO4J_URI
              value: {{ printf "bolt://%s-neo4j:7687" (include "brain-researcher.fullname" .) | quote }}
            - name: NEO4J_USER
              value: {{ .Values.neo4j.auth.user | default "neo4j" | quote }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.neo4j.auth.existingSecret | default "br-neo4j-password-k8s" | quote }}
                  key: {{ .Values.neo4j.auth.passwordKey | default "password" | quote }}
            - name: REDIS_URL
              value: 'redis://{{ include "brain-researcher.fullname" . }}-redis.{{ .Values.namespaces.data }}:6379/3'
            - name: PORT
              value: "5000"
            {{- if hasKey .Values.neurokg "urlPrefix" }}
            - name: NEUROKG_URL_PREFIX
              value: {{ .Values.neurokg.urlPrefix | quote }}
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.neurokg.extraEnv }}
            {{- tpl (toYaml .Values.neurokg.extraEnv) $ | nindent 12 }}
            {{- end }}
          {{- if .Values.neurokg.extraEnvFrom }}
          envFrom:
            {{- tpl (toYaml .Values.neurokg.extraEnvFrom) $ | nindent 12 }}
          {{- end }}
          volumeMounts:
            # db-storage moved to Neo4j pod
            - name: vector-cache
              mountPath: /app/data/neurokg/vector_cache
            - name: logs
              mountPath: /app/logs
            - name: shared-data
              mountPath: /app/data/shared
              readOnly: true
            {{- if .Values.neurokg.extraVolumeMounts }}
            {{- toYaml .Values.neurokg.extraVolumeMounts | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.neurokg.resources | nindent 12 }}
          {{- if .Values.neurokg.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.neurokg.probes.startup.path | default "/health" | quote }}
              port: http
            periodSeconds: {{ .Values.neurokg.probes.startup.periodSeconds | default 5 }}
            failureThreshold: {{ .Values.neurokg.probes.startup.failureThreshold | default 60 }}
            timeoutSeconds: {{ .Values.neurokg.probes.startup.timeoutSeconds | default 1 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.neurokg.probes.liveness.path | default "/health" | quote }}
              port: http
            initialDelaySeconds: {{ .Values.neurokg.probes.liveness.initialDelaySeconds | default 60 }}
            periodSeconds: {{ .Values.neurokg.probes.liveness.periodSeconds | default 30 }}
            timeoutSeconds: {{ .Values.neurokg.probes.liveness.timeoutSeconds | default 1 }}
            failureThreshold: {{ .Values.neurokg.probes.liveness.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.neurokg.probes.readiness.path | default "/ready" | quote }}
              port: http
            initialDelaySeconds: {{ .Values.neurokg.probes.readiness.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.neurokg.probes.readiness.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.neurokg.probes.readiness.timeoutSeconds | default 1 }}
            failureThreshold: {{ .Values.neurokg.probes.readiness.failureThreshold | default 3 }}
      volumes:
        - name: logs
          emptyDir: {}
        - name: shared-data
          {{- if .Values.storage.sharedData.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "brain-researcher.fullname" . }}-shared-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.neurokg.extraVolumes }}
        {{- toYaml .Values.neurokg.extraVolumes | nindent 8 }}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: vector-cache
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: {{ .Values.neurokg.persistence.vectorCache.storageClass | default .Values.global.storageClass }}
        resources:
          requests:
            storage: {{ .Values.neurokg.persistence.vectorCache.size }}
{{- end }}
