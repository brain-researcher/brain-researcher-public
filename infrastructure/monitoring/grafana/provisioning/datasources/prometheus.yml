apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    version: 1
    editable: false
    jsonData:
      httpMethod: GET
      prometheusType: Prometheus
      prometheusVersion: 2.40.0
      timeInterval: 30s
      queryTimeout: 60s
      defaultEditor: builder
      disableMetricsLookup: false
      customQueryParameters: ''
      httpHeaderName1: 'X-Grafana-User'
    secureJsonData:
      httpHeaderValue1: 'brain-researcher-grafana'
  
  - name: Redis
    type: redis-datasource
    access: proxy
    url: redis://redis:6379
    database: 0
    isDefault: false
    version: 1
    editable: false
    jsonData:
      poolSize: 5
      timeout: 10
      pingInterval: 0
      pipelineWindow: 0
    secureJsonData:
      password: ''
  
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: brain_researcher
    user: grafana
    isDefault: false
    version: 1
    editable: false
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      maxIdleConnsAuto: true
      connMaxLifetime: 14400
      postgresVersion: 1400
      timescaledb: false
    secureJsonData:
      password: 'grafana_pass_change_me'