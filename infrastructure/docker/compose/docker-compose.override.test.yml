services:
  # Orchestrator service for contract testing
  orchestrator-test:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.orchestrator
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=test
      - PORT=3001
      - AGENT_SERVICE_URL=http://agent-test:8000
      - NEUROKG_SERVICE_URL=http://neurokg-test:5000
      - REDIS_URL=redis://redis-test:6379
      - PACT_PROVIDER_STATES_SETUP_URL=http://orchestrator-test:3001/pact/provider-states
    networks:
      - contract-test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - redis-test
  
  # Agent service for contract testing  
  agent-test:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.agent
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=test
      - PORT=8000
      - NEUROKG_SERVICE_URL=http://neurokg-test:5000
      - REDIS_URL=redis://redis-test:6379
      - OPENAI_API_KEY=test_key_for_contracts
      - PACT_PROVIDER_STATES_SETUP_URL=http://agent-test:8000/pact/provider-states
    networks:
      - contract-test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - redis-test
  
  # BR-KG service for contract testing
  neurokg-test:
    build:
      context: .
      target: neurokg
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=test
      - PORT=5000
      - NEO4J_URI=bolt://neo4j-test:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=test_password
      - PACT_PROVIDER_STATES_SETUP_URL=http://neurokg-test:5000/pact/provider-states
    networks:
      - contract-test-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - neo4j-test
  
  # Redis for session/cache management in tests
  redis-test:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - contract-test-network
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
  
  # Neo4j for knowledge graph in tests
  neo4j-test:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/test_password
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    networks:
      - contract-test-network
    volumes:
      - neo4j_test_data:/data
      - neo4j_test_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "test_password", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
  
  # Test data seeder for contract testing
  test-data-seeder:
    build:
      context: .
      dockerfile: tests/contracts/Dockerfile.seeder
    depends_on:
      - neo4j-test
      - redis-test
    environment:
      - NEO4J_URI=bolt://neo4j-test:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=test_password
      - REDIS_URL=redis://redis-test:6379
    networks:
      - contract-test-network
    command: |
      sh -c "
        echo 'Seeding test data for contract testing...'
        python /app/seed_test_data.py
        echo 'Test data seeding complete'
      "
    profiles:
      - seeding

volumes:
  redis_test_data:
  neo4j_test_data:
  neo4j_test_logs:

networks:
  contract-test-network:
    driver: bridge
