services:
  # Load Balancer (HAProxy)
  haproxy:
    image: haproxy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # HAProxy stats
    volumes:
      - ./infrastructure/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./infrastructure/haproxy/ssl:/etc/ssl/certs:ro
    networks:
      - frontend
      - backend
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s

  # BR-KG API Service - Replicated
  br-kg:
    build:
      context: .
      target: br-kg
    networks:
      - backend
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
    deploy:
      replicas: 4
      placement:
        max_replicas_per_node: 2
        constraints:
          - node.labels.tier == api
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 2
        delay: 10s
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 2
        delay: 10s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  # Agent Service - Multiple Replicas
  agent:
    build:
      context: .
      target: agent
    networks:
      - backend
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - BR_KG_API_URL=http://br-kg:5000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - REDIS_URL=redis://redis:6379
    deploy:
      replicas: 3
      placement:
        max_replicas_per_node: 2
        constraints:
          - node.labels.tier == compute
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        monitor: 120s
      rollback_config:
        parallelism: 1
        delay: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 45s
      timeout: 15s
      retries: 3
      start_period: 120s

  # Orchestrator API Gateway - Highly Available
  orchestrator:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.orchestrator
    networks:
      - backend
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - AGENT_URL=http://agent:8000
      - BR_KG_URL=http://br-kg:5000
      - NICLIP_URL=http://niclip:8001
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/brain_researcher
    deploy:
      replicas: 5
      placement:
        max_replicas_per_node: 3
        constraints:
          - node.labels.tier == orchestrator
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.75'
          memory: 750M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 2
        delay: 15s
        failure_action: rollback
        monitor: 90s
      rollback_config:
        parallelism: 2
        delay: 15s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Web UI - Multiple Frontend Instances
  web-ui:
    build:
      context: .
      dockerfile: apps/web-ui/Dockerfile
    networks:
      - backend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://orchestrator:3001
      - NEXT_PUBLIC_APP_NAME=Brain Researcher Web
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    deploy:
      replicas: 4
      placement:
        max_replicas_per_node: 2
        constraints:
          - node.labels.tier == web
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 2
        delay: 10s
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 2
        delay: 10s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis Cluster for State Management
  redis-master:
    image: redis:7-alpine
    networks:
      - backend
    volumes:
      - redis_master_data:/data
    command: redis-server --appendonly yes --replica-read-only no
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == storage
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis-replica:
    image: redis:7-alpine
    networks:
      - backend
    volumes:
      - redis_replica_data:/data
    command: redis-server --appendonly yes --replicaof redis-master 6379
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.tier == storage
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.125'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - redis-master
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL with Connection Pooling
  postgres:
    image: postgres:15-alpine
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_DB=brain_researcher
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == storage
          - node.role == manager
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d brain_researcher"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PgBouncer Connection Pool
  pgbouncer:
    image: pgbouncer/pgbouncer:1.19.1
    networks:
      - backend
    volumes:
      - ./infrastructure/database/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infrastructure/database/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    environment:
      - DATABASES_HOST=postgres
      - DATABASES_PORT=5432
      - DATABASES_USER=postgres
      - DATABASES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - DATABASES_DBNAME=brain_researcher
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=50
    deploy:
      replicas: 2
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.labels.tier == storage
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "psql -h localhost -p 6432 -U postgres -d brain_researcher -c 'SELECT 1;' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:v2.44.0
    networks:
      - backend
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == monitoring
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:9.5.2
    networks:
      - backend
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000/grafana
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.tier == monitoring
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

networks:
  frontend:
    driver: overlay
    external: false
  backend:
    driver: overlay
    external: false

volumes:
  redis_master_data:
  redis_replica_data:
  postgres_data:
  prometheus_data:
  grafana_data:

# Global configuration
configs:
  haproxy_config:
    file: ./infrastructure/haproxy/haproxy.cfg
  pgbouncer_config:
    file: ./infrastructure/database/pgbouncer.ini

secrets:
  postgres_password:
    external: true
  openai_api_key:
    external: true
  anthropic_api_key:
    external: true
