# Nginx configuration for Brain Researcher
# This routes subdomains to the appropriate services

# Cloudflare IP ranges for security (only allow Cloudflare)
# Update these periodically from https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# IPv6 ranges
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# Use the CF-Connecting-IP header for the real IP
real_ip_header CF-Connecting-IP;

# Upstream definitions for load balancing and failover
upstream web_ui {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream agent_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream br_kg_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

# Main website (Next.js UI)
server {
    listen 80;
    listen [::]:80;
    server_name ${PUBLIC_HOSTNAME} www.${PUBLIC_HOSTNAME};

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Increase buffer sizes for large requests
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    proxy_buffers 32 4k;
    proxy_buffer_size 8k;

    # Gzip compression (Cloudflare will handle Brotli)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss application/rss+xml application/atom+xml image/svg+xml text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype;

    # Main app
    location / {
        proxy_pass http://web_ui;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable buffering for SSE/streaming
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # Static files (Next.js)
    location /_next/static {
        proxy_pass http://web_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Enable caching headers for Cloudflare
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public files
    location /public {
        proxy_pass http://web_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache static assets
        add_header Cache-Control "public, max-age=86400";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

# API subdomain (Agent/Orchestrator API)
server {
    listen 80;
    listen [::]:80;
    server_name api.${PUBLIC_HOSTNAME};

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Access-Control-Allow-Origin "https://${PUBLIC_HOSTNAME}" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Large file support for datasets
    client_max_body_size 500M;
    client_body_timeout 300s;

    location / {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://${PUBLIC_HOSTNAME}";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://agent_api;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for real-time features
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running analysis
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # Cache dataset metadata
    location ~ ^/api/datasets/[^/]+/metadata$ {
        proxy_pass http://agent_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache for 1 hour
        add_header Cache-Control "public, max-age=3600";
    }
}

# BR-KG Knowledge Graph subdomain
server {
    listen 80;
    listen [::]:80;
    server_name kg.${PUBLIC_HOSTNAME};

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Access-Control-Allow-Origin "https://${PUBLIC_HOSTNAME}" always;

    location / {
        proxy_pass http://br-kg_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for complex graph queries
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Large buffer for graph data
        proxy_buffers 32 16k;
        proxy_buffer_size 32k;
    }

    # GraphQL endpoint
    location /graphql {
        proxy_pass http://br-kg_api/graphql;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Increase limits for GraphQL
        client_max_body_size 10M;
        proxy_read_timeout 300s;
    }

    # Cache search results
    location /api/search {
        proxy_pass http://br-kg_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Cache for 5 minutes
        add_header Cache-Control "public, max-age=300";
    }
}

# Agent subdomain (same as API for now)
server {
    listen 80;
    listen [::]:80;
    server_name agent.${PUBLIC_HOSTNAME};

    location / {
        proxy_pass http://agent_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket for real-time agent updates
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}

