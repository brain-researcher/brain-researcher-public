# Brain Researcher CDN Nginx Configuration
# Optimized for performance, security, and caching

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for" '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format cache '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'cache=$upstream_cache_status rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Buffer sizes
    client_body_buffer_size 128k;
    client_max_body_size 100m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    output_buffers 1 32k;
    postpone_output 1460;

    # Timeouts
    client_header_timeout 3m;
    client_body_timeout 3m;
    send_timeout 3m;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/opentype;

    # Brotli compression (if module available)
    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/opentype;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    limit_conn conn_limit_per_ip 20;

    # Cache zones
    proxy_cache_path /var/cache/nginx/api
        levels=1:2
        keys_zone=api_cache:100m
        max_size=10g
        inactive=60m
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/static
        levels=1:2
        keys_zone=static_cache:100m
        max_size=20g
        inactive=7d
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/pages
        levels=1:2
        keys_zone=page_cache:100m
        max_size=5g
        inactive=1h
        use_temp_path=off;

    # Upstream servers
    upstream brain_researcher_app {
        least_conn;
        server web-ui:3000 max_fails=3 fail_timeout=30s;
        # Add more servers for load balancing
        # server web-ui-2:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream brain_researcher_api {
        least_conn;
        server orchestrator:3001 max_fails=3 fail_timeout=30s;
        # Add more API servers for load balancing
        # server orchestrator-2:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream brain_researcher_kg {
        least_conn;
        server br-kg:5000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # Security headers map
    map $sent_http_content_type $security_headers {
        default "X-Content-Type-Options: nosniff; X-Frame-Options: DENY; X-XSS-Protection: 1; mode=block; Referrer-Policy: strict-origin-when-cross-origin";
    }

    # Cache control map
    map $uri $cache_control {
        ~*\.(css|js|woff|woff2|ttf|eot)$ "public, max-age=31536000, immutable";
        ~*\.(jpg|jpeg|png|gif|svg|ico|webp)$ "public, max-age=2592000";
        ~*\.(pdf|doc|docx)$ "public, max-age=86400";
        default "public, max-age=3600";
    }

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA:DHE-RSA-AES256-SHA256:DHE-RSA-AES256-SHA;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Main server block
    server {
        listen 80;
        listen [::]:80;
        server_name brain-researcher.com www.brain-researcher.com;

        # Redirect HTTP to HTTPS
        return 301 https://$server_name$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name brain-researcher.com www.brain-researcher.com;

        # SSL certificates
        ssl_certificate /etc/nginx/certs/brain-researcher.pem;
        ssl_certificate_key /etc/nginx/certs/brain-researcher-key.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.brain-researcher.com wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;

        # Root and index
        root /var/www/html;
        index index.html index.htm;

        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Static assets from CDN or local
        location ~* \.(css|js|woff|woff2|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp|pdf)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";

            # Try local files first, then upstream
            try_files $uri @static_proxy;

            # CORS headers for fonts and assets
            location ~* \.(woff|woff2|ttf|eot)$ {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
                add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
            }
        }

        # Next.js static assets
        location /_next/static/ {
            proxy_cache static_cache;
            proxy_cache_valid 200 1y;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            proxy_cache_key "$scheme$proxy_host$uri$is_args$args";

            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://brain_researcher_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API routes with caching
        location /api/ {
            # Rate limiting
            limit_req zone=api burst=20 nodelay;

            # Caching for GET requests only
            proxy_cache api_cache;
            proxy_cache_methods GET HEAD;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_bypass $http_cache_control;
            proxy_cache_key "$scheme$proxy_host$uri$is_args$args";

            # Don't cache authenticated requests
            proxy_cache_bypass $http_authorization;
            proxy_no_cache $http_authorization;

            # Headers
            add_header X-Cache-Status $upstream_cache_status;
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD";
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization";
            add_header Access-Control-Max-Age "3600";

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD";
                add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization";
                add_header Access-Control-Max-Age "3600";
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://brain_researcher_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-URI $request_uri;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Knowledge Graph API
        location /kg/ {
            limit_req zone=api burst=10 nodelay;

            proxy_cache api_cache;
            proxy_cache_valid 200 2m;
            proxy_cache_key "$scheme$proxy_host$uri$is_args$args";

            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://brain_researcher_kg/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket proxy for real-time features
        location /ws/ {
            proxy_pass http://brain_researcher_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeouts
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # Admin interface (restricted access)
        location /admin/ {
            # IP restriction (uncomment and configure)
            # allow 10.0.0.0/8;
            # allow 192.168.0.0/16;
            # deny all;

            auth_basic "Admin Area";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://brain_researcher_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Service Worker
        location = /sw.js {
            expires 0;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Service-Worker-Allowed "/";

            proxy_pass http://brain_researcher_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Manifest and PWA files
        location ~* \.(manifest|webmanifest)$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
            add_header Content-Type "application/manifest+json";

            proxy_pass http://brain_researcher_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Main application routes
        location / {
            limit_req zone=general burst=50 nodelay;

            # Page caching for static content
            proxy_cache page_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_bypass $http_cache_control $cookie_session;
            proxy_cache_key "$scheme$proxy_host$uri$is_args$args";

            # Don't cache authenticated pages
            proxy_cache_bypass $http_authorization $cookie_auth;
            proxy_no_cache $http_authorization $cookie_auth;

            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://brain_researcher_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-URI $request_uri;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Fallback for static assets
        location @static_proxy {
            proxy_cache static_cache;
            proxy_cache_valid 200 1d;
            proxy_cache_key "$scheme$proxy_host$uri";

            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://brain_researcher_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Security.txt
        location = /.well-known/security.txt {
            return 200 "Contact: security@brain-researcher.com\nExpires: 2025-12-31T23:59:59.000Z\nEncryption: https://brain-researcher.com/pgp-key.txt\nPreferred-Languages: en\n";
            add_header Content-Type text/plain;
        }

        # Robots.txt
        location = /robots.txt {
            return 200 "User-agent: *\nAllow: /\nSitemap: https://brain-researcher.com/sitemap.xml\n";
            add_header Content-Type text/plain;
        }

        # Deny access to sensitive files
        location ~* \.(env|config|ini|log|sh|sql|bak|backup)$ {
            deny all;
            return 404;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            return 404;
        }
    }

    # Status server for monitoring
    server {
        listen 8080;
        server_name localhost;

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
        }

        location /cache_status {
            content_by_lua_block {
                local cache_path = "/var/cache/nginx"
                local function get_cache_size(path)
                    local handle = io.popen("du -sh " .. path .. " 2>/dev/null | cut -f1")
                    local result = handle:read("*a")
                    handle:close()
                    return result:gsub("^%s*(.-)%s*$", "%1")
                end

                ngx.say("API Cache: " .. get_cache_size(cache_path .. "/api"))
                ngx.say("Static Cache: " .. get_cache_size(cache_path .. "/static"))
                ngx.say("Page Cache: " .. get_cache_size(cache_path .. "/pages"))
            }
        }
    }
}

# Stream module for TCP/UDP load balancing (if needed)
stream {
    upstream backend_database {
        server db1:5432 max_fails=3 fail_timeout=30s;
        server db2:5432 max_fails=3 fail_timeout=30s backup;
    }

    server {
        listen 5432;
        proxy_pass backend_database;
        proxy_timeout 1s;
        proxy_responses 1;
        error_log /var/log/nginx/database_proxy.log;
    }
}