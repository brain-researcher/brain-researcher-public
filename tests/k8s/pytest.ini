[tool:pytest]
# Kubernetes Test Configuration for Brain Researcher Platform

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    smoke: Smoke tests for basic functionality
    slow: Long-running tests (may take several minutes)
    destructive: Tests that modify cluster resources
    monitoring: Monitoring and observability tests
    integration: Integration tests across multiple services
    unit: Unit tests for individual components

# Output and reporting
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --maxfail=5
    --durations=10
    --disable-warnings
    -ra

# Test timeout (in seconds)
timeout = 1800

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Minimum versions
minversion = 7.0

# Test execution
junit_family = xunit2
junit_logging = all
junit_log_passing_tests = true

# Parallel execution (if pytest-xdist is installed)
# Enable with: pytest -n auto
# Disable for debugging: pytest -n 0

# Custom options for Kubernetes tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*requests.*verify=False.*:urllib3.exceptions.InsecureRequestWarning
    ignore:.*Unverified HTTPS request.*:urllib3.exceptions.InsecureRequestWarning