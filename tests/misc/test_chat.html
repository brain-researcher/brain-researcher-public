<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
        }
        input {
            width: 70%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #response {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 4px;
            min-height: 100px;
            white-space: pre-wrap;
        }
        #status {
            margin-top: 10px;
            color: #666;
            font-style: italic;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Brain Researcher Chat Test</h1>
        <div>
            <input type="text" id="message" placeholder="Enter your question..." value="What is n-back task?">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
        <div id="status"></div>
        <div id="response">Response will appear here...</div>
    </div>

    <script>
        async function sendMessage() {
            const messageInput = document.getElementById('message');
            const responseDiv = document.getElementById('response');
            const statusDiv = document.getElementById('status');
            const sendBtn = document.getElementById('sendBtn');

            const message = messageInput.value.trim();
            if (!message) {
                alert('Please enter a message');
                return;
            }

            sendBtn.disabled = true;
            statusDiv.innerHTML = 'Sending request... <span class="loading"></span>';
            responseDiv.textContent = 'Waiting for response...';

            const startTime = Date.now();

            try {
                const response = await fetch('http://localhost:3004/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                const elapsedTime = ((Date.now() - startTime) / 1000).toFixed(1);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                statusDiv.innerHTML = `✅ Response received in ${elapsedTime} seconds`;

                // Display the response content
                if (data.message && data.message.content) {
                    responseDiv.textContent = data.message.content;
                } else if (data.content) {
                    responseDiv.textContent = data.content;
                } else {
                    responseDiv.textContent = JSON.stringify(data, null, 2);
                }

                // Show execution details if available
                if (data.runCard && data.runCard.execution) {
                    const exec = data.runCard.execution;
                    statusDiv.innerHTML += `<br>Model: ${exec.model || 'unknown'}, Latency: ${exec.latency_ms}ms`;
                }

            } catch (error) {
                const elapsedTime = ((Date.now() - startTime) / 1000).toFixed(1);
                statusDiv.innerHTML = `❌ Error after ${elapsedTime} seconds: ${error.message}`;
                responseDiv.textContent = 'Error: ' + error.message;
            } finally {
                sendBtn.disabled = false;
            }
        }

        // Allow Enter key to send
        document.getElementById('message').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('sendBtn').disabled) {
                sendMessage();
            }
        });
    </script>
</body>
</html>
