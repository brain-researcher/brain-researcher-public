# Pytest configuration for security tests

[tool:pytest]
minversion = 7.0
testpaths =
    tests/security/auth
    tests/security/api
    tests/security/jwt

python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Security-specific markers
markers =
    security: marks tests as security tests
    auth: marks tests as authentication tests
    api_security: marks tests as API security tests
    jwt: marks tests as JWT security tests
    sast: marks tests as static analysis security tests
    dast: marks tests as dynamic analysis security tests
    slow: marks tests as slow running (deselect with '-m "not slow"')
    integration: marks tests as integration tests requiring running services

# Test execution options
addopts =
    -ra
    -q
    --strict-markers
    --tb=short
    --maxfail=10
    --durations=10
    --security

# Timeout for security tests (some may take longer)
timeout = 300

# Coverage settings for security tests
coverage_omit =
    tests/*
    external/*
    *_env/*
    */migrations/*

# Environment variables for security testing
env =
    PYTEST_SECURITY_MODE = true
    SECURITY_TEST_MODE = true

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Disable warnings for security tests (focus on security issues)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:requests.*
    ignore::UserWarning:urllib3.*