# OWASP ZAP Baseline Configuration for Brain Researcher
# This configuration defines baseline security scanning parameters

[spider]
# URLs to include in spider scan
include_urls = [
    "http://localhost:8000/api/*",
    "http://localhost:3001/api/*",
    "http://localhost:5000/api/*",
    "http://localhost:3000/*"
]

# URLs to exclude from spider scan
exclude_urls = [
    ".*logout.*",
    ".*delete.*",
    ".*remove.*",
    ".*/data/.*",
    ".*/download/.*"
]

# Maximum crawl depth
max_depth = 5

# Maximum number of nodes to crawl
max_nodes = 100

[authentication]
# Authentication method (form, script, manual)
method = "manual"

# Login URL (if using form authentication)
login_url = "http://localhost:3001/auth/login"

# Username and password fields
username_field = "username"
password_field = "password"

# Test credentials (for testing only - use environment variables in production)
test_username = "test_user"
test_password = "test_password"

# Session management
session_management = "cookie"
session_token_name = "session_id"

[active_scan]
# Enable active vulnerability scanning
enabled = true

# Scan policy (High, Medium, Low, or custom)
policy = "Medium"

# Maximum scan time in minutes
max_scan_time = 30

# Exclude specific attack types for medical data safety
excluded_attacks = [
    "SQL Injection",  # Will be handled by custom rules
    "Remote File Include"
]

[passive_scan]
# Enable passive vulnerability scanning
enabled = true

# Passive scan rules to enable
enabled_rules = [
    "Information Disclosure",
    "Insecure HTTP Headers",
    "Cookie Security",
    "SSL/TLS Issues",
    "Cross-Site Scripting (XSS)"
]

[reporting]
# Output formats
formats = ["html", "json", "xml"]

# Report directory
output_dir = "tests/security/owasp_zap/reports"

# Include request/response details
include_details = true

# Risk levels to include in report
risk_levels = ["High", "Medium", "Low", "Informational"]

[neuroimaging_specific]
# Custom rules for neuroimaging applications
check_participant_data_exposure = true
check_medical_data_encryption = true
check_data_anonymization = true

# API endpoints that handle sensitive data
sensitive_endpoints = [
    "/api/participants/*",
    "/api/subjects/*",
    "/api/medical/*",
    "/api/data/download/*",
    "/api/analysis/results/*"
]

# Headers that should be present for security
required_headers = [
    "X-Content-Type-Options",
    "X-Frame-Options",
    "X-XSS-Protection",
    "Content-Security-Policy",
    "Strict-Transport-Security"
]
