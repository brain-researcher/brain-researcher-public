# Calibration case library C01-C60 for the scientific review layer.
#
# Source: docs/overleaf/BrainResearcher/old_doc/Brain Researcher Manuscript (11).docx
#   Section 6 "Case Library C01-C60" (Table 24: Case / Scenario / Severity / Novelty / Rule(s)).
# That S4 manuscript is SUPERSEDED by configs/br-kg/scientific_review_failure_mode_registry.yaml,
# but the C01-C60 cases remain the canonical annotator-training / regression calibration set.
#
# Field semantics:
#   id                - case identifier C01..C60 (unique)
#   scenario          - short prose description of the analysis situation
#   expected_severity - recommended default verdict: allow | warn | block
#   expected_rule     - the failure-mode rule the case should trigger (null when none / allow)
#   novelty           - novelty/prior-conflict audit tag, or null
#
# NOTE: severities here are the manuscript's recommended defaults; all thresholds are
# profile-configurable. This file asserts STRUCTURAL integrity only; running the live rule
# engine against each scenario is tracked as a separate followup.

cases:
