version: '3.8'

services:
  pact-broker:
    image: pactfoundation/pact-broker:2.107.1
    ports:
      - "9292:9292"
    environment:
      PACT_BROKER_DATABASE_URL: "postgres://pact_broker:password@postgres:5432/pact_broker"
      PACT_BROKER_BASIC_AUTH_USERNAME: pact_workshop
      PACT_BROKER_BASIC_AUTH_PASSWORD: pact_workshop
      PACT_BROKER_PUBLIC_HEARTBEAT: true
      PACT_BROKER_LOG_LEVEL: INFO
      # Enable webhook features
      PACT_BROKER_WEBHOOK_HTTP_METHOD_WHITELIST: POST,PUT,PATCH,DELETE
      PACT_BROKER_WEBHOOK_HOST_WHITELIST: github.com,api.github.com
    depends_on:
      - postgres
    networks:
      - pact-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9292/diagnostic/status/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pact_broker
      POSTGRES_USER: pact_broker
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pact-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pact_broker -d pact_broker"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Pact Broker webhook service for GitHub integration
  pact-broker-webhook:
    image: curlimages/curl:latest
    depends_on:
      - pact-broker
    networks:
      - pact-network
    restart: "no"
    entrypoint: /bin/sh
    command: |
      -c "
      sleep 30
      curl -X POST http://pact-broker:9292/webhooks \
        -H 'Content-Type: application/json' \
        -H 'Authorization: Basic cGFjdF93b3Jrc2hvcDpwYWN0X3dvcmtzaG9w' \
        -d '{
          \"description\": \"GitHub commit status webhook\",
          \"events\": [
            \"contract_content_changed\",
            \"provider_verification_published\"
          ],
          \"request\": {
            \"method\": \"POST\",
            \"url\": \"https://api.github.com/repos/YOUR_GITHUB_USER/brain_researcher/statuses/${pactbroker.consumerVersionNumber}\",
            \"headers\": {
              \"Content-Type\": \"application/json\",
              \"Authorization\": \"token YOUR_GITHUB_TOKEN\"
            },
            \"body\": {
              \"state\": \"${pactbroker.githubVerificationStatus}\",
              \"description\": \"Pact verification result\",
              \"context\": \"pact-broker\"
            }
          }
        }'
      "

volumes:
  postgres_data:
    driver: local

networks:
  pact-network:
    driver: bridge