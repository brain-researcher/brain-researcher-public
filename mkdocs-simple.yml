site_name: Brain Researcher Documentation
site_description: A neuroimaging analysis platform combining LLM-powered natural language understanding with advanced fMRI analysis tools
site_author: Brain Researcher Team

# Theme configuration
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

# Basic plugins
plugins:
  - search

# Navigation
nav:
  - Home: index-simple.md
  - MCP: mcp.md
  - Operations: OPERATIONS.md
  - Runtime Stack: specs/brain_researcher_runtime_stack.md
  - BR-KG:
      - Tool Schema: services/br-kg/kg_tool_schema.md
      - GABRIEL Pipeline: services/br-kg/gabriel_full_pipeline.md
      - GABRIEL Quickstart: services/br-kg/gabriel_sample_quickstart.md
  - Use Cases:
      - BR-KG Plot Probe: use_cases/br_kg_plot_probe_20260502/SUMMARY.md
      - Bounded Autoresearch: use_cases/bounded_autoresearch_a1_2026-04-30/BOUNDED_AUTORESEARCH_CASE_REPORT.md

# Extensions
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
