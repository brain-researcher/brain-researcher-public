site_name: Brain Researcher Documentation
site_description: A neuroimaging analysis platform combining LLM-powered natural language understanding with advanced fMRI analysis tools
site_author: Brain Researcher Team

# Theme configuration
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

# Basic plugins
plugins:
  - search

# Navigation
nav:
  - Home: index-simple.md
  - MCP: mcp.md
  - Operations: OPERATIONS.md
  - Architecture: architecture/overview.md
  - BR-KG:
      - Tool Schema: services/br-kg/kg_tool_schema.md
      - GABRIEL Pipeline: services/br-kg/gabriel_full_pipeline.md
      - GABRIEL Quickstart: services/br-kg/gabriel_sample_quickstart.md
  - Release:
      - Public KG Dump: release/public_kg_dump.md
      - OSS Preview Gate: release/oss_preview_release_gate_2026-05-28.md

# Extensions
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
