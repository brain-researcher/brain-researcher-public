bids_hed_guidance:
  common_events_columns: [onset, duration, trial_type, response, correct, rt]
  per_subfamily:
    sf_signal_detection:
      events_columns: [onset, duration, trial_type, contrast, noise_level, interval_id, response, correct, rt]
      hed_examples:
        - "Perception, Detection, Yes-no"
        - "Perception, Detection, 2AFC"
    sf_feature_discrimination:
      events_columns: [onset, duration, trial_type, target_feature, orientation_diff_deg, spatial_frequency_cpd, delta_e_color, response, correct, rt]
      hed_examples:
        - "Perception, Discrimination, Orientation"
        - "Perception, Discrimination, Vernier"
    sf_motion_perception:
      events_columns: [onset, duration, trial_type, coherence, speed_deg_s, direction, aperture_size, response, correct, rt]
      hed_examples:
        - "Perception, Motion, Coherence"
    sf_temporal_order_flicker:
      events_columns: [onset, duration, trial_type, soa_ms, modality, flicker_rate_hz, response, correct, rt]
      hed_examples:
        - "Perception, Temporal-order, TOJ"
        - "Perception, Flicker, CFF"
    sf_masking_crowding_adaptation:
      events_columns: [onset, duration, trial_type, mask_type, mask_duration_ms, soa_ms, flanker_spacing_deg, adapter_orientation, response, correct, rt]
      hed_examples:
        - "Perception, Masking, Metacontrast"
        - "Perception, Crowding"
    sf_multistability_illusions:
      events_columns: [onset, duration, trial_type, eye_of_presentation, contrast, context_geometry, support_ratio, report_mode, response, rt]
      hed_examples:
