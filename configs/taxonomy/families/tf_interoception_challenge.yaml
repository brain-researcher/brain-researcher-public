# ────────────────────────────────────────────────────────────────────────────────
# BIDS / HED guidance (common + per-subfamily specifics)
# ────────────────────────────────────────────────────────────────────────────────
bids_hed_guidance:
  common_events_columns:
    - onset
    - duration
    - trial_type           # e.g., baseline, block_onset, challenge, recovery, rating
    - intensity            # e.g., co2_fraction, resistance_level, temperature_c, tilt_angle_deg, lbnp_mmHg
    - respiration_rate
    - heart_rate
    - etco2_mmHg
    - spo2_pct
    - scr
    - bp_sys_mmHg
    - bp_dia_mmHg
    - eeg_flag             # if HEP/EEG recorded
    - rating_value         # VAS for dyspnea/pain/anxiety/fullness
    - response
    - rt
  per_subfamily:
    sf_interoceptive_accuracy:
      events_columns: [onset, duration, trial_type, interval_s, phase_lag_ms, confidence, interoceptive_accuracy, hep_amplitude, response, rt]
      hed_examples:
        - "Interoception, Heartbeat, Discrimination"
        - "Interoception, Heartbeat, Counting"
        - "Interoception, Heartbeat-evoked-potential"
    sf_challenges:
      events_columns: [onset, duration, trial_type, challenge_type, intensity, respiration_rate, heart_rate, etco2_mmHg, spo2_pct, bp_sys_mmHg, bp_dia_mmHg, scr, rating_value, response]
      hed_examples:
        - "Challenge, Respiratory, Hypercapnia"
        - "Challenge, Pain, Cold-pressor"
