    sf_interference_recency_binding:
      events_columns: [onset, duration, trial_type, probe_recency, bound_vs_feature, swap_lure_flag, retrocue_flag, response, correct, rt]
      hed_examples:
        - "Working-memory, Interference, Recent-probes"
        - "Working-memory, Binding, Feature-conjunction"
    sf_spatial_oculomotor_wm:
      events_columns: [onset, duration, trial_type, target_eccentricity_deg, retention_interval_ms, saccade_onset, endpoint_error_deg]
      hed_examples:
        - "Working-memory, Oculomotor-delayed-response"
    sf_complex_span:
      events_columns: [onset, duration, trial_type, processing_accuracy, storage_item, recall_correct, span_score]
      hed_examples:
        - "Working-memory, Complex-span, Operation-span"
    sf_multimodal_wm:
      events_columns: [onset, duration, trial_type, modality, list_length, articulatory_suppression, response, correct, rt]
      hed_examples:
        - "Working-memory, Verbal, Digit-span"
