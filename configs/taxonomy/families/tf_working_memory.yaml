bids_hed_guidance:
  common_events_columns: [onset, duration, trial_type, response, correct, rt]
  per_subfamily:
    sf_wm_recognition_short_delay:
      events_columns: [onset, duration, trial_type, set_size, probe_type, retention_interval_ms, response, correct, rt]
      hed_examples:
