# ────────────────────────────────────────────────────────────────────────────────
# BIDS / HED guidance
# ────────────────────────────────────────────────────────────────────────────────
bids_hed_guidance:
  common_events_columns: [onset, duration, trial_type, task_current, task_previous, switch_flag, response, correct, rt]
  per_subfamily:
    sf_explicit_cued_switching:
      events_columns: [onset, duration, trial_type, task_cue, cue_validity, CSI_ms, RSI_ms, run_length, proportion_switch, bivalent_flag, response, correct, rt]
      hed_examples:
        - "Cognitive-control, Task-switching, Explicit-cue, Switch"
        - "Cognitive-control, Task-switching, Explicit-cue, Repeat"
    sf_voluntary_memory_based_switching:
      events_columns: [onset, duration, trial_type, free_choice_flag, task_choice, stay_switch, incentive_condition, response, correct, rt]
      hed_examples:
        - "Cognitive-control, Task-selection, Voluntary-switch"
    sf_three_task_inhibition:
      events_columns: [onset, duration, trial_type, sequence_triplet, n2_relation (ABA/CBA), n2_repeat_flag, RSI_ms, CSI_ms, response, correct, rt]
      hed_examples:
        - "Cognitive-control, Task-set-inhibition, N-2-repetition-cost"
    sf_bivalent_rule_congruency:
      events_columns: [onset, duration, trial_type, stimulus_bivalency, task_rule_congruency, stimulus_repetition, response_repetition, response, correct, rt]
      hed_examples:
        - "Cognitive-control, Rule-congruency, Bivalent-stimulus"
    sf_neuropsych_set_shifting:
      events_columns:
        - onset
        - duration
        - trial_type
        - sorting_rule            # WCST/DCCS/IDED
        - feedback                # correct/incorrect
        - rule_change_flag
        - stage                   # IDED stages
        - errors_cumulative
        - response
        - correct
        - rt
      hed_examples:
        - "Clinical-assessment, WCST, Rule-shift"
        - "Clinical-assessment, ID-ED, Extra-dimensional-shift"
