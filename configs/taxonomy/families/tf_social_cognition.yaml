      - name: Voice Prosody Emotion Recognition
        typical_DVs: [prosody_recognition_accuracy, rt_ms]
        common_manipulations: [prosody_type, noise_level, semantic_content_control]
        model_families: []
        model_params: []
        variant_tags: [voices]
        design_flags: []
