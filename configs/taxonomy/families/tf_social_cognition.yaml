  - id: sf_empathy_vicarious
    label: Empathy & Vicarious Response
    description: Affective/cognitive empathy, vicarious pain/value; prosocial predictors.
    paradigms:
      - name: Empathy for Pain (Pictures/Video)
        typical_DVs: [empathy_rating, SCR_change, EMG_corrugator, BOLD_response]
        common_manipulations: [body_part, context (intentional/accidental), perspective_take_flag, perspective_taking_load]
        model_families: []
        model_params: []
        variant_tags: [vicarious_pain]
        design_flags: [rating_or_neural]
        qa_checks: [desensitization_control]
        keywords: [empathy_pain]
      - name: Empathy for Social Pain (Exclusion/Rejection)
        typical_DVs: [empathy_rating, BOLD_response]
        common_manipulations: [scenario_type (exclusion/rejection), relationship_closeness]
        model_families: []
        model_params: []
        variant_tags: [social_pain]
        design_flags: []
        qa_checks: []
        keywords: [social_pain, empathy]
      - name: Vicarious Reward / Outcome for Other
        typical_DVs: [vicarious_choice_rate, self_vs_other_weight_w]
        common_manipulations: [recipient_identity, relationship_closeness, stake_size]
