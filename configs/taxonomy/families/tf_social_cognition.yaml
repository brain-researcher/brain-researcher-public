id: tf_social_cognition
label: Social Cognition & Interaction
description: >-
  Inferring others’ beliefs, intentions, emotions, and traits; evaluating fairness and cooperation in interactive games;
  perceiving socially relevant cues (faces, gaze, biological motion); empathy and vicarious valuation; social learning,
  influence, and norm enforcement. Emphasizes mechanistic readouts (e.g., inequity aversion, reciprocity, ToM accuracy)
  alongside behavioral DVs.

# ────────────────────────────────────────────────────────────────────────────────
# LEVEL 2: Subfamilies, each with LEVEL 3 paradigms
# ────────────────────────────────────────────────────────────────────────────────
subfamilies:

  - id: sf_social_value_games
    label: Social Value-Based Decision & Cooperation Games
    description: Interactive economic paradigms quantifying fairness, reciprocity, cooperation, punishment, and social discounting.
    paradigms:
      - name: Ultimatum Game (UG)
        typical_DVs: [acceptance_rate, min_acceptable_offer_MAO, rejection_rate_unfair, rt_ms]
        common_manipulations: [offer_amount, endowment, stake_size, partner_type (human/bot), reputation_info, repeated_vs_one_shot, inequity_type (advantageous/disadvantageous)]
        model_families: [Inequity_aversion_Fehr_Schmidt, ERC, Social_utility]
        model_params: [alpha_disadvantage, beta_advantage, rho_reciprocity]
        variant_tags: [one_shot, repeated]
        design_flags: [role_rotation, responder_focus]
        qa_checks: [comprehension_pass]
        keywords: [fairness, punishment]
      - name: Dictator Game (DG)
        typical_DVs: [donation_amount, generosity_rate]
        common_manipulations: [endowment, frame (give/take), anonymity, recipient_need, inequity_type (advantageous/disadvantageous)]
        model_families: [Social_value_orientation, Warm_glow]
        model_params: [svo_angle, warm_glow_phi]
        variant_tags: [third_party_punishment_optional]
        design_flags: [anonymity_emphasis]
        qa_checks: []
        keywords: [altruism]
      - name: Trust Game (TG)
        typical_DVs: [investment_amount, back_transfer, trust_rate, reciprocity_index]
        common_manipulations: [return_rate_multiplier, partner_type, reputation_info, noise_in_returns]
        model_families: [Reciprocity_models, Social_belief_update]
        model_params: [theta_reciprocity, alpha_belief, beta_inverse_temp]
        variant_tags: [single_round, repeated]
        design_flags: [role_switching]
        qa_checks: [honesty_checks_for_bots]
        keywords: [trust, reciprocity]
      - name: Trust Game with Reputation Learning
        typical_DVs: [investment_amount, back_transfer, trust_rate, reciprocity_index]
        common_manipulations: [return_rate_multiplier, partner_type, reputation_feedback, volatility]
        model_families: [Bayesian_reputation, RL_belief_update]
        model_params: [alpha_reputation, beta_inverse_temp]
        variant_tags: [reputation_learning]
        design_flags: [separate_learning_phase]
        qa_checks: [manipulation_checks]
        keywords: [reputation, belief_update]
      - name: Prisoner’s Dilemma / Public Goods
        typical_DVs: [cooperation_rate, contribution_amount, punishment_usage_rate]
        common_manipulations: [multiplier, group_size, partner_matching (fixed/random), punishment_condition (peer/third_party)]
        model_families: [Conditional_cooperation, Social_preference]
        model_params: [w_conditional, alpha_inequity, beta_advantage]
        variant_tags: [iterated, one_shot]
        design_flags: [belief_elicitation_optional]
        qa_checks: []
        keywords: [cooperation, free_riding]
      - name: Social Discounting
        typical_DVs: [indifference_point_by_social_distance, discount_rate_social]
        common_manipulations: [social_distance_index, reward_magnitude, frame]
        model_families: [Hyperbolic_social_discount]
        model_params: [k_social, beta_inverse_temp]
        variant_tags: [recipient_known_vs_unknown]
        design_flags: []
        qa_checks: []
        keywords: [altruism_gradient]

  - id: sf_theory_of_mind_mentalizing
    label: Theory of Mind / Mental State Inference
    description: Inferring beliefs, desires, intentions; explicit/implicit ToM across stories, animations, and faces.
    paradigms:
      - name: False-Belief Stories (Adults/Children)
        typical_DVs: [belief_inference_accuracy, rt_ms]
        common_manipulations: [story_complexity, first_vs_second_order_belief, counterfactuals, belief_vs_reality_conflict]
        model_families: []
        model_params: []
        variant_tags: [first_order, second_order]
        design_flags: [comprehension_questions]
        qa_checks: [language_comprehension_control]
        keywords: [belief_inference]
      - name: Implicit Theory of Mind (Anticipatory Looking)
        typical_DVs: [anticipatory_fixation, violation_of_expectation]
        common_manipulations: [belief_type (true/false), occluder_presence, timing_of_cue]
        model_families: []
        model_params: []
        variant_tags: [implicit, infant, nonverbal]
        design_flags: [eye_tracking_required]
        qa_checks: [calibration_pass]
        keywords: [implicit_tom, anticipatory_looking]
      - name: Frith–Happé Animations (Triangles)
        typical_DVs: [mentalizing_score, intentionality_rating, accuracy]
        common_manipulations: [animation_type (mentalizing/goal-directed/random)]
        model_families: []
        model_params: []
        variant_tags: [nonverbal]
        design_flags: [standardized_scoring]
        qa_checks: []
        keywords: [mentalizing, animations]
      - name: Reading the Mind in the Eyes (RMET)
        typical_DVs: [accuracy]
        common_manipulations: [item_difficulty, time_limit]
        model_families: []
        model_params: []
        variant_tags: [static_images]
        design_flags: [forced_choice]
        qa_checks: []
        keywords: [affective_tom]
      - name: Strange Stories / MASC
        typical_DVs: [mental_state_inference_accuracy, error_types_distribution]
        common_manipulations: [story_genre (sarcasm/white_lie/irony), film_scene_context]
        model_families: []
        model_params: []
        variant_tags: [narrative, film]
        design_flags: [coded_responses]
        qa_checks: [inter_rater_reliability]
        keywords: [pragmatics, sarcasm]

  - id: sf_social_perception_attention
    label: Social Perception & Attention
