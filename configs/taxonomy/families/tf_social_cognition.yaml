# ────────────────────────────────────────────────────────────────────────────────
# BIDS / HED guidance (common + per-subfamily specifics)
# ────────────────────────────────────────────────────────────────────────────────
bids_hed_guidance:
  common_events_columns:
    - onset
    - duration
    - trial_type            # e.g., offer, choice, outcome, vignette, rating
    - partner_type          # human/bot/confederate
    - reputation_info
    - response
    - correct
    - rt
  per_subfamily:
    sf_social_value_games:
      events_columns: [onset, duration, trial_type, offer_amount, endowment, return_rate, outcome_amount_self, outcome_amount_other, partner_type, reputation_info, belief_report, contribution_amount, punishment_cost, social_distance, response, rt]
      hed_examples:
        - "Social-decision, Ultimatum, Offer"
        - "Cooperation, Public-goods, Contribution"
    sf_theory_of_mind_mentalizing:
      events_columns: [onset, duration, trial_type, story_type, belief_level, belief_accuracy, justification_text, response, correct, rt]
      hed_examples:
        - "Mentalizing, False-belief, Story"
        - "Mentalizing, Triangles, Animation"
    sf_social_perception_attention:
      events_columns: [onset, duration, trial_type, gaze_validity, emotion_intensity, scrambling_level, response, correct, rt]
      hed_examples:
        - "Perception, Gaze, Joint-attention"
        - "Perception, Biological-motion"
    sf_empathy_vicarious:
      events_columns: [onset, duration, trial_type, body_part, context, rating, physio_markers, response]
      hed_examples:
        - "Empathy, Vicarious-pain"
    sf_social_learning_influence:
      events_columns: [onset, duration, trial_type, advisor_reliability, group_opinion, advice_value, response, rt]
      hed_examples:
        - "Social-learning, Advice-taking"
        - "Social-influence, Conformity"
    sf_moral_norms_enforcement:
      events_columns: [onset, duration, trial_type, scenario_type, personal_force, punishment_option, cost, response, rt]
      hed_examples:
        - "Moral, Trolley, Personal"
        - "Norms, Third-party-punishment"
    sf_social_exclusion_belonging:
      events_columns: [onset, duration, trial_type, inclusion_ratio, thrower_id, throw_target, affect_rating]
      hed_examples:
        - "Social-exclusion, Cyberball"
    sf_perspective_joint_attention:
      events_columns: [onset, duration, trial_type, perspective_condition, angular_disparity_deg, response, correct, rt]
      hed_examples:
        - "Perspective-taking, Director-task"
