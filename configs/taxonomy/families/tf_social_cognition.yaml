        design_flags: []
        qa_checks: []
        keywords: [emotion_recognition]
      - name: Dynamic Facial Expressions
        typical_DVs: [emotion_recognition_accuracy, temporal_dynamics_sensitivity, rt_ms]
        common_manipulations: [expression_dynamics (onset/offset/speed), gaze_congruency]
        model_families: []
        model_params: []
