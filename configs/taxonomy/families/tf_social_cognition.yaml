      - name: Prosocial Choice (Costly Helping)
        typical_DVs: [helping_rate, donation_amount]
        common_manipulations: [cost_to_self, benefit_to_other, time_pressure]
        model_families: [Altruism_models]
        model_params: [w_altruism, beta_inverse_temp]
        variant_tags: [helping]
        design_flags: []
        qa_checks: []
        keywords: [prosocial]

  - id: sf_social_learning_influence
    label: Social Learning, Conformity & Advice
    description: Learning from others via observation/advice; conformity to group norms.
    paradigms:
      - name: Observational Reinforcement Learning
        typical_DVs: [imitation_rate, observational_learning_rate, social_RPE]
        common_manipulations: [model_accuracy, visibility_of_outcomes, similarity_with_observed, imitation_vs_emulation_cues]
