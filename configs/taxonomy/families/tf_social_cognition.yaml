        model_families: []
        model_params: []
        variant_tags: [overt, covert]
        design_flags: []
        qa_checks: []
        keywords: [gaze_following, joint_attention]
      - name: Biological Motion (Point-Light)
        typical_DVs: [biological_motion_detection_accuracy, direction_judgment]
        common_manipulations: [noise_dots, scrambling, viewpoint]
        model_families: []
        model_params: []
        variant_tags: [point_light]
        design_flags: []
        qa_checks: []
        keywords: [biological_motion]
      - name: Identity/Emotion Recognition (Social)
        typical_DVs: [emotion_recognition_accuracy, identity_accuracy, rt_ms]
        common_manipulations: [emotion_intensity, occlusion, dynamic_vs_static]
        model_families: []
