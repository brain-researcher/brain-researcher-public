        - "Language, Categorical-perception"
        - "Language, Vocoded-speech"
    sf_bilingual_switching_translation:
      events_columns: [onset, duration, trial_type, language_current, language_previous, switch_flag, cognate_status, proficiency, response, correct, rt]
      hed_examples:
