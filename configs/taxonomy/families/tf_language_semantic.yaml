      hed_examples:
        - "Language, Lexical-decision, Word"
        - "Language, Reading, Pseudoword"
        - "Language, Reading, RSVP"
    sf_semantic_processing:
      events_columns: [onset, duration, trial_type, semantic_relatedness, cloze_probability, context_constraint, response, correct, rt]
      hed_examples:
        - "Language, Semantic, Decision"
