    sf_probabilistic_classification:
      events_columns: [onset, duration, trial_type, cue_vector, cue_validity, outcome_probability, feedback_type, feedback_validity, feedback_schedule, training_schedule (blocked/interleaved), num_categories, response, correct, rt]
      hed_examples:
        - "Learning, Probabilistic-classification, Weather-prediction"
        - "Learning, Category, Feedback-schedule"
        - "Learning, Category, Training-schedule"
    sf_representation_generalization:
      events_columns: [onset, duration, trial_type, distortion_level, rotation_deg, train_vs_transfer, prototype_weight, exemplar_weight, model_type, response, correct, rt]
      hed_examples:
        - "Learning, Prototype-distortion"
        - "Learning, Transfer-test"
        - "Learning, Hybrid-model, Prototype-exemplar"
    sf_criterion_base_rate_payoff:
      events_columns: [onset, duration, trial_type, base_rate, payoff_matrix, instruction_type, response, correct, rt]
      hed_examples:
        - "Decision, Criterion, Base-rate"
        - "Decision, Criterion, Payoff"
    sf_modality_specialized:
      events_columns: [onset, duration, trial_type, modality, continuum_value, feedback_type, exploration_time, response_deadline, response, correct, rt]
