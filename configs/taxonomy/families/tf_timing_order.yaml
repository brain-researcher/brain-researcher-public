  common_events_columns: [onset, duration, trial_type, soa_ms, interval_ms, modality, metronome_present, foreperiod, response, correct, rt]
  per_subfamily:
    sf_temporal_order:
      events_columns: [onset, duration, trial_type, soa_ms, modality, adaptation_type, adaptation_soa_ms, response, correct, rt]
      hed_examples:
        - "Timing, TOJ"
        - "Timing, Simultaneity"
        - "Timing, Audiovisual-recalibration"
    sf_interval_metrics:
      events_columns: [onset, duration, trial_type, short_ms, long_ms, probe_or_target_ms, oddball_probability, standard_duration_ms, range_category, response, correct, rt]
      hed_examples:
        - "Timing, Bisection"
        - "Timing, Reproduction"
        - "Timing, Oddball-dilation"
        - "Timing, Weber-scaling"
    sf_sync_continuation:
      events_columns: [onset, duration, trial_type, tempo_bpm, metronome_present, tap_onsets, asynchrony_ms]
      hed_examples:
        - "Timing, Synchronization"
        - "Timing, Continuation"
    sf_foreperiod_hazard:
      events_columns: [onset, duration, trial_type, foreperiod, hazard_rate, temporal_cue_validity, response, rt]
      hed_examples:
