# ────────────────────────────────────────────────────────────────────────────────
bids_hed_guidance:
  common_events_columns: [onset, duration, trial_type, response, correct, rt]
  per_subfamily:
    sf_spatial_orienting_cueing:
      events_columns: [onset, duration, trial_type, cue_type, cue_validity, soa_ms, target_eccentricity_deg, response, correct, rt]
      hed_examples:
        - "Experimental-stimulus, Visual, Cue, Spatial-cueing, Valid-cue"
        - "Experimental-stimulus, Visual, Target, Spatial-attention"
    sf_visual_search_capture:
      events_columns: [onset, duration, trial_type, set_size, target_presence, distractor_type, singleton_presence, feature_match, response, correct, rt]
      hed_examples:
        - "Experimental-stimulus, Visual, Array, Visual-search, Target-present"
        - "Distractor, Visual, Singleton, Attentional-capture"
    sf_temporal_attention_rsvp:
      events_columns: [onset, duration, stream_rate_hz, target_number, lag_t1_t2, response, correct, rt]
      hed_examples:
        - "Experimental-stimulus, RSVP, Target, Attention-blink"
        - "Experimental-stimulus, RSVP, Temporal-cue"
    sf_sustained_attention_vigilance:
      events_columns: [onset, duration, trial_type, target_probability, degradation_level, no_go_trial, cue_target_soa_ms, response, correct, rt]
      hed_examples:
        - "Experimental-stimulus, Sustained-attention, CPT"
        - "Inhibition-task, SART"
    sf_tracking_dynamic_selection:
      events_columns: [onset, duration, trial_type, targets_count, speed_deg_s, occlusion, response, tracking_accuracy]
      hed_examples:
        - "Experimental-stimulus, Visual, Tracking, Multiple-object"
    sf_feature_object_based_selection:
      events_columns: [onset, duration, trial_type, feature_cue_validity, feature_type, object_same_vs_different, response, correct, rt]
      hed_examples:
        - "Experimental-stimulus, Feature-attention, Color"
        - "Experimental-stimulus, Object-attention"
    sf_change_blindness_attention:
      events_columns: [onset, duration, trial_type, flicker_mask_duration_ms, change_presence, response, correct, detection_rt_ms]
      hed_examples:
        - "Experimental-stimulus, Visual, Flicker, Change-blindness"