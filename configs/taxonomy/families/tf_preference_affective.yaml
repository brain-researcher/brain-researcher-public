# ────────────────────────────────────────────────────────────────────────────────
# BIDS / HED guidance
# ────────────────────────────────────────────────────────────────────────────────
bids_hed_guidance:
  common_events_columns: [onset, duration, trial_type, stimulus_category, valence_label, arousal_level, rating_value, response, correct, rt]
  per_subfamily:
    sf_preference_choice:
      events_columns: [onset, duration, trial_type, pair_left_id, pair_right_id, rating_value, wtp_amount, wta_amount, ownership_status, gain_vs_loss_framing, confidence_rating, response, rt]
      hed_examples:
        - "Preference, Rating, VAS"
        - "Preference, Pairwise, Choice"
        - "Preference, Endowment, WTP-WTA"
        - "Preference, Loss-aversion, Framing"
        - "Preference, Confidence"
    sf_aesthetic_judgment:
      events_columns: [onset, duration, trial_type, symmetry_level, familiarity_exposure, novelty_flag, rating_value, response, rt]
      hed_examples:
        - "Aesthetics, Visual, Beauty-rating"
        - "Aesthetics, Music, Liking"
    sf_affect_induction:
      events_columns: [onset, duration, trial_type, stimulus_valence, arousal_level, disgust_category, mood_pre, mood_post, scr, hr, pupil]
      hed_examples:
        - "Affect, Induction, IAPS"
        - "Affect, Induction, Film"
        - "Affect, Disgust, Contamination"
    sf_affective_bias:
      events_columns: [onset, duration, trial_type, valence_pair, cue_validity, soa_ms, joystick_mapping, response, rt, bias_score]
      hed_examples:
        - "Affect, Dot-probe, Bias"
        - "Affect, Approach-avoid, Joystick"
    sf_familiarity_exposure:
      events_columns: [onset, duration, trial_type, exposure_count, lag_between_exposures, familiarity_rating, liking_rating]
      hed_examples:
        - "Preference, Mere-exposure"
    sf_context_framing:
      events_columns: [onset, duration, trial_type, anchor_value, anchor_relevance, decoy_asymmetry, choice_set_size, exposure_duration, inter_stimulus_interval, liking_rating]
      hed_examples:
        - "Preference, Context, Anchoring"
        - "Preference, Context, Decoy-effect"
        - "Preference, Adaptation, Satiation"
    sf_social_preferences:
      events_columns: [onset, duration, trial_type, recommender_identity, recommendation_strength, delay_to_consumption, anticipation_rating, consumption_rating]
      hed_examples:
        - "Preference, Social, Recommendation"
        - "Preference, Anticipation, Consumption"
