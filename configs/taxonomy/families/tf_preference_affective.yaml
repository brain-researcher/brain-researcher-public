id: tf_preference_affective
label: Affective & Preference Tasks
description: >-
  Tasks assessing affective valuation, liking/preference formation, aesthetic judgment, and mood induction.
  Includes explicit ratings (valence/arousal/liking/beauty), pairwise preference/choice and willingness-to-pay,
  aesthetic judgments in visual/music/face domains, attentional/approach biases, and affect/mood induction.
examples: [emotion_induction, like_dislike_rating, aesthetic_preference, pairwise_preference, bdm_willingness_to_pay, dot_probe_bias, approach_avoid_task]
typical_DVs: [valence_rating, arousal_rating, liking_rating, choice_probability, wtp_amount, bias_score, pupil_dilation, scr_change, heart_rate_change]
common_manipulations: [stimulus_valence, arousal_level, familiarity_exposure, novelty, symmetry, prototypicality, fluency, context_constraint, reward_magnitude, time_pressure]
subfamilies:

  # ────────────────────────────────────────────────────────────────────────────
  # Explicit Preference & Choice
  # ────────────────────────────────────────────────────────────────────────────
  - id: sf_preference_choice
    label: Explicit Preference & Pairwise Choice
    description: Scalar ratings and forced-choice preferences; optional economic valuation via willingness-to-pay (WTP).
    paradigms:
      - name: Like/Dislike Rating (VAS/SAM)
        typical_DVs: [liking_rating, valence_rating, arousal_rating, rt_ms, test_retest_reliability]
        common_manipulations: [stimulus_valence, arousal_level, familiarity_exposure, presentation_time_ms]
        model_families: []
        model_params: []
        variant_tags: [VAS, SAM]
        design_flags: [anchored_scale, randomized_order]
        qa_checks: [range_use_check, catch_trials]
        keywords: [explicit_preference]
      - name: Pairwise Preference (2AFC)
        typical_DVs: [choice_probability, choice_consistency, rt_ms]
        common_manipulations: [attribute_difference, time_pressure, repetition]
        model_families: [Bradley_Terry_Luce, Thurstone_mosteller, Value_DDM]
        model_params: [w_attribute_weights, beta_inverse_temp, theta_value_to_drift, a_boundary, Ter_nondec]
        variant_tags: [visual, music, faces]
        design_flags: [counterbalance_left_right]
        qa_checks: [side_bias_check]
        keywords: [pairwise_choice]
      - name: Willingness-to-Pay (BDM Auction)
        typical_DVs: [wtp_amount, acceptance_rate]
        common_manipulations: [reward_magnitude, budget, incentive_compatibility]
        model_families: [Utility_linear_or_CRRA]
        model_params: [rho_CRRA, noise_sigma]
        variant_tags: [BDM, pay_realized]
        design_flags: [incentive_compatible]
        qa_checks: [dominance_violations_zero]
        keywords: [economic_valuation]
      - name: Endowment Effect / Ownership Valuation
        typical_DVs: [wtp_vs_wta_gap, ownership_premium]
        common_manipulations: [ownership_status (endowed/not), item_type, duration_ownership]
        model_families: [Reference_dependent_utility, Prospect_theory]
        model_params: [lambda_loss_aversion, w_ownership_weight]
        variant_tags: [endowment, ownership]
        design_flags: [real_ownership_manipulation]
        qa_checks: [wta_wtp_symmetry_check]
        keywords: [endowment_effect, ownership]
      - name: Loss Aversion / Framing Effects
        typical_DVs: [loss_aversion_coefficient_lambda, framing_effect_size]
        common_manipulations: [gain_vs_loss_framing, magnitude, reference_point]
        model_families: [Prospect_theory, Reference_dependent]
        model_params: [lambda_loss_aversion, alpha_gain_risk, beta_loss_risk]
        variant_tags: [framing, loss_aversion]
        design_flags: [framing_counterbalance]
        qa_checks: [framing_manipulation_check]
        keywords: [loss_aversion, framing]
      - name: Preference Confidence / Uncertainty
        typical_DVs: [confidence_rating, preference_certainty, choice_consistency]
        common_manipulations: [attribute_ambiguity, time_pressure, expertise_level]
        model_families: [Bayesian_preference_uncertainty]
        model_params: [sigma_uncertainty, confidence_threshold]
        variant_tags: [confidence]
        design_flags: [confidence_rating_required]
        qa_checks: [confidence_range_use]
        keywords: [preference_confidence]

  # ────────────────────────────────────────────────────────────────────────────
  # Aesthetic Judgment (Visual/Music/Faces)
  # ────────────────────────────────────────────────────────────────────────────
  - id: sf_aesthetic_judgment
    label: Aesthetic Judgment
    description: Beauty/pleasantness judgments; role of symmetry, prototypicality, fluency, novelty, expertise.
    paradigms:
      - name: Visual Art / Photography Aesthetics
        typical_DVs: [beauty_rating, liking_rating, aesthetic_choice_rate, rt_ms, pupil_dilation]
        common_manipulations: [symmetry, balance, color_saturation, novelty, familiarity_exposure]
        model_families: [Fluency_based, Bayesian_value_integration]
        model_params: [w_symmetry, w_novelty, w_familiarity]
        variant_tags: [art, photo]
        design_flags: [expertise_questionnaire_optional]
        qa_checks: [screen_calibration_check]
        keywords: [aesthetics_visual]
      - name: Musical Preference (Excerpts)
        typical_DVs: [liking_rating, chills_incidence, rt_ms, pupil_dilation]
        common_manipulations: [temporal_predictability, harmonic_consonance, familiarity]
        model_families: [Predictive_processing_meta]
        model_params: [surprise_weight, prediction_error_gain]
        variant_tags: [music]
        design_flags: [headphone_check]
        qa_checks: [sound_level_logged]
        keywords: [aesthetics_music]
      - name: Face Attractiveness / Prototypicality
        typical_DVs: [attractiveness_rating, preference_choice_rate, rt_ms]
        common_manipulations: [symmetry, averageness_morph, skin_texture, expression_neutrality]
        model_families: [Prototype_distance]
        model_params: [distance_to_average]
        variant_tags: [faces]
        design_flags: []
        qa_checks: []
        keywords: [aesthetics_faces]

  # ────────────────────────────────────────────────────────────────────────────
  # Affective Induction & Evaluation
  # ────────────────────────────────────────────────────────────────────────────
  - id: sf_affect_induction
    label: Affective Induction & Evaluation
    description: Induce/measure affect via pictures/film/music/recall; capture state changes in ratings and physiology.
    paradigms:
      - name: IAPS Picture Viewing
        typical_DVs: [valence_rating, arousal_rating, scr_change, heart_rate_change]
        common_manipulations: [stimulus_valence, arousal_level, block_length_s]
        model_families: []
        model_params: []
        variant_tags: [picture]
        design_flags: [rating_or_passive]
        qa_checks: [counterbalance_valence]
        measurement_guidance:
          sensors: [SCR, ECG/PPG, pupil_optional]
          sampling_rates_hz: {scr: 10, ecg_ppg: 250}
        keywords: [mood_induction]
      - name: Film/Music Mood Induction
        typical_DVs: [valence_rating, arousal_rating, mood_change_delta, scr_change]
        common_manipulations: [clip_valence, length_s, music_mode_tempo]
        variant_tags: [film, music]
        design_flags: [pre_post_mood_scale]
        qa_checks: [manipulation_check]
        keywords: [mood_induction]
      - name: Autobiographical Recall (Positive/Negative)
        typical_DVs: [mood_change_delta, valence_rating]
        common_manipulations: [valence, recall_depth, time_window]
        variant_tags: [recall]
        design_flags: [guided_prompt]
        qa_checks: []
        keywords: [affective_recall]
      - name: Disgust Induction / Contamination
        typical_DVs: [disgust_rating, contamination_fear, avoidance_behavior]
        common_manipulations: [disgust_category (core/contamination/moral), intensity, exposure_duration]
        model_families: [Disgust_sensitivity]
        model_params: [disgust_threshold]
        variant_tags: [disgust]
        design_flags: [ethically_approved_stimuli]
        qa_checks: [distress_monitoring]
        keywords: [disgust, contamination]

  # ────────────────────────────────────────────────────────────────────────────
  # Attentional & Approach Bias (Affective Cueing)
  # ────────────────────────────────────────────────────────────────────────────
  - id: sf_affective_bias
    label: Affective Attentional & Approach Bias
    description: Preferential processing or action biases toward affective stimuli (attentional capture, approach/avoid tendencies).
    paradigms:
      - name: Dot-Probe (Attentional Bias)
        typical_DVs: [bias_score_ms, accuracy]
        common_manipulations: [valence_pair (threat/neutral; happy/neutral), cue_validity, soa_ms]
        model_families: [Attentional_bias_index]
        model_params: [bias_ms]
        variant_tags: [faces, words]
        design_flags: [probe_onset_randomized]
        qa_checks: [outlier_rt_filter]
        keywords: [dot_probe]
      - name: Affective Spatial Cueing
        typical_DVs: [cueing_effect_ms, accuracy]
        common_manipulations: [emotional_cue_type, cue_validity, soa_ms]
        model_families: []
        model_params: []
        variant_tags: [gaze_cue_optional]
        design_flags: []
        qa_checks: []
        keywords: [affective_cueing]
      - name: Approach–Avoid Task (AAT; Push/Pull)
        typical_DVs: [approach_bias_index_ms, error_rate]
        common_manipulations: [valence_category, joystick_mapping (push/pull), stimulus_zoom_effect]
        model_families: [Approach_bias_model]
        model_params: [bias_ms, beta_inverse_temp]
        variant_tags: [joystick]
        design_flags: [mapping_counterbalance]
        qa_checks: [motor_calibration]
        keywords: [approach_avoid]

  # ────────────────────────────────────────────────────────────────────────────
  # Familiarity, Mere Exposure & Preference Stability
  # ────────────────────────────────────────────────────────────────────────────
  - id: sf_familiarity_exposure
    label: Familiarity & Mere Exposure
    description: Preference changes after repeated exposure; assess stability and drift across sessions.
    paradigms:
      - name: Mere Exposure (Repeated Items)
        typical_DVs: [liking_increase_delta, familiarity_rating]
        common_manipulations: [exposure_count, lag_between_exposures, stimulus_type]
        model_families: [Exposure_gain_decay]
        model_params: [gain_alpha, decay_lambda]
        variant_tags: [art, faces, words]
        design_flags: [spaced_vs_massed]
        qa_checks: [memory_contamination_control]
        keywords: [mere_exposure]
      - name: Preference Stability / Re-Test
        typical_DVs: [test_retest_reliability, preference_flip_rate]
        common_manipulations: [retest_interval_days, context_change]
        model_families: []
        model_params: []
        variant_tags: [longitudinal]
        design_flags: [same_scale_reuse]
        qa_checks: []
        keywords: [stability]

  # ────────────────────────────────────────────────────────────────────────────
  # Context Effects & Framing
  # ────────────────────────────────────────────────────────────────────────────
  - id: sf_context_framing
    label: Context Effects & Framing
    description: Preference shifts due to context, anchors, and framing; assess reference-dependent valuation.
    paradigms:
      - name: Anchoring Effects (Numerical / Valuation)
        typical_DVs: [anchor_effect_size, final_rating_deviation]
        common_manipulations: [anchor_value, anchor_relevance, exposure_time]
        model_families: [Anchoring_adjustment]
        model_params: [anchor_weight, adjustment_incomplete]
        variant_tags: [anchoring]
        design_flags: [anchor_randomization]
        qa_checks: [anchor_awareness_check]
        keywords: [anchoring, context]
      - name: Context Effects (Choice Set / Decoy)
        typical_DVs: [attraction_effect_size, compromise_effect_size]
        common_manipulations: [decoy_asymmetry, choice_set_size, attribute_tradeoff]
        model_families: [Context_dependent_choice]
        model_params: [decoy_weight, context_sensitivity]
        variant_tags: [decoy, context]
        design_flags: [decoy_counterbalance]
        qa_checks: [dominance_check]
        keywords: [context_effects, decoy]
      - name: Hedonic Adaptation / Satiation
        typical_DVs: [liking_decline_rate, satiation_time, recovery_time]
        common_manipulations: [exposure_duration, inter_stimulus_interval, stimulus_category]
        model_families: [Adaptation_decay]
        model_params: [adaptation_rate, satiation_threshold]
        variant_tags: [adaptation, satiation]
        design_flags: [within_session_vs_across]
        qa_checks: [baseline_measurement]
        keywords: [hedonic_adaptation]

  # ────────────────────────────────────────────────────────────────────────────
  # Social Preferences & Sharing
  # ────────────────────────────────────────────────────────────────────────────
  - id: sf_social_preferences
    label: Social Preferences & Sharing
    description: Preferences about others' preferences, social sharing of preferences, and preference alignment.
    paradigms:
      - name: Preference Sharing / Recommendation
        typical_DVs: [preference_alignment, trust_in_recommendation, choice_consistency]
        common_manipulations: [recommender_identity, recommendation_strength, social_proof]
        model_families: [Social_influence_preference]
        model_params: [w_social_weight, beta_inverse_temp]
        variant_tags: [social, recommendation]
        design_flags: [real_vs_simulated_recommender]
        qa_checks: [manipulation_check]
        keywords: [social_preference]
      - name: Anticipation vs Consumption (Preference)
        typical_DVs: [anticipation_rating, consumption_rating, anticipation_consumption_gap]
        common_manipulations: [delay_to_consumption, consumption_type]
        model_families: [Anticipation_utility]
        model_params: [w_anticipation, discount_rate]
        variant_tags: [anticipation]
        design_flags: [real_consumption_optional]
        qa_checks: [timing_manipulation]
        keywords: [anticipation, consumption]

# ────────────────────────────────────────────────────────────────────────────────
