# ────────────────────────────────────────────────────────────────────────────────
# BIDS / HED guidance (common + per-subfamily specifics)
# ────────────────────────────────────────────────────────────────────────────────
bids_hed_guidance:
  common_events_columns:
    - onset
    - duration
    - trial_type           # study, test, filler, distractor
    - list_id
    - item_id
    - response
    - correct
    - rt
  per_subfamily:
    sf_free_cued_serial_recall:
      events_columns: [onset, duration, trial_type, serial_position, list_length, retention_interval_ms, cue_type, category_type, cue_set_size, response, correct]
      hed_examples:
        - "Memory, Free-recall, List-learning"
        - "Memory, Cued-recall"
        - "Memory, Category-cued-recall"
        - "Memory, Part-set-cueing"
    sf_item_recognition:
      events_columns: [onset, duration, trial_type, probe_type (old/new), lure_type, confidence, rk_judgment, list_length, item_strength, response, correct, rt]
      hed_examples:
        - "Memory, Recognition, Old-new"
        - "Memory, Recognition, Remember-know"
        - "Memory, Recognition, Remember-know-confidence"
        - "Memory, Recognition, List-length"
    sf_associative_memory:
      events_columns: [onset, duration, trial_type, pair_type (intact/rearranged), relatedness, response, correct, rt]
      hed_examples:
        - "Memory, Associative-recognition, Intact"
    sf_source_context_memory:
      events_columns: [onset, duration, trial_type, source_query, source_response, context_match, encoding_state, retrieval_state, state_match, feature_types, temporal_order, spatial_location, response, correct, rt]
      hed_examples:
        - "Memory, Source-memory, Context"
        - "Memory, State-dependent, Mood"
        - "Memory, Episodic-binding, What-where-when"
    sf_false_memory_interference:
      events_columns: [onset, duration, trial_type, condition, critical_lure_flag, misinformation_flag, imagination_count, imagination_vividness, rp_condition, df_method, response, correct, rt]
      hed_examples:
        - "Memory, False-memory, DRM"
        - "Memory, False-memory, Imagination-inflation"
        - "Memory, Interference, Retrieval-induced-forgetting"
    sf_prospective_memory:
      events_columns: [onset, duration, trial_type, pm_cue_present, pm_hit, ongoing_task_type, ongoing_task_rt, response]
      hed_examples:
        - "Memory, Prospective, Event-based"
        - "Memory, Prospective, Time-based"
    sf_encoding_manipulations_transfer:
      events_columns: [onset, duration, trial_type, lop_level, generate_flag, spacing_lag, practice_test_flag, enactment_flag, imagery_flag, sleep_condition, retrieval_trigger, update_manipulation, item_valence, arousal_level, scene_vs_object, response]
      hed_examples:
        - "Memory, Encoding, Levels-of-processing"
        - "Memory, Encoding, Testing-effect"
        - "Memory, Encoding, Reconsolidation"
        - "Memory, Encoding, Emotional"
        - "Memory, Encoding, Scenes-vs-objects"
    sf_metamemory:
      events_columns: [onset, duration, trial_type, jol_value, fok_value, tot_flag, tot_resolution, partial_information, confidence, feedback_flag, response]
      hed_examples:
        - "Memory, Metamemory, JOL"
        - "Memory, Metamemory, Tip-of-the-tongue"
    sf_autobiographical_memory:
      events_columns: [onset, duration, trial_type, time_period_bin, internal_details_count, external_details_count, vividness_rating]
      hed_examples:
        - "Memory, Autobiographical, Cue-word"
    sf_temporal_order_memory:
      events_columns: [onset, duration, trial_type, temporal_lag_items, order_query, temporal_distance_estimation, recency_judgment, response, correct]
      hed_examples:
        - "Memory, Temporal-order, Judgment"
        - "Memory, Recency-judgment"
