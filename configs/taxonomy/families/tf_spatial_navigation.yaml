# ────────────────────────────────────────────────────────────────────────────────
# BIDS / HED guidance (common + per-subfamily specifics)
# ────────────────────────────────────────────────────────────────────────────────
bids_hed_guidance:
  common_events_columns:
    - onset
    - duration
    - trial_type             # e.g., start, decision_point, choice, outcome, probe
    - position_x             # environment coordinates (standardized units)
    - position_y
    - heading_deg
    - speed
    - locomotion_mode        # joystick | treadmill | walking_in_place | wheelchair
    - response
    - correct
    - rt
  per_subfamily:
    sf_virtual_maze_place_learning:
      events_columns: [onset, duration, trial_type, start_pos_xy, goal_pos_xy, landmark_visibility, boundary_geometry, probe_trial_flag, teleport_flag, locomotion_mode, path_length, time_to_goal_ms]
      hed_examples:
        - "Navigation, Virtual-maze, Place-learning, Hidden-goal"
        - "Navigation, Probe, Goal-removed"
    sf_wayfinding_route_planning:
      events_columns: [onset, duration, trial_type, decision_point_id, signage_presence, instruction_type, novel_shortcut_available, choice, correct, rt, path_efficiency]
      hed_examples:
        - "Navigation, Wayfinding, Decision-point"
        - "Navigation, Planning, Detour"
        - "Navigation, Shortcut, Discovery"
    sf_path_integration:
      events_columns: [onset, duration, trial_type, outbound_segments, rotation_deg, translation_m, optic_flow_gain, optic_flow_noise, vestibular_cues, endpoint_error_m, heading_error_deg]
      hed_examples:
        - "Navigation, Path-integration, Triangle-completion"
    sf_reorientation_cognitive_map:
      events_columns: [onset, duration, trial_type, disorientation_flag, boundary_shape, landmark_shift_deg, cue_conflict_condition, cue_preference_index]
      hed_examples:
        - "Navigation, Reorientation, Geometry"
        - "Navigation, Cue-conflict"
    sf_spatial_orientation_pointing:
      events_columns: [onset, duration, trial_type, initial_viewpoint, rotation_deg, target_pos_xy, pointing_angle_deg, pointing_error_deg, rt]
      hed_examples:
        - "Navigation, Pointing, Remembered-target"
        - "Navigation, Relative-direction, JRD"
    sf_landmark_memory:
      events_columns: [onset, duration, trial_type, landmark_id, decision_point_flag, salience_rating, recognition_response, correct, rt]
      hed_examples:
        - "Navigation, Landmark, Recognition"
        - "Navigation, Landmark, Salience"
