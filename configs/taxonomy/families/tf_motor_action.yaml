    - Motor Imagery
constructs:
  primary: [Motor Execution, Sensorimotor Control, Sensorimotor Adaptation, Motor Imagery]
  secondary: [Speed–Accuracy Trade-off, Inhibitory Control (Oculomotor), Internal Model Updating]
uri_brainmap: []
uri_cogpo: []
status: plausible
provenance:
  - source: task_families_master_20.yaml + motor/action expansion
    fields: [subfamilies, paradigms, model_families, model_params, dv_vocab, factor_vocab]
    confidence: high

# ────────────────────────────────────────────────────────────────────────────────
# BIDS / HED guidance (common + per-subfamily specifics)
# ────────────────────────────────────────────────────────────────────────────────
bids_hed_guidance:
  common_events_columns: [onset, duration, trial_type, effector, response, correct, rt]
  per_subfamily:
    sf_rhythmic_sequenced:
      events_columns: [onset, duration, trial_type, pacing, sequence_id, force_level, random_block_flag, response, intertap_interval_ms]
      hed_examples:
        - "Motor, Tapping, Paced"
        - "Motor, Sequence, Chunking"
        - "Motor, SRT, Implicit"
    sf_trajectory_tracking:
      events_columns: [onset, duration, trial_type, trajectory_complexity, target_speed_deg_s, visual_delay_ms, perturbation_force, object_size_mm, object_distance_mm, target_force_level_N, tracking_error_rms]
      hed_examples:
        - "Motor, Tracking, Joystick"
        - "Motor, Pursuit, Manual"
        - "Motor, Reach-to-grasp"
        - "Motor, Force, Isometric"
    sf_oculomotor:
      events_columns: [onset, duration, trial_type, target_eccentricity_deg, gap_overlap, instruction (pro/anti), target_speed_deg_s, response, saccade_latency_ms]
      hed_examples:
        - "Oculomotor, Saccade, Pro"
        - "Oculomotor, Pursuit"
    sf_sensorimotor_adaptation:
      events_columns: [onset, duration, trial_type, perturbation_type (rotation/force/prism), rotation_deg, force_gain, feedback_type, reach_error_deg, aftereffect_deg, washout_length, relearning_interval]
      hed_examples:
        - "Adaptation, Visuomotor-rotation"
        - "Adaptation, Force-field"
        - "Adaptation, Savings"
    sf_speed_accuracy_pointing:
      events_columns: [onset, duration, trial_type, target_size_mm, movement_amplitude_mm, index_of_difficulty_bits, movement_time_ms, endpoint_error_deg]
      hed_examples:
        - "Motor, Fitts, Pointing"
    sf_motor_imagery:
      events_columns: [onset, duration, trial_type, imagery_instruction (kinesthetic/visual), perspective (first/third), action_type, imagery_success, chronometry_ratio]
      hed_examples:
        - "Motor, Imagery, Kinesthetic"
        - "Motor, Mental-rotation"
