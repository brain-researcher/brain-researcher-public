    - Anti-Saccade
    - Smooth Pursuit
    - Saccadic Adaptation
    - Visuomotor Rotation
    - Force-Field Adaptation
    - Fitts’ Law Pointing
    - Mental Rotation (Body/Tool)
    - Motor Imagery
  cogpo_candidate_labels:
    - Finger Tapping
    - Pursuit Tracking
    - Pro-/Anti-Saccade
    - Visuomotor Rotation
