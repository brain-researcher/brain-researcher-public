      family_label: Category & Probabilistic Learning
      subfamily_id: sf_rule_based
      subfamily_label: Rule-Based Learning (RB)
      paradigm_name: Unidimensional Threshold Rule
    provenance:
      confidence: 0.95
      rationale: Geometric stimulus categorization with trial-by-trial feedback over explicit latent rules.

  - experiment_slug: bahrami2020four
