version: 1
ruleset_version: '2026-03-24'
description: >
  Conservative curated Psych-101 experiment slug and exact experiment id mappings
  to canonical task/task-family metadata. Use this registry only for obvious,
  high-confidence mappings; leave the rest unmapped rather than forcing fuzzy
  ontology links from low-signal artifacts.
defaults:
  source: psych101_curated_registry
