- id: tf_interoception_challenge
  name: Interoception & Physiological Challenge
  description: Tasks probing interoceptive accuracy/awareness (cardiorespiratory/gastric) and responses to controlled physiological perturbations (CO₂ hypercapnia, respiratory load, cold pressor, thermal pain, orthostatic/LBNP, drug challenge, breath-hold). Includes metacognitive assessments (confidence/meta-d′), continuous tracking, and standardized physiological acquisition (ECG/PPG, respiration, SpO₂, EtCO₂, SCR, BP). Use medical screening and safety oversight for challenge paradigms.
  examples:
  - heartbeat_counting
  - heartbeat_discrimination_synchrony
  - heartbeat_tracking
  - respiratory_load_detection
  - hypercapnia_co2
  - breath_hold
  - cold_pressor
  - thermal_pain
  - tilt_table
  - lbnp
  - valsalva
  - drug_challenge
  typical_DVs:
  - interoceptive_accuracy
  - interoceptive_bias
  - metacognitive_efficiency
  - dyspnea_rating
  - pain_rating
  - anxiety_rating
  - hr_change_bpm
  - hrv_rmssd
  - resp_rate
  - etco2_mmHg
  - scr_change
  - bp_change
  common_manipulations:
  - intensity
  - duration_s
  - resistance_level
  - co2_fraction
  - temperature_c
  - tilt_angle_deg
  - lbnp_mmHg
  - drug_dose
  - feedback_presence
  subfamilies:
  - id: sf_interoceptive_accuracy
    label: Interoceptive Accuracy & Awareness
    description: Cardio/respiratory interoception tasks with objective accuracy, subjective sensibility, and metacognitive efficiency.
    paradigms:
    - name: Heartbeat Counting (Schandry)
      typical_DVs:
      - interoceptive_count_accuracy
      - bias
      common_manipulations:
      - interval_s (25–60)
      - instruction_style (no_touch/no_pulse)
      - feedback_presence
      variant_tags:
      - counting
      - cardiac
      design_flags:
      - silent_count
      - no_manual_palpation
      qa_checks:
      - ecg_or_ppg_logged
      - exclude_arrhythmic_segments
      measurement_guidance:
        sensors:
        - ECG (Lead II or chest strap) or PPG (finger/ear)
        - respiration belt
        sampling_rates_hz:
          ecg_ppg: 250
          respiration: 25
        preprocessing:
        - R-peak or pulse-peak detection
        - artifact rejection (motion/blinks)
        - align count interval with ECG/PPG
        derived_metrics:
          interoceptive_count_accuracy: mean(1 - |reported - actual|/actual) across intervals
          bias: reported - actual beats
        notes: Interpret with caution; influenced by beliefs/HR knowledge. Prefer discrimination + metacognitive measures.
    - name: Heartbeat Discrimination / Cardio-Audio Synchrony (Whitehead/MCS)
      typical_DVs:
      - dprime
      - criterion_c
      - accuracy_by_phase_lag
      - metacognitive_efficiency_mratio
      common_manipulations:
      - phase_lag_ms (e.g., 0, ±100–300)
      - soa_jitter_ms
      - trial_count
      - confidence_rating
      variant_tags:
      - discrimination
      - synchrony
      - cardiac
      design_flags:
      - method_of_constant_stimuli_or_staircase
      - confidence_required
      qa_checks:
      - prime_phase_control
      - headphone_check_for_audio
      measurement_guidance:
        sensors:
        - ECG/PPG synced to audio
        - headphones
        sampling_rates_hz:
          ecg_ppg: 250
          audio: 44100
        preprocessing:
        - phase-estimation of cardiac cycle
        - audio latencies calibrated
        derived_metrics:
          dprime: SDT sensitivity across synchronous vs asynchronous
          meta_dprime: hierarchical HMeta-d optional; m-ratio = meta-d′/d′
    - name: Heartbeat Tracking (Continuous Confidence/Phase)
      typical_DVs:
      - tracking_error
      - confidence_trace_stats
      - metacog_auc
      common_manipulations:
      - interval_s
      - feedback_presence
      - jittered_phase
      variant_tags:
      - continuous
      - cardiac
      design_flags:
      - continuous_rating_scale
      qa_checks:
      - drift_in_ratings_checked
      measurement_guidance:
        sensors:
        - ECG/PPG
        sampling_rates_hz:
          ecg_ppg: 250
        preprocessing:
        - instantaneous HR estimation
        - time-warp to phase for analyses
    - name: Heartbeat-Evoked Potentials (HEP) (optional neural readout)
      typical_DVs:
      - hep_amplitude
      - hep_latency
      common_manipulations:
      - attention_to_heartbeat
      - task_condition (rest/attention)
      variant_tags:
      - EEG
      design_flags:
      - artifact_rejection_ica
      qa_checks:
      - cardiac_field_artifact_check
      measurement_guidance:
        sensors:
        - EEG
        - ECG
        sampling_rates_hz:
          eeg: 500
          ecg: 250
        preprocessing:
        - R-peak locked averaging
        - blink/ICA cleanup
    - name: Respiratory Interoception (Load Detection/Discrimination)
      typical_DVs:
      - dprime
      - detection_threshold_cmH2O
      - dyspnea_rating
      common_manipulations:
      - resistance_level (low/med/high)
      - block_length
      - inspiratory_flow
      variant_tags:
      - respiratory
      - load_detection
      design_flags:
      - mask_or_mouthpiece
      - medical_screening
      qa_checks:
      - equipment_leak_test
      - SpO2_monitoring
      measurement_guidance:
        sensors:
        - mouth pressure transducer
        - pneumotachograph
        - respiration belt
        - SpO2
        sampling_rates_hz:
          pressure_flow: 100
          respiration: 25
          spo2: 1
        preprocessing:
        - baseline calibration
        - detect inspiration onset
    - name: Gastric Interoception (Water-Load / Balloon) (optional)
      typical_DVs:
      - fullness_rating
      - detection_threshold_volume_ml
      - interoceptive_accuracy
      common_manipulations:
      - volume_step_ml
      - distension_pressure_mmHg
      variant_tags:
      - gastric
      design_flags:
      - medical_clearance_required
