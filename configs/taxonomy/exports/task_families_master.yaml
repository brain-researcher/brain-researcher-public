  - id: sf_eeg_meg_nf
    label: EEG/MEG Band-Power NF
    description: Visual/auditory feedback from band power (alpha/SMR/mu/beta; frontal alpha asymmetry).
    paradigms:
    - name: Alpha Up-Regulation (Occipital)
      typical_DVs:
      - band_power_change_db
      - regulation_success
      - transfer_performance
      common_manipulations:
      - band_hz (8–12)
      - montage (Oz/Pz)
      - feedback_modality
      variant_tags:
      - alpha
      design_flags:
      - eyes_open_vs_closed_control
      qa_checks:
      - eye_blink_EMG_rejection
      - impedance_ok
      measurement_guidance:
        sampling_hz: 500–1000
        preprocessing:
        - band-pass + notch 50/60
        - artifact subspace or ICA
        - Hilbert envelope 250–500 ms window
    - name: SMR Up-Regulation (12–15 Hz) / Mu Suppression
      typical_DVs:
      - band_power_change_db
      - regulation_success
      - transfer_performance
      common_manipulations:
