- id: tf_task_switching
  label: Task Switching & Cognitive Flexibility
  description: 'Switching task sets or classification rules across trials/blocks. Covers explicitly cued vs predictable run-based switching, voluntary/memory-based switching, three-task sequences that reveal task-set inhibition (N−2), bivalent-stimulus rule congruency effects, and neuropsychological set-shifting (WCST/Wisconsin Card Sorting Test, DCCS/Dimensional Change Card Sort, ID/ED/Intra-Extra Dimensional, TMT-B/Trail Making Test Part B).

    '
  subfamilies:
  - id: sf_explicit_cued_switching
    label: Explicitly Cued / Predictable Switching
    description: External cues or predictable sequences indicate the current task; classic sources of switch and mixing costs.
    paradigms:
    - name: Cued Task Switching (explicit cue)
      aliases:
      - Explicit Cueing
      - Color–Shape / Number–Letter switching
      - Cued Switching
      - Explicit Task Switching
      - Task Switching with Cues
      - Color-Shape Task
      - Number-Letter Task
      typical_DVs:
      - switch_cost_ms
      - mixing_cost_ms
      - error_rate
      - preparation_effect_slope
      common_manipulations:
      - cue_validity
      - cue_transparency
      - CSI_ms
      - RSI_ms
      - response_mapping
      - proportion_switch
      - bivalent_vs_univalent_stimuli
      notes: Switch cost declines with preparation (longer CSI/cue-stimulus interval). Separate local switch vs global mixing costs.
    - name: Alternating Runs (AABB)
      aliases:
      - Predictable Switching
      - Rogers–Monsell
      - Rogers-Monsell Task
      - Alternating Run Task
      - AABB Switching
      - Fixed Alternation
      typical_DVs:
      - switch_cost_ms
      - mixing_cost_ms
      - error_rate
      common_manipulations:
      - run_length
      - RSI_ms
      - CSI_ms
      - sequence_predictability
      - response_repetition
      notes: Fixed alternation (e.g., AABB…); clean estimation of switch vs repeat trials. RSI = response-stimulus interval; CSI = cue-stimulus interval.
    - name: Mixed vs Single-Task Blocks
      aliases:
      - Global Mixing-Cost Design
      - Mixed Block Design
      - Single vs Mixed Blocks
      - Mixing Cost Paradigm
      typical_DVs:
      - mixing_cost_ms
      - error_rate
      common_manipulations:
      - block_type_mixed_vs_pure
      - task_set_size
      - stimulus_bivalency
      notes: Mixed blocks require maintaining two task sets → global "mixing" cost.
    - name: Prepared vs Unprepared Switching
      aliases:
      - Preparation Effect
      - Preparation Benefit
      - Task Preparation Paradigm
      - CSI Manipulation
      typical_DVs:
      - switch_cost_ms
      - preparation_effect_slope
      common_manipulations:
      - CSI_ms
      - foreperiod_distribution
      - cue_modality
      notes: Vary CSI (cue–stimulus interval) to quantify reconfiguration/preparation.
  - id: sf_voluntary_memory_based_switching
    label: Voluntary & Memory-Based Switching
    description: Internally generated task selection or switching guided by memory of the required sequence/rule.
    paradigms:
    - name: Voluntary Task Switching (VTS)
      aliases:
      - Free-Choice Switching
      - VTS Task
      - Voluntary Switching
      - Self-Directed Task Switching
      - Free Choice Task Switching
      typical_DVs:
      - voluntary_switch_rate
      - stay_bias
      - switch_cost_ms
      - error_rate
      common_manipulations:
      - reward_incentive
      - proportion_switch_goals
      - instruction_set (promote_switch_vs_stay)
      notes: Participants freely choose task each trial; reveals selection biases and control costs.
    - name: Memory-Based Task Switching (no external cue)
      aliases:
      - Internal Cueing
      - Memory-Guided Switching
      - Sequence-Based Switching
      - Internal Task Switching
      typical_DVs:
      - switch_cost_ms
      - sequence_adherence
      - error_rate
      common_manipulations:
      - sequence_length
      - memory_load
      - sequence_predictability
      - RSI_ms
      notes: Must remember which task comes next; highlights internal control demands. RSI = response-stimulus interval.
    - name: Bilingual Language Switching (optional)
      aliases:
      - Language Switching
      - Bilingual Switching
      - Language Task Switching
      - Code Switching
      typical_DVs:
      - switch_cost_ms
      - mixing_cost_ms
      - error_rate
      common_manipulations:
      - language_cue
      - language_proficiency
      - CSI_ms
      - RSI_ms
      notes: Kept here as a flexibility exemplar; cross-links to Language family. CSI = cue-stimulus interval; RSI = response-stimulus interval.
  - id: sf_three_task_inhibition
    label: Three-Task Sequences & Task-Set Inhibition
    description: Using three tasks (A/B/C) to expose backward inhibition via N−2 repetition costs.
    paradigms:
    - name: N−2 Repetition Cost (ABC vs ABA)
      aliases:
      - Backward Inhibition
      - N-2 Repetition Cost
      - N-2 Repetition Effect
      - Backward Inhibition Effect
      - Three-Task Switching
      typical_DVs:
      - n2_repetition_cost_ms
      - error_rate
      common_manipulations:
      - task_triple_sequence
      - RSI_ms
      - CSI_ms
      - response_repetition_control
      notes: Slower performance when returning to a recently abandoned task (ABA) vs novel (CBA). N−2 = second trial back.
    - name: Task-Set Inertia / Residual Cost
      aliases:
      - Residual Switch Cost
      - Task Set Inertia Effect
      - Residual Cost
      - Persistent Switch Cost
      typical_DVs:
      - residual_switch_cost_ms
      common_manipulations:
      - RSI_ms
      - CSI_ms
      - task_persistence_manipulations
      notes: Persistent carryover even with preparation; dissociable from cue processing. RSI = response-stimulus interval; CSI = cue-stimulus interval.
  - id: sf_bivalent_rule_congruency
    label: Bivalent Stimuli & Task-Rule Congruency
    description: Same stimulus affords multiple task rules; congruent vs incongruent stimulus–rule pairings yield a TRCE.
    paradigms:
    - name: Task-Rule Congruency Effect (TRCE)
      aliases:
      - Bivalent Stimuli Congruency
      - TRCE Effect
      - Task Rule Congruency
      - Bivalent Stimulus Congruency
      - Rule Congruency Effect
      typical_DVs:
      - trce_ms
      - error_rate
      common_manipulations:
      - stimulus_bivalency
      - task_rule_congruency
      - response_mapping
      - stimulus_repetition
      - response_repetition
      notes: E.g., parity vs magnitude classifications for digits; congruent/incongruent across rules.
    - name: Univalent vs Bivalent Stimuli
      aliases:
      - Bivalency Effect
      - Univalent Bivalent Comparison
      - Stimulus Bivalency Effect
      typical_DVs:
      - bivalency_cost_ms
      - error_rate
      common_manipulations:
      - bivalent_vs_univalent_stimuli
      - proportion_bivalent
      notes: Bivalency slows performance even on univalent trials (bivalency effect).
  - id: sf_neuropsych_set_shifting
    label: Neuropsychological Set-Shifting
    description: Clinical/assessment tasks indexing flexibility; rule discovery/maintenance vs shifts.
    paradigms:
    - name: Wisconsin Card Sorting Test (WCST)
