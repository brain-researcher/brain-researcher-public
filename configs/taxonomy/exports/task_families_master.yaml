      notes: Widely used in developmental cohorts (children).
    - name: Intra-/Extra-Dimensional Set Shift (ID/ED; CANTAB)
      aliases:
      - ID/ED Shift
      - IDED
      - Intra-Extra Dimensional Shift
      - CANTAB IDED
      - Intradimensional Extradimensional Shift
      typical_DVs:
      - stages_completed
      - errors_to_criterion
      - ED_shift_cost
      common_manipulations:
      - compound_stimuli
      - intradimensional_vs_extradimensional
      - reversal_stage_presence
      notes: Distinguishes within-dimension (ID) vs across-dimension (ED) shifts. CANTAB = Cambridge Neuropsychological Test Automated Battery.
    - name: Trail Making Test Part B (TMT-B)
      aliases:
      - TMT-B
      - Trail Making Test B
