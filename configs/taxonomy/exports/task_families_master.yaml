- id: tf_neurofeedback
  label: Neurofeedback (Protocol)
  name: Neurofeedback (Protocol)
  meta: true
  description: 'Protocol-oriented paradigms where participants regulate neural signals via real-time feedback. Variants include ROI-based rt-fMRI, MVPA/decoder-based, connectivity/network-based, EEG/MEG band-power feedback, and fNIRS hemodynamic feedback. This family is marked `meta: true` for downstream handling (separate from construct scoring): prioritize calibration, latency/QC reporting, transfer tests, and control/sham designs.'
  examples:
  - rtfmri_roi_regulation
  - decoder_based_nf
  - connectivity_nf
  - eeg_alpha_nf
  - fnirs_pfc_nf
  - transfer_no_feedback
  - sham_yoked_control
  typical_DVs:
  - regulation_success
  - percent_signal_change
  - decoder_score_mean
  - connectivity_z_change
  - band_power_change
  - transfer_performance
  - learning_rate
  - retention_index
  common_manipulations:
  - roi_vs_mvpa_vs_connectivity
  - direction_up_vs_down
  - feedback_schedule (continuous/intermittent)
  - target_roi_or_network
  - strategy_instruction
  - reward_incentive
  - session_count
  usage_policy:
    roi_definition_only: false
    exclude_from_construct_metrics: true
    prioritize_in_preproc_qc: true
    required_reports:
    - latency_budget_ms
    - motion_FD
    - physio_confounds
    - calibration_quality
    - transfer_presence
  subfamilies:
  - id: sf_rtfmri_roi
    label: rt-fMRI ROI-based Regulation
    description: Percent-signal-change feedback from a predefined ROI (e.g., amygdala, insula, dlPFC, M1).
    paradigms:
    - name: ROI Up-Regulation (thermometer/bar)
      typical_DVs:
      - percent_signal_change
      - time_above_threshold
      - regulation_success
      - learning_rate
      common_manipulations:
      - target_roi
      - baseline_window_s
      - direction (up)
      - feedback_schedule
      - strategy_instruction (imagery/reappraisal/motor)
      variant_tags:
      - amygdala
      - insula
      - m1
      - dlPFC
      design_flags:
      - blocked_regulate_vs_rest
      - intermittent_feedback_optional
      qa_checks:
      - latency_budget_reported
      - motion_FD_thresholded
      - physio_regressors_used
      measurement_guidance:
        rt_pipeline:
        - slice-time + motion (minimal)
        - ROIs in native space
        - percent-signal change vs baseline window
        - update every TR or sub-TR if available
        latency_budget_ms:
          acq_TR: 800–2000
          recon: 100–300
          transfer: 20–50
          compute: 20–100
        confounds:
        - motion FD censoring
        - RETROICOR/respiratory belt optional
    - name: ROI Down-Regulation / Bidirectional
      typical_DVs:
      - percent_signal_change
      - bidirectional_control_index
      common_manipulations:
      - target_roi
      - direction (down/bidirectional)
      - feedback_schedule
      variant_tags:
      - bidirectional
      design_flags:
      - counterbalanced_direction_blocks
      qa_checks:
      - drift_control
      - baseline_recalibration_per_block
  - id: sf_rtfmri_decoder
    label: Decoder-/MVPA-based rt-fMRI
    description: Feedback is a classifier/regressor output (e.g., “positive affect” decoder, pain/imagery decoders).
    paradigms:
    - name: Decoder-Trained Affect Regulation
      typical_DVs:
      - decoder_score_mean
      - hit_rate_target_state
      - transfer_performance
      - learning_rate
      common_manipulations:
      - decoder_label (positive/neutral)
      - training_runs
      - crossval_scheme
      - retrain_frequency
      variant_tags:
      - affect_decoder
      design_flags:
      - calibration_runs_required
      - holdout_transfer
      qa_checks:
      - decoder_AUC_reported
      - leakage_checks
      measurement_guidance:
        training:
        - collect labeled blocks
        - fit MVPA (e.g., L2-logistic/SVR)
        - cross-validate; lock weights for NF
        online:
        - apply z-scoring per run
        - project to decoder; smooth 5–10 s optionally
    - name: Pain Decoder Regulation
      typical_DVs:
      - decoder_score_mean
      - pain_rating_change
      - transfer_performance
      common_manipulations:
      - decoder_label (pain/neutral)
      - pain_induction_type
      - strategy_instruction
      variant_tags:
      - pain_decoder
      design_flags:
      - calibration_with_pain_induction
      - holdout_transfer
      qa_checks:
      - decoder_AUC_reported
      - pain_induction_validated
      keywords:
      - pain_regulation
    - name: Motor Imagery Decoder Regulation
      typical_DVs:
      - decoder_score_mean
      - imagery_vividness
      - transfer_performance
      common_manipulations:
      - imagery_type (hand/foot/tongue)
      - decoder_label
      - strategy_instruction
      variant_tags:
      - imagery_decoder
      - motor_imagery
      design_flags:
      - calibration_runs_required
      qa_checks:
      - decoder_AUC_reported
      - imagery_compliance_check
      keywords:
      - motor_imagery_nf
    - name: Pattern-Titration / Shaping
      typical_DVs:
      - decoder_score_gain
      - shaping_threshold_hits
      common_manipulations:
      - target_threshold_schedule
      - reward_incentive
      variant_tags:
      - shaping
      design_flags:
      - adaptive_thresholds
      qa_checks:
      - ceiling_floor_guardrails
  - id: sf_rtfmri_connectivity
    label: Connectivity / Network NF
    description: Feedback from dynamic coupling (seed–target correlation; network balance).
    paradigms:
    - name: Seed–Target Coupling Up/Down
      typical_DVs:
      - connectivity_z_change
      - success_rate
      - transfer_performance
      common_manipulations:
      - seed_roi
      - target_roi
      - window_length_s
      - direction (up/down)
      variant_tags:
      - fronto-amygdala
      - DMN-TPN
      design_flags:
      - sliding_window (20–30 s)
      qa_checks:
      - windowed_z_vs_motion
      - physiological_regressors
      measurement_guidance:
        connectivity:
        - detrend, motion + physio regress
        - sliding correlation Fisher-z
        - update every 1–2 s
    - name: Network Balance Regulation (DMN-TPN Balance)
      typical_DVs:
      - network_balance_index
      - dmn_suppression
      - tpn_activation
      - transfer_performance
      common_manipulations:
      - target_balance_ratio
      - dmn_vs_tpn_weight
      - window_length_s
      variant_tags:
      - network_balance
      - DMN-TPN
      design_flags:
      - sliding_window
      - dual_network_feedback
      qa_checks:
      - network_definition_validated
      - motion_controls
      keywords:
      - network_balance
      - dmn_tpn
    - name: DMN Suppression / TPN Enhancement
      typical_DVs:
      - dmn_suppression_index
      - tpn_activation
      - transfer_performance
      common_manipulations:
