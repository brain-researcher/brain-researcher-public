- id: code_agent
  name: Coding Agent
  package: code
  domain: advanced
  runtime_kind: python
  modality:
  - general
  capabilities:
  - coding_agent
  intents:
  - code_assistant
  consumes:
  - text_prompt
  - path_list
  - test_list
  - apply_flag
  produces:
  - code_summary
  - code_diff
  - code_edit_plan
  - test_status
  resources:
    cpu_min: 1
    mem_mb_min: 256
    gpu: false
    time_min_default: 2
  python:
    module: brain_researcher.services.tools.llm_router_tool
    function: CodingAgentTool
    entry_type: class
  backend:
    kind: python
    provider: ai.coding
  metadata:
    source: curated
    family: coding_agent
    description: LLM-based coding assistant (refactor, debug, write tests) with FS
      context, iterative run/fix, optional patch apply.
    parameters:
      task:
        type: string
        required: true
        description: User coding request
      paths:
        type: array
        items: string
        required: false
        description: Files/dirs/globs to focus on
      tests:
        type: array
        items: string
        required: false
        description: Test commands to run (e.g. pytest ...)
      auto_fs_context:
        type: boolean
        default: true
        description: Auto-search/read relevant code via gemini.fs
      max_iters:
        type: integer
        default: 3
        description: "Max generate\u2192run iterations"
      apply:
        type: boolean
        default: false
        description: Apply patches to repo (CLI-only recommended)
      dry_run:
        type: boolean
        default: false
        description: If apply is true, preview only
    returns:
      status:
        type: string
        enum:
        - success
        - failed
        - partial
        - unknown
      summary:
        type: string
        description: Human-readable result summary
      iterations:
        type: integer
      files_touched:
        type: array
        items: string
      files_changed:
        type: array
        items: object
        description: Per-file change summaries
      patches:
        type: array
        items: string
        description: Unified diff patches (not auto-applied unless apply=true)
      test_status:
        type: string
        enum:
        - passed
        - failed
        - not_run
        - null
      exec_stdout:
        type: string
        nullable: true
      exec_stderr:
        type: string
        nullable: true
      requires_confirmation:
        type: boolean
        description: True when patches present and not auto-applied
  function: analysis
  risk: safe
  tags:
  - advanced
  - analysis
  - python
  - safe
  description: ai code_agent tool
