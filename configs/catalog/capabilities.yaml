version: 0.1.0
tools:
- id: fsl.bet.run
  name: FSL BET (Brain Extraction Tool)
  package: fsl
  runtime_kind: container
  entrypoint: fsl.6.0.7.bet.run
  modality:
  - smri
  - fmri
  capabilities:
  - skull_strip
  - brain_extraction
  - preprocessing
  intents:
  - skull_strip_mri
  consumes:
  - volume_3d
  - volume_4d
  produces:
  - volume_3d
  - mask_path
  resources:
    cpu_min: 1
    mem_mb_min: 512
    gpu: false
    time_min_default: 2
    scaling_hints:
    - param: input_file_size_mb
      mem_mb_per_unit: 2
      time_min_per_unit: 0.01
      unit_description: MB of input file
  container:
    package_ref: fsl
    runtime: apptainer
  metadata:
    description: Brain extraction tool for removing non-brain tissue from MRI images
    literature:
    - Smith SM. (2002). Fast robust automated brain extraction. Human Brain Mapping,
      17(3), 143-155.
  domain: dmri
  function: analysis
  risk: safe
  tags:
  - analysis
  - container
  - dmri
  - safe
  description: 'NiWrap: FSL BET brain extraction (skull-strip) producing brain-only
    volume and mask'
- id: fsl.flirt.run
