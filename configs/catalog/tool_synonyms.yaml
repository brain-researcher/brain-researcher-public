# Tool Synonyms for Intent-to-Tool Mapping
#
# This file provides synonym expansion for common neuroimaging terms
# to improve tool discovery. Synonyms are used to expand both tool
# descriptions (at index build time) and user queries (at search time).
#
# Format:
#   term: [synonym1, synonym2, ...]
#
# Terms and synonyms are normalized to lowercase during processing.

