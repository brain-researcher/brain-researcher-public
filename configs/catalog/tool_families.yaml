families:
- id: br_kg.client
  description: Client for BR-KG search and lookup
  op_param: op
  ops:
    search_concepts: br_kg.find_related_concepts
    coordinate_lookup: br_kg.coordinate_to_concept
    literature: br_kg.concept_literature_search
    graph_query: graph_query
    task_map: br_kg.task_to_concept_mapping
    br_kg.client: br_kg.client
    br_kg.coordinate_to_concept.run: br_kg.coordinate_to_concept.run
    br_kg.find_related_concepts.run: br_kg.find_related_concepts.run
    br_kg.graph_query.run: br_kg.graph_query.run
    br_kg.literature_search.run: br_kg.literature_search.run
    br_kg.task_mapping.run: br_kg.task_mapping.run
    br_kg.fetch_glm_priors: br_kg.fetch_glm_priors
- id: jobs.client
  description: List and manage compute jobs
  op_param: op
  ops:
    list: jobs.list_user_jobs
    status: jobs.get_job_status
    logs: jobs.get_job_logs
    submit: jobs.submit
    cancel: jobs.cancel
- id: openneuro.client
  description: Search and inspect OpenNeuro datasets
  op_param: op
  ops:
    search: openneuro.search
    get: openneuro.get_dataset
    summary: openneuro.get_dataset_summary
    openneuro.client: openneuro.client
    openneuro_download: openneuro_download
    openneuro_list_files: openneuro_list_files
    openneuro_cache: prefetch.openneuro_cache
- id: gemini.fs
  description: Gemini CLI file helpers
  op_param: op
  ops:
    list_dir: gemini.list_directory
    read: gemini.read_file
    search: gemini.search_text
    write: gemini.write_file
    replace: gemini.replace
    fs.apply_patch: fs.apply_patch
    fs.list_directory: fs.list_directory
    fs.read: fs.read
    fs.search: fs.search
- id: gemini.net
  description: Gemini web/search helpers
  op_param: op
  ops:
    fetch: gemini.web_fetch
    google: gemini.google_search
- id: google.rag
  description: Google RAG / File Search tools
  op_param: operation
  ops:
    create_store: google.file_search
    list_stores: google.file_search
    delete_store: google.file_search
    upload: google.file_search
    list_files: google.file_search
    delete_file: google.file_search
    query: google.file_search
- id: ai.llm
  description: Core LLM chat tools
  op_param: op
  ops:
    gemini_chat: ai.llm.gemini.chat
    router_chat: ai.llm.router.chat
    python.llm_router_tool.run: python.llm_router_tool.run
- id: datasets.client
  description: Dataset listing and search
  op_param: op
  ops:
    list_resources: python.datasets_list_resources.run
    bids.list_subjects: bids.list_subjects
    bids.validate: bids.validate
    datasets.client: datasets.client
    query_bids_layout: python.query_bids_layout.run
    resolve_bids: resolve_bids
    validate_bids: validate_bids
    bids.manifest: bids.manifest
    python_resolve_space_tool: python.resolve_space_tool.run
    resolve_space: resolve_space
- id: dandi.client
  description: DANDI archive helpers
  op_param: op
  ops:
    search: dandi_search
    download: dandi_download
- id: download
  description: Dataset download helpers
  op_param: op
  ops:
    openneuro: openneuro_download
    dandi: dandi_download
    neurovault: neurovault_download_collection
