  # NiWrap-backed imaging tools
  # Note: IDs must match NiWrap descriptors (without .run suffix)

  # FSL Suite
  - fsl_bet               # Skull stripping / brain extraction
  - fsl_flirt             # Linear registration (6/12 DOF)
  - fsl_fnirt             # Non-linear registration
  - fsl_feat              # fMRI first-level analysis
  - fsl_melodic           # ICA-based analysis
  - fsl_melodic_ica       # Group/single-subject ICA via MELODIC-style workflows
  - fsl_dual_regression   # Post-group-ICA dual regression analysis
  - fsl_bedpostx          # Diffusion fiber estimation
  - fsl_fix               # ICA-based denoising (FIX)
  - fsl_palm              # Permutation Analysis of Linear Models
  - fsl_fast              # FAST tissue segmentation with bias correction

  # AFNI Suite
  - afni_3dClustSim       # Multiple comparison correction
  - afni_3dDeconvolve     # GLM / deconvolution analysis

  # ANTs Suite
  - ants_registration     # ANTs registration (SyN)

  # FSL fieldmap / distortion-correction tools
  - fsl_prepare_fieldmap
  - fsl_topup
  - fsl_epi_reg

  # FreeSurfer (Python-based, not NiWrap)
  - freesurfer_recon_all  # Cortical reconstruction

