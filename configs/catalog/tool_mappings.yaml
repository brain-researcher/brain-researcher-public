# MCP File System Tools
mcp_filesystem:
  fs.read:
    aliases:
      - read_file
      - read
      - file_read
      - open_file
      - load_file
    example_queries:
      - "Read file contents"
      - "Open file at path"
    adapter_hints:
      path: ["path", "file_path", "file", "filename"]
      encoding: ["encoding", "charset"]
      start: ["start", "offset", "byte_start"]
      end: ["end", "limit", "byte_end"]

  fs.list_directory:
    aliases:
      - list_dir
      - ls
      - directory_list
      - list_files
      - dir_contents
    example_queries:
      - "List directory contents"
      - "Show files in directory"
    adapter_hints:
      path: ["path", "directory", "dir", "folder"]
      include_hidden: ["include_hidden", "show_hidden", "all_files"]

  fs.search:
    aliases:
      - search_files
      - grep
      - find_text
      - search_text
      - file_search
    example_queries:
      - "Search for text in files"
      - "Find files containing pattern"
    adapter_hints:
      pattern: ["pattern", "query", "search_term", "text"]
      path: ["path", "directory", "dir", "search_path"]
      case_sensitive: ["case_sensitive", "case"]

  fs.apply_patch:
    aliases:
      - apply_patch
      - patch_file
      - apply_diff
      - edit_file
    example_queries:
      - "Apply patch to file"
      - "Edit file with diff"
    adapter_hints:
      patch: ["patch", "diff", "unified_diff"]
      path: ["path", "file_path", "target_file"]

