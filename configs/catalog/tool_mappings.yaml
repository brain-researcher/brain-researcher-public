# Planner DAG Tools (Agent-side pipelines)
planner_dag_tools:
  fetch_atlas:
    aliases:
      - atlas_fetch
      - atlas_resolver
    description: Resolve atlas definitions for connectivity workflows
    example_queries:
      - "Fetch the Schaefer200 atlas"
    adapter_hints:
      atlas_name: ["atlas", "atlas_name", "parcellation"]

  extract_timeseries:
    aliases:
      - timeseries_extract
    description: Extract ROI time-series from fMRI volumes
    example_queries:
      - "Get ROI time series from this BOLD run"
    adapter_hints:
      fmri_img: ["fmri_img", "bold", "nifti"]
      atlas: ["atlas", "parcellation"]

  nilearn_connectivity_matrix:
    aliases:
      - nilearn_connectivity
    description: Build connectivity matrices from ROI time-series
    example_queries:
      - "Compute functional connectivity matrix"
    adapter_hints:
      timeseries: ["timeseries", "roi_ts", "signals"]

  resolve_montage:
    aliases:
      - montage_resolver
    description: Fetch standard EEG montage geometry
    example_queries:
      - "Load the standard_1020 montage"
    adapter_hints:
      montage_name: ["montage", "montage_name"]

  eeg_preprocess:
    aliases:
      - eeg_clean
    description: Preprocess raw EEG with filters and ICA
    example_queries:
      - "Clean this raw EEG recording"
    adapter_hints:
      raw_eeg: ["raw_eeg", "eeg_file"]

  epoch_events:
    aliases:
      - eeg_epoch
    description: Epoch EEG around task events
    example_queries:
      - "Epoch the EEG around stimuli"
    adapter_hints:
      events: ["events", "event_file"]

  timefreq_tfr:
    aliases:
      - timefreq_analysis
    description: Compute time-frequency representations for EEG/MEG
    example_queries:
      - "Run time-frequency analysis on the epochs"

  connectivity_measures:
    aliases:
      - sensor_connectivity
    description: Compute EEG/MEG connectivity metrics (PLV, wPLI, GC)
    example_queries:
      - "Compute PLV connectivity"

  coreg_register:
    aliases:
      - coregister_volumes
    description: Register complimentary volumes (e.g., CT→MRI)
    example_queries:
      - "Coregister CT to T1"

  ieeg_electrode_localize:
    aliases:
      - electrode_localize
    description: Localize iEEG electrodes after CT/MRI alignment
    example_queries:
      - "Find electrode coordinates for this subject"

  ieeg_preprocess:
    aliases:
      - ieeg_clean
    description: Preprocess iEEG signals (CAR/bipolar referencing)
    example_queries:
      - "Clean raw iEEG recording"

  ieeg_epoch_features:
    aliases:
      - ieeg_features
    description: Derive bandpower and HFA features from iEEG epochs
    example_queries:
      - "Compute HFA features"

  ieeg_connectivity:
    aliases:
      - ieeg_connectivity_matrix
    description: Build connectivity matrices from iEEG features
    example_queries:
      - "Compute connectivity across contacts"

  dmri_resolve_dwi_triplet:
    aliases:
      - resolve_dwi_triplet
    description: Locate DWI + bval/bvec inputs for dMRI workflows
    example_queries:
      - "Find dwi/bval/bvec for subject 01"

  dmri_fit_model:
    aliases:
      - dmri_model_fit
    description: Fit diffusion models (DTI/CSD) on resolved data
    example_queries:
      - "Fit a diffusion tensor model"

  dmri_parcellate_connectome:
    aliases:
      - dmri_connectome
    description: Generate structural connectomes via parcellation
    example_queries:
      - "Build the structural connectome"

  parcellation_fetch:
    aliases:
      - fetch_parcellation
    description: Download or resolve ROI parcellations
    example_queries:
      - "Get the aparc+aseg parcellation"

  resolve_bids:
    aliases:
      - bids_resolver
    description: Resolve file paths within a BIDS dataset
    example_queries:
      - "Locate subject 01 T1w in BIDS"

  smri_recon:
    aliases:
      - smri_reconstruct
    description: Run cortical reconstruction (FreeSurfer/FastSurfer)
    example_queries:
      - "Run recon-all on this T1"

  smri_parcellation_stats:
    aliases:
      - smri_stats
    description: Export ROI morphometry tables from recon outputs
    example_queries:
      - "Export cortical thickness stats"

  smri_surface_export:
    aliases:
      - smri_surface_assets
    description: Package surface meshes for visualization/analytics
    example_queries:
      - "Export left/right pial surfaces"

  pet_coreg:
    aliases:
