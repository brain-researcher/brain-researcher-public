# Tool Name Mappings and Aliases
# Generated from configs/tools_catalog.json
# This file serves as the single source of truth for tool routing

# Knowledge/Retrieval/BR-KG tools
knowledge_retrieval:
  find_related_concepts:
    aliases:
      - related_concepts
      - concept_search
      - literature_retrieval
      - find_concepts
      - search_concepts
    example_queries:
      - "Find concepts related to hippocampus"
      - "What concepts are similar to working memory"
    adapter_hints:
      concept: ["concept", "query", "search_query", "term", "keyword"]

  coordinate_to_concept:
    aliases:
      - mni_to_concept
      - coord2concept
      - coordinate2concept
      - coords_to_concept
      - brain_location
    example_queries:
      - "What concept is at MNI coordinates [30, -25, -20]"
      - "Map coordinate 30, -25, -20 to concept"
    adapter_hints:
      coordinates: ["coordinates", "coords", "x,y,z", "coordinate"]

  concept_literature_search:
    aliases:
      - pubmed_search
      - literature_search
      - find_papers
      - search_papers
      - paper_search
    example_queries:
      - "Find papers about hippocampus memory"
      - "Search literature on working memory"
    adapter_hints:
      query: ["search_query", "query", "keywords", "terms"]

  graph_query:
    aliases:
      - br_kg_query
      - sparql
      - knowledge_graph
      - kg_query
    example_queries:
      - "Query knowledge graph for attention networks"
    adapter_hints:
      query: ["query", "sparql", "graph_query"]

  evidence_pack:
    aliases:
      - provenance_pack
      - provenance_chains
      - evidence_bundle
      - kg_evidence_pack
      - evidence_graph
    example_queries:
      - "Get an evidence pack for emotion regulation"
      - "Return provenance chains for a task"
      - "Show evidence supporting a cognitive concept"
    adapter_hints:
      seed_id: ["seed_id", "id", "node_id"]
      label: ["label", "type", "node_type"]
      name: ["name", "term", "query"]
      max_maps: ["max_maps", "maps", "top_maps"]
      max_paths: ["max_paths", "paths", "top_paths"]
      max_regions_per_map: ["max_regions_per_map", "regions_per_map", "top_regions"]
      max_similar_tasks: ["max_similar_tasks", "similar_tasks", "top_similar_tasks"]

# Analysis tools
analysis:
  glm_analysis:
    aliases:
      - statistical_analysis
      - glm
      - first_level
      - fmri_analysis
      - stats_analysis
    example_queries:
      - "Run GLM analysis on fMRI data"
      - "Perform statistical analysis"
    adapter_hints:
      data_file: ["data_file", "input", "fmri_data"]
      design_matrix: ["design_matrix", "design", "model"]
      output_dir: ["output_dir", "output", "results_dir"]
    requires_demo_for_missing: true

  contrast_analysis:
    aliases:
      - cluster_analysis
      - contrast_cluster
      - cluster_inference
      - peak_detection
    example_queries:
      - "Analyze contrast map for significant clusters"
    adapter_hints:
      contrast_map: ["contrast_map", "map", "stat_map", "input"]
      threshold: ["threshold", "p_value", "significance"]
    requires_demo_for_missing: true

  encoding_model:
    aliases:
      - encoding
      - predictive_model
      - brain_encoding
    example_queries:
      - "Build encoding model for brain activity"
    adapter_hints:
      brain_data: ["brain_data", "fmri", "neural_data"]
      features: ["features", "predictors", "stimuli"]
    requires_demo_for_missing: true

  contrast_to_activation_map:
    aliases:
      - contrast_to_map
      - predict_activation_map
      - contrast_map_prediction
    example_queries:
      - "Predict an activation map for 2-back versus 0-back"
      - "Map incongruent vs congruent Stroop contrast to brain activation"
    adapter_hints:
      contrast_text: ["contrast_text", "contrast", "description", "query"]
      task_name: ["task_name", "task", "paradigm"]

  brain_similarity:
    aliases:
      - pattern_similarity
      - similarity_analysis
      - compare_patterns
      - rsa
    example_queries:
      - "Compare brain patterns between conditions"
    adapter_hints:
      pattern1: ["pattern1", "first_pattern", "data1"]
      pattern2: ["pattern2", "second_pattern", "data2"]

# Task mapping
task_mapping:
  task_to_concept_mapping:
    aliases:
      - task_mapping
      - map_task
      - task2concept
      - cognitive_task
    example_queries:
      - "Map n-back task to concepts"
      - "What concepts for Stroop task"
    adapter_hints:
      task_name: ["task_name", "task", "paradigm"]

# Data tools
data_management:
  openneuro_download:
    aliases:
      - download_openneuro
      - get_dataset
      - fetch_openneuro
    example_queries:
      - "Download dataset ds000001 from OpenNeuro"
    adapter_hints:
      dataset_id: ["dataset_id", "dataset", "ds_id"]

  validate_bids:
    aliases:
      - bids_validator
      - check_bids
      - validate_dataset
    example_queries:
      - "Validate BIDS dataset structure"
    adapter_hints:
      bids_dir: ["bids_dir", "dataset_path", "path"]

  query_bids_layout:
    aliases:
      - bids_query
      - search_bids
      - find_files
    example_queries:
      - "Query BIDS dataset for T1w images"
    adapter_hints:
