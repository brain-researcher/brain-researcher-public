# Merge Policies Configuration
# Defines when and how to auto-merge duplicate entities vs queue for manual review
# Referenced by: docs/standards/BR-KG_Standards.md (merge_policies section)
# Related to: invariants.md (MERGE-01, MERGE-02)
#
# Schema definitions (node/edge types, properties, ID formats) are now in:
# configs/br-kg/config.yml (schema section)

# Auto-Merge Conditions
# When these conditions are met, entities are automatically merged
auto_merge:
  # Exact ID matches (highest confidence)
  exact_id_match:
    enabled: true
    conditions:
      - "Exact DOI match"
      - "Exact PMID match"
      - "Exact external ID match (cogat:, mesh:, etc.)"
    confidence: 1.0
    action: "auto_merge"
    notes: "Highest confidence - always auto-merge"

  # High-confidence string similarity
  high_similarity:
    enabled: true
    conditions:
      - "Task/Concept names with string_sim >= auto_merge_min_score"
      - "Same source context"
      - "No conflicting metadata"
    threshold: 0.92  # From thresholds.yaml linker.auto_merge_min_score
    confidence_range: [0.92, 1.0]
    action: "auto_merge"
    validation:
      - "Check title/author/year consistency"
      - "Verify same entity_type"
      - "Check no major conflicts"
    notes: "High confidence matches - merge automatically"

# Manual Review Queue
# When these conditions are met, entities are queued for human review
manual_review:
  # Medium confidence matches
  medium_confidence:
    enabled: true
    confidence_range: [0.75, 0.92]  # From thresholds.yaml linker.human_review_range
    conditions:
      - "String similarity in review range"
      - "Some conflicting metadata"
      - "Cross-language or transliterated names"
    action: "queue_for_review"
    queue_name: "curation_queue"

  # Low confidence with signals
  low_confidence_with_signals:
    enabled: true
    confidence_range: [0.60, 0.75]
    conditions:
      - "Multiple weak signals align"
      - "Embedding similarity + fuzzy match"
      - "Spatial proximity + name similarity"
    min_signals: 2  # Require at least 2 matching signals
    action: "queue_for_review"
    notes: "Low confidence but multiple signals - needs human judgment"

  # Conflicts detected
  conflicts:
    enabled: true
    conflict_types:
      - "conflicting_titles"
      - "conflicting_authors"
      - "conflicting_years"
      - "conflicting_journals"
    action: "queue_for_review"
    priority: "high"  # High priority for review
    notes: "Conflicts detected - always requires manual review"

# Merge Procedure
merge_procedure:
  # Step 1: Compute candidate set
  candidate_computation:
    blocking:
      - "year"  # Block by year for publications
      - "journal"  # Block by journal for publications
      - "source"  # Block by data source
    scoring_features:
      - "exact_ids"  # DOI, PMID, etc.
      - "title_similarity"  # String similarity
      - "author_jaccard"  # Author overlap
      - "venue_match"  # Journal/venue match
      - "niclip_text_sim"  # Semantic similarity
    min_blocking_overlap: 1  # At least one blocking field must match

  # Step 2: Score candidates
  scoring:
    method: "weighted_sum"
    weights:
      exact_ids: 1.0
      title_similarity: 0.8
      author_jaccard: 0.6
      venue_match: 0.5
      niclip_text_sim: 0.7
    normalization: "min_max"  # Normalize to 0-1 range
    threshold_auto_merge: 0.92
    threshold_review: 0.75

  # Step 3: Execute merge
  execution:
    if_score_ge_auto_threshold: "auto_merge"
    if_score_in_review_range: "queue_for_review"
    if_score_below_review: "no_action"

  # Step 4: Merge operations
  merge_operations:
    - "Keep canonical node (selected by priority rules)"
    - "Create SAME_AS edges (bidirectional)"
    - "Unify properties (merge non-conflicting, keep canonical for conflicts)"
    - "Append aliases[] array"
    - "Write provenance (merge history)"
    - "Update valid_to on old node version"
    - "Create audit log entry"

# Canonical Node Selection
canonical_selection:
  # Priority order (from edge_scoring.yaml canonical_priority)
  priority_rules:
    - "external_authority"  # Prefer trusted external IDs (DOI > PMID > others)
    - "older_canonical"  # If canonical_id exists, prefer older
    - "higher_evidence_score"  # Prefer node with more evidence
    - "more_connections"  # Prefer node with more edges
    - "longer_label"  # Prefer more descriptive label

  # Source priority per node type (from edge_scoring.yaml)
  source_priority:
    Task: ["cogat", "niclip", "bids", "openneuro", "custom"]
    Concept: ["mesh", "cogat", "wikidata", "pubmed", "custom"]
    Region: ["schaefer400", "aal", "harvard-oxford", "custom"]
    Publication: ["doi", "pmid"]
    Dataset: ["doi", "openneuro_id", "url"]
    Phenotype: ["mesh", "hpo", "custom"]
    StatisticalMap: ["hash_canonical", "url"]

  # Tiebreaker rules
  tiebreakers:
    - "most_connections"  # Node with most edges
    - "earliest_created"  # Oldest node (by valid_from)
    - "longest_label"  # Most descriptive label

# Split/Undo Support (MERGE-01: Reversible merges)
split_undo:
  enabled: true
  audit_log:
    required: true
    location: "data/audit/merge_history.ndjson"
    fields:
      - "merge_id"
      - "timestamp"
      - "canonical_node_id"
      - "merged_node_ids"
      - "merge_confidence"
      - "merged_by"  # "auto" or user_id
      - "properties_snapshot"  # Original properties before merge

  graph_snapshot:
    enabled: true
    before_merge: true  # Create snapshot before merge
    restore_capability: true
    snapshot_format: "graphml"  # or "cypher", "json"

  split_procedure:
    - "Detach SAME_AS edges"
    - "Revert properties to pre-merge state"
    - "Restore original node if deleted"
    - "Update audit log"
    - "Create split record in audit log"

  ui_support:
    enabled: false  # Future: UI for manual split
    notes: "Provide UI to detach SAME_AS and revert properties"

# Merge Confidence Calculation
merge_confidence:
  # Method for combining evidence
  method: "weighted_average"

  # Evidence components
  evidence_components:
    exact_id_match:
      weight: 1.0
      description: "Exact external ID match (DOI, PMID, etc.)"

    title_similarity:
      weight: 0.8
      description: "String similarity of titles/names"
      threshold: 0.86  # From thresholds.yaml

    author_jaccard:
      weight: 0.6
      description: "Jaccard similarity of author sets"

    venue_match:
      weight: 0.5
      description: "Journal/venue exact match"

    niclip_cos:
      weight: 0.7
      description: "NiCLIP embedding cosine similarity"
      threshold: 0.32  # From thresholds.yaml

  # Confidence calculation
  calculation:
    formula: "weighted_sum(evidence_components) / sum(weights)"
    normalize: true
    min_confidence: 0.0
    max_confidence: 1.0

  # Diversity bonus
  diversity_bonus:
    enabled: true
    bonus: 0.04  # +0.04 when >= 2 different method families agree
    method_families:
      - ["exact_id", "title_similarity", "author_jaccard"]  # String family
      - ["niclip_cos", "embedding_match"]  # Semantic family
      - ["spatial", "overlap"]  # Spatial family

# Conflict Detection
conflict_detection:
  # Conflict types
  conflict_types:
    conflicting_titles:
      threshold: 0.5  # Title similarity < 0.5 = conflict
      severity: "high"

    conflicting_authors:
      jaccard_threshold: 0.3  # Author overlap < 0.3 = conflict
      severity: "high"

    conflicting_years:
      year_diff_threshold: 5  # Year difference > 5 years = conflict
      severity: "medium"

    conflicting_journals:
      exact_match_required: true
      severity: "medium"

  # Conflict resolution
  resolution:
    on_conflict: "queue_for_review"  # Never auto-merge on conflict
    priority: "high"
    notes: "Conflicts always require human review"

# Cross-Language and Transliteration
cross_language:
  enabled: true
  detection:
    - "Detect non-ASCII characters"
    - "Detect different scripts (Latin, Cyrillic, CJK, etc.)"
    - "Detect transliteration patterns"

  handling:
    action: "queue_for_review"
    priority: "medium"
    notes: "Cross-language matches need expert review"

  transliteration_support:
    enabled: false  # Future enhancement
    libraries: ["unidecode", "transliterate"]
    notes: "Future: Add transliteration normalization"

# Queue Management
curation_queue:
  # Queue configuration
  storage:
    format: "NDJSON"
    path: "data/curation/merge_queue.ndjson"

  # Queue fields
  record_fields:
    - "queue_id"
    - "timestamp"
    - "candidate_1_curie"
    - "candidate_2_curie"
    - "entity_type"
    - "confidence_score"
    - "evidence_components"
    - "conflicts_detected"
    - "priority"
    - "status"  # pending, reviewed, merged, rejected

  # Priority levels
  priorities:
    high:
      - "conflicts_detected"
      - "exact_id_match_with_conflicts"
    medium:
      - "cross_language"
      - "medium_confidence"
    low:
      - "low_confidence_with_signals"

  # Review workflow
  review_workflow:
    - "Human reviewer examines evidence"
    - "Reviewer decides: merge, reject, or defer"
    - "If merge: execute merge procedure"
    - "If reject: mark as non-match, prevent future matching"
    - "If defer: return to queue with notes"

  # Auto-expiry
  auto_expiry:
    enabled: true
    expiry_days: 90  # Remove from queue after 90 days if not reviewed
    action: "mark_as_deferred"

# Audit and Reversibility (MERGE-01)
audit:
  # Audit log requirements
  required: true
  format: "NDJSON"
  path: "data/audit/merge_history.ndjson"

  # Required fields
  required_fields:
    - "merge_id"  # Unique merge identifier
    - "timestamp"  # When merge occurred
    - "canonical_node_id"  # Selected canonical node
    - "merged_node_ids"  # List of merged node IDs
    - "merge_confidence"  # Confidence score
    - "merged_by"  # "auto" or user_id
    - "merge_method"  # How merge was decided (auto/review)
    - "properties_snapshot"  # Original properties before merge
    - "same_as_edges_created"  # List of SAME_AS edge IDs

  # Reversibility
  reversibility:
    enabled: true
    preserve_history: true
    snapshot_before_merge: true
    restore_capability: true

  # Split tracking
  split_tracking:
    enabled: true
    track_splits: true
    split_reason: "required"  # Reason for split must be provided

# Canonical Stability (MERGE-02)
canonical_stability:
  # Canonical ID immutability
  immutable_after_merge: true
  write_once: true
  enforcement: "database_constraint"

  # Canonical ID format
  canonical_id_format: "canonical:{entity_type}:{stable_id}"
  stable_id_source: "external_authority"  # Prefer external IDs (DOI, PMID)

  # Stability rules
  rules:
    - "Once canonical_id assigned, never change"
    - "Even if better candidate found later, keep original canonical"
    - "New merges always point to existing canonical"
    - "Canonical selection only happens on first merge"

# Notes
notes:
  - "Auto-merge only for high-confidence matches (>= 0.92)"
  - "Manual review for medium-confidence (0.75-0.92) or conflicts"
  - "Merges are reversible via audit log and snapshots (MERGE-01)"
  - "Canonical IDs are immutable after merge (MERGE-02)"
  - "All merges must preserve history and enable undo"
  - "Cross-language matches always require review"
