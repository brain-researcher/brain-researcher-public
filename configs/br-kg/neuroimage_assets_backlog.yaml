        source: should be derived from fMRIPrep, MRIQC, GLMFitLins, and surface exports
        local_status: absent
        resolver_status: none
        provenance_status: missing
        license_status: mixed_upstream
        priority: P4
        why_it_matters: "Workflows repeatedly need masks, confounds, QC summaries, and subject or surface derivatives, but these are not yet indexed as reusable assets."
        next_action: "Add registry records for masks, confounds, QC summaries, and CIFTI or surface outputs with explicit scope and space metadata."
        evidence_paths:
          - configs/datasets/catalog.v1.jsonl
          - docs/archive/TOOL_DISCOVERY_IMPLEMENTATION_SUMMARY.md

  - family_id: semantic_provenance_glue
    title: "Semantic and provenance glue"
    summary: >
      Some cross-family semantics already exist in dataset tags, tasks, space
      configs, and annotation provenance, but canonical asset IDs and alias
      policy are still incomplete across templates, atlases, and reference maps.
    entries:
      - asset_name: dataset_tags_tasks_and_annotation_provenance
        current_state: already_usable
        scope: metadata_layer
        format: catalog_fields
        space_or_density: n_a
        source: dataset catalog annotations
        local_status: ready
        resolver_status: real
        provenance_status: explicit
        license_status: mixed_upstream
        priority: P5
        why_it_matters: "The catalog already stores tasks, tags, subject labels, annotation sources, and refresh timestamps that can anchor cross-family semantics."
        next_action: "Reuse these fields as the starting point for asset-level semantic IDs and provenance joins."
        evidence_paths:
          - configs/datasets/catalog.v1.jsonl
      - asset_name: yeo17_space_and_annotation_identifiers
        current_state: present_not_standardized
        scope: config_level
        format: yaml
        space_or_density: Yeo17 in MNI152NLin2009cAsym 2mm
        source: BR-KG spatial defaults
