version: "1.0"
last_updated: "2026-03-09"

row_model:
  required_fields:
    - asset_name
    - current_state
    - scope
    - format
    - space_or_density
    - source
    - local_status
    - resolver_status
    - provenance_status
    - license_status
    - priority
    - why_it_matters
    - next_action
    - evidence_paths
  current_state_values:
    - already_usable
    - present_not_standardized
    - missing_and_should_acquire
  local_status_values:
    - ready
    - partial
    - absent
  resolver_status_values:
    - real
    - partially_real
    - stub
    - none
  provenance_status_values:
    - explicit
    - partial
    - missing
  license_status_values:
    - clear
    - mixed_upstream
    - unknown
    - internal
  priority_values:
    - P0
    - P1
    - P2
    - P3
    - P4
    - P5

decision:
  standardized_templates:
    answer: partial_yes
    summary: >
      The repo already ships local standard template assets and now has a
      registry-backed resolver, but it still lacks a fully unified template
      registry and transform provenance layer.
    evidence_paths:
      - data/br-kg/raw/neuromaps/atlases/MNI152
      - data/br-kg/raw/neuromaps/atlases/fsaverage
      - configs/datasets/local_mounts.yaml
      - src/brain_researcher/services/tools/resolve_space_tool.py

priorities:
  - priority: P0
    family_id: templates_spaces_transforms
    reason: "Everything else depends on stable space, density, and transform resolution."
  - priority: P1
    family_id: atlases_parcellations
    reason: "ROI, connectome, and parcel-stat workflows depend on a real atlas layer."
  - priority: P2
    family_id: dataset_metadata_bids
    reason: "Dataset-level discovery is already strong and needs file-level asset normalization."
  - priority: P3
    family_id: reference_maps_annotations
    reason: "Reference-map reuse becomes much easier once spaces and atlases are normalized."
  - priority: P4
    family_id: derivatives_qc_design
    reason: "Derivative and QC assets should be standardized after core spaces and catalogs."
  - priority: P5
    family_id: semantic_provenance_glue
    reason: "Cross-family canonical IDs and provenance rules should be tightened last."

families:
  - family_id: dataset_metadata_bids
    title: "Dataset metadata and BIDS"
    summary: >
      Strong dataset-level inventory already exists, but reusable file-level BIDS
      assets are still spread across tools, docs, and mounted layouts.
    entries:
      - asset_name: canonical_dataset_catalog
        current_state: already_usable
        scope: dataset_level
        format: jsonl+json-schema
        space_or_density: n_a
        source: curated local catalog aggregated from OpenNeuro and manual overlays
        local_status: ready
        resolver_status: real
        provenance_status: explicit
        license_status: mixed_upstream
        priority: P2
        why_it_matters: "This is the canonical dataset-level inventory for metadata, phenotype summaries, and derivative pointers."
        next_action: "Keep it canonical and extend it with normalized file-group subassets instead of replacing it."
        evidence_paths:
          - configs/datasets/catalog.v1.jsonl
          - configs/datasets/catalog.schema.json
          - docs/services/br-kg/kg_tool_schema.md
        notes:
          dataset_count: 1693
          datasets_with_phenotype_summary: 305
          datasets_with_declared_derivatives: 449
      - asset_name: dataset_resource_resolution
        current_state: already_usable
        scope: dataset_level
        format: python_tool
        space_or_density: n_a
        source: dataset catalog plus BR-KG-backed query_service
        local_status: ready
        resolver_status: real
        provenance_status: explicit
        license_status: internal
        priority: P2
        why_it_matters: "Resolvers already map dataset references to BIDS roots, derivative paths, URLs, and readiness metadata."
        next_action: "Keep the current tool surface and feed it from the backlog inventory once file-level assets are normalized."
        evidence_paths:
          - src/brain_researcher/services/tools/dataset_resources_tool.py
      - asset_name: bids_path_resolution
        current_state: already_usable
        scope: file_lookup
        format: python_tool
        space_or_density: BIDS entities
        source: local BIDS filesystem lookup with optional PyBIDS fallback
        local_status: ready
        resolver_status: real
        provenance_status: explicit
        license_status: internal
        priority: P2
        why_it_matters: "This is the current working entry point for subject/session/datatype/suffix path resolution."
        next_action: "Retain the interface and connect it to normalized sidecar, confounds, and QC asset groups."
        evidence_paths:
          - src/brain_researcher/services/tools/resolve_bids_tool.py
      - asset_name: mounted_dataset_roots_and_templateflow_mounts
        current_state: present_not_standardized
        scope: environment_level
        format: yaml
        space_or_density: multi_space
        source: local machine and OAK mount configuration
        local_status: partial
        resolver_status: partially_real
        provenance_status: explicit
        license_status: mixed_upstream
        priority: P2
        why_it_matters: "Mounted data roots are already known locally, but they are environment-specific rather than reusable asset records."
        next_action: "Normalize mount aliases and resource roots into environment-neutral asset records."
        evidence_paths:
          - configs/datasets/local_mounts.yaml
      - asset_name: file_level_bids_sidecar_confounds_qc_inventory
        current_state: missing_and_should_acquire
        scope: file_group_level
        format: registry_entry
        space_or_density: BIDS entities plus derivative file groups
        source: should be derived from BIDS roots, derivatives, and sidecars
        local_status: absent
        resolver_status: none
        provenance_status: missing
        license_status: mixed_upstream
        priority: P2
        why_it_matters: "Dataset-level metadata is strong, but reusable assets like dataset_description, participants, events, confounds, TR/TE, and QC are not cataloged as first-class assets."
        next_action: "Add normalized per-dataset file-group inventory records for sidecars, events, confounds, QC summaries, and masks."
        evidence_paths:
          - docs/archive/TOOL_DISCOVERY_IMPLEMENTATION_SUMMARY.md
          - src/brain_researcher/services/tools/behavior_tools.py

  - family_id: templates_spaces_transforms
    title: "Templates, spaces, and transforms"
    summary: >
      The repo already contains real volumetric and surface template assets, but
      runtime normalization is still incomplete and no single registry fully
      governs aliases, densities, and transform provenance.
    entries:
      - asset_name: local_volumetric_templates
        current_state: already_usable
        scope: space_level
        format: nifti
        space_or_density: MNI152NLin2009cAsym and MNI152NLin6Asym at 1mm to 3mm
        source: local neuromaps atlas cache
        local_status: ready
        resolver_status: partially_real
        provenance_status: partial
        license_status: clear
        priority: P0
        why_it_matters: "The repo already ships reusable MNI templates, masks, and tissue probability maps for standard volumetric analyses."
        next_action: "Promote these files into a single template registry instead of resolving them ad hoc from paths."
        evidence_paths:
          - data/br-kg/raw/neuromaps/atlases/MNI152
      - asset_name: local_surface_templates
        current_state: already_usable
        scope: space_level
        format: gifti_surface
        space_or_density: fsaverage, fsLR, and civet densities
        source: local neuromaps atlas cache
        local_status: ready
        resolver_status: partially_real
        provenance_status: partial
        license_status: clear
        priority: P0
        why_it_matters: "Surface assets already exist for fsaverage, fsLR, and civet, which is enough to support surface-based reuse once normalized."
        next_action: "Register hemisphere-aware surfaces and densities under one canonical template registry."
        evidence_paths:
          - data/br-kg/raw/neuromaps/atlases/fsaverage
          - data/br-kg/raw/neuromaps/atlases/fsLR
          - data/br-kg/raw/neuromaps/atlases/civet
      - asset_name: regfusion_transform_files
        current_state: present_not_standardized
        scope: transform_level
        format: text_transform
        space_or_density: MNI152 to fsaverage, fsLR, and civet
        source: local neuromaps atlas cache
        local_status: ready
        resolver_status: none
        provenance_status: partial
        license_status: clear
        priority: P0
        why_it_matters: "The transform assets exist locally, but workflows cannot ask for them through a standard resolver."
        next_action: "Expose regfusion transforms as first-class resolvable assets with source and target space metadata."
        evidence_paths:
          - data/br-kg/raw/neuromaps/atlases/regfusion
      - asset_name: coordinate_system_registry
        current_state: present_not_standardized
        scope: config_level
        format: yaml
        space_or_density: named coordinate systems
        source: BR-KG coordinate system and spatial defaults
        local_status: ready
        resolver_status: none
        provenance_status: explicit
        license_status: internal
        priority: P0
        why_it_matters: "The repo already defines preferred spaces and validation rules, but this config is not yet the single runtime source of truth."
        next_action: "Drive runtime template and transform resolution from the registered coordinate system metadata."
        evidence_paths:
          - configs/br-kg/coordinate_systems.yaml
          - configs/br-kg/spatial.yaml
      - asset_name: generic_template_resolver
        current_state: present_not_standardized
        scope: runtime_api
        format: python_tool
        space_or_density: named spaces and resolutions
        source: registry-backed local runtime wrapper
        local_status: partial
        resolver_status: partially_real
        provenance_status: partial
        license_status: internal
        priority: P0
        why_it_matters: "The public runtime entry point now resolves real local template assets, but coverage and provenance are still narrower than a full canonical template registry."
        next_action: "Expand registry coverage to transforms, richer aliases, and canonical provenance rather than replacing the runtime surface again."
        evidence_paths:
          - src/brain_researcher/services/tools/resolve_space_tool.py
          - configs/datasets/local_mounts.yaml
      - asset_name: unified_template_registry_and_alias_layer
        current_state: missing_and_should_acquire
        scope: registry_level
        format: canonical_registry
        space_or_density: multi_space and multi_density
        source: should consolidate local neuromaps assets and mounted TemplateFlow
        local_status: absent
        resolver_status: none
        provenance_status: missing
        license_status: clear
        priority: P0
        why_it_matters: "Templates exist, but there is still no single layer that normalizes aliases like MNI152, MNI152NLin2009cAsym, fsaverage5, or fsLR 32k."
        next_action: "Create a single registry that maps aliases, densities, masks, tissue maps, and transforms to stable asset IDs."
        evidence_paths:
          - src/brain_researcher/services/tools/resolve_space_tool.py
          - data/br-kg/raw/neuromaps/atlases/MNI152
          - configs/datasets/local_mounts.yaml

  - family_id: atlases_parcellations
    title: "Atlases and parcellations"
    summary: >
      The repo already caches several atlas families and has partial runtime
      support, but space/version coverage and atlas resolution are still
      fragmented across local files, fetchers, and partial runtime adapters.
    entries:
      - asset_name: local_nilearn_atlas_cache
        current_state: already_usable
        scope: atlas_family
        format: nifti+csv+txt+surface_labels
        space_or_density: MNI152 and fsaverage variants
        source: local nilearn atlas cache
        local_status: ready
        resolver_status: partially_real
        provenance_status: partial
        license_status: clear
        priority: P1
        why_it_matters: "The repo already ships Schaefer, AAL, Harvard-Oxford, Yeo, BASC, Destrieux, and MSDL assets in reusable local form, with TemplateFlow-backed Schaefer and DiFuMo files now available as preferred variants when mounted."
        next_action: "Index these atlases under canonical family, space, and version metadata rather than leaving them path-driven."
        evidence_paths:
          - data/br-kg/raw/nilearn_atlases
      - asset_name: fetch_atlas_runtime_for_common_families
        current_state: already_usable
        scope: runtime_api
        format: python_tool
        space_or_density: local Schaefer, AAL, Harvard-Oxford, Yeo, Destrieux, BASC, MSDL, and DiFuMo volume atlases
        source: registry-backed local path lookup with TemplateFlow preference for Schaefer plus nilearn fallback for common families
        local_status: ready
        resolver_status: partially_real
        provenance_status: partial
        license_status: clear
        priority: P1
        why_it_matters: "There is already a working runtime path for fetching several common local atlas families plus labels without fabricating stub paths, and the fetch path now needs to preserve TemplateFlow-backed Schaefer alignment plus DiFuMo support."
        next_action: "Keep the current tool but deepen canonical metadata for family, version, hierarchy, and license rather than adding more path heuristics."
        evidence_paths:
          - src/brain_researcher/services/tools/fetch_atlas_tool.py
          - src/brain_researcher/services/tools/atlas_utils.py
      - asset_name: nilearn_atlas_ingestion_loader
        current_state: present_not_standardized
        scope: ingestion_level
        format: python_loader
        space_or_density: declared per atlas spec
        source: nilearn-backed ingestion definitions
        local_status: ready
        resolver_status: none
        provenance_status: explicit
        license_status: clear
        priority: P1
        why_it_matters: "Common atlas families are already described in one loader, but that description is not yet the canonical runtime registry."
        next_action: "Reuse atlas specs from ingestion as the starting point for a single atlas registry."
        evidence_paths:
          - src/brain_researcher/core/ingestion/loaders/nilearn_atlas_unified.py
      - asset_name: generic_parcellation_fetch_runtime
        current_state: present_not_standardized
        scope: runtime_api
        format: python_tool
        space_or_density: atlas plus volume space or fsaverage density
        source: registry-backed local runtime wrapper
        local_status: partial
        resolver_status: partially_real
        provenance_status: partial
        license_status: internal
        priority: P1
        why_it_matters: "The public parcellation entry point now resolves real local atlas assets for supported volume families plus fsaverage surface annotations, but it is not yet a full canonical atlas registry."
        next_action: "Broaden registry coverage across more atlas families, spaces, label hierarchies, provenance fields, and non-fsaverage surface variants."
        evidence_paths:
          - src/brain_researcher/services/tools/parcellation_fetch_tool.py
      - asset_name: multi_space_multi_family_atlas_registry
        current_state: present_not_standardized
        scope: registry_level
        format: canonical_registry
        space_or_density: volume plus surface plus density-aware variants
        source: partial registry merging static atlas metadata with registry-backed local discovery and TemplateFlow-backed atlas variants
        local_status: partial
        resolver_status: partially_real
        provenance_status: partial
        license_status: clear
        priority: P1
        why_it_matters: "The repo now has a first-pass atlas registry spanning common volume and fsaverage surface families, but coverage and metadata are still incomplete and partially heuristic."
        next_action: "Promote this partial registry into canonical atlas records covering family, version, space, density, label files, hierarchy availability, and license metadata, including TemplateFlow-backed Schaefer and DiFuMo assets."
        evidence_paths:
          - src/brain_researcher/services/tools/reference_asset_registry.py
          - src/brain_researcher/services/tools/fetch_atlas_tool.py
          - src/brain_researcher/services/tools/parcellation_fetch_tool.py
          - configs/reference_assets/reference_asset_registry.yaml
          - configs/reference_assets/cbig_assets.yaml
          - data/br-kg/raw/nilearn_atlases
      - asset_name: missing_subcortical_cerebellar_and_hcp_style_families
        current_state: missing_and_should_acquire
        scope: atlas_family
        format: atlas_bundle
        space_or_density: volume and surface
        source: should be added beyond current nilearn-heavy defaults
        local_status: absent
        resolver_status: none
        provenance_status: missing
        license_status: unknown
        priority: P1
        why_it_matters: "Current local coverage is materially better than before, but it is still strongest for nilearn-style common families rather than the broader atlas set used in production neuroimaging workflows."
        next_action: "Prioritize additional families such as Juelich, HCP-MMP1.0, Gordon, Tian, SUIT, and other subcortical or cerebellar resources if licensing allows."
        evidence_paths:
          - src/brain_researcher/core/ingestion/loaders/nilearn_atlas_unified.py
          - data/br-kg/raw/nilearn_atlases

  - family_id: reference_maps_annotations
    title: "Reference maps and annotations"
    summary: >
      The repo already contains several high-value reference-map corpora, but
      they are not yet normalized under one registry that unifies space tags,
      file types, and provenance.
    entries:
      - asset_name: local_neuromaps_annotation_cache
        current_state: already_usable
        scope: reference_map_family
        format: mixed_neuromaps_cache
        space_or_density: multiple volume and surface spaces
        source: local neuromaps annotation cache
        local_status: ready
        resolver_status: partially_real
        provenance_status: explicit
        license_status: clear
        priority: P3
        why_it_matters: "The repo already ships dozens of neuromaps annotation sets that can serve as reusable reference maps."
        next_action: "Normalize annotation records into a single inventory with explicit space, density, and modality metadata."
        evidence_paths:
          - data/br-kg/raw/neuromaps/annotations
          - src/brain_researcher/core/ingestion/loaders/neuromaps_unified.py
      - asset_name: local_neurosynth_and_nimare_assets
        current_state: already_usable
        scope: reference_map_family
        format: json_gz+tsv_gz+npz+nifti
        space_or_density: volumetric meta-analytic assets
        source: local Neurosynth and NiMARE cache
        local_status: ready
        resolver_status: partially_real
        provenance_status: partial
        license_status: mixed_upstream
        priority: P3
        why_it_matters: "These assets already provide reusable literature-derived maps, vocabulary tables, and topic weights."
        next_action: "Keep normalizing provenance and aliasing across flat Neurosynth stat maps, bundled inference maps, and NiMARE bundle artifacts."
        evidence_paths:
          - data/neurosynth_nimare
          - data/neurosynth_maps
          - data/neurosynth/statmaps
      - asset_name: local_openneuro_glmfitlins_stat_map_corpus
        current_state: already_usable
        scope: derivative_map_corpus
        format: nifti+reports
        space_or_density: primarily MNI152NLin2009cAsym derivatives
        source: local OpenNeuro GLMFitLins outputs
        local_status: ready
        resolver_status: partially_real
        provenance_status: partial
        license_status: mixed_upstream
        priority: P3
        why_it_matters: "The repo already has a sizeable local corpus of reusable statistical maps for downstream decoding and spatial comparison."
        next_action: "Keep tightening provenance normalization and selection policy across dataset, group, and subject-level map variants."
        evidence_paths:
          - data/openneuro_glmfitlins/stat_maps
      - asset_name: query_neuromaps_runtime
        current_state: present_not_standardized
        scope: runtime_api
        format: python_runtime_tool
        space_or_density: local or fetched neuromaps references
        source: runtime helper using neuromaps and local cache heuristics
        local_status: partial
        resolver_status: partially_real
        provenance_status: partial
        license_status: clear
        priority: P3
        why_it_matters: "A useful runtime hook exists for neuromaps-backed reference lookup, but its return shape is still map-centric rather than registry-centric."
        next_action: "Keep the helper and reframe it around canonical reference-map asset IDs."
        evidence_paths:
          - src/brain_researcher/services/tools/grandmaster/runtime_tools.py
      - asset_name: registry_backed_reference_map_resolver
        current_state: present_not_standardized
        scope: runtime_api
        format: python_tool+registry
        space_or_density: volume and surface reference maps
        source: partial registry merged from static metadata and local cache discovery
        local_status: partial
        resolver_status: partially_real
        provenance_status: partial
        license_status: mixed_upstream
        priority: P3
        why_it_matters: "There is now a real runtime path for resolving local reference maps and annotations through registry-backed IDs instead of stub outputs."
        next_action: "Extend the same resolver surface from neuromaps-heavy coverage to broader Neurosynth, NiMARE, and stat-map corpora with stronger provenance normalization."
        evidence_paths:
          - src/brain_researcher/services/tools/reference_asset_registry.py
          - src/brain_researcher/services/tools/resolve_reference_map_tool.py
          - configs/reference_assets/reference_asset_registry.yaml
          - configs/reference_assets/cbig_assets.yaml
      - asset_name: unified_reference_map_registry
        current_state: missing_and_should_acquire
        scope: registry_level
        format: canonical_registry
        space_or_density: volume and surface reference maps
        source: should unify neuromaps, Neurosynth, NiMARE, and local stat-map corpora
        local_status: absent
        resolver_status: none
        provenance_status: missing
        license_status: mixed_upstream
        priority: P3
        why_it_matters: "A partial registry now exists, but a full cross-source reference-map inventory with stable governance and complete provenance still does not."
        next_action: "Promote the current partial registry into canonical reference-map records with stable IDs, source, modality, space, density, and provenance fields across all supported corpora."
        evidence_paths:
          - data/br-kg/raw/neuromaps/annotations
          - data/neurosynth_nimare
          - data/openneuro_glmfitlins/stat_maps
          - src/brain_researcher/services/tools/reference_asset_registry.py

