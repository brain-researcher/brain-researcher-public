schema_version: br-failure-mode-registry-v1
registry_version: "2026-05-26"
registry_id: scientific_review_failure_mode_registry_v1
title: Brain Researcher failure-mode registry
source_document_type: failure_mode_registry
source_path: configs/br-kg/scientific_review_failure_mode_registry.yaml
generated_doc_path: docs/review/failure_mode_registry.md
scope: >
  Source-of-truth policy registry for scientific-review failure modes. These
  rows are not one check per row; they map failure modes to shared detector
  primitives, required evidence, gates, and mutation fixtures.
execution_boundary: >
  This registry defines policy and evidence contracts. A row becomes executable
  only when a loader, validator, probe, or review check consumes the declared
  detector and evidence fields.

detectors:
  measured:
    desc: Compute a property from the artifact and compare to a hard bound.
    runs_at: execution
    examples_fields: [max_abs, finite_fraction, min_eig, std_by_col, shape, n_rows]
  reconcile:
    desc: Cross-check asserted metadata against measured artifact facts.
    runs_at: execution
    examples_pairs:
      - [transform_state, max_abs]
      - [matrix_kind, min_eig]
      - [source_layer, claim_strength]
      - [row_key, join_audit]
  provenance:
    desc: Prevent structurally when the failure is not knowable from output alone.
    runs_at: execution
    required_evidence_trust: runner_attested
    constructs:
      - sklearn.Pipeline-inside-CV
      - GroupKFold(groups=...)
      - keyed-join-only loader
  invariant:
    desc: Run a falsification probe that correct results must pass.
    runs_at: review
    probes:
      permutation_null:
        desc: Shuffle y and rerun the full pipeline including preprocessing.
        covers_family: leakage
      round_trip:
        desc: Re-derive asserted state, such as tanh(z) returning bounded correlations.
      subsample_stability:
        desc: Random-subset stability probe for fold blowup or brittle effects.
      sign_monotonicity:
        desc: Basic impossible-value checks such as p in [0, 1] and variance >= 0.
  prior:
    desc: Domain plausibility prior that flags suspiciously strong or unstable claims.
    runs_at: review
    priors:
      bwas_effect_ceiling:
        metric: pearson_r
        plausible_max: 0.4
        source: Marek 2022
  coverage:
    desc: Missing required diagnostics for a known-risk operation is itself a finding.
    runs_at: review

families:
  - value_domain
  - state
  - leakage
  - inference
  - alignment
  - matrix
  - meta
  - multiplicity
  - governance

gates:
  execution:
    desc: Fail-fast because the computation is not a valid artifact.
  review:
    desc: Gate claim strength or report mode for an otherwise completed computation.

action_policy:
  execution:
    critical: raise
    error: raise
    warn: caveat
  review:
    critical: block_claim
    error: block_claim
    warn: caveat

priority_policy:
  desc: Prioritize publishable-wrong silent failures before neutral or crash-only failures.
  first_tags:
    silent: true
    inflates: favorable
    severity: [critical, error]

bundle_contracts:
  fit_scope_by_step:
    desc: Per-operation evidence that fit-able preprocessing saw only allowed data.
    required_fields:
      - step_id
      - operation
      - fit_scope
      - train_ids_hash
      - test_ids_hash
      - fitted_params_hash
    allowed_fit_scopes:
      - train_fold_only
      - full_dataset
      - outer_test
      - unknown
  claim_contract:
    desc: Verdict stamp copied into artifacts so downstream consumers cannot bypass review.
    required_fields:
      - report_allowed
      - claim_strength
      - confirmatory_or_exploratory
      - scientific_review_decision
      - blocking_findings
      - reviewed_at
  review_probes:
    label_permutation_null:
      required_fields:
        - status
        - n_permutations
        - seed
        - pipeline_scope
        - generated_by
        - input_scope
        - cv_scope
        - exchangeability_unit
        - metric
        - observed_metric
        - null_mean
        - null_p95
        - null_max
        - empirical_p
        - split_manifest_sha256
        - config_sha256
        - pipeline_invocation_sha256
        - verdict

rules:
  - id: REVIEW_VALUEDOMAIN_FISHER_Z_INPUT
    family: value_domain
    what: Fisher-z or arctanh on values outside [-1, 1].
    silent: true
    inflates: favorable
    detect: measured
    evidence: outside_unit_interval_fraction > 1e-6 OR max_abs > 1+eps
    gate: execution
    severity: error
    fixture: value_domain_fisher_z_out_of_range

  - id: REVIEW_VALUEDOMAIN_ARCTANH_BOUNDARY
    family: value_domain
    what: arctanh at exact +/-1 creates infinities.
    silent: false
    inflates: crash
    detect: measured
    evidence: clip after validate; record boundary_clip_count
    gate: execution
    severity: warn
    fixture: value_domain_arctanh_boundary

  - id: REVIEW_VALUEDOMAIN_LOG_NONPOSITIVE
    family: value_domain
    what: Log or log-ratio on non-positive values.
    silent: true
    inflates: crash
    detect: measured
    evidence: min <= 0 before log
    gate: execution
    severity: error
    fixture: value_domain_log_nonpositive

  - id: REVIEW_VALUEDOMAIN_LOGIT_OUT_OF_01
    family: value_domain
    what: Logit on values outside the open unit interval.
    silent: true
    inflates: crash
    detect: measured
    evidence: any(x <= 0 or x >= 1) before logit
    gate: execution
    severity: error
    fixture: value_domain_logit_out_of_01

  - id: REVIEW_VALUEDOMAIN_SQRT_BOXCOX_NEGATIVE
    family: value_domain
    what: Square-root or Box-Cox transform on negative values.
    silent: true
    inflates: crash
    detect: measured
    evidence: min < 0 before transform
    gate: execution
    severity: error
    fixture: value_domain_sqrt_negative

  - id: REVIEW_VALUEDOMAIN_PVAL_TYPE_CONFUSION
    family: value_domain
    what: p-value, -log10(p), z-statistic, or probability used under the wrong domain.
    silent: true
    inflates: favorable
    detect: reconcile
    evidence: value_domain tag vs range and sibling-array monotonic relation
    gate: execution
    severity: error
    fixture: value_domain_pval_type_confusion

  - id: REVIEW_VALUEDOMAIN_DIV_BY_NEAR_ZERO
    family: value_domain
    what: Division or normalization by near-zero denominator.
    silent: true
    inflates: favorable
    detect: measured
    evidence: denom_std < 1e-8 OR post-op max_abs explosion
    gate: execution
    severity: error
    fixture: value_domain_div_near_zero

  - id: REVIEW_VALUEDOMAIN_NONFINITE_PROPAGATION
    family: value_domain
    what: NaN or Inf is silently propagated or hidden by nan_to_num/fillna.
    silent: true
    inflates: neutral
    detect: measured
    evidence: finite_fraction < 1.0 with no declared imputation contract
    gate: execution
    severity: error
    fixture: value_domain_nonfinite_propagation

  - id: REVIEW_VALUEDOMAIN_NEGATIVE_VARIANCE_EIG
    family: value_domain
    what: Negative variance or impossible negative eigenvalue treated as valid.
    silent: true
    inflates: neutral
    detect: invariant
    evidence: var >= 0 and min_eig >= -tol
    gate: execution
    severity: error
    fixture: value_domain_negative_eig

  - id: REVIEW_VALUEDOMAIN_DTYPE_OVERFLOW
    family: value_domain
    what: Integer overflow or float underflow in accumulated statistics.
    silent: true
    inflates: neutral
    detect: measured
    evidence: dtype audit plus magnitude sanity against expected scale
    gate: execution
    severity: warn
    fixture: value_domain_dtype_overflow

  - id: REVIEW_STATE_DOUBLE_FISHER_Z
    family: state
    what: Fisher-z applied to data already declared Fisher-z transformed.
    silent: true
    inflates: favorable
    detect: reconcile
    evidence: transform_state == fisher_z and Fisher-z op requested
    gate: execution
    severity: error
    fixture: state_double_fisher_z

  - id: REVIEW_STATE_DOUBLE_ZSCORE
    family: state
    what: Z-scoring data already standardized.
    silent: true
    inflates: neutral
    detect: reconcile
    evidence: declared raw but col_mean ~ 0 and col_std ~ 1
    gate: execution
    severity: warn
    fixture: state_double_zscore

  - id: REVIEW_STATE_DOUBLE_DETREND_DEMEAN
    family: state
    what: Detrend or demean on already detrended time series.
    silent: true
    inflates: neutral
    detect: reconcile
    evidence: preprocessing_applied already lists detrend or demean
    gate: execution
    severity: warn
    fixture: state_double_detrend

  - id: REVIEW_STATE_DOUBLE_GSR
    family: state
    what: Global signal regression repeated after upstream GSR.
    silent: true
    inflates: neutral
    detect: reconcile
    evidence: preprocessing_applied already lists gsr
    gate: execution
    severity: warn
    fixture: state_double_gsr

  - id: REVIEW_STATE_DOUBLE_BANDPASS
    family: state
    what: Temporal filter applied to already filtered data.
    silent: true
    inflates: neutral
    detect: invariant
    evidence: power spectral density stop-band energy already near zero
    gate: review
    severity: warn
    fixture: state_double_bandpass

  - id: REVIEW_STATE_DOUBLE_SMOOTH
    family: state
    what: Spatial smoothing applied to already smoothed data.
    silent: true
    inflates: neutral
    detect: invariant
    evidence: estimated_fwhm much greater than requested_fwhm
    gate: review
    severity: warn
    fixture: state_double_smooth

  - id: REVIEW_STATE_DOUBLE_CONFOUND_REG
    family: state
    what: Motion or confound regression repeated after upstream regression.
    silent: true
