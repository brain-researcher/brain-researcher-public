    evidence: map value_domain tag inconsistent across inputs
    gate: execution
    severity: error
    fixture: state_beta_vs_stat

  - id: REVIEW_STATE_BOLD_UNITS_MIXED
    family: state
    what: Percent-signal-change and arbitrary BOLD units mixed across subjects or sites.
