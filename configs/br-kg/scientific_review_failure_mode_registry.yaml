  - id: REVIEW_LEAKAGE_IMPUTE_FULL
    family: leakage
    what: Imputer fit on full data.
    silent: true
    inflates: favorable
    detect: provenance
    prevent: imputer inside Pipeline within CV
    evidence: fit_scope_by_step.imputer != train_fold_only
    gate: execution
    severity: error
    fixture: leakage_impute_full

  - id: REVIEW_LEAKAGE_HPARAM_ON_TEST
    family: leakage
    what: Hyperparameter tuned on the outer test fold.
    silent: true
    inflates: favorable
    detect: provenance
    prevent: nested CV with inner loop limited to training folds
    evidence: alpha selection scope == outer test
    gate: execution
    severity: critical
    fixture: leakage_hparam_on_test

  - id: REVIEW_LEAKAGE_SUBJECT_SPLIT
    family: leakage
    what: Multiple runs or sessions from the same subject split across train and test.
    silent: true
    inflates: favorable
    detect: provenance
    prevent: GroupKFold(groups=subject_id)
    evidence: train_ids intersect test_ids at subject level
    gate: execution
    severity: critical
    fixture: leakage_subject_split

  - id: REVIEW_LEAKAGE_FAMILY_SPLIT
    family: leakage
    what: HCP twins or siblings split across folds.
    silent: true
    inflates: favorable
    detect: provenance
    prevent: GroupKFold(groups=family_id) whenever dataset has family structure
    evidence: dataset_has_families and train_family intersects test_family
    gate: execution
    severity: critical
    fixture: leakage_family_split

  - id: REVIEW_LEAKAGE_SITE_SPLIT
    family: leakage
    what: Site or scanner distribution makes folds degenerate.
    silent: true
    inflates: favorable
    detect: provenance
    prevent: stratify or group by site when site is a plausible confound
    evidence: site distribution degenerate across folds
    gate: review
    severity: warn
    fixture: leakage_site_split

  - id: REVIEW_LEAKAGE_TEMPORAL_IID
    family: leakage
    what: Autocorrelated timepoints shuffled into i.i.d. CV.
    silent: true
    inflates: favorable
    detect: provenance
    prevent: block or grouped CV by subject-time unit
    evidence: split_unit == timepoint with autocorrelated source
    gate: execution
    severity: error
    fixture: leakage_temporal_iid

  - id: REVIEW_LEAKAGE_DERIVED_FEATURE_TARGET
    family: leakage
    what: Feature computed from or correlated by construction with the target.
    silent: true
    inflates: favorable
    detect: invariant
    evidence: permutation_null performance remains high
    gate: review
    severity: critical
    fixture: leakage_derived_feature

  - id: REVIEW_LEAKAGE_REPEATED_AS_INDEP
    family: leakage
    what: Repeated measurements counted as independent observations.
    silent: true
    inflates: favorable
    detect: reconcile
    evidence: declared n vs n_unique(subject)
    gate: review
    severity: error
    fixture: leakage_repeated_as_indep

