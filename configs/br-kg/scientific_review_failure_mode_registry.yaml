    gate: execution
    severity: error
    fixture: state_distance_as_similarity

  - id: REVIEW_STATE_COHERENCE_AS_CORR
    family: state
    what: Coherence in [0, 1] treated as Pearson correlation in [-1, 1].
    silent: true
    inflates: favorable
    detect: reconcile
    evidence: matrix_kind == coherence OR min >= 0 while corr assumed
    gate: execution
    severity: error
    fixture: state_coherence_as_corr

  - id: REVIEW_STATE_CENSOR_MASK_DESYNC
    family: state
    what: Scrub or censor mask is desynchronized from BOLD, confound, or behavior rows.
    silent: true
    inflates: favorable
    detect: reconcile
    evidence: censor mask length and row ids vs BOLD/confound frame ids
    gate: execution
    severity: critical
    fixture: state_censor_mask_desync

  - id: REVIEW_STATE_FILTER_CENSOR_ORDER
    family: state
    what: Temporal filtering and censoring order violates the declared preprocessing contract.
    silent: true
    inflates: neutral
    detect: reconcile
    evidence: preprocessing_order vs declared time-series contract
    gate: review
    severity: warn
    fixture: state_filter_censor_order

  - id: REVIEW_STATE_RUN_CONCAT_NO_BOUNDARY
    family: state
    what: Runs or sessions concatenated without boundary regressors or block handling.
    silent: true
    inflates: favorable
    detect: coverage
    evidence: run_concatenated == true and boundary_handling absent
    gate: review
    severity: error
    fixture: state_run_concat_no_boundary

  - id: REVIEW_LEAKAGE_FEATURE_SELECT_FULL
    family: leakage
    what: Feature selection fit on full data before cross-validation.
    silent: true
    inflates: favorable
    detect: provenance
    prevent: feature-selection step inside sklearn.Pipeline within CV
    evidence: fit_scope_by_step.feature_selection != train_fold_only
    gate: execution
    severity: critical
    fixture: leakage_feature_select_full

  - id: REVIEW_LEAKAGE_SCALER_FULL
    family: leakage
    what: Scaler fit on full data including the test fold.
    silent: true
    inflates: favorable
    detect: provenance
    prevent: scaler inside Pipeline within CV
