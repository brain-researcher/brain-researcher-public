    family: leakage
    what: Target residualization fit on full data before cross-validation.
    silent: true
    inflates: favorable
    detect: provenance
    prevent: target residualizer fit on y_train only inside each outer fold
    evidence: fit_scope_by_step.target_residualizer != train_fold_only
    gate: execution
    severity: critical
    fixture: leakage_target_residualizer_full

