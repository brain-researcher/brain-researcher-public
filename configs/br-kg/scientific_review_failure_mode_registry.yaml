    fixture: leakage_pca_full

  - id: REVIEW_LEAKAGE_RESIDUALIZER_FULL
    family: leakage
    what: Confound residualizer fit on full data.
    silent: true
    inflates: favorable
    detect: provenance
    prevent: residualizer fit on X_train only and applied to X_test
    evidence: fit_scope_by_step.residualizer != train_fold_only
    gate: execution
    severity: critical
    fixture: leakage_residualizer_full

  - id: REVIEW_LEAKAGE_HARMONIZATION_FULL
    family: leakage
    what: ComBat or site harmonization fit on full data including the test fold.
