    gate: execution
    severity: critical
    fixture: leakage_combat_target

  - id: REVIEW_LEAKAGE_VARIANCE_MASK_FULL
    family: leakage
    what: Low-variance feature mask computed on full data.
    silent: true
    inflates: favorable
    detect: provenance
    prevent: keep-mask computed from X_train only per fold
    evidence: fit_scope_by_step.variance_mask != train_fold_only
    gate: execution
    severity: error
