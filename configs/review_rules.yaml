    suggested_fix: "Replace the citation with a paper that studies the claimed construct, or rewrite the claim to match the cited paper."
    tags: [epistemics, citation, construct]
    reason_tags: [citation_mismatch, construct_validity]

  - rule_id: REVIEW_CITATION_POPULATION_MISMATCH
