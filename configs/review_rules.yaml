    severity: error
    action: warn
    message: "A coordinate table implies a direct group difference even though the evidence is cross-study only."
    suggested_fix: "Remove the faux group-difference column and report the coordinates as separate study-specific observations."
    tags: [epistemics, coordinates, literature]

  - rule_id: REVIEW_DIRECTIONAL_CLAIM_CONTRADICTION
    description: "Directional predictions disagree within the same hypothesis family"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.epistemic_integrity.directional_claim_contradiction_check
