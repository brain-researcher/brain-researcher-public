version: 1

# Domain-grounded review rules for BR pipeline plans.
# Follows the configs/gates.yaml pattern.
# review_mode: plan | artifact | both
# check_fn: dotted importlib path for structural checks (tool ordering, modality compat, etc.)
# tool_filter: restrict metric check to steps whose tool matches any listed value

rules:
  # ---- Repetition rate / TR ----
  - rule_id: REVIEW_TR_LOW
    description: "TR is below the sane fMRI acquisition range"
    review_mode: plan
    applies_to: step
    stage: plan_review
    metric: params.tr
    comparator: lt
    threshold: 0.3
    severity: warn
    action: warn
    message: "TR < 0.3s is extremely fast for fMRI; verify this is not a unit error (ms vs s)."
    suggested_fix: "Typical fMRI TR range is 0.5–3.0 s. Check whether value should be in seconds."
    tags: [fmri, tr, params]

  - rule_id: REVIEW_TR_HIGH
    description: "TR is above the sane fMRI acquisition range"
    review_mode: plan
    applies_to: step
    stage: plan_review
    metric: params.tr
    comparator: gt
    threshold: 5.0
    severity: warn
    action: warn
    message: "TR > 5.0s is unusually long for fMRI; verify this is intentional."
    suggested_fix: "Typical fMRI TR range is 0.5–3.0 s."
    tags: [fmri, tr, params]

  # ---- Spatial smoothing / FWHM ----
  - rule_id: REVIEW_FWHM_OOB
    description: "Smoothing kernel is too large for fMRI"
    review_mode: plan
    applies_to: step
    stage: plan_review
    tool_filter: [smooth, fslmaths, nilearn_smooth_img, susan]
    metric: params.fwhm
    comparator: gt
    threshold: 12.0
    severity: warn
    action: warn
    message: "FWHM smoothing kernel > 12mm is unusually large for fMRI."
    suggested_fix: "Typical fMRI FWHM range is 4–8mm."
    tags: [smoothing, fmri, params]

  - rule_id: REVIEW_FWHM_LOW
    description: "Smoothing kernel is suspiciously small"
    review_mode: plan
    applies_to: step
    stage: plan_review
    tool_filter: [smooth, fslmaths, nilearn_smooth_img, susan]
    metric: params.fwhm
    comparator: lt
    threshold: 2.0
    severity: error
    action: block
    message: "FWHM smoothing kernel < 2mm is likely a unit error (voxels instead of mm)."
    suggested_fix: "Specify FWHM in mm. Common values: 4, 6, 8 mm."
    tags: [smoothing, fmri, params]

  # ---- Plan-level structural rules (check_fn dispatch) ----
  - rule_id: REVIEW_REGISTRATION_ORDER
    description: "Atlas/parcellation step appears before registration"
    review_mode: plan
    applies_to: plan
    stage: plan_review
    metric: plan.step_count
    comparator: gte
    threshold: 1
    check_fn: "brain_researcher.services.review.checks.tool_order.registration_before_atlas_analysis"
    severity: error
    action: block
    message: "An atlas/parcellation step precedes registration; results will be in wrong space."
    suggested_fix: "Add a registration step (e.g. coreg_register, fsl_flirt) before atlas analysis."
    tags: [registration, atlas, ordering]

  - rule_id: REVIEW_SKULL_STRIP_ORDER
    description: "Registration step appears before skull-stripping"
    review_mode: plan
    applies_to: plan
    stage: plan_review
    metric: plan.step_count
    comparator: gte
    threshold: 1
    check_fn: "brain_researcher.services.review.checks.tool_order.skull_stripping_before_registration"
    severity: warn
    action: warn
    message: "A registration step precedes skull-stripping; registering with skull may degrade accuracy."
    suggested_fix: "Skull-strip (bet, antsBrainExtraction) before registration."
    tags: [registration, skull_strip, ordering]

  - rule_id: REVIEW_MISSING_CONFOUND_REGRESSION
    description: "GLM step present without a prior confound regression step"
    review_mode: plan
    applies_to: plan
    stage: plan_review
    metric: plan.step_count
    comparator: gte
    threshold: 1
    check_fn: "brain_researcher.services.review.checks.tool_order.confound_regression_before_glm"
    severity: warn
    action: warn
    message: "GLM step found but no confound regression step precedes it."
    suggested_fix: "Add a confound regression step before GLM to remove motion and physiological noise."
    tags: [glm, confounds, ordering]

  - rule_id: REVIEW_MODALITY_MISMATCH
    description: "EEG/MEG modality combined with volumetric MNI atlas"
    review_mode: plan
    applies_to: plan
    stage: plan_review
    metric: plan.step_count
    comparator: gte
    threshold: 0
    check_fn: "brain_researcher.services.review.checks.space_compat.atlas_modality_compatible"
    severity: error
    action: block
    message: "EEG/MEG data combined with a volumetric MNI atlas — modality/space mismatch."
    suggested_fix: "Use a surface-based or EEG-compatible atlas (e.g. fsaverage, MNI-template with source imaging)."
    tags: [eeg, meg, atlas, modality]

  - rule_id: REVIEW_NO_STEPS
    description: "Pipeline plan has no steps"
    review_mode: plan
    applies_to: plan
    stage: plan_review
    metric: plan.step_count
    comparator: lt
    threshold: 1
    severity: error
    action: block
    message: "Pipeline plan contains no steps."
    suggested_fix: "Add at least one tool step to the plan."
    tags: [plan, empty]

  # ---- Artifact-time rules (Phase 2) ----
  - rule_id: REVIEW_MEAN_FD_HIGH
    description: "Mean framewise displacement exceeds motion threshold"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    metric: stats_metrics.mean_fd
    comparator: gt
    threshold: 0.5
    severity: warn
    action: warn
    message: "Mean framewise displacement > 0.5mm; consider stricter motion exclusion."
    suggested_fix: "Apply FD < 0.5mm threshold for scrubbing, or exclude high-motion subjects."
    tags: [motion, qc, fmri]

  - rule_id: REVIEW_SCRUBBING_RATE_HIGH
    description: "More than 20% of volumes are high-motion"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    metric: stats_metrics.scrubbing_fraction
    comparator: gt
    threshold: 0.20
    severity: error
    action: block
    message: "More than 20% of volumes exceed FD 0.5mm; analysis validity is compromised."
    suggested_fix: "Exclude high-motion subjects or relax the scrubbing threshold with justification."
    tags: [motion, qc, scrubbing]

  - rule_id: REVIEW_R2_TOO_LOW
    description: "GLM model explained variance is too low"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    metric: stats_metrics.r_squared
    comparator: lt
    threshold: 0.10
    severity: warn
    action: warn
    message: "GLM explained variance R² < 0.10; model may be poorly specified."
    suggested_fix: "Check design matrix, confound regressors, and HRF model specification."
    tags: [glm, model_fit, stats]

  - rule_id: REVIEW_EFFECT_SIZE_OOB
    description: "Max Cohen's d is implausibly large for fMRI"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    metric: stats_metrics.cohens_d_max
    comparator: gt
    threshold: 3.0
    severity: warn
    action: warn
    message: "Max Cohen's d > 3.0 is suspicious for fMRI group analysis."
    suggested_fix: "Verify contrast coding, data scaling, and check for outlier subjects."
    tags: [glm, effect_size, stats]

  - rule_id: REVIEW_PREDICTIVE_REVIEW_CONTEXT_METADATA
    description: "Predictive review context is missing split or null-model metadata"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.review_context_validity.predictive_review_context_metadata_check
    severity: error
    action: block
    message: "Predictive review context omits split and/or null-model metadata."
    suggested_fix: "Populate review_context.split_manifest and review_context.null_model before treating the run as predictive-validation ready."
    tags: [review_context, predictive, leakage, null_model]

  - rule_id: REVIEW_REVIEW_CONTEXT_MIRROR_CONFLICT
    description: "Mirrored review_context payloads disagree across staged artifacts"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.review_context_validity.review_context_mirror_conflict_check
    severity: warn
    action: warn
    message: "Mirrored review_context metadata disagrees across staged artifacts."
    suggested_fix: "Regenerate or restage the run so run.json, analysis_bundle.json, review_contract, and source-side summaries carry the same review_context."
    tags: [review_context, predictive, provenance]
    reason_tags: [low_reliability]

  - rule_id: REVIEW_EXTERNAL_EVIDENCE_PATH_INTEGRITY
    description: "External extraction metadata references evidence paths that do not resolve to staged source artifacts"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.review_context_validity.external_evidence_path_integrity_check
    severity: warn
    action: warn
    message: "External extraction metadata references evidence paths that do not resolve to staged source artifacts."
    suggested_fix: "Restage the external run so inferred_fields.evidence_path points to real staged source files or indexed artifacts."
    tags: [external, provenance, evidence_path]
    reason_tags: [low_reliability]

  - rule_id: REVIEW_REVIEW_CONTEXT_LEAKAGE_CIRCULARITY
    description: "Review context explicitly flags leakage or circularity"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.review_context_validity.review_context_leakage_circularity_flag_check
    severity: warn
    action: warn
    message: "Review context explicitly flags leakage/circularity."
    suggested_fix: "Carry the caveat into the review narrative and avoid presenting the result as clean validation until the concern is resolved."
    tags: [review_context, leakage, circularity, caveat]

  - rule_id: REVIEW_PREDICTIVE_CV_LEAKAGE
    description: "Predictive provenance explicitly indicates CV leakage or test contamination"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.predictive_integrity.predictive_cv_leakage_check
    severity: error
    action: block
    message: "Predictive provenance explicitly indicates CV leakage or test contamination."
    suggested_fix: "Move data-dependent transforms inside the training fold only and remove any explicit full-dataset or test-set fit provenance."
    tags: [predictive, leakage, generalization]

  - rule_id: REVIEW_PREDICTIVE_SPLIT_INTEGRITY
    description: "Predictive split provenance shows overlapping or non-independent train/test partitions"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.predictive_integrity.predictive_split_integrity_check
    severity: error
    action: block
    message: "Predictive split provenance shows overlapping or non-independent partitions."
    suggested_fix: "Regenerate the split manifest so train/validation/test sets are mutually exclusive at the declared split unit."
    tags: [predictive, leakage, generalization, split_integrity]

  - rule_id: REVIEW_PERMUTATION_EXCHANGEABILITY_INVALID
    description: "Permutation provenance explicitly marks exchangeability as invalid"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.null_model_validity.permutation_exchangeability_check
    severity: error
    action: block
    message: "Explicit permutation provenance indicates exchangeability is not preserved."
    suggested_fix: "Use a valid restricted-exchangeability permutation design for the repeated-measures, family, or block structure."
    tags: [null_model, permutation, exchangeability, null_mismatch]

  - rule_id: REVIEW_SPATIAL_NULL_INVALID
    description: "Spatial-null provenance explicitly marks the spatial null as invalid or unsupported"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.null_model_validity.spatial_null_validity_check
    severity: error
    action: block
    message: "Explicit spatial-null provenance marks the spatial null as invalid or unsupported."
    suggested_fix: "Provide a spatial-null method that is explicitly valid for the data geometry and correlation structure."
    tags: [null_model, spatial_null, null_mismatch]

  - rule_id: REVIEW_SURFACE_VOLUME_CORRECTION_DOMAIN_MISMATCH
    description: "Correction domain conflicts with the surface/CIFTI vs volume data domain"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.null_model_validity.surface_volume_correction_domain_mismatch_check
    severity: error
    action: block
    message: "Explicit review metadata places the correction domain in a different family from the analyzed data domain."
    suggested_fix: "Keep the correction/inference domain aligned with the data representation, or convert the data before correction."
    tags: [null_model, domain_mismatch, surface, volume, null_mismatch]
    reason_tags: [null_mismatch]

  - rule_id: REVIEW_CLAIM_INFLATION
    description: "Explicit claim language exceeds the structured support recorded in the bundle"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.claim_validity.claim_inflation_check
    severity: warn
    action: warn
    message: "Claim language exceeds the structured support recorded in the bundle."
    suggested_fix: "Downgrade mechanism/causal/biomarker/prediction language unless the bundle explicitly records the corresponding support."
    tags: [claims, validity, inflation]
    reason_tags: [claim_inflation]

  - rule_id: REVIEW_REVERSE_INFERENCE_RISK
    description: "Explicit region/signal-to-process claims look like reverse inference without recorded decoder support"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.claim_validity.reverse_inference_risk_check
    severity: warn
    action: warn
    message: "Explicit region/signal-to-process claims look like reverse inference without recorded decoder support."
    suggested_fix: "Rephrase the claim as compatible-with language or attach explicit decoder/forward-inference evidence."
    tags: [claims, construct_validity, reverse_inference]
    reason_tags: [claim_inflation, construct_validity]

  - rule_id: REVIEW_MODEL_FIT_MECHANISM_OVERREACH
    description: "Model-fit or encoding evidence is being framed as mechanistic or representational equivalence"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.claim_validity.model_fit_mechanism_overreach_check
    severity: warn
    action: warn
    message: "Model-fit or encoding evidence is being framed as mechanistic or representational equivalence."
    suggested_fix: "Downgrade the claim to consistency or predictive-fit language unless additional causal evidence is provided."
    tags: [claims, neuroai, mechanism]
    reason_tags: [claim_inflation]

  - rule_id: REVIEW_CONTROVERSIAL_CHOICE_SENSITIVITY
    description: "Explicit controversial methodological choices lack recorded sensitivity or robustness checks"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.claim_validity.controversial_choice_sensitivity_check
    severity: warn
    action: warn
    message: "Explicit controversial methodological choices lack recorded sensitivity or robustness checks."
    suggested_fix: "Record on/off, threshold-sweep, or robustness analyses for the controversial choice before treating it as settled."
    tags: [sensitivity, robustness, preprocessing]
    reason_tags: [controversial_choice]

  - rule_id: REVIEW_CONSTRUCT_VALIDITY_CONFOUND
    description: "Explicit behavioral or alternative confounds are recorded without clear control handling"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.claim_validity.construct_validity_confound_check
    severity: warn
    action: warn
    message: "Explicit behavioral or alternative confounds are recorded without clear control handling."
    suggested_fix: "Model the explicit imbalance or alternative explanation before making strong cognitive or behavioral claims."
    tags: [construct_validity, confounds, behavior]
    reason_tags: [confound]

  - rule_id: REVIEW_DESIGN_MATRIX_CONFOUND_COLUMNS_MISMATCH
    description: "Declared confound regressors are missing from the observed design-matrix columns"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.artifact_structure.design_matrix_confound_column_consistency_check
    severity: error
    action: block
    message: "Declared confound regressors are missing from the observed design-matrix columns."
    suggested_fix: "Regenerate the design matrix so the declared confounds are included, or update review_context preprocessing metadata to match the actual design."
    tags: [design_matrix, confounds, glm, artifact_consistency]
    reason_tags: [confound, null_mismatch]

  - rule_id: REVIEW_MULTIPLE_COMPARISON_METADATA_MISMATCH
    description: "Declared multiple-comparison metadata contradicts the observed threshold summary artifacts"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.artifact_structure.multiple_comparison_metadata_consistency_check
    severity: error
    action: block
    message: "Declared multiple-comparison metadata contradicts the observed threshold summary artifacts."
    suggested_fix: "Regenerate the threshold summary artifacts or update review_context statistical_inference metadata so the declared correction method and threshold parameters match the observed outputs."
    tags: [thresholding, multiple_comparisons, artifact_consistency]
    reason_tags: [null_mismatch]

  - rule_id: REVIEW_CORRECTION_SUMMARY_NUMERIC_MISMATCH
    description: "Observed correction-summary arithmetic is internally inconsistent"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.artifact_structure.correction_summary_numeric_consistency_check
    severity: error
    action: block
    message: "Observed correction-summary metrics are internally inconsistent."
    suggested_fix: "Regenerate the correction or threshold summary so alpha, rejection counts, fractions, and cluster counts are numerically self-consistent."
    tags: [thresholding, correction_summary, artifact_consistency]
    reason_tags: [null_mismatch]

  - rule_id: REVIEW_CONTRAST_TABLE_SEMANTICS_INVALID
    description: "Declared contrast-table artifact is missing, unparseable, or contradicts the reviewed contrast/design matrix"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.artifact_structure.contrast_table_semantics_check
    severity: error
    action: block
    message: "Contrast-table artifact is missing, unparseable, or contradicts the reviewed contrast/design matrix."
    suggested_fix: "Regenerate the contrast table with explicit contrast names and correct vector dimensionality, or align the declared contrast metadata with the actual artifact."
    tags: [contrast_table, artifact_consistency, glm]
    reason_tags: [null_mismatch]

  - rule_id: REVIEW_CLUSTER_TABLE_SEMANTICS_INVALID
    description: "Declared cluster-table artifact is missing, unparseable, or lacks structured cluster-level semantics"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.artifact_structure.cluster_table_semantics_check
    severity: error
    action: block
    message: "Cluster-table artifact is missing, unparseable, or lacks structured cluster-level semantics."
    suggested_fix: "Regenerate the cluster table with parseable cluster extent/significance/stat columns, or update review_context statistical_inference cluster_table_path."
    tags: [thresholding, cluster_table, artifact_consistency]
    reason_tags: [null_mismatch]

  - rule_id: REVIEW_CLUSTER_TABLE_COUNT_MISMATCH
    description: "Structured cluster-count metadata contradicts the observed cluster-table row count"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.artifact_structure.cluster_table_count_consistency_check
    severity: error
    action: block
    message: "Structured cluster-count metadata contradicts the observed cluster-table row count."
    suggested_fix: "Regenerate the threshold summary or cluster table so found/surviving cluster counts agree with the structured cluster-table artifact."
    tags: [thresholding, cluster_table, artifact_consistency]
    reason_tags: [null_mismatch]

  - rule_id: REVIEW_PEAK_TABLE_SEMANTICS_INVALID
    description: "Declared peak-table artifact is missing, unparseable, or lacks structured peak coordinates/statistics"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.artifact_structure.peak_table_semantics_check
    severity: error
    action: block
    message: "Peak-table artifact is missing, unparseable, or lacks structured peak coordinates/statistics."
    suggested_fix: "Regenerate the peak table with parseable coordinate and peak-statistic columns, or update review_context statistical_inference peak_table_path."
    tags: [thresholding, peak_table, artifact_consistency]
    reason_tags: [null_mismatch]

  - rule_id: REVIEW_PEAK_CLUSTER_MEMBERSHIP_INVALID
    description: "Peak-table cluster membership contradicts the structured cluster table"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.artifact_structure.peak_cluster_membership_consistency_check
    severity: error
    action: block
    message: "Peak-table cluster membership contradicts the structured cluster table."
    suggested_fix: "Regenerate the peak and cluster tables so cluster_id values are explicit, unique, and consistent across both artifacts."
    tags: [thresholding, peak_table, cluster_table, artifact_consistency]
    reason_tags: [null_mismatch]

  - rule_id: REVIEW_CLUSTER_PEAK_CARDINALITY_MISMATCH
    description: "One or more cluster-table rows have no corresponding peak-table membership"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.artifact_structure.cluster_peak_cardinality_check
    severity: error
    action: block
    message: "One or more cluster-table rows have no corresponding peak-table membership."
    suggested_fix: "Regenerate the cluster and peak tables so every surviving cluster has at least one associated peak row."
    tags: [thresholding, peak_table, cluster_table, artifact_consistency]
    reason_tags: [null_mismatch]

  - rule_id: REVIEW_DESIGN_MODEL_METADATA_MISMATCH
    description: "Declared HRF or autocorrelation design-model metadata contradicts the observed GLM and design-matrix summaries"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.artifact_structure.design_model_metadata_consistency_check
    severity: error
    action: block
    message: "Declared HRF or autocorrelation design-model metadata contradicts the observed GLM and design-matrix summaries."
    suggested_fix: "Regenerate the GLM summary/design artifacts or update review_context design_model metadata so the declared HRF, derivative, and autocorrelation settings match the observed model."
    tags: [glm, hrf, autocorrelation, artifact_consistency]
    reason_tags: [null_mismatch]

  - rule_id: REVIEW_NEUROAI_SELECTION_ON_TEST
    description: "Explicit neuroAI winner selection used held-out or test data"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.neuroai_validity.neuroai_selection_on_test_check
    severity: error
    action: block
    message: "NeuroAI candidate selection explicitly used held-out or test data."
    suggested_fix: "Move winner selection into nested CV or an internal training-only selection stage, then evaluate on untouched held-out data."
    tags: [neuroai, predictive, leakage, winner_selection]
    reason_tags: [leakage, generalization]

  - rule_id: REVIEW_NEUROAI_SPLIT_GROUPING_MISMATCH
    description: "Explicit neuroAI split metadata violates required grouping keys"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.neuroai_validity.neuroai_split_grouping_mismatch_check
    severity: error
    action: block
    message: "NeuroAI split metadata shows fine-grained or random partitions that ignore the required grouping structure."
    suggested_fix: "Regenerate the split with explicit story/session/subject grouping before claiming held-out generalization."
    tags: [neuroai, predictive, split_integrity, leakage]
    reason_tags: [leakage, generalization]

  - rule_id: REVIEW_NEUROAI_SUBJECT_MANIFEST_COVERAGE
    description: "The split/fold manifest references subject IDs absent from the declared subject manifest"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.neuroai_validity.neuroai_subject_manifest_coverage_check
    severity: error
    action: block
    message: "The split/fold manifest references subject IDs that are missing from the declared subject manifest."
    suggested_fix: "Regenerate the subject and split manifests from the same subject set, or update the declared subject manifest to cover the evaluated split."
    tags: [neuroai, predictive, split_integrity, subject_manifest]
    reason_tags: [leakage, generalization]

  - rule_id: REVIEW_NEUROAI_DECLARED_SUBJECT_SET_MISSING_SUBJECT_COLUMN
    description: "A declared structured subject-set manifest omits a usable subject identifier column"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
    check_fn: brain_researcher.services.review.checks.neuroai_validity.neuroai_declared_subject_set_missing_subject_column_check
    severity: error
    action: block
    message: "A declared structured subject-set manifest is missing a usable subject identifier column."
    suggested_fix: "Regenerate the manifest with `subject`, `subject_id`, or `participant_id`, or switch to a plain one-subject-per-line source file."
    tags: [neuroai, predictive, split_integrity, subject_manifest]
    reason_tags: [leakage, generalization]

  - rule_id: REVIEW_NEUROAI_SUBJECT_MANIFEST_SELECTION_SOURCE_CONFLICT
    description: "The declared subject manifest contains subject IDs absent from the declared subject-selection source"
    review_mode: artifact
    applies_to: artifact
    stage: artifact_review
