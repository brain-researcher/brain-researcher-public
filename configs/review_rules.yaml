    reason_tags: [citation_mismatch]

  # ---- GLM design rules ----
  - rule_id: REVIEW_GLM_N_EVENTS_TOO_FEW
    description: "Too few events per condition for reliable beta estimation"
    review_mode: plan
    applies_to: step
    stage: plan_review
    tool_filter: [glm_first_level, nilearn_first_level_model, fsl_feat, fsl_film_gls, spm_glm, fitlins]
    metric: params.n_events_per_condition
    comparator: lt
    threshold: 8
    severity: warn
    action: warn
    message: "Fewer than 8 events per condition; beta estimates may be unstable."
    suggested_fix: "Standard event-related designs need ≥ 10 events/condition. For LSS use ≥ 5."
    tags: [glm, design, events]

  - rule_id: REVIEW_HIGH_PASS_TOO_AGGRESSIVE
    description: "High-pass filter cutoff may remove neural signal"
    review_mode: plan
    applies_to: step
    stage: plan_review
    tool_filter: [glm_first_level, nilearn_first_level_model, fsl_feat, fsl_film_gls, nilearn_clean_img]
    metric: params.high_pass
    comparator: gt
    threshold: 0.02
    severity: warn
    action: warn
    message: "High-pass filter > 0.02 Hz (period < 50s) may remove slow neural signal."
    suggested_fix: "Standard fMRI high-pass is 0.01 Hz (100s). For block designs use period > 2× block cycle."
    tags: [glm, filter, high_pass]
    kg_lookup:
      node_type: GLMDesignPrior
      property: high_pass
      query_hint: "task-conditioned GLM high-pass prior"
      min_confidence: 0.3

  - rule_id: REVIEW_GROUP_N_TOO_SMALL
    description: "Group-level analysis with very few subjects"
    review_mode: plan
    applies_to: step
    stage: plan_review
    tool_filter: [glm_second_level, nilearn_second_level_model, fsl_randomise, spm_factorial_design, flame]
    metric: params.n_subjects
    comparator: lt
    threshold: 10
    severity: warn
    action: warn
    message: "Group analysis with fewer than 10 subjects is underpowered."
    suggested_fix: "Standard fMRI group studies need N ≥ 20 for adequate power (80%) at typical effect sizes."
    tags: [glm, group, power]

  # ---- DWI parameter rules ----
  - rule_id: REVIEW_DWI_BVALUE_LOW
    description: "DWI b-value too low for standard tractography"
    review_mode: plan
    applies_to: step
    stage: plan_review
    tool_filter: [mrtrix_tckgen, dsi_studio_tracking, fsl_dtifit, ants_dti, dipy_tracking, dmri_tractography]
    metric: params.b_value
    comparator: lt
    threshold: 700
    severity: warn
    action: warn
    message: "b-value < 700 s/mm² is too low for standard DTI/tractography."
    suggested_fix: "Standard DTI uses b=1000 s/mm²; HARDI/CSD typically uses b=2000–3000 s/mm²."
    tags: [dwi, bvalue, tractography]

  - rule_id: REVIEW_DWI_BVALUE_HIGH
    description: "DWI b-value unusually high without multi-shell justification"
    review_mode: plan
    applies_to: step
    stage: plan_review
    tool_filter: [mrtrix_tckgen, dsi_studio_tracking, fsl_dtifit, dipy_tracking, dmri_tractography]
    metric: params.b_value
    comparator: gt
    threshold: 5000
    severity: warn
    action: warn
    message: "b-value > 5000 s/mm² is extreme; verify this is intentional (e.g. NODDI)."
    suggested_fix: "Standard HARDI: b=2000–3000. NODDI/advanced models: b=5000+ is valid but must be explicit."
    tags: [dwi, bvalue, tractography]

  - rule_id: REVIEW_DWI_N_DIRECTIONS_LOW
    description: "Too few diffusion gradient directions for robust estimation"
    review_mode: plan
    applies_to: step
    stage: plan_review
    tool_filter: [mrtrix_tckgen, fsl_dtifit, dipy_tracking, ants_dti, dmri_tractography, dmri_parcellate_connectome]
    metric: params.n_directions
    comparator: lt
    threshold: 12
    severity: error
    action: block
    message: "Fewer than 12 gradient directions is insufficient for DTI; HARDI requires ≥ 30."
    suggested_fix: "Use ≥ 32 directions for DTI, ≥ 60 for CSD/HARDI. Minimum 6 is only valid for DKI debugging."
    tags: [dwi, directions, hardi]

  # ---- Modality mismatch extensions ----
  - rule_id: REVIEW_DWI_TOOL_ON_BOLD
    description: "DWI-specific tool applied to BOLD/fMRI modality"
    review_mode: plan
    applies_to: plan
    stage: plan_review
    metric: plan.step_count
    comparator: gte
    threshold: 1
    check_fn: "brain_researcher.services.review.checks.space_compat.dwi_tool_on_bold_data"
    severity: error
    action: block
    message: "A DWI-specific tool is declared alongside a BOLD/fMRI modality — modality mismatch."
    suggested_fix: "Verify the correct modality is declared; DWI and BOLD pipelines must not share tractography steps."
    tags: [dwi, fmri, modality]

  - rule_id: REVIEW_MIXED_MNI_VERSIONS
    description: "Multiple incompatible MNI template versions in the same plan"
    review_mode: plan
    applies_to: plan
    stage: plan_review
    metric: plan.step_count
    comparator: gte
    threshold: 2
    check_fn: "brain_researcher.services.review.checks.space_compat.mixed_mni_versions"
    severity: error
    action: block
    message: "Both MNI152NLin2009cAsym and MNI152NLin6Asym appear in the same plan."
    suggested_fix: "Pick one MNI version and apply it consistently. MNI2009c is standard for fMRIPrep outputs."
    tags: [mni, space, registration]

  # ---- Statistical validity ----
  - rule_id: REVIEW_PARAMETRIC_SMALL_N
    description: "Parametric group test with very small N — nonparametric preferred"
    review_mode: plan
    applies_to: step
    stage: plan_review
    tool_filter: [scipy_ttest_ind, scipy_ttest_rel, pingouin_ttest, glm_second_level, nilearn_second_level_model]
    metric: params.n_subjects
    comparator: lt
    threshold: 8
    severity: warn
    action: warn
    message: "Parametric test with N < 8 violates normality assumptions; use nonparametric alternative."
    suggested_fix: "Use FSL randomise (permutation), or scipy.stats.mannwhitneyu / wilcoxon for small N."
    tags: [stats, parametric, small_n]

  - rule_id: REVIEW_METHOD_APPROPRIATENESS
    description: "Design-method compatibility check (covers all design-method mismatches via seed/KG)"
    review_mode: plan
    applies_to: plan
