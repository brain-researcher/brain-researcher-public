# Capability crosswalk (v1)
#
# Purpose:
# - Map external labels (e.g., benchmark expected_capability) and common user phrases
#   into internal planner tokens:
#     - `to_operators`: capability tags used by `search_by_capability()`
#     - `to_intents`: intent ids used by `search_by_intent()`
#
# This is meant to improve the *system* by increasing recall for tool families that
# are often referenced with higher-level or alternative terminology.
#
# Notes:
# - Keep mappings conservative; prefer existing capability tags.
# - Some benchmark labels currently point to tools not yet present in the catalog.
#   Those entries are kept as placeholders for future catalog enrichment.
#
version: 1

