# OSS carve manifest — single source of truth for what becomes public.
# Consumed by scripts/oss/carve_public.py (Phase 1).
#
# Derived from the 2026-05-31 full-tree classification audit
# (10 read-only agents, 61 risk findings, 30 high-severity). Defaults FAIL SAFE:
# when in doubt, drop. Decisions: Layout C (flat src/, no re-root); force-push
# clean history to existing origins.
#
# CARVE METHOD (defense in depth): the carve base set is `git ls-files` of main
# (TRACKED files only) — NOT a working-tree copy. Gitignored secrets (.env,
# client_secret_*.json, .env.local) therefore cannot be carried even if a glob
# below misses them. The manifest excludes/redactions are applied ON TOP of that.

version: 1
layout: C                       # flat src/brain_researcher; no packages/ re-root
source_base: git-ls-files       # tracked files only; never cp the working tree

# --------------------------------------------------------------------------
# RELAUNCH BLOCKERS — not carve operations; must be done before any push.
# Excluding these from the carve is necessary but NOT sufficient: they are live
# and may exist in main's git history.
# --------------------------------------------------------------------------
rotation_required:
  - { secret: CLOUDFLARE_API_TOKEN, note: "publicly exposed token fingerprint was observed; rotate now" }
  - { secret: DEEPSEEK_API_KEY, note: "live key observed in root .env + services/agent/.env; revoke" }
  - { secret: OPENAI_API_KEY, note: "live key observed in root .env + services/agent/.env; revoke" }
  - { secret: GEMINI_API_KEY, note: "live key observed in root .env + services/agent/.env; revoke" }
  - { secret: GCP_OAUTH_CLIENT_SECRET, note: "client secret observed in apps/web-ui/client_secret_*.json; rotate in GCP console" }
  - { secret: NEXTAUTH_SECRET, note: "auth secret observed in apps/web-ui/.env.local and root .env; rotate" }
  - { secret: SUPABASE_ANON_KEY, note: "Supabase anon key observed; verify if public read-only, otherwise rotate" }
  - { secret: BR_MCP_TOKEN_PEPPER, note: "BR MCP token material observed in root .env; rotate" }
  - { secret: NEO4J_PASSWORD_HASH, note: "Neo4j password hash observed in old audit artifacts; rotate and keep audit artifacts out of public carve" }

code_fixes_required:
  - file: src/brain_researcher/services/orchestrator/push_notifications.py
    fix: "Stop logging VAPID private/public keys via logger.info (~line 220) — runtime secret leak even in a clean public repo."
  - file: src/brain_researcher/core/utils/deepseek_client.py
    fix: "Verify no hardcoded DeepSeek key; must read from env only."

# --------------------------------------------------------------------------
# GLOBAL EXCLUDES (apply to every target)
# --------------------------------------------------------------------------
global_exclude:
  secrets:                      # belt-and-suspenders over git-ls-files base
    - "**/.env"
    - "**/.env.local"
    - "**/.env.*"               # KEEP *.example below
    - "apps/web-ui/client_secret_*.json"
    - "**/*.pem"
    - "**/*serviceaccount*.json"
  keep_examples:                # explicit allow-list that overrides secrets glob
    - ".env.example"
    - ".env.local.example"
    - "deployment.env.example"
  generated_and_caches:
    - ".venv/**"
    - "**/__pycache__/**"
    - "{.pytest_cache,.mypy_cache,.ruff_cache,.hypothesis,.pytest_tmp,.playwright-mcp}/**"
    - "**/node_modules/**"
    - "apps/web-ui/{.next,.tmp,.bolt}/**"
    - "{out,outputs,logs,backups,execution_pack}/**"
    - "**/*.db"
    - "*.png"                   # root screenshots (marimo-*, hub-*, webui-*, landing-*, attach-works)
  agent_ide_internal:
    - "{.claude,.codex,.cursor}/**"
    - ".claude_resources.json"
    - ".mcp.json"               # redact or drop
  toplevel_drop:                # not part of the public product
    - "benchmarks/**"           # corpus + frozen run archives; eval rubrics re-homed to agent-kit
    - "manuscript/**"
    - "data/**"
    - "external/**"
    - "notebooks/**"
    - "br-stream-proxy/**"
    - "gwas_analysis/**"
    - "packages/brain-researcher/**"   # unused under Layout C (cli/ ships)

# --------------------------------------------------------------------------
# TARGET: brain-researcher-public  (core)
# --------------------------------------------------------------------------
targets:
  public-core:
    transform: none
    include:
      - "src/brain_researcher/**"
      - "packages/cli/**"
      - "contracts/**"
      - "apps/web-ui/**"
      - "configs/**"
      - "docs/**"
      - "scripts/**"
      - "tests/**"
      - "infrastructure/**"
      - "pyproject.toml"
      - "Makefile"
      - "mkdocs*.yml"
    exclude:
      configs:
        - "configs/datasets/local_mounts.yaml"        # ${BRAIN_RESEARCHER_HOME} paths
        - "configs/legacy/**"
        - "configs/slurm/profiles/sherlock_russpold.yaml"  # Stanford russpold cluster
      docs:
        - "docs/{audits,internal,architecture,release,archive,issues,planning,review,overleaf,PRD,operations}/**"
        - "docs/use_cases/BR-multiverse-cocaine-mri/**"          # human-subjects study, possible PII
        - "docs/use_cases/BR_high_dim_SPD_matrices/**"
        - "docs/{REVIEW_GITHUB_ISSUES,CALL_FOR_COLLABATORS_REVIEW_ITEMS}.md"
      scripts:
        - "scripts/{ops,deployment,billing,tribe_closed_loop}/**"   # prod hosts, GCP ids, PII
        - "scripts/root_legacy/mount_oak.sh"           # user@cluster.example.edu
        - "scripts/migrate_folder_to_gcp.sh"           # GCP project id
      src:
        - "src/brain_researcher/legacy/**"
      tests:
        - "tests/{integration,e2e,load,stress,k8s,services,contracts,backup,migration,_disabled}/**"
        - "tests/unit/scripts/**"                      # import dropped scripts.ops
        - "tests/unit/config/test_active_scripts_docs_topology_contract.py"
        - "tests/unit/config/test_gateway_legacy_surface_contract.py"
      infrastructure:
        - "infrastructure/deployment/gcp/values.prod.yaml"      # GCP project id + GSA email
        - "infrastructure/deployment/gce_k3s/values.prod.yaml"  # /home path + registry + file-search ids
        - "infrastructure/nginx/install_nginx_config.sh"
      apps:
        - "apps/web-ui/public/benchmarks/**"           # leaks lab dir structure
        - "apps/web-ui/test-*.js"
    redact:                       # ship, but scrub via REDACTION_POLICY first
      - "configs/runtime/**"                            # localhost/internal service refs
      - "src/brain_researcher/config/metadata_loading.json"  # /home/.../data/brainmap
      - "docs/{OPERATIONS,DEPLOYMENT,DEPLOYMENT_GKE,E2E_DEMO_EXECUTION_PLAN,UI_WIRING_CHECKLIST}.md"
      - "docker-compose.prod.yml"
      - "environment.brain_researcher.yml"
      - "neuroimage_env.yaml"
      - "infrastructure/cloudflare/**"                  # confirm env-var only; scrub README hosts
      - "infrastructure/k8s/**"                         # scrub prod hostnames
      - "SECURITY.md"                                   # PII (contact email)
      - "CODE_OF_CONDUCT.md"                            # PII
    carry:                        # public-specific files added by the carve
      - { from: "configs/oss/gitleaks.public.toml", to: ".gitleaks.toml" }
      - { from: "<derived-from-main>/.github/workflows/ci.yml", to: ".github/workflows/ci.yml",
          note: "Layout C ⇒ derive from main's ci.yml (drop only excluded-dir refs); do NOT canonize the path-B trim" }
      - { from: "configs/oss/templates/README.public.md", to: "README.md" }
      - { from: "configs/oss/templates/AGENTS.public.md", to: "AGENTS.md" }
      - { from: "configs/oss/templates/CLAUDE.public.md", to: "CLAUDE.md" }
      - "LICENSE"
      - "CONTRIBUTING.md"
      - "REDACTION_POLICY.md"
      - "CITATION.cff"
      - ".pre-commit-config.yaml"

# --------------------------------------------------------------------------
# TARGET: brain-researcher-agent-kit  (companion)
# --------------------------------------------------------------------------
  agent-kit:
    include:
      skills:                     # ship ONLY public-safe skills
        - "skills/brain-researcher-scientific-review-gate/**"
        - "skills/journal-writing-guidelines/**"
        - "skills/neuro-big-picture/**"
        - "skills/repo-github-workflow/**"
      demos_to_replays:
        - "configs/demo/**"       # 6 bundles — audit: no secrets, placeholder artifact paths
      evals:
        - "configs/evals/**"
        - "benchmarks/**/methodology.md"   # rubrics/task-defs only
        - "benchmarks/**/eval/*.yaml"
    exclude:
      skills_internal_infra:      # drop: lab cluster hosts/paths, internal ops
        - "skills/{sherlock-oak-workflow,gcp-gpu-request,banghcp-gcp-batch-orchestration,codex-review-operator,brain-researcher-session-handoff}/**"
        - "skills/third_party/**"  # licensing/redistribution review required first
      evals_private:
        - "benchmarks/{neurometabench,reproducibility_audit_examples,psych101_snapshot,tool_routing_validation,proper_br_call_experiment}/**"
        - "benchmarks/UNIFIED_BENCHMARK_BUNDLE*/**/traces/**"
        - "benchmarks/UNIFIED_BENCHMARK_BUNDLE*/**/runs/**"
        - "benchmarks/UNIFIED_BENCHMARK_BUNDLE*/**/eval/scripts/**"   # prod hosts
    additions:
      - "skills/registry.yaml"    # NEW — Phase 2 deliverable
    note: "adapters/, agents/, examples/ are agent-kit-native (not carved from main)."

# --------------------------------------------------------------------------
# REDACTION (applied to `redact` files; also a final sweep on all carried text)
# --------------------------------------------------------------------------
redaction:
  path_patterns:
    - { find: "${BRAIN_RESEARCHER_HOME}", replace: "${BRAIN_RESEARCHER_HOME}" }
    - { find: "${CLUSTER_GROUP_ROOT}", replace: "${CLUSTER_GROUP_ROOT}" }
    - { find: "${CLUSTER_PI_MODULES}", replace: "${CLUSTER_PI_MODULES}" }
  identifier_patterns:
    - "${GCP_PROJECT_ID}"          # GCP project id
    - "${GCE_VM_NAME}"             # GCE VM
    - "${PUBLIC_HOSTNAME}"            # prod host
    - "*.iam.gserviceaccount.example.com"       # GSA emails
    - "user@*"                        # PII email
    - "${SUPABASE_PROJECT_HOST}"
  use_policy: REDACTION_POLICY.md       # scrub_text() rules

# --------------------------------------------------------------------------
# VERIFY (carve_public.py must pass ALL before any push; no silent caps)
# --------------------------------------------------------------------------
verify:
  - "gitleaks detect --config .gitleaks.toml --no-banner   # → 0 findings"
  - "git grep -i '<redacted-secret-fingerprint>' || true     # → no match"
  - "grep -rIE '${GCP_PROJECT_ID}|${GCE_VM_NAME}|${BRAIN_RESEARCHER_HOME}' .  # → no match"
  - "private-staging CI green (real run, not a local subset) before making public"
  - "log every dropped/redacted path (no silent truncation)"

# Open questions carried from the audit (resolve before final push) ----------
open_questions:
  - "configs/runtime/: redact to examples vs drop entirely?"
  - "infrastructure/deployment/{gcp,gce_k3s}: ship sanitized placeholder values.example.yaml in place of the dropped prod overlays?"
  - "Supabase anon key: is the instance shared/read-only (key acceptable) or must it rotate?"
  - "skills/third_party/AI-Research-SKILLs: licensing/redistribution rights before shipping any?"
  - "sherlock-oak-workflow: split into generic SLURM (ship) + Stanford-specific (drop) rather than full drop?"
