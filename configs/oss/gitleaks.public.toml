# Gitleaks config for the public carve (brain-researcher-public).
#
# PROVENANCE: rescued into main on 2026-05-31 from the live public repo
# (brain-researcher-public commit 9af630ff), which is slated for a
# clean-history force-push. This file previously lived ONLY in that repo;
# carrying it here ensures it survives the relaunch. The carve pipeline
# (scripts/oss/carve_public.py) ships this as the public repo's `.gitleaks.toml`.
#
# LAYOUT C NOTE: the public repo keeps a FLAT `src/` layout (no
# `packages/brain-researcher/` re-root), so the telemetry example path below
# is `src/brain_researcher/...`, not `packages/brain-researcher/src/...`.
#
# Extends the default ruleset; adds allowlists for known false positives that
# the default generic-api-key / stripe-access-token / curl-auth-header rules
# flag in test fixtures, docs, and placeholders.
#
# A real Cloudflare API token was previously hardcoded in
# infrastructure/cloudflare/*.py — removed and moved to environment variables
# (CLOUDFLARE_API_TOKEN). Do NOT add a blanket allowlist for that path; only
# the placeholder docs below are exempt.

[extend]
useDefault = true

[allowlist]
description = "Documented false positives and public placeholder policy"

# Stripe's official, publicly documented test key — appears in test fixtures.
regexes = [
  '''sk_test_4eC39HqLyjWDarjtT1zdp7dc''',
  '''replace_with_64_hex_chars''',
  '''YOUR_API_TOKEN''',
  '''YOUR_ZONE_ID''',
]

# Paths that only contain test fixtures, placeholders, or documentation of
# past findings — never live secrets.
paths = [
  '''\.env\.example$''',
  '''REDACTION_POLICY\.md$''',
  '''scripts/oss/EXTRACT_PUBLIC_KG\.md$''',
  '''infrastructure/cloudflare/README\.md$''',
  '''tests/.*''',
  '''src/brain_researcher/services/telemetry/example_usage\.py$''',
]

# Specific fixture-attribute matches (API_USD_BUCKET / API_USD_CURRENCY) that
# the generic-api-key rule mis-detects as keys.
stopwords = [
  "API_USD_BUCKET",
  "API_USD_CURRENCY",
]
