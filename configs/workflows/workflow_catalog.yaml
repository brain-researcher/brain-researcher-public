version: vFinal

# ---------------------------------------------------------------------------
# Workflow Catalog (vFinal)
#
# Purpose:
# - Declare high-level workflows as first-class entities for routing
# - Each workflow is an orchestration of atomic tools (plus presets/guards)
#
# Notes:
# - This file is declarative; it does not execute anything by itself.
# - Implementations typically live under brain_researcher/services/workflows/
#   and may also be exposed as callable tools.
# ---------------------------------------------------------------------------

workflows:
  # Tier 1: Data Preparation & QC
  - id: workflow_preprocessing_qc
    stage: preprocessing
    cost_tier: expensive
    execution_story_kind: composite_workflow
    supported_recipe_targets: [neurodesk, container, slurm]
    primary_target: neurodesk
    recipe_family: preprocessing_qc
    origin: core32
    modalities: ["fmri", "smri"]
    example_dataset:
      dataset_id: ds000114
      source: OpenNeuro
      smoke_test: tests/integration/realdata/test_workflow_preprocessing_qc_ds000114_smoke.py
    artifact_contract:
      required_outputs:
        - qc_table.csv
        - qc_outliers.csv
        - qc_summary.json
        - index.html
      optional_outputs:
        - fmriprep_dir
        - mriqc_dir
    acceptance_gate:
      script: scripts/workflows/run_workflow_realdata_gate.py
      smoke_test: tests/integration/realdata/test_workflow_preprocessing_qc_ds000114_smoke.py
      execute_gate_script: scripts/workflows/run_external_repo_minimal_execute_gate.py
      execute_gate_test: tests/integration/realdata/test_workflow_external_repo_minimal_execute_gate.py
    runbook: docs/runbooks/workflow_preprocessing_qc.md
    params:
      schema:
        type: object
        required: [bids_dir, output_dir]
        properties:
          bids_dir:
            type: string
            description: Input BIDS dataset root.
          output_dir:
            type: string
            description: Root directory for fMRIPrep, MRIQC, and QC summary outputs.
          qc_tsv:
            type: string
            description: Optional precomputed QC TSV. If omitted, get_qc_table will try MRIQC outputs.
          participant_label:
            type: array
            items:
              type: string
          work_dir:
            type: string
          fmriprep_work_dir:
            type: string
          mriqc_work_dir:
            type: string
          fs_license_file:
            type: string
          output_spaces:
            type: array
            items:
              type: string
          analysis_level:
            type: string
          modalities:
            type: array
            items:
              type: string
          modality:
            type: string
          bids_filter_file:
            type: string
          n_cpus:
            type: integer
          omp_nthreads:
            type: integer
          mem_mb:
            type: integer
          n_procs:
            type: integer
          mem_gb:
            type: number
          extra_args:
            type: array
            items:
              type: string
          fmriprep_extra_args:
            type: array
            items:
              type: string
          mriqc_extra_args:
            type: array
            items:
              type: string
          skip_bids_validation:
            type: boolean
          outlier_metric:
            type: string
          outlier_z:
            type: number
          dashboard_title:
            type: string
          dry_run:
            type: boolean
            description: Return preview commands from fMRIPrep/MRIQC instead of executing them.
      defaults:
        analysis_level: participant
        modalities: [bold]
        modality: bold
        skip_bids_validation: false
        outlier_metric: fd_mean
        outlier_z: 3.0
        dashboard_title: QC Summary
        dry_run: true
    impl: "workflow: validate_bids_structure -> run_bids_app(fmriprep) -> run_bids_app(mriqc) -> get_qc_table -> detect_outliers -> qc_aggregator -> dashboard_generator"
    runtime:
      kind: declarative_workflow
      steps:
        - id: validate
          tool: validate_bids_structure
          params:
            bids_dir: "${inputs.bids_dir}"
            strict: false
        - id: fmriprep
          tool: run_bids_app
          params:
            app: "fmriprep"
            bids_dir: "${inputs.bids_dir}"
            output_dir: "${inputs.output_dir}/fmriprep"
            participant_label: "${inputs.participant_label}"
            work_dir: "${inputs.work_dir}"
            fs_license_file: "${inputs.fs_license_file}"
            output_spaces: "${inputs.output_spaces}"
            bids_filter_file: "${inputs.bids_filter_file}"
            n_cpus: "${inputs.n_cpus}"
            omp_nthreads: "${inputs.omp_nthreads}"
            mem_mb: "${inputs.mem_mb}"
            skip_bids_validation: "${inputs.skip_bids_validation:-false}"
            dry_run: "${inputs.dry_run:-true}"
            extra_args: "${inputs.extra_args}"
        - id: mriqc
          tool: run_bids_app
          params:
            app: "mriqc"
            bids_dir: "${inputs.bids_dir}"
            output_dir: "${inputs.output_dir}/mriqc"
            analysis_level: "${inputs.analysis_level:-participant}"
            participant_label: "${inputs.participant_label}"
            modalities: "${inputs.modalities}"
            work_dir: "${inputs.work_dir}"
            bids_filter_file: "${inputs.bids_filter_file}"
            n_procs: "${inputs.n_procs}"
            mem_gb: "${inputs.mem_gb}"
            dry_run: "${inputs.dry_run:-true}"
            extra_args: "${inputs.extra_args}"
        - id: qc_table
          tool: get_qc_table
          params:
            qc_tsv: "${inputs.qc_tsv}"
            mriqc_dir: "${inputs.output_dir}/mriqc"
            modality: "${inputs.modality:-bold}"
            output_file: "${inputs.output_dir}/qc/qc_table.csv"
        - id: outliers
          tool: detect_outliers
          params:
            qc_table: "${steps.qc_table.data.outputs.qc_table}"
            metric: "${inputs.outlier_metric:-fd_mean}"
            z_threshold: "${inputs.outlier_z:-3.0}"
            output_file: "${inputs.output_dir}/qc/qc_outliers.csv"
        - id: aggregate
          tool: qc_aggregator
          params:
            qc_table: "${steps.outliers.data.outputs.outliers_table}"
            output_file: "${inputs.output_dir}/qc/qc_summary.json"
        - id: dashboard
          tool: dashboard_generator
          params:
            qc_table: "${steps.outliers.data.outputs.outliers_table}"
            output_html: "${inputs.output_dir}/qc/index.html"
            title: "${inputs.dashboard_title:-QC Summary}"

  - id: workflow_realtime_twophoton_closed_loop
    stage: acquisition
    cost_tier: moderate
    execution_story_kind: composite_workflow
    supported_recipe_targets: [python]
    primary_target: python
    recipe_family: realtime_twophoton
    origin: core32
    modalities: ["optical"]
    example_dataset:
      dataset_id: synthetic_twophoton_stream
      source: synthetic
      smoke_test: tests/integration/realdata/test_workflow_realtime_twophoton_closed_loop_smoke.py
    artifact_contract:
      required_outputs:
        - summary.json
        - motion.jsonl
        - decoder.jsonl
        - controller.jsonl
        - trace_df_f.npy
      optional_outputs:
        - registered_frames.npy
        - timing.jsonl
    runbook: docs/runbooks/workflow_realtime_twophoton_closed_loop.md
    params:
      schema:
        type: object
        required: [reference_template, roi_manifest, decoder_path, output_dir]
        properties:
          data_source:
            type: string
            enum: [raw_socket, file_replay, simulator]
          input_file:
            type: string
          mode:
            type: string
            enum: [monitoring, shadow, closed_loop]
          reference_template:
            type: string
          roi_manifest:
            type: string
          decoder_path:
            type: string
          calibration_meta:
            type: string
          state_space:
            type: string
          stream_host:
            type: string
          stream_port:
            type: integer
          stream_timeout_s:
            type: number
          stream_max_frames:
            type: integer
          frame_rate_hz:
            type: number
          motion_correction:
            type: boolean
          motion_backend:
            type: string
          motion_confidence_threshold:
            type: number
          max_translation_px:
            type: number
          drop_on_low_confidence:
            type: boolean
          baseline_window_frames:
            type: integer
          neuropil_correction:
            type: boolean
          controller_backend:
            type: string
            enum: [none, udp, websocket]
          controller_host:
            type: string
          controller_port:
            type: integer
          controller_target:
            type: string
          decoder_threshold:
            type: number
          decoder_release_threshold:
            type: number
          state_hold_frames:
            type: integer
          refractory_frames:
            type: integer
          save_frames:
            type: boolean
          output_dir:
            type: string
      defaults:
        data_source: raw_socket
        mode: closed_loop
        stream_host: 127.0.0.1
        stream_port: 7788
        stream_timeout_s: 5.0
        frame_rate_hz: 30.0
        motion_correction: true
        controller_backend: none
        decoder_threshold: 0.5
        decoder_release_threshold: 0.35
        state_hold_frames: 2
        refractory_frames: 2
        save_frames: false
    impl: "workflow: microscope_callback_adapter -> realtime_twophoton(raw_socket) -> optional controller feedback"
    runtime:
      kind: declarative_workflow
      steps:
        - id: realtime
          tool: realtime_twophoton
          params:
            data_source: "${inputs.data_source:-raw_socket}"
            input_file: "${inputs.input_file}"
            mode: "${inputs.mode:-closed_loop}"
            reference_template: "${inputs.reference_template}"
            roi_manifest: "${inputs.roi_manifest}"
            decoder_path: "${inputs.decoder_path}"
            calibration_meta: "${inputs.calibration_meta}"
            state_space: "${inputs.state_space}"
            stream_host: "${inputs.stream_host:-127.0.0.1}"
            stream_port: "${inputs.stream_port:-7788}"
            stream_timeout_s: "${inputs.stream_timeout_s:-5.0}"
            stream_max_frames: "${inputs.stream_max_frames}"
            frame_rate_hz: "${inputs.frame_rate_hz:-30.0}"
            motion_correction: "${inputs.motion_correction:-true}"
            motion_backend: "${inputs.motion_backend}"
            motion_confidence_threshold: "${inputs.motion_confidence_threshold}"
            max_translation_px: "${inputs.max_translation_px}"
            drop_on_low_confidence: "${inputs.drop_on_low_confidence}"
            baseline_window_frames: "${inputs.baseline_window_frames}"
            neuropil_correction: "${inputs.neuropil_correction}"
            controller_backend: "${inputs.controller_backend:-none}"
            controller_host: "${inputs.controller_host}"
            controller_port: "${inputs.controller_port}"
            controller_target: "${inputs.controller_target}"
            decoder_threshold: "${inputs.decoder_threshold:-0.5}"
            decoder_release_threshold: "${inputs.decoder_release_threshold:-0.35}"
            state_hold_frames: "${inputs.state_hold_frames:-2}"
            refractory_frames: "${inputs.refractory_frames:-2}"
            save_frames: "${inputs.save_frames:-false}"
            output_dir: "${inputs.output_dir}"

