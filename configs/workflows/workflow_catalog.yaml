  - id: workflow_psych101_ingest_eval
    stage: reporting
    cost_tier: cheap
    execution_story_kind: composite_workflow
    supported_recipe_targets: [python]
    primary_target: python
    origin: trend_addition
    modalities: ["behavioral"]
    runbook: docs/runbooks/workflow_psych101_ingest_eval.md
    example_dataset:
      dataset_id: psych101_synthetic
      source: synthetic
      smoke_test: tests/integration/realdata/test_workflow_psych101_ingest_eval_smoke.py
    description: >
      Minimal Psych-101 scaffold for ingesting a trial TSV export and preparing
      a lightweight eval manifest. The workflow is intentionally non-GPU and is
      designed for Phase 0/1 integration work: normalize the trial table,
      compute a compact summary, and write a manifest artifact for downstream
      evaluation or reporting.
    impl: >
      workflow: psych101_ingest(qc_tsv -> normalized trials)
        -> psych101_prepare_eval_manifest(qc_table -> summary manifest)
    artifact_contract:
      required_outputs:
        - psych101_trials.csv
        - psych101_eval_manifest.json
    params:
      schema:
        type: object
        required: [psych101_tsv, output_dir]
        properties:
          psych101_tsv:
            type: string
            description: Psych-101 trial export TSV/CSV to normalize.
          output_dir:
            type: string
            description: Directory where normalized trials and the eval manifest are written.
          output_stem:
            type: string
            description: Optional basename for the manifest artifact.
          dataset_id:
            type: string
            description: Dataset identifier to write into the graph plan and eval manifest.
          source_name:
            type: string
            description: Human-readable dataset title used in scaffold metadata.
          heldout_ratio:
            type: number
            description: Placeholder held-out split ratio to record in the eval manifest.
          audit_group_keys:
            type: array
            items:
              type: string
            description: Optional subgroup columns to audit, such as site, sex, or ethnicity_group.
          target_population:
            type: string
            description: Optional prose description of the target population represented by the benchmark.
          sampling_frame:
            type: string
            description: Optional sampling-frame note carried into the eval manifest.
          inclusion_criteria:
            type: string
            description: Optional inclusion criteria note recorded for bias audit purposes.
          exclusion_criteria:
            type: string
            description: Optional exclusion criteria note recorded for bias audit purposes.
          sample_weight_column:
            type: string
            description: Optional normalized trial-table column containing sample weights.
          min_group_count:
            type: integer
            description: Minimum participant count before a subgroup is flagged as underpowered.
      defaults:
        output_stem: psych101_eval_manifest
        dataset_id: psych101
        source_name: Psych-101
        heldout_ratio: 0.1
        min_group_count: 5
    runtime:
      kind: declarative_workflow
      steps:
        - id: ingest
          tool: psych101_ingest
          params:
            qc_tsv: "${inputs.psych101_tsv}"
            output_file: "${inputs.output_dir}/psych101_trials.csv"
            dataset_id: "${inputs.dataset_id:-psych101}"
            source_name: "${inputs.source_name:-Psych-101}"
        - id: prepare_eval_manifest
          tool: psych101_prepare_eval_manifest
          params:
            qc_table: "${steps.ingest.data.outputs.qc_table}"
            output_file: "${inputs.output_dir}/${inputs.output_stem:-psych101_eval_manifest}.json"
            dataset_id: "${inputs.dataset_id:-psych101}"
            heldout_ratio: "${inputs.heldout_ratio:-0.1}"
            audit_group_keys: "${inputs.audit_group_keys}"
            target_population: "${inputs.target_population}"
            sampling_frame: "${inputs.sampling_frame}"
            inclusion_criteria: "${inputs.inclusion_criteria}"
            exclusion_criteria: "${inputs.exclusion_criteria}"
            sample_weight_column: "${inputs.sample_weight_column}"
            min_group_count: "${inputs.min_group_count:-5}"

