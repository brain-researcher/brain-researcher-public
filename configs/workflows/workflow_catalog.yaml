  - id: workflow_data_harmonization
    stage: dataset
    cost_tier: moderate
    execution_story_kind: portable_python_compute
    supported_recipe_targets: [python]
    primary_target: python
    recipe_family: data_harmonization
    origin: core32
    lifecycle: stable_pack
    stable_workflow_pack: true
    source_repo: "https://github.com/ThomasYeoLab/Standalone_An2024_DeepResBat"
    source_paper: "An et al. 2024 DeepResBat: deep residual batch harmonization accounting for covariate distribution differences"
    tested_release: "brain_researcher stable-pack baseline 2026-03-09"
    backend_options:
      default: combat
      available: [combat, deepresbat_external]
      optional_external: [deepresbat_external]
    example_dataset:
      dataset_id: ds000114
      source: OpenNeuro
      smoke_test: tests/integration/realdata/test_workflow_data_harmonization_ds000114_smoke.py
    reference_assets: []
    artifact_contract:
      required_outputs: [harmonized.csv, harmonization_report.json, provenance.json]
      report_files: [harmonization_report.json]
      provenance_files: [provenance.json]
    acceptance_gate:
      script: scripts/workflows/run_workflow_realdata_gate.py
      smoke_test: tests/integration/realdata/test_workflow_data_harmonization_ds000114_smoke.py
    runbook: docs/runbooks/workflow_data_harmonization.md
    params:
      schema:
        type: object
        required: [bids_dir, features, batch, output_dir]
        properties:
          bids_dir:
            type: string
            description: BIDS dataset root used for dataset context and provenance.
          features:
            type: string
            description: CSV/TSV/NPY features table (rows are samples).
          batch:
            oneOf:
              - type: string
              - type: array
            description: Batch labels file or inline batch labels.
          covars:
            type: string
            description: Optional CSV/TSV covariates table.
          output_dir:
            type: string
            description: Output directory for harmonized features and reports.
          backend:
            type: string
            enum: [combat, deepresbat_external]
            description: Harmonization backend. Default is local ComBat-like harmonization.
      defaults:
        backend: combat
    impl: "workflow: load_dataset -> harmonize_data(ComBat) -> regenerate downstream-ready features + reports"
    runtime:
      kind: declarative_workflow
      steps:
        - id: load
          tool: load_dataset
          params:
            bids_dir: "${inputs.bids_dir}"
        - id: harmonize
          tool: harmonize_data
          params:
            features: "${inputs.features}"
            batch: "${inputs.batch}"
            covars: "${inputs.covars}"
            method: "${inputs.backend:-combat}"
            output_file: "${inputs.output_dir}/harmonized.csv"
            report_file: "${inputs.output_dir}/harmonization_report.json"
            provenance_file: "${inputs.output_dir}/provenance.json"

