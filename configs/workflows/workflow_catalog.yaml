  - id: workflow_hypothesis_candidate_cards
    stage: interpretation
    cost_tier: moderate
    execution_story_kind: portable_python_compute
    supported_recipe_targets: [python]
    primary_target: python
    recipe_family: hypothesis_candidate_cards
    origin: novelty_agent_path
    impl: "workflow: br_kg.find_structural_leverage -> br_kg.sample_ood_hypothesis -> br_kg.verify_sampled_hypotheses -> br_kg.detect_contradiction_motifs -> br_kg.detect_topology_shifts -> br_kg.synthesize_hypothesis_candidate_cards"
    params:
      schema:
        type: object
        required:
          - query
        properties:
          query:
            type: string
            description: "Construct/task query used to resolve seed KG nodes."
            example: "fmri based image decoding"
          frontier_mode:
            type: string
            enum:
              - "off"
              - "frontier"
            description: "Whether to mix contradiction/assumption/analogy frontier candidates into final cards."
            default: "off"
          seed_kg_ids:
            type: array
            items:
              type: string
            description: "Optional explicit seed KG IDs."
            default: []
          relation_types:
            type: array
            items:
              type: string
            description: "Optional relation filter."
            default: []
          top_k:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          n_samples:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          taste_mode:
            type: string
            enum:
              - novelty_first
              - balanced
              - evidence_first
            default: novelty_first
          candidate_lane_mode:
            type: string
            enum:
              - broad
              - strict
            default: broad
          use_external_literature:
            type: boolean
            default: false
          verify_use_external_literature:
            anyOf:
              - type: boolean
              - type: "null"
            description: "Optional override for external literature lookup inside verify_sampled_hypotheses. When omitted, the verify step falls back to use_external_literature."
            default: null
          external_literature_top_k:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
          external_literature_recency_days:
            type: integer
            minimum: 0
            maximum: 3650
            default: 365
          external_literature_exclude_domains:
            type: array
            items:
              type: string
            default: []
          controller_mode:
            type: string
            enum:
              - legacy
              - principle_v0
            default: legacy
      defaults:
        frontier_mode: "off"
        seed_kg_ids: []
        relation_types: []
        top_k: 20
        n_samples: 5
        taste_mode: novelty_first
        candidate_lane_mode: broad
        use_external_literature: false
        external_literature_top_k: 5
        external_literature_recency_days: 365
        external_literature_exclude_domains: []
        controller_mode: legacy
    runtime:
      kind: declarative_workflow
      # Runtime registry IDs use the Python-safe br_kg prefix; br-kg remains the
      # public service/catalog label outside executable workflow step lookup.
      steps:
        - id: leverage
          tool: br_kg.find_structural_leverage
          params:
            query: "${inputs.query}"
            seed_kg_ids: "${inputs.seed_kg_ids}"
            relation_types: "${inputs.relation_types}"
            limit: "${inputs.top_k}"
            taste_mode: "${inputs.taste_mode}"
        - id: principle_state_init
          tool: br_kg.principle_state_init
          params:
            query: "${inputs.query}"
            seed_kg_ids: "${steps.leverage.data.result.seed_kg_ids}"
            relation_types: "${inputs.relation_types}"
            taste_mode: "${inputs.taste_mode}"
            controller_mode: "${inputs.controller_mode:-legacy}"
            leverage_items: "${steps.leverage.data.result.items}"
        - id: ood_sampling
          tool: br_kg.sample_ood_hypothesis
          params:
            query: "${inputs.query}"
            seed_kg_ids: "${steps.leverage.data.result.seed_kg_ids}"
            relation_types: "${inputs.relation_types}"
            n_samples: "${inputs.n_samples}"
            taste_mode: "${inputs.taste_mode}"
            controller_mode: "${inputs.controller_mode:-legacy}"
            leverage_items: "${steps.leverage.data.result.items}"
            leverage_context: "${steps.leverage.data.result}"
            principle_state: "${steps.principle_state_init.data.result}"
        - id: verify_sampled_hypotheses
          tool: br_kg.verify_sampled_hypotheses
          params:
            query: "${inputs.query}"
            seed_kg_ids: "${steps.leverage.data.result.seed_kg_ids}"
            sampled_hypotheses: "${steps.ood_sampling.data.result.hypotheses}"
            verify_top_k: "${inputs.n_samples}"
            candidate_lane_mode: "${inputs.candidate_lane_mode:-broad}"
            use_external_literature: "${inputs.verify_use_external_literature}"
            external_literature_top_k: "${inputs.external_literature_top_k:-5}"
            external_literature_recency_days: "${inputs.external_literature_recency_days:-365}"
            external_literature_exclude_domains: "${inputs.external_literature_exclude_domains:-[]}"
        - id: contradiction_scan
          tool: br_kg.detect_contradiction_motifs
          params:
            query: "${inputs.query}"
            seed_kg_ids: "${steps.leverage.data.result.seed_kg_ids}"
            evidence_items: "${steps.verify_sampled_hypotheses.data.result.evidence_items:-[]}"
            max_evidence: "${inputs.top_k}"
        - id: topology_shift_scan
          tool: br_kg.detect_topology_shifts
          params:
            query: "${inputs.query}"
            seed_kg_ids: "${steps.leverage.data.result.seed_kg_ids}"
            mode: proposal
            limit: "${inputs.top_k}"
            taste_mode: "${inputs.taste_mode}"
        - id: contradiction_frontiers
          tool: br_kg.find_contradiction_frontiers
          params:
            query: "${inputs.query}"
            seed_kg_ids: "${steps.leverage.data.result.seed_kg_ids}"
            relation_types: "${inputs.relation_types}"
            limit: "${inputs.top_k}"
            max_evidence: "${inputs.top_k}"
        - id: assumption_cracks
          tool: br_kg.mine_assumption_cracks
          params:
            query: "${inputs.query}"
            seed_kg_ids: "${steps.contradiction_frontiers.data.result.seed_kg_ids}"
            contradiction_frontiers: "${steps.contradiction_frontiers.data.result}"
            limit: "${inputs.top_k}"
        - id: analogy_transfers
          tool: br_kg.find_analogy_transfers
          params:
            query: "${inputs.query}"
            seed_kg_ids: "${steps.contradiction_frontiers.data.result.seed_kg_ids}"
            relation_types: "${inputs.relation_types}"
            limit: "${inputs.top_k}"
        - id: principle_state_update
          tool: br_kg.principle_state_update
          params:
            query: "${inputs.query}"
            seed_kg_ids: "${steps.leverage.data.result.seed_kg_ids}"
            relation_types: "${inputs.relation_types}"
            taste_mode: "${inputs.taste_mode}"
            controller_mode: "${inputs.controller_mode:-legacy}"
            principle_state: "${steps.principle_state_init.data.result}"
            ood_result: "${steps.ood_sampling.data.result}"
            contradiction_result: "${steps.contradiction_scan.data.result}"
            topology_result: "${steps.topology_shift_scan.data.result}"
        - id: candidate_card_rewrite
          tool: br_kg.synthesize_hypothesis_candidate_cards
          params:
            query: "${inputs.query}"
            frontier_mode: "${inputs.frontier_mode:-\"off\"}"
            top_n: "${inputs.n_samples}"
            source_workflow: "workflow_hypothesis_candidate_cards"
            resolved_seed_kg_ids: "${steps.leverage.data.result.seed_kg_ids}"
            leverage_result: "${steps.leverage.data.result}"
            principle_state_init_result: "${steps.principle_state_init.data.result}"
            ood_result: "${steps.ood_sampling.data.result}"
            verify_result: "${steps.verify_sampled_hypotheses.data.result}"
            contradiction_result: "${steps.contradiction_scan.data.result}"
            topology_result: "${steps.topology_shift_scan.data.result}"
            principle_state_update_result: "${steps.principle_state_update.data.result}"
            contradiction_frontiers_result: "${steps.contradiction_frontiers.data.result}"
            assumption_cracks_result: "${steps.assumption_cracks.data.result}"
            analogy_transfers_result: "${steps.analogy_transfers.data.result}"

  - id: workflow_spatial_correlation
    stage: interpretation
    cost_tier: moderate
    execution_story_kind: portable_python_compute
    supported_recipe_targets: [python]
    primary_target: python
    recipe_family: spatial_correlation
    origin: trend_addition
    lifecycle: active
    impl: "workflow: query_neuromaps -> align maps -> spatial correlation + nulls -> report"
    params:
      schema:
        type: object
        required:
          - reference_term
          - map_file
        properties:
          reference_term:
            type: string
            description: "Search term for query_neuromaps."
            example: "default mode network"
          map_file:
            type: string
            description: "Path to the local map file to compare."
            example: "/tmp/sub-01_map.func.gii"
          n_perm:
            type: integer
            description: "Number of null permutations for spatial correlation."
            minimum: 10
            maximum: 100000
            default: 1000
          output_dir:
            type: string
            description: "Directory for workflow outputs."
            default: "/tmp/brain-researcher/workflow_spatial_correlation"
      defaults:
        n_perm: 1000
        output_dir: "/tmp/brain-researcher/workflow_spatial_correlation"
    runtime:
      kind: declarative_workflow
      steps:
        - id: fetch_reference
          tool: query_neuromaps
          params:
            term: "${inputs.reference_term}"
            output_file: "${inputs.output_dir}/neuromaps/query_neuromaps.json"
        - id: spatial_corr
          tool: compare_surface_maps
          params:
            map1: "${inputs.map_file}"
            map2: "${steps.fetch_reference.data.outputs.map_path}"
            null_permutations: "${inputs.n_perm}"
            output_file: "${inputs.output_dir}/spatial_correlation.json"

  - id: workflow_spatial_correlation_surface
    stage: interpretation
    cost_tier: moderate
    execution_story_kind: composite_workflow
    supported_recipe_targets: []
    primary_target: ""
    origin: trend_addition
    impl: "workflow: stack L/R surfaces -> compare_surface_maps with spins"
    runtime:
      kind: declarative_workflow
      steps:
        - id: stack_map
          tool: stack_surface_hemis
          params:
            left_file: "${inputs.map_left}"
            right_file: "${inputs.map_right}"
            output_file: "${inputs.output_dir}/stacked_map.func.gii"
        - id: stack_ref
          tool: stack_surface_hemis
          params:
            left_file: "${inputs.ref_left}"
            right_file: "${inputs.ref_right}"
            output_file: "${inputs.output_dir}/stacked_ref.func.gii"
        - id: spatial_corr
          tool: compare_surface_maps
          params:
            map1: "${steps.stack_map.data.outputs.stacked_gifti}"
            map2: "${steps.stack_ref.data.outputs.stacked_gifti}"
            null_permutations: "${inputs.n_perm}"
            output_file: "${inputs.output_dir}/spatial_correlation_surface.json"

  # SPD (Symmetric Positive Definite) Connectome Analysis
  - id: workflow_spd_connectome_analysis
    stage: connectivity
    cost_tier: expensive
    execution_story_kind: composite_workflow
    supported_recipe_targets: []
    primary_target: ""
    origin: spd_learn_mvp
    modalities: ["fmri", "eeg"]
    impl: "workflow: repr_spd_covariance_estimate -> repr_spd_project -> geom_spd_logm -> geom_spd_geodesic_distance"
    runtime:
      kind: declarative_workflow
      steps:
        - id: cov_a
          tool: repr_spd_covariance_estimate
          params:
            data_file: "${inputs.timeseries_a}"
            output_file: "${inputs.output_dir}/cov_a.npz"
            method: "${inputs.cov_method}"
            standardize: true
        - id: cov_b
          tool: repr_spd_covariance_estimate
          params:
            data_file: "${inputs.timeseries_b}"
            output_file: "${inputs.output_dir}/cov_b.npz"
            method: "${inputs.cov_method}"
            standardize: true
        - id: spd_a
          tool: repr_spd_project
          params:
            matrix_file: "${steps.cov_a.data.covariance_file}"
            output_file: "${inputs.output_dir}/spd_a.npz"
            epsilon: "${inputs.epsilon}"
        - id: spd_b
          tool: repr_spd_project
          params:
            matrix_file: "${steps.cov_b.data.covariance_file}"
            output_file: "${inputs.output_dir}/spd_b.npz"
            epsilon: "${inputs.epsilon}"
        - id: logm_a
          tool: geom_spd_logm
          params:
            spd_matrix_file: "${steps.spd_a.data.spd_file}"
            output_file: "${inputs.output_dir}/logm_a.npz"
            reference: "identity"
        - id: logm_b
          tool: geom_spd_logm
          params:
            spd_matrix_file: "${steps.spd_b.data.spd_file}"
            output_file: "${inputs.output_dir}/logm_b.npz"
            reference: "identity"
        - id: distance
          tool: geom_spd_geodesic_distance
          params:
            matrix_a_file: "${steps.spd_a.data.spd_file}"
            matrix_b_file: "${steps.spd_b.data.spd_file}"
            metric: "${inputs.distance_metric}"
            output_file: "${inputs.output_dir}/spd_distance.json"

  - id: workflow_ibl_neuropixels
    stage: ephys
    cost_tier: expensive
    execution_story_kind: composite_workflow
    supported_recipe_targets: [python]
    primary_target: python
    recipe_family: ibl_neuropixels
    origin: core32
    lifecycle: active
    modalities: ["ephys", "optical", "behavior"]
    description: IBL Neuropixels pipeline for mounted Brain-Wide Map sessions using Kilosort4, optional pose, and spike-behavior alignment.
    impl: "workflow: ibl_neuropixels_workflow"
    example_dataset:
      dataset_id: ds:manual:ibl_brainwide
      source: public_s3
      smoke_test: tests/integration/realdata/test_workflow_ibl_neuropixels_smoke.py
    artifact_contract:
      required_outputs:
        - workflow_summary.json
        - kilosort/spike_times.parquet
        - alignment/aligned_spikes.parquet
        - alignment/trial_features.parquet
      optional_outputs:
        - pose/lightning_pose_coords_leftCamera.parquet
        - alignment/aligned_behavior.parquet
    params:
      schema:
        type: object
        required: [dataset_ref, session_id, probe_label, output_dir]
        properties:
          dataset_ref:
            type: string
            description: Dataset reference, typically ds:manual:ibl_brainwide.
          session_id:
            type: string
            description: IBL session id in lab/subject/date/number or subject/date/number form.
          subject_id:
            type: string
          probe_label:
            type: string
            description: Probe label such as probe00.
          raw_ephys_dir:
            type: string
            description: Optional raw ephys override path.
          video_path:
            type: string
            description: Optional raw video override path.
          behavior_events_path:
            type: string
            description: Optional precomputed trial/events table path.
          pose_backend:
            type: string
            enum: [lightning_pose, deeplabcut]
          include_pose:
            type: boolean
          output_dir:
            type: string
          spike_limit:
            type: integer
          max_duration_s:
            type: number
            description: Optional duration cap for manageable Kilosort smoke runs.
          dry_run:
            type: boolean
      defaults:
        dataset_ref: ds:manual:ibl_brainwide
        pose_backend: lightning_pose
        include_pose: true
        spike_limit: 5000
        max_duration_s: 60
        dry_run: false
    runtime:
      kind: declarative_workflow
      steps:
        - id: ibl_neuropixels
          tool: ibl_neuropixels_workflow
          params:
            dataset_ref: "${inputs.dataset_ref}"
            session_id: "${inputs.session_id}"
            subject_id: "${inputs.subject_id}"
            probe_label: "${inputs.probe_label}"
            raw_ephys_dir: "${inputs.raw_ephys_dir}"
            video_path: "${inputs.video_path}"
            behavior_events_path: "${inputs.behavior_events_path}"
            pose_backend: "${inputs.pose_backend:-lightning_pose}"
            include_pose: "${inputs.include_pose:-true}"
            output_dir: "${inputs.output_dir}"
            spike_limit: "${inputs.spike_limit}"
            max_duration_s: "${inputs.max_duration_s:-60}"
            dry_run: "${inputs.dry_run:-false}"

  - id: workflow_ibl_decoding_inputs
    stage: decoding
    cost_tier: moderate
    execution_story_kind: composite_workflow
    supported_recipe_targets: [python]
    primary_target: python
    recipe_family: ibl_decoding_inputs
    origin: core32
    lifecycle: active
    modalities: ["ephys", "behavior"]
    description: Build analysis-ready X/y/groups decoding inputs from mounted IBL Brain-Wide Map sessions without making downstream scientific claims.
    impl: "workflow: ibl_decoding_dataset"
    example_dataset:
      dataset_id: ds:manual:ibl_brainwide
      source: public_s3
      smoke_test: tests/integration/realdata/test_workflow_ibl_decoding_inputs_smoke.py
    artifact_contract:
      required_outputs:
        - X.npy
        - y.npy
        - groups.npy
        - sample_metadata.parquet
        - feature_metadata.parquet
        - metadata.json
      optional_outputs:
        - label_map.json
    params:
      schema:
        type: object
        required: [dataset_ref, session_id, probe_label, output_dir]
        properties:
          dataset_ref:
            type: string
            description: Dataset reference, typically ds:manual:ibl_brainwide.
          session_id:
            type: string
            description: IBL session id in lab/subject/date/number or subject/date/number form.
          session_ids:
            type: array
            items:
              type: string
            description: Optional multi-session override for cross-session builders.
          subject_id:
            type: string
          probe_label:
            type: string
            description: Probe label such as probe00.
          spike_times_path:
            type: string
            description: Optional precomputed spike table path.
          trials_path:
            type: string
            description: Optional trials table path.
          trial_features_path:
            type: string
            description: Optional trial-features sidecar path.
          regions_path:
            type: string
            description: Optional region lookup table path.
          label_field:
            type: string
            description: Label field for y, for example choice, feedbackType, stimulus_side, or signed_contrast.
          feature_level:
            type: string
            enum: [unit, region]
          group_by:
            type: string
            enum: [session, subject]
          anchor_field:
            type: string
          window_start_s:
            type: number
          window_end_s:
            type: number
          min_feature_count:
            type: integer
          output_dir:
            type: string
          spike_limit:
            type: integer
          dry_run:
            type: boolean
      defaults:
        dataset_ref: ds:manual:ibl_brainwide
        label_field: choice
        feature_level: unit
        group_by: session
        anchor_field: stimOn_times
        window_start_s: 0.0
        window_end_s: 0.2
        min_feature_count: 1
        dry_run: false
    runtime:
      kind: declarative_workflow
      steps:
        - id: ibl_decoding_inputs
          tool: ibl_decoding_dataset
          params:
            dataset_ref: "${inputs.dataset_ref}"
            session_id: "${inputs.session_id}"
            session_ids: "${inputs.session_ids}"
            subject_id: "${inputs.subject_id}"
            probe_label: "${inputs.probe_label}"
            spike_times_path: "${inputs.spike_times_path}"
            trials_path: "${inputs.trials_path}"
            trial_features_path: "${inputs.trial_features_path}"
            regions_path: "${inputs.regions_path}"
            label_field: "${inputs.label_field:-choice}"
            feature_level: "${inputs.feature_level:-unit}"
            group_by: "${inputs.group_by:-session}"
            anchor_field: "${inputs.anchor_field:-stimOn_times}"
            window_start_s: "${inputs.window_start_s:-0.0}"
            window_end_s: "${inputs.window_end_s:-0.2}"
            min_feature_count: "${inputs.min_feature_count:-1}"
            output_dir: "${inputs.output_dir}"
            spike_limit: "${inputs.spike_limit}"
            dry_run: "${inputs.dry_run:-false}"
