    example_dataset:
      dataset_id: ds000117
      source: OpenNeuro
      smoke_test: tests/integration/realdata/test_workflow_dwi_connectome_ds000117_smoke.py
    artifact_contract:
      required_outputs:
        - sc/connectivity_matrix.csv
        - sc/connectivity_matrix.npy
        - sc/graph_metrics.json
        - sc/connectome_manifest.json
      optional_outputs:
        - qsirecon_dir
        - tractogram
        - source_connectome
        - tracts/streamlines.npy
        - tracts/tractography_summary.json
        - tracts/tractography_provenance.json
        - tracts/fa_map.npy
        - tracts/md_map.npy
        - tracts/rd_map.npy
        - tracts/ad_map.npy
        - tracts/connectivity.npy
    acceptance_gate:
      script: scripts/workflows/run_workflow_realdata_gate.py
      smoke_test: tests/integration/realdata/test_workflow_dwi_connectome_ds000117_smoke.py
    runbook: docs/runbooks/workflow_dwi_connectome.md
    params:
      schema:
        type: object
        required: [atlas, output_dir]
        properties:
          qsiprep_dir:
            type: string
            description: QSIPrep derivative root. Preferred mature input path when QSIRecon outputs are not already available.
          qsirecon_dir:
            type: string
            description: Existing QSIRecon derivative root. Preferred direct derivative route.
          recon_dir:
            type: string
            description: Alias for `qsirecon_dir`.
          tractogram:
            type: string
            description: Optional precomputed tractogram used to materialize a standardized connectome directly.
          connectome_file:
            type: string
            description: Optional precomputed connectome file used when no tractogram is available.
          dwi:
            type: string
            description: Legacy raw DWI volume or lightweight proxy volume for fallback tractography.
          bvals:
            type: string
            description: Legacy diffusion b-values file aligned to `dwi`.
          bvecs:
            type: string
            description: Legacy diffusion b-vectors file aligned to `dwi`.
          bval:
            type: string
            description: Alias for `bvals`.
          bvec:
            type: string
            description: Alias for `bvecs`.
          atlas:
            type: string
            description: Atlas/parcellation image used to build or rematerialize the structural connectome.
          output_dir:
            type: string
            description: Root directory for derivative materialization outputs.
          participant_label:
            type: array
            items:
              type: string
            description: Optional participant labels used to scope derivative resolution and QSIRecon execution.
          session_label:
            type: string
            description: Optional session label metadata.
          recon_spec:
            type: string
            description: Reconstruction preset used when promoting `qsiprep_dir` into QSIRecon derivatives.
          work_dir:
            type: string
          fs_license_file:
            type: string
          n_cpus:
            type: integer
          omp_nthreads:
            type: integer
          extra_args:
            type: array
            items:
              type: string
          qsirecon_extra_args:
            type: array
            items:
              type: string
          dry_run:
            type: boolean
            description: Preview the derivative-first route instead of executing it.
      defaults:
        output_dir: /tmp/brain-researcher/workflow_dwi_connectome
        recon_spec: mrtrix_multishell_msmt_ACT-hsvs
        dry_run: false
    impl: "workflow: use qsirecon_dir directly or qsiprep_dir -> QSIRecon -> materialize standardized connectome (preferred) | raw dwi/bvals/bvecs -> run_tractography -> build_structural_connectome (compatibility fallback)"
    runtime:
      kind: declarative_workflow
      steps:
        - id: tracts
          tool: run_tractography
          params:
            qsiprep_dir: "${inputs.qsiprep_dir}"
            participant_label: "${inputs.participant_label}"
            dwi: "${inputs.dwi}"
            bval: "${inputs.bvals}"
            bvec: "${inputs.bvecs}"
            output_dir: "${inputs.output_dir}/tracts"
        - id: sc
          tool: build_structural_connectome
          params:
            streamlines: "${steps.tracts.data.outputs.streamlines}"
            atlas: "${inputs.atlas}"
            output_dir: "${inputs.output_dir}/sc"

  - id: workflow_surface_projection_analysis
    stage: preprocessing
    cost_tier: expensive
    execution_story_kind: composite_workflow
    supported_recipe_targets: []
    primary_target: ""
    origin: core32
    impl: "workflow: project volume -> surface -> parcellate (fsLR 32k) -> stack hemis"
    runtime:
      kind: declarative_workflow
      steps:
        - id: project_left
          tool: map_volume_to_surface
          params:
            volume: "${inputs.volume}"
            surface: "data/br-kg/raw/neuromaps/atlases/fsLR/tpl-fsLR_den-32k_hemi-L_midthickness.surf.gii"
            hemi: "left"
            output_file: "${inputs.output_dir}/surface_L.func.gii"
        - id: project_right
          tool: map_volume_to_surface
          params:
            volume: "${inputs.volume}"
            surface: "data/br-kg/raw/neuromaps/atlases/fsLR/tpl-fsLR_den-32k_hemi-R_midthickness.surf.gii"
            hemi: "right"
            output_file: "${inputs.output_dir}/surface_R.func.gii"
        - id: surface_bilateral
          tool: stack_surface_hemis
          params:
            left_file: "${steps.project_left.data.outputs.surfaces.left}"
            right_file: "${steps.project_right.data.outputs.surfaces.right}"
            output_file: "${inputs.output_dir}/surface.func.gii"
        - id: parcellate_left
          tool: parcellate_cifti
          params:
            cifti_file: "${steps.project_left.data.outputs.surfaces.left}"
            atlas: "data/br-kg/raw/neuromaps/atlases/fsLR/tpl-fsLR_den-32k_hemi-L_desc-nomedialwall_dparc.label.gii"
            output_file: "${inputs.output_dir}/parcellation_L.func.gii"
        - id: parcellate_right
          tool: parcellate_cifti
          params:
            cifti_file: "${steps.project_right.data.outputs.surfaces.right}"
            atlas: "data/br-kg/raw/neuromaps/atlases/fsLR/tpl-fsLR_den-32k_hemi-R_desc-nomedialwall_dparc.label.gii"
            output_file: "${inputs.output_dir}/parcellation_R.func.gii"
        - id: parcellation_bilateral
          tool: stack_surface_hemis
          params:
            left_file: "${steps.parcellate_left.data.outputs.parcellated_gifti}"
            right_file: "${steps.parcellate_right.data.outputs.parcellated_gifti}"
            output_file: "${inputs.output_dir}/parcellation.func.gii"

