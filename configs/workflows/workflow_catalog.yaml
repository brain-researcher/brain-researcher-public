            type: boolean
          compute_centrality:
            type: boolean
          detect_communities:
            type: boolean
          detect_hubs:
            type: boolean
          compute_rich_club:
            type: boolean
          compute_small_world:
            type: boolean
          compute_efficiency:
            type: boolean
          test_robustness:
            type: boolean
          removal_fraction:
            type: number
          permutation_test:
            type: boolean
          n_permutations:
            type: integer
          community_method:
            type: string
          hub_method:
            type: string
          visualize:
            type: boolean
          output_dir:
            type: string
            description: Root directory for connectivity and graph-topology outputs.
      defaults:
        connectivity_kind: correlation
        fisher_z: true
        graph_type: weighted
        threshold_method: proportional
        threshold_value: 0.1
        compute_basic_metrics: true
        compute_centrality: true
        detect_communities: true
        detect_hubs: true
        compute_rich_club: false
        compute_small_world: true
        compute_efficiency: true
        test_robustness: false
        removal_fraction: 0.5
        permutation_test: false
        n_permutations: 1000
        community_method: louvain
        hub_method: degree
        visualize: true
        output_dir: /tmp/brain-researcher/workflow_connectivity_gradients
    impl: "workflow: compute_connectivity -> graph-topology summaries (current BR baseline) -> report"
    runtime:
      kind: declarative_workflow
      steps:
        - id: connectivity
          tool: compute_connectivity
          params:
            timeseries: "${inputs.timeseries}"
            kind: "${inputs.connectivity_kind}"
            output_file: "${inputs.output_dir}/connectivity.npy"
        - id: gradients
          tool: analyze_graph_topology
          params:
            connectivity_file: "${steps.connectivity.data.outputs.matrix}"
