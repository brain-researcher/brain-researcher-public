          include_unmapped:
            type: boolean
            description: Keep unmapped tasks and experiments in the payload pack for later curation or abstaining models.
          include_experiments:
            type: boolean
            description: Emit experiment-level payloads in addition to task-level payloads.
          recommended_model:
            type: string
            description: Informational model label to stamp into payloads, for example minitaur or centaur.
      defaults:
        repo_id: marcelbinz/Psych-101
        dataset_id: psych101
        source_name: Psych-101
        sample_text: true
        write_to_neo4j: false
        include_unmapped: true
        include_experiments: true
        recommended_model: minitaur
    runtime:
      kind: declarative_workflow
      steps:
        - id: snapshot
          tool: psych101_fetch_hf_snapshot
          params:
            repo_id: "${inputs.repo_id:-marcelbinz/Psych-101}"
            output_file: "${inputs.output_dir}/psych101_hf_metadata.json"
            dataset_id: "${inputs.dataset_id:-psych101}"
            source_name: "${inputs.source_name:-Psych-101}"
            sample_text: "${inputs.sample_text:-true}"
            write_to_neo4j: "${inputs.write_to_neo4j:-false}"
            neo4j_database: "${inputs.neo4j_database}"
        - id: prepare_payloads
          tool: centaur_prepare_task_payloads
          params:
            graph_plan_json: "${steps.snapshot.data.outputs.graph_plan}"
            output_file: "${inputs.output_dir}/psych101_centaur_task_payloads.json"
            include_unmapped: "${inputs.include_unmapped:-true}"
            include_experiments: "${inputs.include_experiments:-true}"
            recommended_model: "${inputs.recommended_model:-minitaur}"

  - id: workflow_psych101_centaur_behavior_embeddings
    stage: dataset
    cost_tier: moderate
    execution_story_kind: composite_workflow
    supported_recipe_targets: [python]
    primary_target: python
    origin: trend_addition
    modalities: ["behavioral"]
    runbook: docs/runbooks/workflow_psych101_centaur_behavior_embeddings.md
    example_dataset:
      dataset_id: psych101
      source: huggingface
      smoke_test: tests/integration/realdata/test_workflow_psych101_centaur_behavior_embeddings_smoke.py
    description: >
      Build the Psych-101 Centaur/Minitaur payload pack, run offline behavioral
      embedding extraction over the prompt JSONL sidecars, and optionally write
      a sibling KG feature space such as embedding_centaur_behavior_v1 onto
      local Psych-101 Task nodes.
    impl: >
      workflow: psych101_fetch_hf_snapshot(repo_id -> metadata + graph plan)
        -> centaur_prepare_task_payloads(graph plan -> prompt sidecars)
        -> centaur_offline_behavior_embeddings(prompt sidecars -> embedding JSONL + optional Neo4j writes)
    artifact_contract:
      required_outputs:
        - psych101_hf_metadata.json
        - psych101_hf_metadata_experiments.json
        - psych101_hf_metadata_graph_plan.json
        - psych101_hf_metadata_neo4j_ingest.json
        - psych101_centaur_task_payloads.json
        - psych101_centaur_task_prompts.jsonl
        - psych101_centaur_experiment_prompts.jsonl
        - psych101_centaur_behavior_embeddings.json
        - psych101_centaur_task_embeddings.jsonl
        - psych101_centaur_experiment_embeddings.jsonl
        - psych101_centaur_neo4j_ingest.json
    params:
      schema:
        type: object
        required: [output_dir, model_name_or_path]
        properties:
          output_dir:
            type: string
            description: Directory where Psych-101 snapshot, payload, and embedding artifacts are written.
          model_name_or_path:
            type: string
            description: Local or Hugging Face model path for offline Minitaur/Centaur embedding extraction.
          embedding_backend:
            type: string
            description: Backend used for embedding extraction. Use hf_hidden_state for real models or hash for deterministic dry runs/tests.
          pooling:
            type: string
            description: Hidden-state pooling method, typically mean or last_token.
          batch_size:
            type: integer
            description: Embedding batch size.
          max_length:
            type: integer
            description: Maximum token length for prompt encoding.
          normalize:
            type: boolean
            description: L2-normalize the resulting embeddings.
          device:
            type: string
            description: Optional explicit torch device override such as cpu or cuda.
          trust_remote_code:
            type: boolean
            description: Forward trust_remote_code to Hugging Face model loading.
          repo_id:
            type: string
            description: Hugging Face dataset id to snapshot.
          dataset_id:
            type: string
            description: Local dataset identifier to embed in graph-plan artifacts.
          source_name:
            type: string
            description: Human-readable source name for graph metadata.
          sample_text:
            type: boolean
            description: Attempt to capture a sample text field during parquet aggregation.
          include_unmapped:
            type: boolean
            description: Keep unmapped tasks and experiments in the payload pack before embedding.
          include_experiments:
            type: boolean
            description: Emit and embed experiment-level prompt sidecars in addition to task-level sidecars.
          write_snapshot_to_neo4j:
            type: boolean
            description: Attempt to write the HF snapshot directly into Neo4j before embedding.
          write_embeddings_to_neo4j:
            type: boolean
            description: Attempt to write embedding_centaur_behavior_v1-style properties into Neo4j.
          write_experiment_embeddings:
            type: boolean
            description: Also write experiment-node embeddings into Neo4j instead of only Task-node embeddings.
          neo4j_database:
            type: string
            description: Optional Neo4j database name override.
          embedding_property:
            type: string
            description: Node property used for the sibling behavioral feature space.
          recommended_model:
            type: string
            description: Informational model label stamped into the payload pack.
      defaults:
        embedding_backend: hf_hidden_state
        pooling: mean
        batch_size: 4
        max_length: 512
        normalize: true
        repo_id: marcelbinz/Psych-101
        dataset_id: psych101
        source_name: Psych-101
        sample_text: true
        include_unmapped: true
        include_experiments: true
        write_snapshot_to_neo4j: false
        write_embeddings_to_neo4j: true
        write_experiment_embeddings: false
        embedding_property: embedding_centaur_behavior_v1
        recommended_model: minitaur
    runtime:
      kind: declarative_workflow
      steps:
        - id: snapshot
          tool: psych101_fetch_hf_snapshot
          params:
            repo_id: "${inputs.repo_id:-marcelbinz/Psych-101}"
            output_file: "${inputs.output_dir}/psych101_hf_metadata.json"
            dataset_id: "${inputs.dataset_id:-psych101}"
            source_name: "${inputs.source_name:-Psych-101}"
            sample_text: "${inputs.sample_text:-true}"
            write_to_neo4j: "${inputs.write_snapshot_to_neo4j:-false}"
            neo4j_database: "${inputs.neo4j_database}"
        - id: prepare_payloads
          tool: centaur_prepare_task_payloads
          params:
            graph_plan_json: "${steps.snapshot.data.outputs.graph_plan}"
            output_file: "${inputs.output_dir}/psych101_centaur_task_payloads.json"
            include_unmapped: "${inputs.include_unmapped:-true}"
            include_experiments: "${inputs.include_experiments:-true}"
            recommended_model: "${inputs.recommended_model:-minitaur}"
        - id: build_behavior_embeddings
          tool: centaur_offline_behavior_embeddings
          params:
            task_prompts_jsonl: "${steps.prepare_payloads.data.outputs.task_prompts}"
            experiment_prompts_jsonl: "${steps.prepare_payloads.data.outputs.experiment_prompts}"
            output_file: "${inputs.output_dir}/psych101_centaur_behavior_embeddings.json"
            model_name_or_path: "${inputs.model_name_or_path}"
            embedding_backend: "${inputs.embedding_backend:-hf_hidden_state}"
            pooling: "${inputs.pooling:-mean}"
            batch_size: "${inputs.batch_size:-4}"
            max_length: "${inputs.max_length:-512}"
            normalize: "${inputs.normalize:-true}"
            device: "${inputs.device:-}"
            trust_remote_code: "${inputs.trust_remote_code:-false}"
            write_to_neo4j: "${inputs.write_embeddings_to_neo4j:-true}"
            write_experiment_embeddings: "${inputs.write_experiment_embeddings:-false}"
            neo4j_database: "${inputs.neo4j_database}"
            embedding_property: "${inputs.embedding_property:-embedding_centaur_behavior_v1}"

  - id: workflow_behavior_to_fmri_retrieval
    stage: reporting
    cost_tier: cheap
    execution_story_kind: composite_workflow
    supported_recipe_targets: [python]
    primary_target: python
    origin: trend_addition
    modalities: ["behavioral", "fmri"]
    runbook: docs/runbooks/workflow_behavior_to_fmri_retrieval.md
    example_dataset:
      dataset_id: psych101
      source: br-kg
      smoke_test: tests/integration/realdata/test_workflow_behavior_to_fmri_retrieval_smoke.py
    description: >
      Behavior fMRI retrieval workflow: retrieve task-fMRI evidence for a
      behavioral seed such as a Psych-101 task or experiment, and export a
      workflow-friendly JSON artifact summarizing ranked TaskAnalysis, Contrast,
      StatsMap, Dataset, and BrainRegion hits.
    impl: >
      workflow: behavior_to_fmri_retrieval_export(seed_id/name -> retrieval JSON artifact)
    artifact_contract:
      required_outputs:
        - behavior_to_fmri_retrieval.json
    params:
      schema:
        type: object
        required: [output_dir]
        properties:
          output_dir:
            type: string
            description: Directory where the retrieval JSON artifact is written.
          output_stem:
            type: string
            description: Basename for the retrieval artifact without extension.
          seed_id:
            type: string
            description: Preferred KG seed identifier, e.g. psych101:task:go-no-go.
          label:
            type: string
            description: Optional node label/type hint when resolving by name.
          name:
            type: string
            description: Optional seed name when seed_id is not provided.
          limit:
            type: integer
            description: Maximum number of ranked retrieval items to keep.
          max_maps:
            type: integer
            description: Maximum maps to traverse while building evidence packs.
          max_paths:
            type: integer
            description: Maximum graph paths to retain per evidence pack.
          max_regions_per_map:
            type: integer
            description: Maximum brain regions to retain per stats map.
          max_behavior_neighbors:
            type: integer
            description: Maximum behavior-neighbor tasks to traverse.
          min_behavior_similarity:
            type: number
            description: Minimum behavior embedding similarity for neighbor expansion.
          neo4j_database:
            type: string
            description: Optional Neo4j database name override.
      defaults:
        output_stem: behavior_to_fmri_retrieval
        seed_id: psych101:task:go-no-go
        limit: 12
        max_maps: 20
        max_paths: 20
        max_regions_per_map: 8
        max_behavior_neighbors: 4
        min_behavior_similarity: 0.0
    runtime:
      kind: declarative_workflow
      steps:
        - id: retrieve
          tool: behavior_to_fmri_retrieval_export
          params:
            output_file: "${inputs.output_dir}/${inputs.output_stem:-behavior_to_fmri_retrieval}.json"
            seed_id: "${inputs.seed_id:-psych101:task:go-no-go}"
            label: "${inputs.label}"
            name: "${inputs.name}"
            limit: "${inputs.limit:-12}"
            max_maps: "${inputs.max_maps:-20}"
            max_paths: "${inputs.max_paths:-20}"
            max_regions_per_map: "${inputs.max_regions_per_map:-8}"
            max_behavior_neighbors: "${inputs.max_behavior_neighbors:-4}"
            min_behavior_similarity: "${inputs.min_behavior_similarity:-0.0}"
            neo4j_database: "${inputs.neo4j_database}"

