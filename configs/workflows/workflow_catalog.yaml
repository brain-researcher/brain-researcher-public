    primary_target: python
    recipe_family: rest_connectome
    lifecycle: active
    origin: core32
    modalities: ["fmri"]
    backend_options:
      default: nilearn_connectome_local
      available: [nilearn_connectome_local]
    python_packages:
      - brain_researcher
      - nibabel>=5.0.0
      - nilearn>=0.10.0
      - numpy>=1.24.0
      - pandas>=2.2.0
      - scikit-learn>=1.3.0
    resource_profile:
      cpu: "2+"
      mem: "8G+"
      est_runtime: "minutes"
    example_dataset:
      dataset_id: ds000114
      source: OpenNeuro
      smoke_test: tests/integration/realdata/test_workflow_rest_connectome_ds000114_smoke.py
    artifact_contract:
      required_outputs:
        - timeseries/timeseries.npy
        - timeseries/timeseries.csv
        - connectivity_matrix.npy
        - feature_contract.json
      optional_outputs:
        - atlas/*.nii.gz
        - atlas/*_labels.tsv
        - atlas/*_labels.json
        - timeseries/timeseries_summary.json
      report_files:
        - timeseries/timeseries_summary.json
    acceptance_gate:
      script: scripts/workflows/run_workflow_realdata_gate.py
      smoke_test: tests/integration/realdata/test_workflow_rest_connectome_ds000114_smoke.py
    runbook: docs/runbooks/workflow_rest_connectome_e2e.md
    params:
      schema:
        type: object
        required: [img, output_dir]
        properties:
          img:
            type: string
            description: Preprocessed BOLD image in a common volumetric space.
          atlas_name:
            type: string
            description: Atlas identifier to resolve through `fetch_atlas`.
          atlas_path:
            type: string
            description: Optional explicit atlas image path to use instead of a fetched atlas.
          connectivity_kind:
            type: string
            description: Connectivity estimator passed to `compute_connectivity`.
          fisher_z:
            type: boolean
            description: Apply Fisher z-transform before saving the connectivity matrix.
          standardize:
            type: boolean
            description: Standardize ROI time series during extraction.
          detrend:
            type: boolean
            description: Detrend ROI time series during extraction.
          t_r:
            type: number
            description: Repetition time in seconds for Nilearn filtering during ROI extraction.
          low_pass:
            type: number
            description: Optional low-pass cutoff in Hz during ROI extraction.
          high_pass:
            type: number
            description: Optional high-pass cutoff in Hz during ROI extraction.
          output_dir:
            type: string
            description: Root directory for atlas, timeseries, and connectivity outputs.
      defaults:
        atlas_name: Schaefer2018_100
        connectivity_kind: correlation
        fisher_z: true
        standardize: true
        detrend: true
        output_dir: /tmp/brain-researcher/workflow_rest_connectome_e2e
    impl: "workflow: fetch_atlas -> extract_timeseries -> compute_connectivity -> plot_matrix/report"
    runtime:
      kind: declarative_workflow
      steps:
        - id: atlas
          tool: fetch_atlas
          params:
            atlas_name: "${inputs.atlas_name}"
            atlas_path: "${inputs.atlas_path}"
            reference_img: "${inputs.img}"
            output_dir: "${inputs.output_dir}/atlas"
        - id: timeseries
          tool: extract_timeseries
          params:
            img: "${inputs.img}"
            atlas: "${steps.atlas.data.outputs.atlas_path}"
            output_dir: "${inputs.output_dir}/timeseries"
        - id: connectivity
          tool: compute_connectivity
          params:
            timeseries: "${steps.timeseries.data.outputs.timeseries}"
            kind: "${inputs.connectivity_kind}"
            output_file: "${inputs.output_dir}/connectivity_matrix.npy"

