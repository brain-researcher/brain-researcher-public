    runbook: docs/runbooks/workflow_network_based_statistics.md
    params:
      schema:
        type: object
        required: [timeseries, labels, output_dir]
        properties:
          timeseries:
            type: string
            description: Path to subject-stacked ROI timeseries array.
          labels:
            oneOf:
              - type: string
              - type: array
                items:
                  type: integer
            description: Two-group labels as a file path or inline list.
          connectivity_kind:
            type: string
            description: Connectivity estimator passed to `compute_connectivity`.
          fisher_z:
            type: boolean
            description: Apply Fisher z-transform before network-based statistics.
          threshold:
            type: number
            description: Edge-wise NBS threshold.
          n_permutations:
            type: integer
            description: Number of label-shuffle permutations.
          tail:
            type: string
            description: Tail selection for thresholding (`two`, `pos`, or `neg`).
          output_dir:
            type: string
            description: Root directory for group connectivity and NBS outputs.
      defaults:
        connectivity_kind: correlation
        fisher_z: true
        threshold: 1.0
        n_permutations: 100
        tail: two
        output_dir: /tmp/brain-researcher/workflow_network_based_statistics
    impl: "workflow: compute_connectivity(group) -> nbs_engine(permutation) -> summary"
    runtime:
      kind: declarative_workflow
      steps:
        - id: connectivity
          tool: compute_connectivity
          params:
            timeseries: "${inputs.timeseries}"
            kind: "${inputs.connectivity_kind}"
            output_file: "${inputs.output_dir}/group_connectivity.npy"
        - id: similarity
          tool: nbs_engine
          params:
            connectivity_matrices: "${steps.connectivity.data.outputs.matrix}"
            labels: "${inputs.labels}"
            threshold: "${inputs.threshold}"
            n_permutations: "${inputs.n_permutations}"
            tail: "two"
            output_file: "${inputs.output_dir}/nbs"

