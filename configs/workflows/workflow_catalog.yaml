  - id: workflow_neurometabench_official_adapter
    stage: meta_analysis
    cost_tier: expensive
    execution_story_kind: portable_python_compute
    supported_recipe_targets: [python]
    primary_target: python
    origin: core32
    modalities: ["meta"]
    description: >
      Official-asset-aware NeurometaBench adapter. Dispatches each benchmark case
      to the appropriate official route: NiMADS/BrainMap reproduction,
      PMC bibliography-first screening, or PubMed-metadata fallback. Writes
      case_adapter.json and results.json for the selected meta-analysis.
    impl: >
      workflow: resolve official benchmark route(meta_pmid)
        -> run neurometabench_screening_pipeline.py
        -> write case_adapter.json + results.json
    script: scripts/neurometabench_screening_pipeline.py
    artifact_contract:
      required_outputs:
        - case_adapter.json
        - results.json
      optional_outputs:
        - screening_decisions.jsonl
        - missed_gt.json
    params:
      schema:
        type: object
        required: [meta_pmid, output_dir]
        properties:
          meta_pmid:
            type: string
            description: PMID of the target NeurometaBench meta-analysis.
          output_dir:
            type: string
            description: Directory for case_adapter.json and results.json.
          data_dir:
            type: string
            description: Directory containing NeurometaBench benchmark assets.
            default: external/neurometabench/data
          max_candidates:
            type: integer
            description: Cap on PubMed-metadata candidate screening when fallback retrieval is used.
            default: 500
          llm_model:
            type: string
            description: Screening model for routes that require abstract screening.
            default: gemini-2.5-pro
      defaults:
        data_dir: external/neurometabench/data
        max_candidates: 500
        llm_model: gemini-2.5-pro
    env_requirements:
      - GEMINI_API_KEY
    runtime:
      kind: declarative_workflow
      steps:
        - id: run_adapter
          tool: run_local_script
          params:
            script: "scripts/neurometabench_screening_pipeline.py"
            args:
              - "--meta-pmid=${inputs.meta_pmid}"
              - "--data-dir=${inputs.data_dir:-external/neurometabench/data}"
              - "--max-candidates=${inputs.max_candidates:-500}"
              - "--llm-model=${inputs.llm_model:-gemini-2.5-pro}"
              - "--output-dir=${inputs.output_dir}"

