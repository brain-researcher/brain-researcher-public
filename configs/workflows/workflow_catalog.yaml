            runtime: "${inputs.runtime:-apptainer}"
            container_type: "${inputs.container_type}"
            container_image: "${inputs.container_image}"
            work_dir: "${inputs.work_dir}"
            reports_only: "${inputs.reports_only:-false}"
            derivatives: "${inputs.fmriprep_dir}"
            task: "${inputs.task}"
            extra_args: "${inputs.extra_args}"
