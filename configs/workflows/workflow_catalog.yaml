        - first_level/<subject>/glm_first_level_summary.json
        - first_level/<subject>/<contrast_name>_zmap.nii.gz
      report_files:
        - second_level/glm_second_level_summary.json
    acceptance_gate:
      script: scripts/workflows/run_workflow_realdata_gate.py
      smoke_test: tests/integration/realdata/test_workflow_task_glm_group_ds000114_smoke.py
    runbook: docs/runbooks/workflow_task_glm_group.md
    params:
      schema:
        type: object
        required: [output_dir]
        properties:
          img:
            type: array
            items:
              type: string
            description: Subject-level preprocessed BOLD images aligned to a common space.
          events:
            type: array
            items:
              type: string
            description: Per-subject events TSV files aligned to `img`.
          bids_dir:
            type: string
            description: Optional BIDS root used to resolve events when direct `img`/`events` inputs are not passed.
          fmriprep_dir:
            type: string
            description: Optional fMRIPrep derivatives root used with `bids_dir` + `task` to resolve first-level inputs.
          task:
            type: string
            description: Task label used for BIDS + fMRIPrep resolution mode.
          participant_label:
            type: array
            items:
              type: string
            description: Optional participant subset for BIDS + fMRIPrep resolution mode.
          session:
            type: string
            description: Optional session label when resolving inputs from BIDS/fMRIPrep roots.
          space:
            type: string
            description: Optional derivative space filter when resolving preprocessed BOLD inputs.
          t_r:
            type: number
            description: Repetition time in seconds. Optional when available in the NIfTI header.
          smoothing_fwhm:
            type: number
            description: Optional smoothing kernel passed to the first-level Nilearn GLM.
          mask_img:
            type: string
            description: Optional analysis mask shared across subjects.
          contrast_name:
            type: string
            description: First-level contrast name to select consistently across subjects.
          output_dir:
            type: string
            description: Root directory for `first_level/` and `second_level/` outputs.
      defaults:
        output_dir: /tmp/brain-researcher/workflow_task_glm_group
    impl: "workflow: resolve direct or BIDS/fMRIPrep subject inputs -> batch first-level Nilearn GLM -> intercept-only second-level GLM -> report"
    runtime:
      kind: declarative_workflow
      steps:
        - id: first_level
          tool: glm_first_level_batch
          params:
            img: "${inputs.img}"
            events: "${inputs.events}"
            t_r: "${inputs.t_r}"
            smoothing_fwhm: "${inputs.smoothing_fwhm}"
            mask_img: "${inputs.mask_img}"
            contrast_name: "${inputs.contrast_name}"
            output_dir: "${inputs.output_dir}/first_level"
        - id: second_level
          tool: run_glm_second_level
          params:
            contrast_maps: "${steps.first_level.data.outputs.selected_zmaps}"
            contrast: "intercept"
            output_dir: "${inputs.output_dir}/second_level"

