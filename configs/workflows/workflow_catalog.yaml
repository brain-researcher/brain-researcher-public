    backend_options:
      default: python_canica_nbs
      available: [python_canica_nbs]
    python_packages:
      - brain_researcher
      - nibabel>=5.0.0
      - nilearn>=0.10.0
      - numpy>=1.24.0
      - pandas>=2.2.0
      - scikit-learn>=1.3.0
      - scipy>=1.11.0
    resource_profile:
      cpu: "4+"
      mem: "16G+"
      est_runtime: "minutes-to-hours"
    example_dataset:
      dataset_id: ds000114
      source: OpenNeuro
      smoke_test: tests/integration/realdata/test_workflow_group_ica_ds000114_smoke.py
    artifact_contract:
      required_outputs:
        - group_ica/canica_components.nii.gz
        - group_ica/canica_timecourses.npy
        - group_ica/connectivity.npy
        - group_ica/nbs.npy
      optional_outputs:
        - group_ica/canica_summary.json
        - group_ica/nbs.mask.npy
        - group_ica/nbs.components.json
        - group_ica/nbs.json
      report_files:
        - group_ica/canica_summary.json
        - group_ica/nbs.json
    acceptance_gate:
      script: scripts/workflows/run_workflow_realdata_gate.py
      smoke_test: tests/integration/realdata/test_workflow_group_ica_ds000114_smoke.py
    runbook: docs/runbooks/workflow_group_ica.md
    params:
      schema:
        type: object
        required: [img, labels, output_dir]
        properties:
          img:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
            description: One or more preprocessed BOLD images.
          n_components:
            type: integer
            description: Number of ICA components.
          t_r:
            type: number
            description: Repetition time in seconds passed to CanICA.
          mask:
            type: string
            description: Optional common analysis mask passed to CanICA.
          labels:
            oneOf:
              - type: string
              - type: array
                items:
                  type: integer
            description: Two-group labels aligned to the subject order.
          connectivity_kind:
            type: string
            description: Connectivity estimator used on ICA time courses.
          fisher_z:
            type: boolean
            description: Apply Fisher z-transform before NBS.
          threshold:
            type: number
            description: Edge-wise NBS threshold.
          n_permutations:
            type: integer
            description: Number of label-shuffle permutations.
          tail:
            type: string
            description: Tail selection for thresholding (`two`, `pos`, or `neg`).
          output_dir:
            type: string
            description: Root directory for group ICA, connectivity, and NBS outputs.
      defaults:
        n_components: 20
        connectivity_kind: correlation
        fisher_z: true
        threshold: 1.0
        n_permutations: 100
        tail: two
        output_dir: /tmp/brain-researcher/workflow_group_ica
    impl: "workflow: python ICA (CanICA) -> connectivity -> nbs_engine stats -> report"
    runtime:
      kind: declarative_workflow
      steps:
        - id: ica
          tool: group_ica
          params:
            img: "${inputs.img}"
            n_components: "${inputs.n_components}"
            output_dir: "${inputs.output_dir}/group_ica"
        - id: conn
          tool: compute_connectivity
          params:
            timeseries: "${steps.ica.data.outputs.timecourses_file}"
            kind: "correlation"
            output_file: "${inputs.output_dir}/group_ica/connectivity.npy"
        - id: stats
          tool: nbs_engine
          params:
            connectivity_matrices: "${steps.conn.data.outputs.matrix}"
            labels: "${inputs.labels}"
            threshold: "${inputs.threshold}"
            n_permutations: "${inputs.n_permutations}"
            tail: "two"
            output_file: "${inputs.output_dir}/group_ica/nbs"

