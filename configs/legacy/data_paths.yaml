# Brain Researcher Data Paths Configuration
# This file centralizes all data source locations for easy management

# Local data sources (always available)
local:
  niclip: /home/zijiaochen/projects/brain_researcher/data/niclip
  brainmap: /home/zijiaochen/projects/brain_researcher/data/brainmap
  openneuro_local: /home/zijiaochen/projects/dataset/openneuro
  br-kg: /home/zijiaochen/projects/brain_researcher/data/br-kg
  cache: /home/zijiaochen/projects/brain_researcher/data/cache
  processed: /home/zijiaochen/projects/brain_researcher/data/processed
  bids: /home/zijiaochen/projects/brain_researcher/data/bids

# OAK mount paths (requires SSHFS mount to be active)
oak_mount:
  base: /home/zijiaochen/projects/oak_mount
  enabled: true  # Set to false to disable OAK mount access

  # Large-scale datasets
  datasets:
    hcp_young_adult: /home/zijiaochen/projects/oak_mount/data/HCP_YA
    hcp_youth: /home/zijiaochen/projects/oak_mount/data/hcp_youth
    openneuro_full: /home/zijiaochen/projects/oak_mount/data
    cnp: /home/zijiaochen/projects/oak_mount/data/CNP
    ibc: /home/zijiaochen/projects/oak_mount/data/IBC
    msc: /home/zijiaochen/projects/oak_mount/data/MSC
    myconnectome: /home/zijiaochen/projects/oak_mount/data/myconnectome
    narps: /home/zijiaochen/projects/oak_mount/data/NARPS
    mls: /home/zijiaochen/projects/oak_mount/data/MLS

  # Resources
  templateflow: /home/zijiaochen/projects/oak_mount/templateflow
  shared_containers: /home/zijiaochen/projects/oak_mount/shared/containers

  # User directories
  user_dir: /home/zijiaochen/projects/oak_mount/users/zijiao/brain_researcher
  user_outputs: /home/zijiaochen/projects/oak_mount/users/zijiao/brain_researcher/outputs
  user_cache: /home/zijiaochen/projects/oak_mount/users/zijiao/brain_researcher/cache

# API-based data sources (no local storage required)
api_sources:
  pubmed:
    enabled: true
    base_url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils/
    cache_days: 30

  neurovault:
    enabled: true
    base_url: https://neurovault.org/api
    cache_days: 7

  neurosynth:
    enabled: true
    base_url: https://neurosynth.org
    cache_days: 90

  wikidata:
    enabled: true
    sparql_endpoint: https://query.wikidata.org/sparql
    cache_days: 30

  allen_brain:
    enabled: true
    base_url: http://api.brain-map.org/api/v2
    cache_days: 90

  openneuro_api:
    enabled: true
    graphql_endpoint: https://openneuro.org/crn/graphql
    s3_bucket: s3://openneuro.org

# Cache settings
cache:
  default_ttl_days: 7
  max_size_gb: 50
  compression: true

# Dataset priorities (when multiple sources available)
dataset_priority:
  - oak_mount  # Prefer OAK mount for large datasets
  - local      # Fall back to local copies
  - api        # Use API as last resort

# Loader defaults
loader_defaults:
  max_workers: 4
  retry_attempts: 3
  retry_delay: 1.0
  use_cache: true
  batch_size: 100

# BR-KG database paths
br-kg:
  db_path: /home/zijiaochen/projects/brain_researcher/data/br-kg/db/br-kg_full.db
  vector_cache: /home/zijiaochen/projects/brain_researcher/data/br-kg/vector_cache
  logs: /home/zijiaochen/projects/brain_researcher/data/br-kg/logs
