# Task Mapping Configuration
# This file defines thresholds and rules for mapping TaskSpec nodes to TaskDef nodes

thresholds:
  # Minimum similarity score for fuzzy matching (0.0 to 1.0)
  fuzzy_match: 0.8

  # Minimum confidence for NiCLIP-based matching
  niclip_confidence: 0.7

  # Maximum edit distance for fuzzy matching (optional, used as secondary filter)
  max_edit_distance: 0.2

# Task names to exclude from mapping
blacklist:
  - "test"
  - "demo"
  - "practice"
  - "example"
  - "training"
  - "calibration"
  - "instruction"
  - "tutorial"

blacklist_terms:
  - "study phase"
  - "random ordered"
  - "originalevent"
  - "postevent"
  - "varyingisi"
  - "onevol"
  - "unequalvariance"
  - "legacy"
  - "fribbids"

blacklist_regex:
  - "^todo[: _-]*full[: _-]*task[: _-]*name"
  - "^expo$"
  - "^beh$"
  - "^fcni\\d+$"

# Common task name variations and their canonical forms
# These are applied before fuzzy matching
name_normalizations:
  # Remove common suffixes
  remove_suffixes:
    - " task"
    - " paradigm"
    - " fMRI task paradigm"
    - " test"
    - " experiment"

  # Replace patterns (regex: replacement)
  replacements:
    "n-back": "nback"
    "N-back": "nback"
    "go/no-go": "go no go"
    "go-no-go": "go no go"
    "stop-signal": "stop signal"
    "odd-ball": "oddball"
    "theory-of-mind": "theory of mind"
    "ToM": "theory of mind"

# Mapping priority order
# If multiple matches are found, prefer in this order
mapping_priority:
  - "exact"      # Exact match (case-insensitive)
  - "fuzzy"      # Fuzzy string matching
  - "niclip"     # NiCLIP synonym-based matching

# Logging configuration
logging:
  # Path to unmatched tasks log file
  unmatched_log: "logs/task_map_unmatched.tsv"

  # Log mapping statistics
  stats_log: "logs/task_map_stats.json"

  # Verbosity level (DEBUG, INFO, WARNING, ERROR)
  level: "INFO"

# NiCLIP integration settings
niclip:
  # Path to cached synonym dictionary
  synonym_cache: "cache/niclip_synonyms.json"

  # Minimum prior probability to consider a task
  min_prior: 0.001

  # Use semantic embeddings for matching
  use_embeddings: false  # Will be enabled in future version

keyword_rules:
  - canonical: "Posner cueing task"
    keywords_any:
      - "posner"
    confidence: 0.55
  - canonical: "Visually guided saccade task"
    keywords_any:
      - "saccade"
    confidence: 0.55
  - canonical: "Flashing checkerboard"
    keywords_any:
      - "checkerboard"
    confidence: 0.55
  - canonical: "Oddball task"
    keywords_any:
      - "oddball"
    confidence: 0.55
  - canonical: "Neurofeedback Paradigm"
    keywords_any:
      - "neurofeedback"
    confidence: 0.55
  - canonical: "Retinotopic mapping task"
    keywords_any:
      - "retinotop"
      - "retmap"
      - "tonotop"
      - "somatotop"
    confidence: 0.55
  - canonical: "functional localizer fMRI tasks"
    keywords_any:
      - "localizer"
      - "localiser"
    confidence: 0.55
  - canonical: "motor sequencing task"
    keywords_any:
      - "motor"
    confidence: 0.55
  - canonical: "Emotion Regulation Task"
    regex:
      - "^emoreg(run)?\\d+$"
    confidence: 0.55
  - canonical: "passive listening"
    regex:
      - "^listen\\d+$"
    confidence: 0.55
