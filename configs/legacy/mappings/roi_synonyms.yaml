# ROI (Region of Interest) Synonyms Mapping
# Maps brain region names across atlases and naming conventions

# Frontal regions
- canonical: "prefrontal cortex"
  region_id: "region:prefrontal_cortex"
  synonyms:
    - "PFC"
    - "frontal cortex"
    - "frontal lobe"
  atlases:
    aal:
      - "Frontal_Sup"
      - "Frontal_Mid"
      - "Frontal_Inf"
    schaefer:
      - "*_PFC_*"
      - "*_Cont_*"  # Control network overlaps with PFC
    desikan:
      - "superiorfrontal"
      - "rostralmiddlefrontal"
      - "caudalmiddlefrontal"

- canonical: "dorsolateral prefrontal cortex"
  region_id: "region:dorsolateral_prefrontal_cortex"
