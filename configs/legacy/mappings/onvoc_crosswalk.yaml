contrasts:
  WM load (high>low):
    primary: ONVOC_0000488
    pattern: (?P<hi>\d)[- ]?back\s*>\s*(?P<lo>\d)[- ]?back
    match_task:
    - task:n-back
    prior_boost: 0.25
  Stroop Interference:
    primary: ONVOC_0000466
    pattern: (?i)incongruent\s*>\s*congruent
    match_task:
    - task:stroop
    prior_boost: 0.3
  Flanker Interference:
    primary: ONVOC_0000466
    pattern: (?i)incongruent\s*>\s*congruent
    match_task:
    - task:flanker
    prior_boost: 0.3
  Stop > Go:
    primary: ONVOC_0000466
    pattern: (?i)stop\s*>\s*go
    match_task:
    - task:stop_signal
    prior_boost: 0.3
  No-Go > Go:
    primary: ONVOC_0000467
    pattern: (?i)no[- ]?go\s*>\s*go
    match_task:
    - task:go-no-go
    prior_boost: 0.3
  MID Anticipation:
    primary: ONVOC_0000463
    pattern: (?i)anticipation\s+(win|gain)\s*>\s*neutral
    match_task:
    - task:mid
    - task:reward_processing
    prior_boost: 0.25
  MID Outcome:
    primary: ONVOC_0000463
    pattern: (?i)outcome\s+(win|gain)\s*>\s*neutral
    match_task:
    - task:mid
    - task:reward_processing
    prior_boost: 0.25
  Gambling (risky > safe):
    primary: ONVOC_0000428
    pattern: (?i)(risky|high[- ]?risk)\s*>\s*(safe|low[- ]?risk)
    match_task:
    - task:gambling
    prior_boost: 0.25
  Emotion Regulation (reappraise > view):
    primary: ONVOC_0000462
    pattern: (?i)(reappraise|regulate)\s*>\s*(view|maintain)
    match_task:
    - task:emotion_regulation
    prior_boost: 0.3
