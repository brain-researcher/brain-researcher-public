services:
  br-kg:
    build:
      context: ../..
      target: br-kg
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1

  agent:
    build:
      context: ../..
      target: agent
    depends_on:
      - br-kg
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - BR_KG_API_URL=http://br-kg:5000
