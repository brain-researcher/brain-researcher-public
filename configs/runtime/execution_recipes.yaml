tool_overrides:
  kg_multihop_qa:
    recipe_depth: summary
    execution_story_summary: Requires a running Brain Researcher BR-KG deployment backed by Neo4j; no portable per-call local recipe is advertised in v1.
    required_env_vars:
      - NEO4J_URI
      - NEO4J_USER
      - NEO4J_PASSWORD
    resource_profile:
      cpu: "2+"
      mem: "4G+"
      est_runtime: "seconds-to-minutes"
  workflow_rest_connectome_e2e:
    recipe_depth: runnable
    python_packages:
      - nibabel>=5.0.0
      - nilearn>=0.10.0
      - numpy>=1.24.0
    resource_profile:
      cpu: "2+"
      mem: "8G+"
      est_runtime: "minutes"
  workflow_preprocessing_qc:
    recipe_depth: runnable
    python_packages:
      - pandas>=2.2.0
      - numpy>=1.24.0
    neurodesk_modules:
      - fmriprep/23.2.3
      - mriqc/24.0.2
      - freesurfer/8.1.0
    required_env_vars:
      - FS_LICENSE
    resource_profile:
      cpu: "8+"
      mem: "32G+"
      est_runtime: "hours"
    container_images:
      fmriprep: nipreps/fmriprep:23.2.3
      mriqc: nipreps/mriqc:24.0.2
    execution_story_summary: Minimal real-execution recipe for single-subject fMRIPrep + MRIQC runs with downstream QC aggregation.
  workflow_task_glm_group:
    recipe_depth: runnable
    python_packages:
      - brain_researcher
      - nibabel>=5.0.0
      - nilearn>=0.10.0
      - numpy>=1.24.0
      - pandas>=2.2.0
      - scikit-learn>=1.3.0
    resource_profile:
      cpu: "4+"
      mem: "12G+"
      est_runtime: "minutes-to-hours"
    execution_story_summary: Minimal execute-capable recipe for group task GLM runs that prefers bids_dir + fmriprep_dir + task inputs and can preview or execute the resolved subject-level plan.
  workflow_dwi_connectome:
    recipe_depth: runnable
    python_packages:
      - brain_researcher
      - numpy>=1.24.0
      - nibabel>=5.0.0
      - pandas>=2.2.0
    neurodesk_modules:
      - qsirecon/1.1.0
      - mrtrix3/3.0.7
      - freesurfer/8.1.0
    required_env_vars:
      - FS_LICENSE
    resource_profile:
      cpu: "4+"
      mem: "16G+"
      est_runtime: "hours"
    container_images:
