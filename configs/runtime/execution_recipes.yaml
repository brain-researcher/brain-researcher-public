neurodesk_packages:
  afni:
    module_name: afni
    version: "25.2.03"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/afni_25.2.03_20250717/afni_25.2.03_20250717.simg
    commands:
      3dDeconvolve: "3dDeconvolve -input {input_file} -polort {polort} -bucket {output_file}"
      3dmerge: "3dmerge -1blur_fwhm {fwhm} -doall -prefix {output_file} {input_file}"
      3dTstat: "3dTstat -mean -prefix {output_file} {input_file}"
  ants:
    module_name: ants
    version: "2.6.0"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/ants_2.6.0_20250424/ants_2.6.0_20250424.simg
    commands:
      antsRegistration: "antsRegistration -d 3 {--metric metric} -f {fixed_image} -m {moving_image} -o {output_prefix} {--transform transform_type}"
      antsApplyTransforms: "antsApplyTransforms -d 3 -i {input_image} -r {reference_image} -o {output_image} -t {transform_file}"
      N4BiasFieldCorrection: "N4BiasFieldCorrection -d 3 -i {input_image} -o {output_image} {-x mask_image}"
  cat12:
    module_name: cat12
    version: "12.9"
    recommended_version: "12.9"
    available_versions: ["12.9", "r2166"]
  connectomeworkbench:
    module_name: connectomeworkbench
    version: "1.5.0"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/connectomeworkbench_1.5.0_20220919/connectomeworkbench_1.5.0_20220919.simg
    commands:
      wb_command: "wb_command {subcommand} {input_file} {output_file}"
  dcm2niix:
    module_name: dcm2niix
    version: "v1.0.20240202"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/dcm2niix_1.0.20240202_20240202/dcm2niix_1.0.20240202_20240202.simg
    commands:
      dcm2niix: "dcm2niix -o {output_dir} {-f filename_format} {-z compression} {input_dir}"
  fmriprep:
    module_name: fmriprep
    version: "23.2.3"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/fmriprep_23.2.3_20240916/fmriprep_23.2.3_20240916.simg
    commands:
      fmriprep: "fmriprep {bids_dir} {output_dir} participant {--fs-license-file fs_license_file} {--participant-label participant_label} {--nthreads nthreads} {--mem-mb mem_mb} {--output-spaces output_spaces}"
  freesurfer:
    module_name: freesurfer
    version: "8.1.0"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/freesurfer_8.1.0_20250812/freesurfer_8.1.0_20250812.simg
    commands:
      recon-all: "recon-all -s {subject_id} -i {input_file} -all {-parallel parallel}"
      mri_convert: "mri_convert {input_file} {output_file}"
      mris_convert: "mris_convert {input_surface} {output_surface}"
  fsl:
    module_name: fsl
    version: "6.0.7.18"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/fsl_6.0.7.18_20250928/fsl_6.0.7.18_20250928.simg
    env:
      FSLOUTPUTTYPE: NIFTI_GZ
    commands:
      bet: "bet {input_file} {output_file} {-f fractional_intensity} {-g gradient_threshold} {-m}"
      flirt: "flirt -in {input_file} -ref {reference_file} -out {output_file} {-omat output_matrix} {-dof dof} {-interp interp}"
      fnirt: "fnirt --in={input_file} --ref={reference_file} --iout={output_file} {--fout field_output} {--cout coef_output}"
      applywarp: "applywarp -i {input_file} -r {reference_file} -o {output_file} {-w warp_field} {--interp interp}"
      fslmaths: "fslmaths {input_file} {operation} {output_file}"
      fslmerge: "fslmerge -t {output_file} {input_files}"
      feat: "feat {design_file}"
      melodic: "melodic -i {input_file} -o {output_dir} {--tr tr} {--nobet}"
      randomise: "randomise -i {input_file} -o {output_prefix} -d {design_mat} -t {contrast_mat} {-n n_permutations} {--tfce}"
      palm: "palm -i {input_file} -d {design_mat} -t {contrast_mat} -o {output_prefix} {-n n_permutations}"
  mriqc:
    module_name: mriqc
    version: "24.0.2"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/mriqc_24.0.2_20241113/mriqc_24.0.2_20241113.simg
    commands:
      mriqc: "mriqc {bids_dir} {output_dir} participant {--participant-label participant_label} {--nthreads nthreads} {--mem-gb mem_gb}"
  qsiprep:
    module_name: qsiprep
    version: "0.21.4"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/qsiprep_0.21.4/qsiprep_0.21.4.sif
    commands:
      qsiprep: "qsiprep {bids_dir} {output_dir} participant {--fs-license-file fs_license_file} {--participant-label participant_label} {--output-resolution output_resolution}"
  mrtrix3:
    module_name: mrtrix3
    version: "3.0.7"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/mrtrix3_3.0.7_20250929/mrtrix3_3.0.7_20250929.simg
    commands:
      mrconvert: "mrconvert {input_file} {output_file} {-fslgrad bvecs bvals}"
      dwi2response: "dwi2response {algorithm} {input_file} {output_file}"
      dwi2fod: "dwi2fod {algorithm} {input_file} {response_file} {output_file}"
      tckgen: "tckgen {fod_image} {output_tracks} {-seed_image seed_image} {-mask mask_image} {-select n_tracks}"
      tcksift2: "tcksift2 {input_tracks} {fod_image} {output_weights}"
      tck2connectome: "tck2connectome {input_tracks} {parcellation} {output_connectome} {-tck_weights_in weights_file}"
  qsirecon:
    module_name: qsirecon
    version: "1.1.0"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/qsirecon_1.1.0_20250423/qsirecon_1.1.0_20250423.simg
    commands:
      qsirecon: "qsirecon {bids_dir} {output_dir} participant {--recon-spec recon_spec} {--participant-label participant_label}"
  fastsurfer:
    module_name: fastsurfer
    version: "2.4.2"
    container_path: /cvmfs/neurodesk.ardc.edu.au/containers/fastsurfer_2.4.2_20260115/fastsurfer_2.4.2_20260115.simg
    commands:
      run_fastsurfer.sh: "run_fastsurfer.sh --sid {subject_id} --sd {subjects_dir} --t1 {input_file} {--parallel}"

