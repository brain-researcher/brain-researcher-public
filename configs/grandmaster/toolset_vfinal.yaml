  # Layer 0: Context & Discovery
  # -------------------------
  - id: local_file_search
    layer: L0_context
    stage: context
    cost_tier: cheap
    origin: core75
    impl: "python: semantic doc search (scope=user protocol/paper/notes only; return snippets+citation offsets)"
    runtime:
      kind: alias
      target: gemini.search_text

  - id: br_kg_task_region_mapper
    layer: L0_context
    stage: interpretation
    cost_tier: moderate
    origin: core75
    impl: "external_api/python: query BR-KG to map task/construct -> regions/coordinates/networks"
    runtime:
      kind: alias
      target: br_kg.search_nodes

  - id: br_kg_dataset_search
    layer: L0_context
    stage: dataset
    cost_tier: moderate
    origin: core75
    impl: "external_api/python: KG-driven dataset search (topic/task/phenotype -> candidate datasets)"
    runtime:
      kind: alias
      target: br_kg.search_datasets

  - id: tool_retriever
    layer: L0_context
    stage: context
    cost_tier: cheap
    origin: core75
