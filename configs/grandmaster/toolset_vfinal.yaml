version: vFinal

# ---------------------------------------------------------------------------
# Grand Master Toolset (vFinal)
#
# Purpose:
# - Declare an intent-based tool surface (IDs, stages, cost tiers, impl notes)
# - Serve as the control plane for routing/presets/benchmarks
# - Avoid maintaining large alias/mapping tables inside the ToolSpec catalog
#
# Notes:
# - This file is declarative. Runtime execution is provided by Python wrappers
#   (e.g., brain_researcher/services/tools/grandmaster_tools.py) and/or BIDS Apps,
#   NiWrap tools, etc.
# ---------------------------------------------------------------------------

stages:
  - id: context
    description: Parameter/protocol/literature/tool retrieval
  - id: dataset
    description: BIDS/derivatives/indexing/query
  - id: qc
    description: Quality control and exclusion
  - id: preprocessing
    description: Confounds/postprocessing/resampling/pipeline orchestration
  - id: local_activity
    description: ALFF/fALFF/ReHo and related metrics
  - id: connectivity
    description: FC/graph/network statistics
  - id: task_glm
    description: Task GLM / PPI
  - id: dynamics
    description: Dynamic connectivity / states
  - id: prediction
    description: ML/CPM/GNN/decoding
  - id: clinical
    description: Clinical/longitudinal/lesion/normative/brain-age
  - id: interpretation
    description: Neurosynth/KG/neuromaps/decoding interpretation
  - id: reporting
    description: Figures, HTML/PDF reports, archiving

cost_tiers:
  cheap: Parsing/indexing/simple stats/light viz
  moderate: Nilearn/medium compute stats + feature extraction
  expensive: BIDS Apps/heavy permutations/DL/foundation models/tractography

