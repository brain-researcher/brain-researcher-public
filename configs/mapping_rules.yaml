# Primary mapping rules for BR-KG scoring and ONVOC anchoring.
# Runtime components (for example scorer/onvoc mapper flows) may read this file
# directly, so updates should be treated as production-facing config changes.
version: 0.0.1
backbone:
  onvoc_tree: configs/onvoc_tree.yaml
family_levels:
- l1
- l2
- l3
channels:
  lambda_by_channel:
    task: 1.0
    contrast: 0.3
    phenotype: 0.5
    modality: 0.3
    hed: 0.4
  caps:
    task: 1.0
    contrast: 1.0
    phenotype: 1.0
    modality: 1.0
    hed: 1.0
thresholds:
  min_weight_if_anchored: 0.4
  hard_topk: 2
  unassigned_if_all_below: 0.3
  cannot_link_cap: 0.1
defaults:
  accept:
    min_score: 0.85
    min_margin: 0.1
    allow_multi: false
  weights:
    id_exact: 1.0
    slug_exact: 0.9
    bids_exact: 0.9
    hed_all: 0.45
    hed_any: 0.35
    keywords_all: 0.35
    keywords_any: 0.25
    regex: 0.25
