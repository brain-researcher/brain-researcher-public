    templateflow: /home/zijiaochen/projects/oak_mount/templateflow
    shared_containers: /home/zijiaochen/projects/oak_mount/shared/containers
  user:
    dir: /home/zijiaochen/projects/oak_mount/users/zijiao/brain_researcher
    outputs: /home/zijiaochen/projects/oak_mount/users/zijiao/brain_researcher/outputs
    cache: /home/zijiaochen/projects/oak_mount/users/zijiao/brain_researcher/cache
