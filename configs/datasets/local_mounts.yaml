# Machine/local-specific mounts and paths
# These override or provide concrete paths for datasets on a given machine

local:
  niclip: /home/zijiaochen/projects/brain_researcher/data/niclip
  brainmap: /home/zijiaochen/projects/brain_researcher/data/brainmap
  openneuro_local: /home/zijiaochen/projects/dataset/openneuro
  br-kg: /home/zijiaochen/projects/brain_researcher/data/br-kg
  cache: /home/zijiaochen/projects/brain_researcher/data/cache
  processed: /home/zijiaochen/projects/brain_researcher/data/processed
  bids: /home/zijiaochen/projects/brain_researcher/data/bids
  public_s3_root: /home/zijiaochen/projects/dataset/public_s3_mount

oak_mount:
