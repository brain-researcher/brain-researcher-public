    hcp_ya: /home/zijiaochen/projects/oak_mount/HCP_YA
    "ds:manual:hcp_ya": /home/zijiaochen/projects/oak_mount/HCP_YA
    IBC_ds002685: /home/zijiaochen/projects/oak_mount/IBC/ds002685
    ICBM: /home/zijiaochen/projects/oak_mount/ICBM
    MLS: /home/zijiaochen/projects/oak_mount/MLS
    dense_ocd_BIDS_22_0_0: /home/zijiaochen/projects/oak_mount/dense_ocd/dense_ocd_BIDS_22.0.0
    ds000031: /home/zijiaochen/projects/oak_mount/myconnectome/ds000031
    ds000054_v0_0_5: /home/zijiaochen/projects/oak_mount/ds000054/0.0.5
    ds000105: /home/zijiaochen/projects/oak_mount/ds000105
    ds000224: /home/zijiaochen/projects/oak_mount/MSC/ds000224
    ds003465: /home/zijiaochen/projects/oak_mount/ds003465/ds003465
