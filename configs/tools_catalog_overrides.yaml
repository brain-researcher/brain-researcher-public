    search_hint: meeg sensor space connectivity mne epochs meg eeg pli wpli plv
    modality: [meg, eeg]
    intents: [connectivity_measures]
    tags: [meg, eeg, meeg, mne, sensor_space, connectivity, pli, wpli, plv, python, safe]

  # --- Modality backfill (routing-control-plane #23C) ---
