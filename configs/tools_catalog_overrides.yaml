# Supplemental tool catalog entries (tracked).
#
# Why this file exists:
# - `configs/tools_catalog_merged.json` is a generated artifact and is gitignored.
# - We still need a stable, reviewable source of truth for a small set of
#   Python tools so ToolSpec-based execution can work in CI/other machines.
#
# Loader behavior:
# - `services/tools/catalog_loader.py` merges this file on top of the merged JSON.
#
version: 1

