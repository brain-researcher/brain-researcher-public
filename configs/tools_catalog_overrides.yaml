  # --- Modality backfill (routing-control-plane slice 4) ---
  # These tools shipped with EMPTY modality, so under the match-all modality filter
  # they silently surfaced for ANY modality query (e.g. an fMRI connectivity tool
  # matching a MEG query). Tagging them gives the modality gate truth to work with:
  # M/EEG connectivity/source/timefreq tools are MEG/EEG-only; the nilearn/compute
  # connectivity tools are fMRI-only. connectivity_measures is a sensor-space
  # M/EEG tool; its canonical id is intentionally kept for compatibility.
  - name: mne_connectivity
    modality: [meg, eeg]
  - name: mne_ica
    modality: [meg, eeg]
  - name: mne_source_localization
    modality: [meg, eeg]
  - name: mne_timefreq
    modality: [meg, eeg]
    search_hint: meg eeg time frequency spectral power frequency bands band-limited networks multilayer connectivity mne morlet multitaper
    tags: [meg, eeg, meeg, mne, time_frequency, spectral_power, frequency_bands, band_limited, multilayer_networks]
  - name: localize_source
    modality: [meg, eeg]
  - name: timefreq_tfr
