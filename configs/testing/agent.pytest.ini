[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    unit: Unit tests that test individual components in isolation
    integration: Integration tests that test component interactions
    e2e: End-to-end tests that test complete workflows
    performance: Performance and scalability tests
    slow: Tests that take a long time to run
    requires_api: Tests that require external API access
    requires_redis: Tests that require Redis
    requires_gpu: Tests that require GPU access

# Test output
addopts =
    -v
    --strict-markers
    --tb=short
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-fail-under=80
    --durations=10

# Coverage settings
[coverage:run]
omit =
    */tests/*
    */test_*
    */__init__.py
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract

# Async settings
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout settings
timeout = 300
timeout_method = thread

# Parallel execution
# Uncomment to run tests in parallel
# addopts = -n auto

# Environment variables for testing
env =
    TESTING = true
    LANGGRAPH_TRACING = false
    BR_KG_API_URL = http://localhost:5000
