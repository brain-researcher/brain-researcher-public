# NiCLIP-LLM Fusion Configuration
# This file configures the integration of NiCLIP brain-data mapping
# with LLM semantic understanding for cognitive annotation
#
# Schema definitions (node/edge types, properties, ID formats) are now in:
# configs/neurokg/config.yml (schema section)

# NiCLIP Configuration
niclip:
  # Brain atlas to use (difumo256, difumo512, difumo1024)
  atlas: "difumo512"
  
  # Spatial parameters
  spatial:
    # Search radius in mm for coordinate mapping
    radius_mm: 10.0
    # Gaussian decay sigma (controls distance weighting)
    sigma: 3.33  # radius/3 as default
    # Minimum weight threshold
    min_weight: 0.1
  
  # Embedding parameters
  embeddings:
    # Number of dimensions for concept embeddings
    n_dims: 128
    # Cache embeddings for performance
    cache_enabled: true
    cache_path: "cache/niclip_embeddings.pkl"
  
  # Normalization
  normalization:
    # Method: percentile, log, linear
    method: "percentile"
    # Percentile range for percentile normalization
    percentile_range: [5, 95]
    # Clip outliers
    clip_outliers: true

# LLM Configuration
llm:
  # Model to use
  model: "gemini-2.5-flash"
  
  # API settings
  api:
    url: "http://localhost:8000"
    timeout: 30
    max_retries: 3
  
  # Ensemble parameters
  ensemble:
    # Number of passes for ensemble
    n_passes: 5
    # Temperature for diversity
    temperature: 0.7
    # Aggregation method: frequency, weighted, max
    aggregation: "frequency"
  
  # Direction detection
  direction:
    # Include direction in prompts
    include_direction: true
    # Direction options
    options: ["+1", "-1", "0"]

# Fusion Configuration
fusion:
  # Task-specific weights
  weights:
    # Perceptual tasks (visual, motor, sensory)
    perceptual:
      niclip: 0.7
      llm: 0.3
    
    # Cognitive tasks (working memory, executive, attention)
    cognitive:
      niclip: 0.5
      llm: 0.5
    
    # Social/semantic tasks (emotion, language, social)
    social:
      niclip: 0.3
      llm: 0.7
    
    # Default weights
    default:
      niclip: 0.5
      llm: 0.5
  
  # Confidence adjustments
  adjustments:
    # Bonus for direction agreement
    direction_agreement_bonus: 0.1
    # Penalty for high conflict
    conflict_penalty: -0.05
    # Boost for literature support
    literature_boost: 0.15
  
  # Thresholds
  thresholds:
    # Minimum confidence to include construct
    min_confidence: 0.1
    # Conflict detection threshold
    conflict_threshold: 0.3
    # High confidence threshold
    high_confidence: 0.8
  
  # Active learning
  active_learning:
    # Enable active learning
    enabled: true
    # Sample high-conflict cases
    conflict_sampling: true
    # Sample low-confidence cases
    uncertainty_sampling: true
    # Maximum samples per batch
    batch_size: 20

# Evaluation Configuration
evaluation:
  # Metrics to compute
  metrics:
    - precision_at_k
    - recall_at_k
    - f1_score
    - spatial_dice_overlap
    - expert_agreement
    - direction_accuracy
  
  # K values for precision/recall@k
  k_values: [1, 3, 5]
  
  # Expert validation
  expert:
    # Minimum expert agreement threshold
    min_agreement: 0.8
    # Use Cohen's kappa
    use_kappa: true
  
  # Spatial validation
  spatial:
    # Compare with Neurosynth
    compare_neurosynth: true
    # Dice coefficient threshold
    dice_threshold: 0.5

# Knowledge Graph Integration
knowledge_graph:
  # Edge properties
  edge_properties:
    # Include all evidence
    include_evidence: true
    # Evidence structure
    evidence_fields:
      - llm_confidence
      - niclip_strength
      - direction
      - spatial_overlap
      - combined_confidence
      - conflict_score
  
  # Versioning
  versioning:
    # Track annotation versions
    enabled: true
    # Version format
    format: "v{major}.{minor}.{patch}"

# Performance Configuration
performance:
  # Caching
  cache:
    # Enable caching
    enabled: true
    # Cache backend (memory, redis, disk)
    backend: "redis"
    # TTL in seconds
    ttl: 3600
  
  # Parallelization
  parallel:
    # Enable parallel processing
    enabled: true
    # Number of workers
    n_workers: 4
    # Batch size
    batch_size: 10

# Logging Configuration
logging:
  # Log level
  level: "INFO"
  
  # Log destinations
  destinations:
    - console
    - file
  
  # File logging
  file:
    path: "logs/fusion.log"
    max_size: "10MB"
    backup_count: 5
  
  # Metrics logging
  metrics:
    # Log fusion metrics
    log_metrics: true
    # Metrics file
    metrics_file: "logs/fusion_metrics.json"

# Literature Integration
literature:
  # Enable literature confidence
  enabled: true
  
  # Literature sources
  sources:
    - neurosynth
    - pubmed
    - cognitive_atlas
  
  # Confidence calculation
  confidence:
    # Weight for literature evidence
    weight: 0.3
    # Minimum papers threshold
    min_papers: 5