# Coordinate Systems Configuration
# Defines template spaces, transformation requirements, and validation rules
# Referenced by: invariants.md (COORD-01, COORD-02)
#
# Schema definitions (node/edge types, properties, ID formats) are now in:
# configs/neurokg/config.yml (schema section)

# Default coordinate space (COORD-01)
default: "MNI152_2009c"

# Default units and orientation
defaults:
  units: "mm"
  orientation: "RAS"  # Right-Anterior-Superior

# Registered coordinate systems
systems:
  - name: "MNI152_2009c"
    description: "ICBM 152 Nonlinear 2009c Asymmetric template"
    voxel: [2, 2, 2]  # mm
    orientation: "RAS"
    transform_chain_required: true
    preferred: true
    notes: "Preferred analysis space for BR-KG. Standard for most modern neuroimaging studies."
    reference: "https://www.bic.mni.mcgill.ca/ServicesAtlases/ICBM152NLin2009"
    
  - name: "MNI152_2006"
    description: "ICBM 152 Nonlinear 2006 Asymmetric template"
    voxel: [2, 2, 2]
    orientation: "RAS"
    transform_chain_required: true
    notes: "Older MNI template. Can be transformed to MNI152_2009c."
    
  - name: "MNI152_1mm"
    description: "ICBM 152 1mm resolution template"
    voxel: [1, 1, 1]
    orientation: "RAS"
    transform_chain_required: true
    notes: "Higher resolution variant of MNI152_2009c."
    
  - name: "Talairach"
    description: "Talairach coordinate system"
    voxel: [2, 2, 2]
    orientation: "RAS"
    transform_chain_required: true
    transforms:
      - from: "MNI152_2009c"
        method: "icbm2tal"
        version: "Lancaster2007"
        reference: "https://www.bioimagesuite.org/Mni2Tal/index.html"
    notes: "Legacy coordinate system. Requires transformation from MNI."
    
  - name: "fsaverage"
    description: "FreeSurfer average surface template"
    voxel: null  # Surface-based, not volumetric
    orientation: "RAS"
    transform_chain_required: false
    notes: "Surface-based coordinate system. Used for cortical surface analyses."
    
  - name: "fsaverage_sym"
    description: "FreeSurfer symmetric average surface template"
    voxel: null
    orientation: "RAS"
    transform_chain_required: false
    notes: "Symmetric variant of fsaverage."

# Transformation chain configuration
transforms:
  # Standard transformation methods
  methods:
    icbm2tal:
      description: "ICBM to Talairach transformation"
      version: "Lancaster2007"
      reversible: false
      
    mni152_2006_to_2009c:
      description: "MNI152 2006 to 2009c transformation"
      method: "nonlinear_warp"
      reversible: true
      
  # Transformation validation
  validation:
    require_provenance: true
    require_method: true
    require_version: true
    max_transformation_chain_length: 3

# Validation rules (COORD-02)
validation:
  # Required fields for Coordinate nodes
  required_fields:
    - "x"
    - "y"
    - "z"
    - "space"
    
  # Space field validation
  space_validation:
    must_be_registered: true  # Space must be in systems list above
    allow_unknown: false  # Reject unknown spaces
    case_sensitive: false
    
  # Coordinate range validation (MNI152 space bounds, approximate)
  coordinate_ranges:
    MNI152_2009c:
      x: [-100, 100]  # mm
      y: [-150, 150]
      z: [-100, 100]
    MNI152_2006:
      x: [-100, 100]
      y: [-150, 150]
      z: [-100, 100]
    Talairach:
      x: [-70, 70]
      y: [-110, 70]
      z: [-50, 50]
      
  # Rounding rules for public exports (PII-02)
  rounding:
    public_export_precision_mm: 1  # Round to 1mm for public exports
    internal_precision_mm: 0.1    # Keep 0.1mm precision internally

# Loader requirements
loader_requirements:
  # All Coordinate loaders must:
  - validate_space_field
  - check_coordinate_ranges
  - record_transformation_provenance
  - normalize_to_default_space_if_needed

# Notes
notes:
  - "All coordinates should be normalized to MNI152_2009c when possible"
  - "Unknown spaces will be rejected unless explicitly allowed"
  - "Transformation chains must be recorded in provenance"
  - "Public exports round coordinates to 1mm precision (see pii_redaction.yaml)"

