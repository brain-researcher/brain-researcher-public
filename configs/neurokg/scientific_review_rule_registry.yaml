    calibrates_rules: [LAYER_SELECTION_POST_HOC]
  - id: C53
    scenario: "RSA compares many models without correction."
    severity: warn
    calibrates_rules: [RSA_MODEL_COMPARISON_NO_CORRECTION]
  - id: C54
