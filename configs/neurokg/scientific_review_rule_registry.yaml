    severity: warn
    calibrates_rules: [ABOVE_CHANCE_NO_PERMUTATION]
  - id: C49
    scenario: "Fold-wise standard error treated as independent."
    severity: warn
    calibrates_rules: [CV_FOLD_ERROR_AS_INDEPENDENT]
  - id: C50
