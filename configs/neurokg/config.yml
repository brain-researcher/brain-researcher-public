# BR-KG Configuration File
# This file contains configuration settings for the BR-KG system
# Last Updated: 2025-01-06
#
# Schema definitions are consolidated here for easier maintenance.
# See also: edge_scoring.yaml, thresholds.yaml, index_plan.yaml, neurokg_fusion_config.yaml

# Graph Schema Definition
# Node and edge type definitions with properties, ID formats, and constraints
schema:
  # Node Type Definitions
  nodes:
    Coordinate:
      description: "An activation peak in a specific template space"
      id_format: "coord:<space>:<res>:<x>:<y>:<z>:<study>"
      key_properties: ["x", "y", "z", "space", "resolution"]
      required_properties: ["x", "y", "z", "space"]
      optional_properties: ["resolution", "study_id", "publication_id", "statistical_map_id"]
      sources: ["neurosynth", "brainmap", "pubmed"]
      current_count: 318325
      status: "loaded"
    
    Publication:
      description: "A scientific paper or study"
      id_format: "pmid:<ID> or doi:<DOI>"
      key_properties: ["pmid", "doi", "title", "year", "journal"]
      required_properties: ["pmid", "title"]
      optional_properties: ["doi", "year", "journal", "authors", "abstract", "keywords"]
      sources: ["pubmed", "neurosynth", "brainmap"]
      current_count: 137535
      status: "loaded"
    
    Collection:
      description: "NeuroVault image collection"
      id_format: "nv:collection:<ID>"
      key_properties: ["id", "name", "owner", "doi"]
      required_properties: ["id", "name"]
      optional_properties: ["owner", "doi", "description", "url"]
      sources: ["neurovault"]
      current_count: 15977
      status: "loaded"
    
    Term:
      description: "Cognitive/anatomical term"
      id_format: "term:sha1(<name>)"
      key_properties: ["name", "definition", "source"]
      required_properties: ["name"]
      optional_properties: ["definition", "source", "synonyms"]
      sources: ["multiple"]
      current_count: 3228
      status: "loaded"
    
    Concept:
      description: "A cognitive construct or mental process"
      id_format: "mesh:<ID> or concept:sha1(<name>)"
      key_properties: ["id", "label", "definition", "source"]
      required_properties: ["id", "label"]
      optional_properties: ["definition", "source", "synonyms", "parent_concept_id"]
      sources: ["cognitive_atlas", "mesh", "wikidata"]
      current_count: 919
      status: "loaded"
    
    Task:
      description: "An experimental task or paradigm"
      id_format: "cogat:<ID> or task:sha1(<name>)"
      key_properties: ["id", "label", "description"]
      required_properties: ["id", "label"]
      optional_properties: ["description", "domain", "paradigm", "concepts_measured"]
      sources: ["cognitive_atlas", "bids", "openneuro", "brainmap"]
      current_count: 853
      status: "loaded"
    
    StatisticalMap:
      description: "An unthresholded statistical map (e.g., t-map, z-map); live labels may appear as StatsMap or StatMap"
      id_format: "nv:<coll>/<img_id>#<etag>"
      key_properties: ["url", "kind", "format", "sha256"]
      required_properties: ["url", "kind"]
      optional_properties: ["format", "sha256", "collection_id", "contrast_id", "space"]
      sources: ["neurovault", "openneuro"]
      current_count: 47
      status: "partial"
    
    Contrast:
      description: "An experimental contrast (e.g., A > B)"
      id_format: "contrast:<dataset_id>:<name_hash>"
      key_properties: ["name", "task_id", "description"]
      required_properties: ["name"]
      optional_properties: ["task_id", "description", "dataset_id", "conditions"]
      sources: ["bids", "openneuro", "manual"]
      current_count: 2
      status: "minimal"

    Claim:
      description: "Structured claim extracted from publication evidence"
      id_format: "claim:<hash>"
      key_properties: ["text", "paper_id", "claim_polarity", "claim_strength"]
      required_properties: ["text", "paper_id"]
      optional_properties: ["target_id", "claim_kind", "related_claim_id", "method_rigor", "main_assumption_text", "main_assumption_id", "assumption_type", "assumption_scope", "defaultness_score", "challengeability_score", "assumption_confidence", "assumption_status", "provenance_completeness"]
      sources: ["gabriel"]
      current_count: 0
      status: "planned"

    Assumption:
      description: "Field-level assumption extracted from a claim or publication"
      id_format: "assumption:<hash>"
      key_properties: ["text", "source_claim_id", "assumption_type"]
      required_properties: ["text"]
      optional_properties: ["paper_id", "source_claim_id", "domain_scope", "defaultness_score", "challengeability_score", "confidence", "status"]
      sources: ["gabriel"]
      current_count: 0
      status: "planned"

    EvidenceSpan:
      description: "Traceable evidence span supporting a claim"
      id_format: "evidence:<hash>"
      key_properties: ["paper_id", "claim_id", "quote", "section"]
      required_properties: ["paper_id", "claim_id", "quote"]
      optional_properties: ["page", "char_start", "char_end", "evidence_quality"]
      sources: ["gabriel"]
      current_count: 0
      status: "planned"

    MeasurementRun:
      description: "Provenance object for an LLM measurement run"
      id_format: "run:<run_id>"
      key_properties: ["run_id", "tool", "model", "prompt_hash", "template_hash"]
      required_properties: ["run_id", "tool", "model", "prompt_hash", "template_hash"]
      optional_properties: ["raw_response_path", "status", "provenance_completeness"]
      sources: ["gabriel"]
      current_count: 0
      status: "planned"

    AgentSession:
      description: "Agent work-session summary derived from BR research logging"
      id_format: "agent_session:<session_id>"
      key_properties: ["session_id", "run_id", "source_client", "status"]
      required_properties: ["session_id"]
      optional_properties: ["goal", "task_surfaces", "open_risk_labels", "validation_evidence_count", "raw_session_json", "last_event_at"]
      sources: ["research_logging"]
      current_count: 0
      status: "planned"

    TaskSurface:
      description: "Coarse task surface inferred from a session"
      id_format: "task_surface:<surface>"
      key_properties: ["name", "surface_id"]
      required_properties: ["name"]
      optional_properties: ["surface_id"]
      sources: ["research_logging"]
      current_count: 0
      status: "planned"

    ValidationEvidence:
      description: "Concrete validation evidence extracted from a session handoff"
      id_format: "validation_evidence:<hash>"
      key_properties: ["evidence_type", "text", "source_field"]
      required_properties: ["evidence_type", "text"]
      optional_properties: ["source_field"]
      sources: ["research_logging"]
      current_count: 0
      status: "planned"

    OpenRisk:
      description: "Canonicalized open risk left by an agent session"
      id_format: "open_risk:<hash>"
      key_properties: ["label", "text"]
      required_properties: ["label", "text"]
      optional_properties: ["matched_pattern"]
      sources: ["research_logging"]
      current_count: 0
      status: "planned"

    Outcome:
      description: "Done item or artifact-like result from a session"
      id_format: "outcome:<hash>"
      key_properties: ["text", "source_field"]
      required_properties: ["text"]
      optional_properties: ["source_field"]
      sources: ["research_logging"]
      current_count: 0
      status: "planned"

    Lesson:
      description: "Candidate policy lesson extracted from session patterns"
      id_format: "lesson:<hash>"
      key_properties: ["issue_code", "text", "status"]
      required_properties: ["issue_code", "text"]
      optional_properties: ["status"]
      sources: ["research_logging"]
      current_count: 0
      status: "planned"

    NextAction:
      description: "Concrete next command or remediation action from a session handoff"
      id_format: "next_action:<hash>"
      key_properties: ["command", "action_type"]
      required_properties: []
      optional_properties: ["command", "action_type"]
      sources: ["research_logging"]
      current_count: 0
      status: "planned"
    
    Experiment:
      description: "Experimental session"
      id_format: "exp:<ID>"
      key_properties: ["id", "description"]
      required_properties: ["id"]
      optional_properties: ["description", "dataset_id", "subject_id", "session_id"]
      sources: ["bids", "openneuro", "manual"]
      current_count: 2
      status: "minimal"
    
    Embedding:
      description: "NICLIP text embedding"
      id_format: "emb:<pmid>"
      key_properties: ["vector", "model", "source"]
      required_properties: ["vector", "model"]
      optional_properties: ["source", "publication_id", "dimensions"]
      sources: ["niclip"]
      current_count: 1
      status: "incomplete"
    
    Region:
      description: "A future-enrichment atlas region label retained for compatibility"
      id_format: "<atlas>:<name> (e.g., schaefer400-7n:L_Cont_7)"
      key_properties: ["id", "label", "atlas", "hemisphere"]
      required_properties: ["id", "label", "atlas"]
      optional_properties: ["hemisphere", "volume", "centroid", "parent_region_id"]
      sources: ["wikidata", "atlases"]
      current_count: 86
      status: "incomplete"

    BrainRegion:
      description: "Canonical public spatial/anatomy node for substrate readiness"
      id_format: "<atlas>:<label_index> or atlas-derived region ID"
      key_properties: ["id", "name", "atlas"]
      required_properties: ["id", "atlas"]
      optional_properties: ["abbreviation", "hemisphere", "network", "label_index", "space"]
      sources: ["atlases", "nilearn", "openneuro_glmfitlins"]
      current_count: 813
      status: "loaded"
    
    Dataset:
      description: "A collection of neuroimaging data"
      id_format: "openneuro:<ID> or doi:<DOI>"
      key_properties: ["id", "doi", "name", "source"]
      required_properties: ["id", "name"]
      optional_properties: ["doi", "source", "description", "license", "url"]
      sources: ["openneuro", "bids"]
      current_count: 0
      status: "not_loaded"
    
    Phenotype:
      description: "A subject diagnosis, trait, or demographic"
      id_format: "mesh:<ID> or hpo:<ID>"
      key_properties: ["label", "category", "source"]
      required_properties: ["label"]
      optional_properties: ["category", "source", "mesh_id", "hpo_id", "definition"]
      sources: ["mesh", "hpo", "uk_biobank"]
      current_count: 0
      status: "not_loaded"
    
    Subject:
      description: "An individual participant in a study"
      id_format: "sub:<dataset_id>:sha256(<label>)"
      key_properties: ["dataset_uid", "subject_label"]
      required_properties: ["dataset_uid", "subject_label"]
      optional_properties: ["age", "sex", "handedness", "group"]
      sources: ["bids", "openneuro", "uk_biobank"]
      current_count: 0
      status: "not_loaded"
    
    Atlas:
      description: "A brain atlas or parcellation scheme"
      id_format: "atlas:<name>:<version>"
      key_properties: ["name", "version", "resolution"]
      required_properties: ["name"]
      optional_properties: ["version", "resolution", "space", "description"]
      sources: ["atlases"]
      current_count: 1
      status: "minimal"
    
    Author:
      description: "A researcher credited in a publication"
      id_format: "author:sha256(<name>:<affil_hash>)"
      key_properties: ["full_name", "orcid"]
      required_properties: ["full_name"]
      optional_properties: ["orcid", "affiliation", "email"]
      sources: ["pubmed", "crossref"]
      current_count: 0
      status: "not_loaded"
    
    File:
      description: "A raw data file (e.g., NIfTI, events.tsv)"
      id_format: "file:<dataset_id>:sha256(<path>)"
      key_properties: ["path", "sha256", "format", "size"]
      required_properties: ["path", "format"]
      optional_properties: ["sha256", "size", "dataset_id", "subject_id", "session_id"]
      sources: ["bids", "openneuro"]
      current_count: 0
      status: "not_loaded"

  # Edge Type Definitions
  edges:
    HAS_COORDINATE:
      description: "The publication reports the activation coordinate"
      path: ["Publication", "Coordinate"]
      matching_method: "direct_extraction"
      config_reference: "edge_scoring.yaml"
      expected_count: 318325
      status: "live"
      priority: 1
    
    IN_REGION:
      description: "Canonical spatial path from StatsMap evidence into BrainRegion"
      path: ["StatsMap", "BrainRegion"]  # StatsMap is the live-label shorthand for the StatisticalMap family
      matching_method: "spatial"
      config_reference: "thresholds.yaml"
      expected_count: "variable"
      status: "live"  # Coordinate -> Region remains a future enrichment lane
      priority: 2
    
    MEASURES:
      description: "The task is designed to measure the cognitive concept"
      path: ["Task", "Concept"]
      matching_method: "semantic"
      config_reference: "edge_scoring.yaml"
      expected_count: "variable"
      status: "partial"
      priority: 3
    
    ACTIVATES:
      description: "Tracked semantic enrichment from task/concept to region-like targets"
      path: ["Task", "Region"]  # Also: ["Concept", "Region"]
      matching_method: "meta_analytic"
      config_reference: "edge_scoring.yaml, thresholds.yaml"
      expected_count: "variable"
      status: "partial"  # Post-Gate-A semantic enrichment; not substrate-blocking
      priority: 4
    
    DERIVED_FROM:
      description: "The map was generated from the specified contrast or publication"
      path: ["StatisticalMap", "Contrast"]  # Also: ["StatisticalMap", "Publication"]
      matching_method: "direct_extraction"
      config_reference: "edge_scoring.yaml"
      expected_count: "variable"
      status: "partial"
      priority: 3

    WORKED_ON_SURFACE:
      description: "The agent session worked on the inferred task surface"
      path: ["AgentSession", "TaskSurface"]
      matching_method: "session_snapshot_classification"
      expected_count: "variable"
      status: "planned"
      priority: 2

    VALIDATED_BY:
      description: "The agent session reported concrete validation evidence"
      path: ["AgentSession", "ValidationEvidence"]
      matching_method: "session_snapshot_classification"
      expected_count: "variable"
      status: "planned"
      priority: 2

    LEFT_OPEN_RISK:
      description: "The agent session left a canonical open risk"
      path: ["AgentSession", "OpenRisk"]
      matching_method: "session_snapshot_classification"
      expected_count: "variable"
      status: "planned"
      priority: 2

    PRODUCED_ARTIFACT:
      description: "The agent session produced an outcome or artifact-like done item"
      path: ["AgentSession", "Outcome"]
      matching_method: "session_snapshot_classification"
      expected_count: "variable"
      status: "planned"
      priority: 3

    EXPOSED_FAILURE_MODE:
      description: "The task surface exposed the open-risk failure mode"
      path: ["TaskSurface", "OpenRisk"]
      matching_method: "session_snapshot_classification"
      expected_count: "variable"
      status: "planned"
      priority: 2

    HAS_REMEDIATION:
      description: "The open risk has a concrete next action"
      path: ["OpenRisk", "NextAction"]
      matching_method: "session_snapshot_classification"
      expected_count: "variable"
      status: "planned"
      priority: 3

    SHOULD_UPDATE_AGENT_POLICY:
      description: "The candidate lesson should be reviewed for agent policy updates"
      path: ["Lesson", "NextAction"]
      matching_method: "session_snapshot_classification"
      expected_count: "variable"
      status: "planned"
      priority: 3
    
    IMPLEMENTS_TASK:
      description: "The contrast is an implementation of the task"
      path: ["Contrast", "Task"]
      matching_method: "semantic"
      config_reference: "edge_scoring.yaml"
      expected_count: "variable"
      status: "minimal"
      priority: 3
    
    INCLUDES:
      description: "The dataset contains the group of subjects"
      path: ["Dataset", "SubjectGroup"]
      matching_method: "direct_extraction"
      config_reference: "edge_scoring.yaml"
      expected_count: "variable"
      status: "blocked"  # Requires Dataset nodes
      priority: 4
    
    HAS_PHENOTYPE:
      description: "The subject has the specified phenotype"
      path: ["Subject", "Phenotype"]
      matching_method: "direct_extraction"
      config_reference: "edge_scoring.yaml"
      expected_count: "variable"
      status: "blocked"  # Requires Subject nodes
      priority: 4
    
    PART_OF:
      description: "Canonical anatomy hierarchy over BrainRegion nodes"
      path: ["BrainRegion", "BrainRegion"]
      matching_method: "atlas_defined"
      config_reference: "edge_scoring.yaml"
      expected_count: "variable"
      status: "missing"  # Live PART_OF currently exists only for non-anatomy uses
      priority: 2
    
    CITES:
      description: "Represents the citation network between papers"
      path: ["Publication", "Publication"]
      matching_method: "direct_extraction"
      config_reference: "edge_scoring.yaml"
      expected_count: "variable"
      status: "partial"
      priority: 3
    
    SAME_AS:
      description: "Links two nodes of the same type that represent the same entity"
      path: ["Any", "Any"]  # Same type only
      matching_method: "multi_method"
      config_reference: "edge_scoring.yaml, thresholds.yaml"
      expected_count: "variable"
      status: "unknown"
      priority: 2
    
    MAPS_TO:
      description: "Links two nodes for cross-source or vocabulary mapping"
      path: ["Any", "Any"]
      matching_method: "semantic"
      config_reference: "edge_scoring.yaml, thresholds.yaml"
      expected_count: "variable"
      status: "unknown"
      priority: 3

    MENTIONS:
      description: "Publication mention of a concept with evidence-aware scores"
      path: ["Publication", "Concept"]
      matching_method: "llm_extract"
      config_reference: "thresholds.yaml"
      expected_count: "variable"
      status: "planned"
      priority: 2

    MENTIONS_REGION:
      description: "Publication mention of a region using evidence-first linking"
      path: ["Publication", "Region"]
      matching_method: "llm_extract"
      config_reference: "thresholds.yaml"
      expected_count: "variable"
      status: "planned"
      priority: 2

    REPORTS_CLAIM:
      description: "Publication reports a structured claim"
      path: ["Publication", "Claim"]
      matching_method: "llm_extract"
      config_reference: "thresholds.yaml"
      expected_count: "variable"
      status: "planned"
      priority: 2

    SUPPORTS:
      description: "Evidence span supports a claim"
      path: ["EvidenceSpan", "Claim"]
      matching_method: "llm_codify"
      config_reference: "thresholds.yaml"
      expected_count: "variable"
      status: "planned"
      priority: 1

    ASSUMES:
      description: "Claim anchors an explicit field assumption"
      path: ["Claim", "Assumption"]
      matching_method: "llm_extract"
      config_reference: "thresholds.yaml"
      expected_count: "variable"
      status: "planned"
      priority: 2

    CHALLENGES_ASSUMPTION:
      description: "Publication or claim challenges an extracted assumption"
      path: ["Publication|Claim", "Assumption"]
      matching_method: "llm_extract"
      config_reference: "thresholds.yaml"
      expected_count: "variable"
      status: "planned"
      priority: 2

    CONTRADICTS:
      description: "Claim contradicts another claim"
      path: ["Claim", "Claim"]
      matching_method: "llm_extract"
      config_reference: "thresholds.yaml"
      expected_count: "variable"
      status: "planned"
      priority: 2

    NULL_RESULT_FOR:
      description: "Claim reports a null-result relative to another claim"
      path: ["Claim", "Claim"]
      matching_method: "llm_extract"
      config_reference: "thresholds.yaml"
      expected_count: "variable"
      status: "planned"
      priority: 2

    REPLICATES:
      description: "Claim directly or conceptually replicates another claim"
      path: ["Claim", "Claim"]
      matching_method: "llm_extract"
      config_reference: "thresholds.yaml"
      expected_count: "variable"
      status: "planned"
      priority: 2

    FAILED_REPLICATION_OF:
      description: "Claim reports a failed replication of another claim"
      path: ["Claim", "Claim"]
      matching_method: "llm_extract"
      config_reference: "thresholds.yaml"
      expected_count: "variable"
      status: "planned"
      priority: 2

    GENERATED:
      description: "Measurement run generated evidence or claim artifacts"
      path: ["MeasurementRun", "Any"]
      matching_method: "direct_extraction"
      config_reference: "provenance.yaml"
      expected_count: "variable"
      status: "planned"
      priority: 2

  # ID Generation Rules
  id_rules:
    curie_namespaces:
      pmid: "PubMed IDs"
      doi: "Digital Object Identifiers"
      cogat: "Cognitive Atlas IDs"
      nv: "NeuroVault collections/images"
      ns: "NeuroSynth terms"
      bm: "BrainMap experiments"
      openneuro: "OpenNeuro datasets"
      niclip: "NiCLIP model entities"
      mesh: "MeSH terms"
      hpo: "Human Phenotype Ontology"
    
    default_computation:
      description: "Fallback ID generation when explicit ID not provided"
      method: "md5_hash"
      format: "{labels}-{key_properties}"

# Database Configuration (Neo4j only)
graph_neo4j_uri: "bolt://localhost:7687"
graph_neo4j_user: "neo4j"
graph_neo4j_password: "password"
max_database_size: "1TB"  # Logical graph size budget

# Memory Configuration (ingestion/cache tuning)
memory:
  cache_size: "8GB"   # Target in-memory cache for ingestion helpers
  mmap_size: "16GB"   # Buffering for large ETL stages
  page_size: 4096     # Retained for backward compatibility in loaders

# ETL Configuration
etl:
  sample_sizes:
    cognitive_atlas_concepts: -1    # -1 means no limit
    cognitive_atlas_tasks: -1
    neurosynth_studies: -1
    neurosynth_coordinates: -1
    pubmed_publications: -1
  batch_size: 10000                 # Process data in batches
  parallel_processing: true         # Enable parallel processing
  max_workers: 8                    # Number of parallel workers

# Query Configuration
query:
  cache_enabled: true
  max_cache_size: 100000           # Increased cache size
  default_limit: 10000             # Increased default query limit
  timeout: 3600                    # Query timeout in seconds

# Performance Configuration
performance:
  index_enabled: true              # Enable database indexing
  compression_enabled: true        # Enable data compression
  vacuum_enabled: true            # Enable automatic vacuuming

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_file: "neurokg_full.log"
