[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    slow: time > 10s
    e2e: end-to-end browser or multi-service
    realdata: needs large/open datasets
    network: hits external services
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external services)
    performance: Performance and benchmarking tests
    requires_api: Requires external API access
    requires_gpu: Requires GPU for computation
    asyncio: Asynchronous test functions
    websocket: Tests involving WebSocket connections
    benchmark: Micro/benchmark tests requiring special setup
    property: Property-based tests using hypothesis or similar frameworks
    load: Load testing scenarios
addopts =
    -m "not slow and not e2e and not realdata"
    --strict-markers
    --verbose
    -ra
    --import-mode=importlib
    --ignore=tests/integration/test_advanced_tools.py
    --ignore-glob="*test_advanced_tools.py*"
# BR-KG unit tests are validated as an explicit shard:
#   pytest --collect-only -q tests/unit/br-kg
# Recursive collection of tests/unit with this package included is import-order
# sensitive in legacy tests, so keep the default unit shard collectable.
norecursedirs = tests/unit/br-kg

# Coverage settings
# --cov=brain_researcher
# --cov-report=html:htmlcov
# --cov-report=term-missing
# --cov-fail-under=80

# Timeout settings
timeout = 300
timeout_method = thread

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning:nibabel.*
    ignore::DeprecationWarning:nilearn.*
    ignore::FutureWarning:sklearn.*
    ignore::UserWarning:torch.*
    ignore::PendingDeprecationWarning
    # noisy C-extension warnings (swig generated) when importing some deps
    ignore:.*SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:.*SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:.*swigvarlink.*:DeprecationWarning
    # hypothesis temp-dir / non-writable dir warnings in CI/dev
    ignore::UserWarning:hypothesis.*
    ignore:Skipping collection of '.hypothesis' directory.*:UserWarning
    ignore:unclosed Connection .*fakeredis\.aioredis\.FakeConnection.*:ResourceWarning
    ignore:.*channels are marked as bad.*:UserWarning
    ignore:'crypt' is deprecated and slated for removal in Python 3\.13:DeprecationWarning:passlib\.utils
    ignore:.*min_items.*:pydantic.warnings.PydanticDeprecatedSince20:pydantic\.fields
    ignore:.*max_items.*:pydantic.warnings.PydanticDeprecatedSince20:pydantic\.fields
    ignore:.*class-based `config` is deprecated.*:pydantic.warnings.PydanticDeprecatedSince20:pydantic\._internal\._config
    ignore:.*`json_encoders` is deprecated.*:pydantic.warnings.PydanticDeprecatedSince20:pydantic\._internal\._generate_schema
