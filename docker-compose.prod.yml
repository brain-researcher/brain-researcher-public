services:
  nginx:
    image: nginx:1.25-alpine
    container_name: brain-researcher-nginx
    depends_on:
      - agent
      - web-ui
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/brain-researcher-compose.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - nginx -t
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - brain-researcher-network

  # api-gateway removed

  neo4j:
    image: neo4j:5.20
    container_name: brain-researcher-neo4j
    ports:
      - '7687:7687'
      - '7474:7474'
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - ./data/neo4j:/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - cypher-shell -a bolt://localhost:7687 -u neo4j -p ${NEO4J_PASSWORD:?set NEO4J_PASSWORD} 'RETURN 1'
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - brain-researcher-network

  br-kg:
    build:
      context: .
      target: br-kg
    container_name: brain-researcher-br-kg
    depends_on:
      - neo4j
    ports:
      - '5000:5000'
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:5000/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - brain-researcher-network

  agent:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.agent
    container_name: brain-researcher-agent
    depends_on:
      - br-kg
      - redis
    ports:
      - '8000:8000'
    env_file:
      - .env
      - .env.local
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./configs:/app/configs:ro
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - BR_KG_API_URL=http://br-kg:5000
      - REDIS_URL=redis://redis:6379/2
      - BR_ORCHESTRATOR_URL=http://orchestrator:3001
      - BR_QUEUE_BACKEND=sqlite
      - BR_QUEUE_DB=/app/data/orchestrator/jobs.sqlite
      - DEFAULT_LLM_MODEL=gemini-2.0-flash
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - brain-researcher-network

  orchestrator:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.orchestrator
    container_name: brain-researcher-orchestrator
    depends_on:
      - agent
      - br-kg
      - redis
    ports:
      - '3001:3001'
    env_file:
      - .env
      - .env.local
    volumes:
      - ./data:/app/data
      - ./logs/orchestrator:/app/logs
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - AGENT_URL=http://agent:8000
      - BR_KG_URL=http://br-kg:5000
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - BR_MCP_TOKEN_PEPPER=${BR_MCP_TOKEN_PEPPER:-}
      - BR_MCP_TOKEN_PEPPER_VERSION=${BR_MCP_TOKEN_PEPPER_VERSION:-v1}
      - BR_MCP_TOKEN_REDIS_PREFIX=${BR_MCP_TOKEN_REDIS_PREFIX:-mcp_token}
      - BR_QUEUE_BACKEND=sqlite
      - BR_QUEUE_DB=/app/data/orchestrator/jobs.sqlite
      - ORCHESTRATOR_UPLOAD_DIR=/app/data/uploads/chat
      - LOG_LEVEL=INFO
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:3001/health
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - brain-researcher-network

  web-ui:
    build:
      context: .
      dockerfile: apps/web-ui/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SUPABASE_OAUTH_PROVIDERS: ${NEXT_PUBLIC_SUPABASE_OAUTH_PROVIDERS}
        NEXT_PUBLIC_AUTH_MODE: ${NEXT_PUBLIC_AUTH_MODE}
        NEXT_PUBLIC_AGENT_API: ${NEXT_PUBLIC_AGENT_API:-http://localhost:8000}
        NEXT_PUBLIC_ORCHESTRATOR_URL: ${NEXT_PUBLIC_ORCHESTRATOR_URL:-http://localhost:3001}
        NEXT_PUBLIC_BR_KG_API: ${NEXT_PUBLIC_BR_KG_API:-http://localhost:5000}
        NEXT_PUBLIC_NICLIP_API: ${NEXT_PUBLIC_NICLIP_API}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-/ws}
        NEXT_PUBLIC_USE_API_PROXY: ${NEXT_PUBLIC_USE_API_PROXY:-true}
        # Used by next.config.js rewrites at build time (runs inside Docker network).
        ORCHESTRATOR_HOST: orchestrator
        ORCHESTRATOR_PORT: '3001'
        AGENT_HOST: agent
        AGENT_PORT: '8000'
        BR_KG_HOST: br-kg
        BR_KG_PORT: '5000'
    container_name: brain-researcher-web-ui
    depends_on:
      - agent
      - orchestrator
    ports:
      - '3000:3000'
    env_file:
      - .env
      - .env.local
    environment:
      - NODE_ENV=production
      - PROJECT_ROOT=/
      - AGENT_BASE_URL=http://agent:8000
      - BR_ORCHESTRATOR_URL=http://orchestrator:3001
      - BR_KG_API=http://br-kg:5000
      # Next.js `rewrites()` runs inside this container. Use Docker DNS names, not localhost.
      - ORCHESTRATOR_HOST=orchestrator
      - ORCHESTRATOR_PORT=3001
      - AGENT_HOST=agent
      - AGENT_PORT=8000
      - BR_KG_HOST=br-kg
      - BR_KG_PORT=5000
      - NEXT_PUBLIC_ORCHESTRATOR_URL=${NEXT_PUBLIC_ORCHESTRATOR_URL:-http://localhost:3001}
      - NEXT_PUBLIC_AGENT_API=${NEXT_PUBLIC_AGENT_API:-http://localhost:8000}
      - NEXT_PUBLIC_BR_KG_API=${NEXT_PUBLIC_BR_KG_API:-http://localhost:5000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-/ws}
      - NEXT_PUBLIC_USE_API_PROXY=true
      - NEXT_PUBLIC_APP_NAME=Brain Researcher Web
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_OAUTH_PROVIDERS=${SUPABASE_OAUTH_PROVIDERS}
      - NEXT_PUBLIC_SUPABASE_OAUTH_PROVIDERS=${NEXT_PUBLIC_SUPABASE_OAUTH_PROVIDERS}
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    volumes:
      - ./configs:/configs:ro
    networks:
      - brain-researcher-network

  redis:
    image: redis:7-alpine
    container_name: brain-researcher-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - brain-researcher-network

  mcp:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.mcp
    container_name: brain-researcher-mcp
    depends_on:
      - redis
    ports:
      - '7000:7000'
    env_file:
      - .env
      - .env.local
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./tmp:/app/tmp
      - ./logs/mcp:/app/logs
    environment:
      - BR_MCP_TRANSPORT=streamable-http
      - BR_MCP_HOST=0.0.0.0
      - BR_MCP_PORT=7000
      - BR_MCP_RUN_ROOT=/app/data/runs/mcp_runs
      - BR_MCP_RUN_ROOT_ALIASES=/app/artifacts/mcp_runs
      - BR_MCP_ALLOWED_ROOTS=/app/artifacts,/app/data,/app/tmp
      - BR_MCP_LOG_LEVEL=INFO
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - BR_MCP_AUTH_MODE=${BR_MCP_AUTH_MODE:-token_or_jwt}
      - BR_MCP_TOKEN_PEPPER=${BR_MCP_TOKEN_PEPPER:-}
      - BR_MCP_TOKEN_PEPPER_VERSION=${BR_MCP_TOKEN_PEPPER_VERSION:-v1}
      - BR_MCP_TOKEN_REDIS_PREFIX=${BR_MCP_TOKEN_REDIS_PREFIX:-mcp_token}
      - BR_MCP_ALLOW_NETWORK=0
      - BR_MCP_ALLOW_DANGEROUS=0
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7000/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - brain-researcher-network

volumes:
  redis_data: # postgres_data:

  nginx_logs:


networks:
  brain-researcher-network:
    name: brain-researcher-network
