name: brain_researcher
channels:
  - conda-forge
  - defaults
  - bioconda
dependencies:
  # Python version
  - python=3.11
  
  # Core scientific packages (conda-managed for better performance)
  - numpy=1.26.4
  - scipy=1.11.4
  - scikit-learn=1.3.2
  - pandas=2.2.0
  - matplotlib=3.8.2
  - seaborn=0.13.0
  - statsmodels=0.14.1
  
  # Jupyter ecosystem
  - jupyter
  - notebook
  - ipykernel
  - jupyterlab
  
  # Build tools
  - pip
  - setuptools
  - wheel
  
  # System libraries
  - gcc
  - gxx
  - make
  
  # Pip packages
  - pip:
      # Web frameworks
      - Flask>=3.1.0
      - Flask-CORS>=4.0.0
      - fastapi>=0.115.12
      - uvicorn[standard]>=0.34.0
      - gunicorn>=23.0.0
      - dash>=2.14.0
      - dash-cytoscape>=0.3.0
      
      # LangChain ecosystem
      - langchain>=0.1.0
      - langchain-core>=0.1.0
      - langgraph>=0.3.18
      - langchain-openai>=0.0.5
      - langchain-anthropic>=0.0.1
      - langchain-community>=0.0.1
      - langchain-google-genai
      - langchain_ollama
      - openneuro-py>=2026.3.0
      
      # AI/ML libraries
      - openai
      - transformers
      - sentencepiece
      - sentence-transformers>=2.2.0
      - faiss-cpu>=1.7.4
      - xgboost>=2.1.0
      - lightgbm>=4.5.0
      - torch-geometric>=2.6.0
      - pytorch-tabnet>=4.1.0
      
      # MCP tools
      - mcp
      - tooluniverse
      - sequential-thinking-mcp>=0.1.0
      
      # Database and storage
      - neo4j>=5.28.0
      - py2neo>=2021.2.4
      - psycopg2-binary>=2.9.10
      - redis>=6.2.0
      - fakeredis>=2.19.0
      - SQLAlchemy==1.4.54
      - SQLAlchemy-JSONField>=1.0.2
      - SQLAlchemy-Utils>=0.41.2
      - alembic>=1.16.0
      - aiosqlite>=0.21.0
      
