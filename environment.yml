      - nimare>=0.5.0
      - neuromaps>=0.0.5
      - templateflow>=24.1.0
      - cognitiveatlas>=0.1.11
      - PyMARE>=0.0.10
      - pyneurovault>=0.1.3
      - "neurostore-sdk @ git+https://github.com/neurostuff/neurostore-python-sdk.git"
      
      # Apache Airflow (for workflow orchestration)
