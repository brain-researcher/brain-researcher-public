openapi: 3.0.3
info:
  title: GLM FitLins API
  version: 0.1.0
  description: Draft OpenAPI spec for the BR-KG GLM FitLins endpoints.
servers:
  - url: /api/glmfitlins
paths:
  /datasets:
    get:
      summary: Get datasets with GLM FitLins data
      tags: [Datasets]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetsResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /contrasts:
    get:
      summary: Get contrasts
      tags: [Contrasts]
      parameters:
        - in: query
          name: dataset_id
          schema: { type: string }
        - in: query
          name: task
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContrastsResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /contrasts/{contrast_id}/constructs:
    get:
      summary: Get constructs for a contrast
      tags: [Constructs]
      parameters:
        - in: path
          name: contrast_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContrastConstructsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /constructs:
    get:
      summary: Get constructs
      tags: [Constructs]
      parameters:
        - in: query
          name: name
          schema: { type: string }
        - in: query
          name: min_confidence
          schema: { type: number, default: 0 }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstructsResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /search:
    get:
      summary: Search datasets, contrasts, and constructs
      tags: [Search]
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: type
          schema:
            type: string
            enum: [dataset, contrast, construct]
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          description: Missing query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /priors:
    get:
      summary: Get GLM design priors
      tags: [Priors]
      parameters:
        - in: query
          name: dataset_id
          schema: { type: string }
        - in: query
          name: task
          schema: { type: string }
        - in: query
          name: mode
          schema:
            type: string
            enum: [distribution, family]
            default: distribution
        - in: query
          name: k
          schema:
            type: integer
            default: 24
        - in: query
          name: seed
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriorsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Backend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /constructs/{construct_id}/contrasts:
    get:
      summary: Get contrasts for a construct
      tags: [Constructs]
      parameters:
        - in: path
          name: construct_id
          required: true
          schema: { type: string }
        - in: query
          name: dataset_id
          schema: { type: string }
        - in: query
          name: min_confidence
          schema: { type: number, default: 0 }
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConstructContrastsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  "/contrasts/constructs:batch":
    post:
      summary: Batch fetch constructs for contrasts
      tags: [Constructs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContrastConstructsBatchRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContrastConstructsBatchResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stats:
    get:
      summary: Get GLM FitLins statistics
      tags: [Stats]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /concept-aliases:
    get:
      summary: Get concept aliases
      tags: [Aliases]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConceptAliasesResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    DatasetSummary:
      type: object
      properties:
        id: { type: string }
        dataset_id: { type: string }
        name: { type: string }
        doi: { type: string }
        source: { type: string }
        contrast_count: { type: integer }
    DatasetsResponse:
      type: object
      properties:
        datasets:
          type: array
          items:
            $ref: "#/components/schemas/DatasetSummary"
        total: { type: integer }
    ContrastSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        task_label: { type: string }
        dataset_id: { type: string }
        construct_count: { type: integer }
    ContrastsResponse:
      type: object
      properties:
        contrasts:
          type: array
          items:
            $ref: "#/components/schemas/ContrastSummary"
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
    ConstructSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        node_id: { type: string }
        usage_count: { type: integer }
        avg_confidence: { type: number }
    ConstructsResponse:
      type: object
      properties:
        constructs:
          type: array
          items:
            $ref: "#/components/schemas/ConstructSummary"
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
    ContrastConstruct:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        direction: { type: string }
        llm_confidence: { type: number }
        literature_confidence: { type: number }
        overall_confidence: { type: number }
    ContrastConstructsResponse:
      type: object
      properties:
        contrast_id: { type: string }
        constructs:
          type: array
          items:
            $ref: "#/components/schemas/ContrastConstruct"
        total: { type: integer }
    SearchResponse:
      type: object
      properties:
        datasets:
          type: array
          items:
            $ref: "#/components/schemas/DatasetSummary"
        contrasts:
          type: array
          items:
            $ref: "#/components/schemas/ContrastSummary"
        constructs:
          type: array
          items:
            $ref: "#/components/schemas/ConstructSummary"
        total:
          type: object
          properties:
            datasets: { type: integer }
            contrasts: { type: integer }
            constructs: { type: integer }
            all: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
    PriorsResponse:
      type: object
      properties:
        priors:
          type: object
          additionalProperties:
            type: object
            additionalProperties: { type: number }
        scanned: { type: integer }
        source: { type: string }
        scope: { type: string }
        support:
          $ref: "#/components/schemas/PriorSupport"
        spec_family:
          type: array
          items:
            type: object
            additionalProperties: true
    PriorSupport:
      type: object
      properties:
        n_nodes_scanned: { type: integer }
        n_datasets: { type: integer }
        n_tasks: { type: integer }
    ConstructContrast:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        task_label: { type: string }
        dataset_id: { type: string }
        direction: { type: string }
        llm_confidence: { type: number }
        literature_confidence: { type: number }
        overall_confidence: { type: number }
    ConstructContrastsResponse:
      type: object
      properties:
        construct_id: { type: string }
        contrasts:
          type: array
          items:
            $ref: "#/components/schemas/ConstructContrast"
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
    ContrastConstructsBatchRequest:
      type: object
      properties:
        contrast_ids:
          type: array
          items: { type: string }
        min_confidence: { type: number }
      required: [contrast_ids]
    ContrastConstructsBatchResult:
      type: object
      properties:
        contrast_id: { type: string }
        constructs:
          type: array
          items:
            $ref: "#/components/schemas/ContrastConstruct"
        total: { type: integer }
    ContrastConstructsBatchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/ContrastConstructsBatchResult"
        total: { type: integer }
    StatsResponse:
      type: object
      properties:
        database:
          type: object
          properties:
            total_nodes: { type: integer }
            total_relationships: { type: integer }
        glmfitlins:
          type: object
          properties:
            datasets: { type: integer }
            contrasts: { type: integer }
            constructs: { type: integer }
            annotations: { type: integer }
            subject_groups: { type: integer }
            subjects: { type: integer }
            phenotypes: { type: integer }
        relationships:
          type: object
          properties:
            involves_construct: { type: integer }
            includes: { type: integer }
            has_subject: { type: integer }
            has_phenotype: { type: integer }
        confidence_stats:
          type: object
    ConceptAliasesResponse:
      type: object
      properties:
        aliases:
          type: array
          items:
            type: object
            properties:
              alias: { type: string }
              concept_id: { type: string }
        grouped_by_concept:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        total_aliases: { type: integer }
        total_concepts: { type: integer }
