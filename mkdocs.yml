site_name: Brain Researcher Documentation
site_description: A neuroimaging analysis platform combining LLM-powered natural language understanding with advanced fMRI analysis tools
site_author: Brain Researcher Team
site_url: https://brain-researcher.readthedocs.io

# Repository
repo_name: brain-researcher
repo_url: https://github.com/your-org/brain-researcher
edit_uri: edit/main/docs/

# Theme configuration
theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/brain

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_object_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google
  - autorefs
  - git-revision-date-localized:
      enable_creation_date: true

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: your-org
      repo: brain-researcher
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Navigation
nav:
  - Home: index.md
  - MCP: mcp.md
  - Operations: OPERATIONS.md
  - Runtime Stack: specs/brain_researcher_runtime_stack.md
  - BR-KG:
      - Tool Schema: services/br-kg/kg_tool_schema.md
      - GABRIEL Pipeline: services/br-kg/gabriel_full_pipeline.md
      - GABRIEL Quickstart: services/br-kg/gabriel_sample_quickstart.md
  - Use Cases:
      - BR-KG Plot Probe: use_cases/br_kg_plot_probe_20260502/SUMMARY.md
      - Bounded Autoresearch: use_cases/bounded_autoresearch_a1_2026-04-30/BOUNDED_AUTORESEARCH_CASE_REPORT.md

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-org/brain-researcher
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/your-org/brain-researcher
  version:
    provider: mike
    default: stable

# Extra JavaScript
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
